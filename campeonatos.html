<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonatos - Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
max-width:1100px;
margin:auto;
}

input, select{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#f7c600;
color:black;
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

.btn{
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-bottom:12px;
font-weight:bold;
cursor:pointer;
border:none;
}

.btn-voltar{
display:inline-block;
margin-bottom:15px;
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.logo{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
background:#1a3f73;
}

.nome-campeonato{
font-weight:bold;
font-size:16px;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
gap:12px;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.item{
display:flex;
align-items:center;
gap:12px;
min-width:0;
}

.item-info{
display:flex;
flex-direction:column;
gap:4px;
min-width:0;
}

.item-info small{
opacity:.85;
font-size:12px;
}

.actions{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.actions button{
background:#1a3f73;
padding:6px 10px;
border-radius:6px;
color:white;
border:none;
font-size:12px;
margin:0;
}

.actions .delete{
background:#b30000;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:15px;
z-index:999;
}

.modal-content{
background:#102a52;
padding:20px;
border-radius:12px;
max-width:500px;
width:100%;
text-align:center;
max-height:85vh;
overflow:auto;
}

.modal-content img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
margin-bottom:12px;
background:#1a3f73;
}

.tags{
display:flex;
gap:6px;
flex-wrap:wrap;
justify-content:center;
margin-top:10px;
}

.tag{
background:#1a3f73;
padding:4px 8px;
border-radius:999px;
font-size:12px;
}

.subtitle{
opacity:.85;
font-size:13px;
margin-bottom:10px;
}

.checkbox-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(110px, 1fr));
gap:8px;
margin-bottom:12px;
}

.check-item{
background:#102a52;
padding:8px;
border-radius:8px;
display:flex;
align-items:center;
gap:8px;
}

.check-item input{
width:auto;
margin:0;
}
</style>
</head>

<body>

<header>Campeonatos</header>

<div class="container">

<a href="admin.html" class="btn-voltar">← Voltar</a>

<a class="btn" onclick="toggleFormulario()">+ Novo Campeonato</a>

<input id="buscaCampeonato" placeholder="Pesquisar campeonato..." oninput="carregarCampeonatos()">

<div id="formulario" style="display:none;">
  <input id="nomeCampeonato" placeholder="Nome do campeonato">
  <input id="logoCampeonato" type="file" accept="image/*">
  <input id="temporadaCampeonato" placeholder="Temporada (ex: 2026)">

  <select id="statusCampeonato">
    <option value="">Selecione o status</option>
    <option value="Ativo">Ativo</option>
    <option value="Em breve">Em breve</option>
    <option value="Encerrado">Encerrado</option>
  </select>

  <div class="subtitle">Categorias do campeonato</div>
  <div class="checkbox-grid" id="categoriasGrid">
    <label class="check-item"><input type="checkbox" value="Sub-11">Sub-11</label>
    <label class="check-item"><input type="checkbox" value="Sub-12">Sub-12</label>
    <label class="check-item"><input type="checkbox" value="Sub-13">Sub-13</label>
    <label class="check-item"><input type="checkbox" value="Sub-14">Sub-14</label>
    <label class="check-item"><input type="checkbox" value="Sub-15">Sub-15</label>
    <label class="check-item"><input type="checkbox" value="Sub-16">Sub-16</label>
    <label class="check-item"><input type="checkbox" value="Sub-17">Sub-17</label>
    <label class="check-item"><input type="checkbox" value="Sub-18">Sub-18</label>
    <label class="check-item"><input type="checkbox" value="Sub-19">Sub-19</label>
    <label class="check-item"><input type="checkbox" value="Sub-21">Sub-21</label>
  </div>

  <button id="botaoSalvar" onclick="salvarCampeonato()">Salvar Campeonato</button>
</div>

<div class="lista-grid" id="listaCampeonatos"></div>

</div>

<div class="modal" id="modalVer">
  <div class="modal-content" id="modalConteudo"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let editandoId = null;
let logoAtual = "";

window.toggleFormulario = function(){
  const f = document.getElementById("formulario");
  f.style.display = f.style.display === "none" ? "block" : "none";
}

function getCategoriasSelecionadas() {
  return Array.from(document.querySelectorAll('#categoriasGrid input[type="checkbox"]:checked')).map(i => i.value);
}

function marcarCategorias(categorias) {
  document.querySelectorAll('#categoriasGrid input[type="checkbox"]').forEach(i => {
    i.checked = (categorias || []).includes(i.value);
  });
}

function limparFormulario() {
  document.getElementById("nomeCampeonato").value = "";
  document.getElementById("logoCampeonato").value = "";
  document.getElementById("temporadaCampeonato").value = "";
  document.getElementById("statusCampeonato").value = "";
  document.getElementById("botaoSalvar").textContent = "Salvar Campeonato";
  document.querySelectorAll('#categoriasGrid input[type="checkbox"]').forEach(i => i.checked = false);
  editandoId = null;
  logoAtual = "";
}

window.salvarCampeonato = async function() {
  const nome = document.getElementById("nomeCampeonato").value.trim();
  const logo = document.getElementById("logoCampeonato").files[0];
  const temporada = document.getElementById("temporadaCampeonato").value.trim();
  const status = document.getElementById("statusCampeonato").value;
  const categorias = getCategoriasSelecionadas();

  if (!nome) {
    alert("Digite o nome do campeonato");
    return;
  }

  if (!temporada) {
    alert("Digite a temporada");
    return;
  }

  if (!status) {
    alert("Selecione o status");
    return;
  }

  let urlLogo = logoAtual;

  if (logo) {
    const nomeArquivo = Date.now() + "-" + logo.name;
    const storageRef = ref(storage, "campeonatos/" + nomeArquivo);
    await uploadBytes(storageRef, logo);
    urlLogo = await getDownloadURL(storageRef);
  }

  const dados = {
    nome: nome,
    logo: urlLogo || "",
    temporada: temporada,
    status: status,
    categorias: categorias
  };

  if (editandoId) {
    await updateDoc(doc(db, "campeonatos", editandoId), dados);
    alert("Campeonato atualizado com sucesso!");
  } else {
    await addDoc(collection(db, "campeonatos"), dados);
    alert("Campeonato salvo com sucesso!");
  }

  limparFormulario();
  carregarCampeonatos();
}

window.editarCampeonato = async function(id) {
  const snap = await getDocs(collection(db, "campeonatos"));

  snap.forEach((item) => {
    if (item.id === id) {
      const c = item.data();

      document.getElementById("nomeCampeonato").value = c.nome || "";
      document.getElementById("temporadaCampeonato").value = c.temporada || "";
      document.getElementById("statusCampeonato").value = c.status || "";
      document.getElementById("botaoSalvar").textContent = "Atualizar Campeonato";

      marcarCategorias(c.categorias || []);
      logoAtual = c.logo || "";
      editandoId = id;

      document.getElementById("formulario").style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  });
}

window.verCampeonato = async function(id) {
  const snap = await getDocs(collection(db, "campeonatos"));
  let campeonato = null;

  snap.forEach((item) => {
    if (item.id === id) {
      campeonato = item.data();
    }
  });

  if (!campeonato) return;

  const categorias = (campeonato.categorias || []).map(c => `<div class="tag">${c}</div>`).join("");

  document.getElementById("modalConteudo").innerHTML = `
    <img src="${campeonato.logo || ''}">
    <h2 style="margin:10px 0;">${campeonato.nome}</h2>
    <div class="subtitle">Temporada: ${campeonato.temporada || "-"}</div>
    <div class="subtitle">Status: ${campeonato.status || "-"}</div>
    <div class="tags">${categorias}</div>
    <button onclick="fecharModal()" style="margin-top:15px;">Fechar</button>
  `;

  document.getElementById("modalVer").style.display = "flex";
}

window.fecharModal = function() {
  document.getElementById("modalVer").style.display = "none";
}

window.excluirCampeonato = async function(id){
  const confirmar = confirm("Tem certeza que deseja excluir este campeonato?");
  if(!confirmar) return;

  await deleteDoc(doc(db, "campeonatos", id));
  alert("Campeonato excluído!");
  carregarCampeonatos();
}

async function carregarCampeonatos() {
  const lista = document.getElementById("listaCampeonatos");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "campeonatos"));
  let campeonatos = [];

  querySnapshot.forEach((docSnap) => {
    campeonatos.push({ id: docSnap.id, ...docSnap.data() });
  });

  const busca = (document.getElementById("buscaCampeonato").value || "").toLowerCase().trim();

  if (busca) {
    campeonatos = campeonatos.filter(c =>
      (c.nome || "").toLowerCase().includes(busca) ||
      (c.temporada || "").toLowerCase().includes(busca) ||
      (c.status || "").toLowerCase().includes(busca)
    );
  }

  campeonatos.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));

  campeonatos.forEach((campeonato) => {
    const categorias = (campeonato.categorias || []).map(c => `<span class="tag">${c}</span>`).join("");

    lista.innerHTML += `
      <div class="card">
        <div class="item">
          <img src="${campeonato.logo || ''}" class="logo" alt="Logo do campeonato">
          <div class="item-info">
            <div class="nome-campeonato">${campeonato.nome}</div>
            <small>Temporada: ${campeonato.temporada || "-"}</small>
            <small>Status: ${campeonato.status || "-"}</small>
            <div class="tags">${categorias}</div>
          </div>
        </div>
        <div class="actions">
          <button onclick="editarCampeonato('${campeonato.id}')">Editar</button>
          <button onclick="verCampeonato('${campeonato.id}')">Ver</button>
          <button class="delete" onclick="excluirCampeonato('${campeonato.id}')">Excluir</button>
        </div>
      </div>
    `;
  });
}

carregarCampeonatos();
</script>

</body>
</html>
