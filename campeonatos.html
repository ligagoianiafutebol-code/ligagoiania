<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonatos</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
max-width:1100px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#f7c600;
color:black;
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

.btn-voltar{
display:inline-block;
margin-bottom:15px;
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.logo{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
background:#1a3f73;
}

.nome-campeonato{
font-weight:bold;
font-size:16px;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
gap:12px;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:10px;
}

.item{
display:flex;
align-items:flex-start;
gap:12px;
min-width:0;
flex:1;
}

.item-info{
display:flex;
flex-direction:column;
gap:6px;
min-width:0;
flex:1;
}

.item-info small{
opacity:.85;
font-size:12px;
}

.actions{
display:flex;
gap:6px;
flex-wrap:wrap;
align-items:center;
}

.actions button{
background:#1a3f73;
padding:6px 10px;
border-radius:6px;
color:white;
border:none;
font-size:12px;
margin:0;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:15px;
z-index:999;
}

.modal-content{
background:#102a52;
padding:20px;
border-radius:12px;
max-width:720px;
width:100%;
text-align:center;
max-height:85vh;
overflow:auto;
}

.modal-content img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
margin-bottom:12px;
background:#1a3f73;
}

.tags{
display:flex;
gap:6px;
flex-wrap:wrap;
justify-content:center;
margin-top:10px;
}

.tag{
background:#1a3f73;
padding:4px 8px;
border-radius:999px;
font-size:12px;
}

.subtitle{
opacity:.85;
font-size:13px;
margin-bottom:10px;
}

.times-box{
margin-top:10px;
text-align:left;
background:#0b1f3a;
border-radius:10px;
padding:12px;
}

.times-box h3{
margin:0 0 10px;
font-size:15px;
color:#f7c600;
}

.times-lista{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.time-tag{
background:#1a3f73;
padding:6px 10px;
border-radius:999px;
font-size:12px;
}

.sem-item{
opacity:.85;
font-size:13px;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:10px;
margin-top:16px;
text-align:left;
}

.stat-card{
background:#0b1f3a;
border-radius:10px;
padding:10px;
border:1px solid rgba(255,255,255,.08);
}

.stat-card strong{
display:block;
color:#f7c600;
font-size:13px;
margin-bottom:4px;
}

.stat-card span{
font-size:15px;
font-weight:bold;
}

@media (max-width:700px){
.card{
flex-direction:column;
}

.actions{
width:100%;
justify-content:flex-start;
}

.stats-grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<header>Campeonatos</header>

<div class="container">

<a href="index.html" class="btn-voltar">← Voltar</a>

<input id="buscaCampeonato" placeholder="Pesquisar campeonato..." oninput="carregarCampeonatos()">

<div class="lista-grid" id="listaCampeonatos"></div>

</div>

<div class="modal" id="modalVer">
  <div class="modal-content" id="modalConteudo"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let campeonatosCache = [];
let timesCache = [];
let jogosCache = [];
let sumulasCache = [];
let estatisticasCampeonatos = {};

function normalizarTexto(texto) {
  return String(texto || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function statusPublico(status = "") {
  const s = String(status).trim().toLowerCase();
  return ["ativo", "em breve", "publicado", "publico", "público"].includes(s);
}

function campeonatoEhPublico(campeonato) {
  if (campeonato.publicado === true) return true;
  if (campeonato.publico === true) return true;
  if (campeonato.visivelPublico === true) return true;
  if (statusPublico(campeonato.status)) return true;
  return false;
}

function obterNomeTime(time) {
  return time.nome || time.nomeTime || time.time || time.titulo || "Time sem nome";
}

function timePertenceAoCampeonato(time, campeonato) {
  const campeonatoId = campeonato.id;
  const campeonatoNome = normalizarTexto(campeonato.nome);

  const campoCampeonatoId = String(time.campeonatoId || "").trim();
  const campoCampeonato = normalizarTexto(time.campeonato || "");
  const campoCampeonatoNome = normalizarTexto(time.campeonatoNome || "");

  const listaCampeonatos = Array.isArray(time.campeonatos) ? time.campeonatos.map(v => normalizarTexto(v)) : [];
  const listaCampeonatoIds = Array.isArray(time.campeonatoIds) ? time.campeonatoIds.map(v => String(v).trim()) : [];

  if (campoCampeonatoId && campoCampeonatoId === campeonatoId) return true;
  if (campoCampeonato && campoCampeonato === campeonatoNome) return true;
  if (campoCampeonatoNome && campoCampeonatoNome === campeonatoNome) return true;
  if (listaCampeonatos.includes(campeonatoNome)) return true;
  if (listaCampeonatoIds.includes(campeonatoId)) return true;

  return false;
}

function obterTimesDoCampeonato(campeonato) {
  return timesCache.filter(time => timePertenceAoCampeonato(time, campeonato));
}

function calcularEstatisticasCampeonatos() {
  estatisticasCampeonatos = {};

  campeonatosCache.forEach(campeonato => {
    estatisticasCampeonatos[campeonato.id] = {
      jogos: 0,
      gols: 0,
      categorias: new Set(),
      times: new Set()
    };
  });

  sumulasCache.forEach(sumula => {
    const campeonatoNome = normalizarTexto(sumula.campeonato || "");
    const timeA = sumula.timeA || "";
    const timeB = sumula.timeB || "";
    const categoria = sumula.categoria || "";
    const golsA = Number(sumula.golsA || 0);
    const golsB = Number(sumula.golsB || 0);

    campeonatosCache.forEach(campeonato => {
      if (normalizarTexto(campeonato.nome) === campeonatoNome) {
        if (!estatisticasCampeonatos[campeonato.id]) {
          estatisticasCampeonatos[campeonato.id] = {
            jogos: 0,
            gols: 0,
            categorias: new Set(),
            times: new Set()
          };
        }

        estatisticasCampeonatos[campeonato.id].jogos += 1;
        estatisticasCampeonatos[campeonato.id].gols += golsA + golsB;
        if (categoria) estatisticasCampeonatos[campeonato.id].categorias.add(categoria);
        if (timeA) estatisticasCampeonatos[campeonato.id].times.add(timeA);
        if (timeB) estatisticasCampeonatos[campeonato.id].times.add(timeB);
      }
    });
  });
}

function obterStatsCampeonato(campeonato) {
  const stats = estatisticasCampeonatos[campeonato.id];

  if (!stats) {
    return {
      jogos: 0,
      gols: 0,
      categorias: [],
      times: []
    };
  }

  return {
    jogos: stats.jogos || 0,
    gols: stats.gols || 0,
    categorias: Array.from(stats.categorias || []),
    times: Array.from(stats.times || [])
  };
}

window.verCampeonato = function(id) {
  const campeonato = campeonatosCache.find(c => c.id === id);
  if (!campeonato) return;

  const categoriasCadastro = (campeonato.categorias || []).map(c => `<div class="tag">${c}</div>`).join("");
  const timesDoCadastro = obterTimesDoCampeonato(campeonato);
  const stats = obterStatsCampeonato(campeonato);

  const htmlTimesCadastro = timesDoCadastro.length
    ? timesDoCadastro.map(time => `<div class="time-tag">${obterNomeTime(time)}</div>`).join("")
    : `<div class="sem-item">Nenhum time participante encontrado.</div>`;

  const htmlCategoriasJogo = stats.categorias.length
    ? stats.categorias.map(c => `<div class="tag">${c}</div>`).join("")
    : `<div class="tag">Sem jogos</div>`;

  document.getElementById("modalConteudo").innerHTML = `
    <img src="${campeonato.logo || ''}" onerror="this.src=''">
    <h2 style="margin:10px 0;">${campeonato.nome || "-"}</h2>
    <div class="subtitle">Temporada: ${campeonato.temporada || "-"}</div>
    <div class="subtitle">Status: ${campeonato.status || "-"}</div>
    <div class="tags">${categoriasCadastro || '<div class="tag">Sem categorias</div>'}</div>

    <div class="stats-grid">
      <div class="stat-card"><strong>Jogos</strong><span>${stats.jogos}</span></div>
      <div class="stat-card"><strong>Gols</strong><span>${stats.gols}</span></div>
      <div class="stat-card"><strong>Times</strong><span>${stats.times.length || timesDoCadastro.length}</span></div>
    </div>

    <div style="margin-top:16px;">
      <div class="subtitle">Categorias com jogos</div>
      <div class="tags">${htmlCategoriasJogo}</div>
    </div>

    <div class="times-box">
      <h3>Times participantes</h3>
      <div class="times-lista">${htmlTimesCadastro}</div>
    </div>

    <button onclick="fecharModal()" style="margin-top:15px;">Fechar</button>
  `;

  document.getElementById("modalVer").style.display = "flex";
}

window.fecharModal = function() {
  document.getElementById("modalVer").style.display = "none";
}

async function carregarCampeonatos() {
  const lista = document.getElementById("listaCampeonatos");
  lista.innerHTML = "<div class='sem-item'>Carregando campeonatos...</div>";

  let campeonatos = campeonatosCache.filter(campeonatoEhPublico);

  const busca = (document.getElementById("buscaCampeonato").value || "").toLowerCase().trim();

  if (busca) {
    campeonatos = campeonatos.filter(c =>
      (c.nome || "").toLowerCase().includes(busca) ||
      (c.temporada || "").toLowerCase().includes(busca) ||
      (c.status || "").toLowerCase().includes(busca)
    );
  }

  campeonatos.sort((a, b) => (a.nome || "").localeCompare((b.nome || ""), 'pt-BR'));

  if (!campeonatos.length) {
    lista.innerHTML = "<div class='sem-item'>Nenhum campeonato publicado encontrado.</div>";
    return;
  }

  lista.innerHTML = "";

  campeonatos.forEach((campeonato) => {
    const categorias = (campeonato.categorias || []).map(c => `<span class="tag">${c}</span>`).join("");
    const timesDoCadastro = obterTimesDoCampeonato(campeonato);
    const stats = obterStatsCampeonato(campeonato);

    const nomesTimes = timesDoCadastro.slice(0, 6).map(t => `<span class="tag">${obterNomeTime(t)}</span>`).join("");
    const resumoTimes = timesDoCadastro.length
      ? nomesTimes + (timesDoCadastro.length > 6 ? `<span class="tag">+${timesDoCadastro.length - 6} times</span>` : "")
      : `<span class="tag">Sem times informados</span>`;

    lista.innerHTML += `
      <div class="card">
        <div class="item">
          <img src="${campeonato.logo || ''}" class="logo" alt="Logo do campeonato" onerror="this.src=''">
          <div class="item-info">
            <div class="nome-campeonato">${campeonato.nome || "-"}</div>
            <small>Temporada: ${campeonato.temporada || "-"}</small>
            <small>Status: ${campeonato.status || "-"}</small>
            <small>Jogos: ${stats.jogos} | Gols: ${stats.gols}</small>
            <div class="tags">${categorias || '<span class="tag">Sem categorias</span>'}</div>
            <div class="tags">${resumoTimes}</div>
          </div>
        </div>
        <div class="actions">
          <button onclick="verCampeonato('${campeonato.id}')">Ver</button>
        </div>
      </div>
    `;
  });
}

async function iniciarPagina() {
  try {
    const snapCampeonatos = await getDocs(collection(db, "campeonatos"));
    campeonatosCache = [];
    snapCampeonatos.forEach(docSnap => campeonatosCache.push({ id: docSnap.id, ...docSnap.data() }));

    const snapTimes = await getDocs(collection(db, "times"));
    timesCache = [];
    snapTimes.forEach(docSnap => timesCache.push({ id: docSnap.id, ...docSnap.data() }));

    const snapJogos = await getDocs(collection(db, "jogos"));
    jogosCache = [];
    snapJogos.forEach(docSnap => jogosCache.push({ id: docSnap.id, ...docSnap.data() }));

    const snapSumulas = await getDocs(collection(db, "sumulas"));
    sumulasCache = [];
    snapSumulas.forEach(docSnap => sumulasCache.push({ id: docSnap.id, ...docSnap.data() }));

    calcularEstatisticasCampeonatos();
    carregarCampeonatos();
  } catch (erro) {
    document.getElementById("listaCampeonatos").innerHTML = "<div class='sem-item'>Erro ao carregar os campeonatos.</div>";
    console.error(erro);
  }
}

iniciarPagina();
</script>

</body>
</html>
