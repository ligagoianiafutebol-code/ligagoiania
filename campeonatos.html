<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonatos</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
max-width:1100px;
margin:auto;
}

input, select{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#f7c600;
color:black;
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

.btn{
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-bottom:12px;
font-weight:bold;
cursor:pointer;
border:none;
}

.btn-voltar{
display:inline-block;
margin-bottom:15px;
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.logo{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
background:#1a3f73;
}

.nome-campeonato{
font-weight:bold;
font-size:16px;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
gap:12px;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:10px;
}

.item{
display:flex;
align-items:flex-start;
gap:12px;
min-width:0;
flex:1;
}

.item-info{
display:flex;
flex-direction:column;
gap:6px;
min-width:0;
flex:1;
}

.item-info small{
opacity:.85;
font-size:12px;
}

.actions{
display:flex;
gap:6px;
flex-wrap:wrap;
align-items:center;
}

.actions button{
background:#1a3f73;
padding:6px 10px;
border-radius:6px;
color:white;
border:none;
font-size:12px;
margin:0;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:15px;
z-index:999;
}

.modal-content{
background:#102a52;
padding:20px;
border-radius:12px;
max-width:650px;
width:100%;
text-align:center;
max-height:85vh;
overflow:auto;
}

.modal-content img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
margin-bottom:12px;
background:#1a3f73;
}

.tags{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-top:8px;
}

.tag{
background:#1a3f73;
padding:4px 8px;
border-radius:999px;
font-size:12px;
}

.subtitle{
opacity:.85;
font-size:13px;
margin-bottom:10px;
}

.times-box{
margin-top:10px;
text-align:left;
background:#0b1f3a;
border-radius:10px;
padding:12px;
}

.times-box h3{
margin:0 0 10px;
font-size:15px;
color:#f7c600;
}

.times-lista{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.time-tag{
background:#1a3f73;
padding:6px 10px;
border-radius:999px;
font-size:12px;
}

.sem-item{
opacity:.85;
font-size:13px;
}

.topo-publico{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
margin-bottom:12px;
}

@media (max-width:700px){
.card{
flex-direction:column;
}

.actions{
width:100%;
justify-content:flex-start;
}
}
</style>
</head>

<body>

<header>Campeonatos</header>

<div class="container">

  <div class="topo-publico">
    <a href="index.html" class="btn-voltar">← Voltar</a>
  </div>

  <input id="buscaCampeonato" placeholder="Pesquisar campeonato..." oninput="carregarCampeonatos()">

  <div class="lista-grid" id="listaCampeonatos"></div>

</div>

<div class="modal" id="modalVer">
  <div class="modal-content" id="modalConteudo"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let campeonatosCache = [];
let timesCache = [];

function statusPublico(status = "") {
  const s = String(status).trim().toLowerCase();
  return ["ativo", "em breve", "publicado", "publico", "público"].includes(s);
}

function campeonatoEhPublico(campeonato) {
  if (campeonato.publicado === true) return true;
  if (campeonato.publico === true) return true;
  if (campeonato.visivelPublico === true) return true;
  if (statusPublico(campeonato.status)) return true;
  return false;
}

function obterNomeTime(time) {
  return (
    time.nome ||
    time.nomeTime ||
    time.time ||
    time.titulo ||
    "Time sem nome"
  );
}

function timePertenceAoCampeonato(time, campeonato) {
  const campeonatoId = campeonato.id;
  const campeonatoNome = (campeonato.nome || "").trim().toLowerCase();

  const campoCampeonatoId = String(time.campeonatoId || "").trim();
  const campoCampeonato = String(time.campeonato || "").trim().toLowerCase();
  const campoCampeonatoNome = String(time.campeonatoNome || "").trim().toLowerCase();

  const listaCampeonatos = Array.isArray(time.campeonatos) ? time.campeonatos.map(v => String(v).trim().toLowerCase()) : [];
  const listaCampeonatoIds = Array.isArray(time.campeonatoIds) ? time.campeonatoIds.map(v => String(v).trim()) : [];

  if (campoCampeonatoId && campoCampeonatoId === campeonatoId) return true;
  if (campoCampeonato && campoCampeonato === campeonatoNome) return true;
  if (campoCampeonatoNome && campoCampeonatoNome === campeonatoNome) return true;
  if (listaCampeonatos.includes(campeonatoNome)) return true;
  if (listaCampeonatoIds.includes(campeonatoId)) return true;

  return false;
}

function obterTimesDoCampeonato(campeonato) {
  return timesCache.filter(time => timePertenceAoCampeonato(time, campeonato));
}

window.verCampeonato = function(id) {
  const campeonato = campeonatosCache.find(c => c.id === id);
  if (!campeonato) return;

  const categorias = (campeonato.categorias || []).map(c => `<div class="tag">${c}</div>`).join("");
  const times = obterTimesDoCampeonato(campeonato);

  const htmlTimes = times.length
    ? times.map(time => `<div class="time-tag">${obterNomeTime(time)}</div>`).join("")
    : `<div class="sem-item">Nenhum time participante encontrado.</div>`;

  document.getElementById("modalConteudo").innerHTML = `
    <img src="${campeonato.logo || ''}" onerror="this.src=''">
    <h2 style="margin:10px 0;">${campeonato.nome || "-"}</h2>
    <div class="subtitle">Temporada: ${campeonato.temporada || "-"}</div>
    <div class="subtitle">Status: ${campeonato.status || "-"}</div>
    <div class="tags">${categorias || '<div class="tag">Sem categorias</div>'}</div>

    <div class="times-box">
      <h3>Times participantes</h3>
      <div class="times-lista">${htmlTimes}</div>
    </div>

    <button onclick="fecharModal()" style="margin-top:15px;">Fechar</button>
  `;

  document.getElementById("modalVer").style.display = "flex";
}

window.fecharModal = function() {
  document.getElementById("modalVer").style.display = "none";
}

async function carregarTimes() {
  timesCache = [];
  const querySnapshot = await getDocs(collection(db, "times"));
  querySnapshot.forEach((docSnap) => {
    timesCache.push({ id: docSnap.id, ...docSnap.data() });
  });
}

async function carregarCampeonatos() {
  const lista = document.getElementById("listaCampeonatos");
  lista.innerHTML = "<div class='sem-item'>Carregando campeonatos...</div>";

  const querySnapshot = await getDocs(collection(db, "campeonatos"));
  campeonatosCache = [];

  querySnapshot.forEach((docSnap) => {
    campeonatosCache.push({ id: docSnap.id, ...docSnap.data() });
  });

  let campeonatos = campeonatosCache.filter(campeonatoEhPublico);

  const busca = (document.getElementById("buscaCampeonato").value || "").toLowerCase().trim();

  if (busca) {
    campeonatos = campeonatos.filter(c =>
      (c.nome || "").toLowerCase().includes(busca) ||
      (c.temporada || "").toLowerCase().includes(busca) ||
      (c.status || "").toLowerCase().includes(busca)
    );
  }

  campeonatos.sort((a, b) => (a.nome || "").localeCompare((b.nome || ""), 'pt-BR'));

  if (!campeonatos.length) {
    lista.innerHTML = "<div class='sem-item'>Nenhum campeonato publicado encontrado.</div>";
    return;
  }

  lista.innerHTML = "";

  campeonatos.forEach((campeonato) => {
    const categorias = (campeonato.categorias || []).map(c => `<span class="tag">${c}</span>`).join("");
    const times = obterTimesDoCampeonato(campeonato);
    const nomesTimes = times.slice(0, 6).map(t => `<span class="tag">${obterNomeTime(t)}</span>`).join("");
    const resumoTimes = times.length
      ? nomesTimes + (times.length > 6 ? `<span class="tag">+${times.length - 6} times</span>` : "")
      : `<span class="tag">Sem times informados</span>`;

    lista.innerHTML += `
      <div class="card">
        <div class="item">
          <img src="${campeonato.logo || ''}" class="logo" alt="Logo do campeonato" onerror="this.src=''">
          <div class="item-info">
            <div class="nome-campeonato">${campeonato.nome || "-"}</div>
            <small>Temporada: ${campeonato.temporada || "-"}</small>
            <small>Status: ${campeonato.status || "-"}</small>
            <div class="tags">${categorias || '<span class="tag">Sem categorias</span>'}</div>
            <div class="tags">${resumoTimes}</div>
          </div>
        </div>
        <div class="actions">
          <button onclick="verCampeonato('${campeonato.id}')">Ver</button>
        </div>
      </div>
    `;
  });
}

async function iniciarPagina() {
  try {
    await carregarTimes();
    await carregarCampeonatos();
  } catch (erro) {
    document.getElementById("listaCampeonatos").innerHTML = "<div class='sem-item'>Erro ao carregar os campeonatos.</div>";
    console.error(erro);
  }
}

iniciarPagina();
</script>

</body>
</html>
