<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonatos - LIGA GOIANA DE FUTEBOL DE BASE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.menu{
display:flex;
justify-content:center;
gap:10px;
background:#102a52;
padding:12px;
flex-wrap:wrap;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.menu a{
color:white;
text-decoration:none;
font-weight:bold;
font-size:14px;
background:#0d2346;
padding:10px 14px;
border-radius:8px;
}

.menu a.ativo{
background:#f7c600;
color:black;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.hero{
background:linear-gradient(135deg,#102a52,#0d2346);
border:1px solid rgba(255,230,0,.12);
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

.hero h2{
margin:0 0 8px;
color:#f7c600;
font-size:26px;
}

.hero p{
margin:0;
opacity:.92;
line-height:1.6;
font-size:14px;
}

.filtros{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

input, select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
gap:14px;
}

.card{
background:#102a52;
padding:16px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
border:1px solid rgba(255,230,0,.12);
}

.item{
display:flex;
align-items:center;
gap:12px;
min-width:0;
flex:1;
}

.logo{
width:64px;
height:64px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,.15);
background:#1a3f73;
flex-shrink:0;
}

.item-info{
display:flex;
flex-direction:column;
gap:6px;
min-width:0;
}

.nome-campeonato{
font-weight:bold;
font-size:17px;
color:#ffffff;
}

.item-info small{
opacity:.9;
font-size:12px;
}

.tags{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-top:4px;
}

.tag{
background:#1a3f73;
padding:4px 8px;
border-radius:999px;
font-size:12px;
}

.actions{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:flex-end;
}

.btn-acao{
display:inline-flex;
align-items:center;
justify-content:center;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:13px;
border:none;
cursor:pointer;
}

.btn-ver{
background:#f7c600;
color:black;
}

.vazio{
background:#102a52;
padding:30px;
border-radius:12px;
text-align:center;
}

@media (max-width:800px){
.filtros{
grid-template-columns:1fr;
}

.card{
flex-direction:column;
align-items:flex-start;
}

.actions{
width:100%;
justify-content:flex-start;
}
}
</style>
</head>
<body>

<header>LIGA GOIANA DE FUTEBOL DE BASE</header>

<div class="menu">
<a href="index.html">Início</a>
<a href="campeonatos.html" class="ativo">Campeonatos</a>
<a href="tabela.html">Tabela</a>
<a href="jogos.html">Jogos</a>
<a href="artilharia.html">Artilharia</a>
<a href="cartoes.html">Cartões</a>
<a href="suspensos.html">Suspensos</a>
<a href="times.html">Times</a>
<a href="jogadores.html">Jogadores</a>
<a href="login.html">Login</a>
</div>

<div class="container">

<div class="hero">
  <h2>Campeonatos</h2>
  <p>Veja os campeonatos publicados, filtre por temporada e abra a página pública de cada competição.</p>
</div>

<div class="filtros">
  <input id="buscaCampeonato" placeholder="Pesquisar campeonato..." oninput="carregarCampeonatos()">

  <select id="filtroTemporada" onchange="carregarCampeonatos()">
    <option value="">Selecione a temporada</option>
  </select>
</div>

<div class="lista-grid" id="listaCampeonatos"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let campeonatosCache = [];

function normalizarTexto(texto) {
  return String(texto || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function statusPublico(status = "") {
  const s = String(status).trim().toLowerCase();
  return ["ativo", "em breve", "publicado", "publico", "público"].includes(s);
}

function campeonatoEhPublico(campeonato) {
  if (campeonato.publicado === true) return true;
  if (campeonato.publico === true) return true;
  if (campeonato.visivelPublico === true) return true;
  if (statusPublico(campeonato.status)) return true;
  return false;
}

function preencherFiltroTemporada(){
  const select = document.getElementById("filtroTemporada");
  const temporadas = [...new Set(
    campeonatosCache
      .filter(campeonatoEhPublico)
      .map(c => c.temporada)
      .filter(Boolean)
  )].sort((a,b) => String(a).localeCompare(String(b), "pt-BR"));

  select.innerHTML = '<option value="">Selecione a temporada</option>';

  temporadas.forEach(t => {
    select.innerHTML += `<option value="${t}">${t}</option>`;
  });
}

window.carregarCampeonatos = function(){
  const lista = document.getElementById("listaCampeonatos");
  const busca = (document.getElementById("buscaCampeonato").value || "").toLowerCase().trim();
  const temporada = document.getElementById("filtroTemporada").value;

  let campeonatos = campeonatosCache.filter(campeonatoEhPublico);

  if (busca) {
    campeonatos = campeonatos.filter(c =>
      (c.nome || "").toLowerCase().includes(busca) ||
      (c.temporada || "").toLowerCase().includes(busca) ||
      (c.status || "").toLowerCase().includes(busca)
    );
  }

  if (temporada) {
    campeonatos = campeonatos.filter(c => String(c.temporada || "") === String(temporada));
  }

  campeonatos.sort((a, b) => (a.nome || "").localeCompare((b.nome || ""), "pt-BR"));

  if (!campeonatos.length) {
    lista.innerHTML = `<div class="vazio">Nenhum campeonato publicado encontrado.</div>`;
    return;
  }

  lista.innerHTML = "";

  campeonatos.forEach(campeonato => {
    const categorias = (campeonato.categorias || []).map(c => `<span class="tag">${c}</span>`).join("");

    lista.innerHTML += `
      <div class="card">
        <div class="item">
          <img src="${campeonato.logo || 'logo-liga.jfif'}" class="logo" alt="${campeonato.nome || 'Campeonato'}" onerror="this.src='logo-liga.jfif'">
          <div class="item-info">
            <div class="nome-campeonato">${campeonato.nome || "-"}</div>
            <small>Temporada: ${campeonato.temporada || "-"}</small>
            <small>Status: ${campeonato.status || "-"}</small>
            <div class="tags">${categorias || '<span class="tag">Sem categorias</span>'}</div>
          </div>
        </div>

        <div class="actions">
          <a class="btn-acao btn-ver" href="campeonato-publico.html?id=${campeonato.id}">
            Ver Campeonato
          </a>
        </div>
      </div>
    `;
  });
};

async function iniciarPagina(){
  const lista = document.getElementById("listaCampeonatos");
  lista.innerHTML = `<div class="vazio">Carregando campeonatos...</div>`;

  try{
    const snap = await getDocs(collection(db, "campeonatos"));
    campeonatosCache = [];
    snap.forEach(docSnap => {
      campeonatosCache.push({ id: docSnap.id, ...docSnap.data() });
    });

    preencherFiltroTemporada();
    carregarCampeonatos();
  }catch(erro){
    console.error(erro);
    lista.innerHTML = `<div class="vazio">Erro ao carregar os campeonatos.</div>`;
  }
}

iniciarPagina();
</script>

</body>
</html>
