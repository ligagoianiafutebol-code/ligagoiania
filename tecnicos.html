<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Técnicos - Admin</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-soft:rgba(247,198,0,.12);
      --gold-line:rgba(247,198,0,.24);
      --white:#ffffff;
      --muted:#d8e1ef;
      --danger:#b30000;
      --shadow:0 8px 22px rgba(0,0,0,.28);
      --transition:.25s ease;
      --max:1140px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:
        linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
    }

    a{
      text-decoration:none;
      color:inherit;
      transition:var(--transition);
    }

    button{
      font-family:inherit;
      cursor:pointer;
      transition:var(--transition);
      border:none;
    }

    input, select{
      font-family:inherit;
    }

    .wrap{
      width:min(100% - 28px, var(--max));
      margin:0 auto;
    }

    header{
      background:rgba(8,23,44,.96);
      border-bottom:3px solid var(--gold);
      box-shadow:var(--shadow);
    }

    .header-top{
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:24px;
      font-weight:700;
      color:var(--white);
    }

    .top-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
    }

    .btn-light{
      background:#fff4cf;
      color:#111;
    }

    .btn-light:hover{
      background:var(--gold);
      transform:translateY(-2px);
    }

    .container{
      padding:24px 0 34px;
    }

    .hero{
      background:linear-gradient(135deg,#102a52,#0d2346);
      border:1px solid var(--gold-line);
      border-radius:18px;
      padding:22px;
      margin-bottom:20px;
      box-shadow:var(--shadow);
    }

    .hero h2{
      margin:0 0 8px;
      color:var(--gold);
      font-size:28px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:15px;
    }

    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .toolbar .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:var(--gold);
      color:black;
      padding:11px 16px;
      border-radius:10px;
      font-weight:700;
      text-decoration:none;
    }

    .toolbar .btn:hover{
      filter:brightness(1.04);
      transform:translateY(-1px);
    }

    .search-box{
      margin-bottom:16px;
    }

    input, select{
      width:100%;
      padding:13px;
      border:none;
      border-radius:10px;
      font-size:14px;
      box-sizing:border-box;
      background:#f5f7fb;
      color:#111;
    }

    input:focus, select:focus{
      outline:2px solid rgba(247,198,0,.5);
    }

    .form-panel{
      display:none;
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--shadow);
      margin-bottom:18px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .full{
      grid-column:1 / -1;
    }

    .checkbox-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(130px, 1fr));
      gap:8px;
      margin-top:6px;
    }

    .check-item{
      background:#102a52;
      padding:10px;
      border-radius:10px;
      display:flex;
      align-items:center;
      gap:8px;
      font-size:14px;
    }

    .check-item input{
      width:auto;
      margin:0;
    }

    .form-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .form-actions button{
      background:var(--gold);
      color:black;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
    }

    .form-actions button:hover{
      filter:brightness(1.04);
      transform:translateY(-1px);
    }

    .lista-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
      gap:12px;
    }

    .card{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:16px;
      border-radius:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      border:1px solid rgba(255,230,0,.10);
      box-shadow:var(--shadow);
      transition:var(--transition);
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:var(--gold-line);
    }

    .user{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:0;
      flex:1;
    }

    .photo{
      width:64px;
      height:64px;
      border-radius:50%;
      object-fit:cover;
      background:#1a3f73;
      border:2px solid rgba(255,255,255,.12);
      flex-shrink:0;
    }

    .user-info{
      display:flex;
      flex-direction:column;
      gap:5px;
      min-width:0;
    }

    .user-info .nome{
      font-weight:700;
      font-size:18px;
      color:#fff;
    }

    .user-info small{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .categorias-tags{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .tag{
      background:#1a3f73;
      padding:5px 9px;
      border-radius:999px;
      font-size:12px;
      display:inline-block;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .actions button{
      background:#1a3f73;
      padding:9px 12px;
      border-radius:8px;
      color:white;
      font-size:12px;
      margin:0;
      font-weight:700;
    }

    .actions button:hover{
      background:var(--gold);
      color:#111;
    }

    .actions .delete{
      background:var(--danger) !important;
      color:#fff !important;
    }

    .actions .delete:hover{
      filter:brightness(1.08);
    }

    .vazio{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:30px;
      border-radius:14px;
      text-align:center;
      color:var(--muted);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      padding:15px;
      z-index:999;
    }

    .modal-content{
      background:linear-gradient(180deg, rgba(16,42,82,.98), rgba(12,33,64,.98));
      padding:22px;
      border-radius:16px;
      text-align:center;
      max-width:860px;
      width:100%;
      max-height:88vh;
      overflow:auto;
      border:1px solid var(--gold-line);
      box-shadow:var(--shadow);
    }

    .modal-content h2{
      color:var(--gold);
      margin:14px 0 10px;
    }

    .modal-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
      text-align:left;
    }

    .info-box,
    .stats-box{
      background:#102a52;
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:14px;
    }

    .info-box h3,
    .stats-box h3{
      color:var(--gold);
      margin-bottom:10px;
      font-size:18px;
    }

    .info-line{
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:10px;
    }

    .stat-card{
      background:#0d2346;
      border-radius:12px;
      padding:12px;
      border:1px solid rgba(255,255,255,.06);
    }

    .stat-card strong{
      display:block;
      color:var(--gold);
      font-size:22px;
      margin-bottom:4px;
    }

    .stat-card span{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .categorias-stats{
      margin-top:14px;
      background:#0d2346;
      border-radius:12px;
      padding:12px;
      border:1px solid rgba(255,255,255,.06);
      text-align:left;
    }

    .categorias-stats h4{
      color:var(--gold);
      margin-bottom:10px;
      font-size:16px;
    }

    .categoria-item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:8px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
      color:var(--muted);
      font-size:14px;
    }

    .categoria-item:last-child{
      border-bottom:none;
    }

    .modal-actions{
      margin-top:18px;
    }

    .modal-actions button{
      background:var(--gold);
      color:black;
      padding:11px 14px;
      border-radius:10px;
      font-weight:700;
    }

    @media (max-width:900px){
      .header-title{
        order:3;
        width:100%;
        text-align:center;
      }

      .header-left,
      .header-right{
        width:100%;
        justify-content:center;
      }

      .form-grid,
      .modal-grid,
      .stats-grid{
        grid-template-columns:1fr;
      }

      .card{
        flex-direction:column;
        align-items:flex-start;
      }

      .actions{
        width:100%;
        justify-content:flex-start;
      }
    }

    @media (max-width:600px){
      .top-btn,
      .toolbar .btn{
        width:100%;
        justify-content:center;
      }

      .header-left,
      .header-right{
        flex-direction:column;
        align-items:stretch;
      }

      .form-actions button{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap header-top">
      <div class="header-left">
        <button class="top-btn btn-light" type="button" onclick="voltarPagina()">
          <i class="fa-solid fa-arrow-left"></i> Voltar
        </button>

        <a href="index.html" class="top-btn btn-light">
          <i class="fa-solid fa-house"></i> Página Inicial
        </a>

        <a href="admin.html" class="top-btn btn-light">
          <i class="fa-solid fa-gears"></i> Painel ADM
        </a>
      </div>

      <div class="header-title">Técnicos</div>

      <div class="header-right"></div>
    </div>
  </header>

  <div class="wrap container">

    <div class="hero">
      <h2>Cadastro de Técnicos</h2>
      <p>Cadastre, edite, visualize e acompanhe estatísticas automáticas dos técnicos e seus times.</p>
    </div>

    <div class="toolbar">
      <a class="btn" onclick="toggleFormulario()">
        <i class="fa-solid fa-plus"></i> Novo Técnico
      </a>
    </div>

    <div class="search-box">
      <input id="busca" placeholder="Pesquisar técnico..." oninput="carregarTecnicos()">
    </div>

    <div class="form-panel" id="formulario">
      <div class="form-grid">
        <div>
          <input id="nome" placeholder="Nome do técnico">
        </div>

        <div>
          <input id="foto" type="file" accept="image/*">
        </div>

        <div>
          <input id="cpf" placeholder="CPF">
        </div>

        <div>
          <input id="telefone" placeholder="Telefone">
        </div>

        <div>
          <input id="email" placeholder="Email">
        </div>

        <div>
          <input id="dataNascimento" type="date">
        </div>

        <div class="full">
          <input id="cidadeNascimento" placeholder="Cidade onde nasceu">
        </div>

        <div class="full">
          <select id="time">
            <option value="">Selecione o time</option>
          </select>
        </div>

        <div class="full">
          <div class="checkbox-grid" id="categoriasGrid"></div>
        </div>
      </div>

      <div class="form-actions">
        <button onclick="salvar()">
          <i class="fa-solid fa-floppy-disk"></i> Salvar
        </button>
        <button onclick="cancelarEdicao()">
          <i class="fa-solid fa-xmark"></i> Cancelar
        </button>
      </div>
    </div>

    <div class="lista-grid" id="lista"></div>

  </div>

  <div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script type="module">
    import { db } from "./firebase.js";
    import { collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const storage = getStorage();

    let editandoId = null;
    let fotoAtual = "";

    window.voltarPagina = function(){
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "admin.html";
      }
    };

    function normalizarTexto(texto){
      return String(texto || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function calcularIdade(dataNascimento){
      if(!dataNascimento) return "-";

      const nascimento = new Date(dataNascimento + "T00:00:00");
      if(isNaN(nascimento.getTime())) return "-";

      const hoje = new Date();
      let idade = hoje.getFullYear() - nascimento.getFullYear();
      const mes = hoje.getMonth() - nascimento.getMonth();

      if(mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())){
        idade--;
      }

      return idade >= 0 ? idade : "-";
    }

    function parseDataFlex(valor){
      if(!valor) return null;

      const d1 = new Date(valor);
      if(!isNaN(d1.getTime())) return d1;

      const texto = String(valor).trim();
      const match = texto.match(/^(\d{2})\/(\d{2})\/(\d{4})(?:\s*-\s*(\d{2}):(\d{2}))?$/);

      if(match){
        const [, dia, mes, ano, hora = "00", minuto = "00"] = match;
        const d2 = new Date(`${ano}-${mes}-${dia}T${hora}:${minuto}:00`);
        if(!isNaN(d2.getTime())) return d2;
      }

      return null;
    }

    async function carregarCategorias(){
      const grid = document.getElementById("categoriasGrid");
      grid.innerHTML = "";

      const snap = await getDocs(collection(db, "categorias"));
      let lista = [];

      snap.forEach(d => {
        const data = d.data();
        if(data.nome) lista.push(data.nome);
      });

      lista.sort((a,b)=>a.localeCompare(b, "pt-BR"));

      lista.forEach(nome=>{
        grid.innerHTML += `
          <label class="check-item">
            <input type="checkbox" value="${nome}">${nome}
          </label>
        `;
      });
    }

    async function carregarTimes(){
      const select = document.getElementById("time");
      select.innerHTML = '<option value="">Selecione o time</option>';

      const snap = await getDocs(collection(db, "times"));
      let lista = [];

      snap.forEach(d=>lista.push(d.data()));

      lista.sort((a,b)=>(a.nome || "").localeCompare(b.nome || "", "pt-BR"));

      lista.forEach(t=>{
        select.innerHTML += `<option value="${t.nome}">${t.nome}</option>`;
      });
    }

    function getCategorias(){
      return Array.from(document.querySelectorAll('#categoriasGrid input:checked')).map(i=>i.value);
    }

    function marcarCategorias(categorias){
      document.querySelectorAll('#categoriasGrid input').forEach(i => {
        i.checked = (categorias || []).includes(i.value);
      });
    }

    window.toggleFormulario = function(){
      const f = document.getElementById("formulario");
      f.style.display = f.style.display === "none" || f.style.display === "" ? "block" : "none";
    };

    window.cancelarEdicao = function(){
      limparFormulario();
      document.getElementById("formulario").style.display = "none";
    };

    function limparFormulario(){
      document.getElementById("nome").value = "";
      document.getElementById("foto").value = "";
      document.getElementById("cpf").value = "";
      document.getElementById("telefone").value = "";
      document.getElementById("email").value = "";
      document.getElementById("time").value = "";
      document.getElementById("dataNascimento").value = "";
      document.getElementById("cidadeNascimento").value = "";
      document.querySelectorAll('#categoriasGrid input').forEach(i => i.checked = false);
      editandoId = null;
      fotoAtual = "";
    }

    async function calcularEstatisticasTecnico(nomeTime){
      const snapJogos = await getDocs(collection(db,"jogos"));

      let jogos = 0;
      let vitorias = 0;
      let empates = 0;
      let derrotas = 0;
      let golsPro = 0;
      let golsContra = 0;
      let proximoJogo = null;
      const jogosPorCategoria = {};
      const agora = new Date();

      snapJogos.forEach(docSnap => {
        const j = docSnap.data();
        const ehMandante = normalizarTexto(j.timeA) === normalizarTexto(nomeTime);
        const ehVisitante = normalizarTexto(j.timeB) === normalizarTexto(nomeTime);

        if(!ehMandante && !ehVisitante) return;

        const categoria = j.categoria || "Sem categoria";
        jogosPorCategoria[categoria] = (jogosPorCategoria[categoria] || 0) + 1;

        const finalizado = j.status === "sumula_enviada";
        const dataJogo = parseDataFlex(j.data);

        if(finalizado){
          jogos += 1;

          const golsA = Number(j.golsA || 0);
          const golsB = Number(j.golsB || 0);

          if(ehMandante){
            golsPro += golsA;
            golsContra += golsB;

            if(golsA > golsB) vitorias++;
            else if(golsA === golsB) empates++;
            else derrotas++;
          }

          if(ehVisitante){
            golsPro += golsB;
            golsContra += golsA;

            if(golsB > golsA) vitorias++;
            else if(golsB === golsA) empates++;
            else derrotas++;
          }
        }else if(dataJogo && dataJogo > agora){
          if(!proximoJogo || dataJogo < proximoJogo.dataObj){
            proximoJogo = {
              confronto: `${j.timeA || "-"} x ${j.timeB || "-"}`,
              data: j.data || "-",
              local: j.local || "-",
              categoria: j.categoria || "-",
              dataObj: dataJogo
            };
          }
        }
      });

      const aproveitamento = jogos > 0 ? (((vitorias * 3) + empates) / (jogos * 3) * 100).toFixed(1) : "0.0";

      return {
        jogos,
        vitorias,
        empates,
        derrotas,
        golsPro,
        golsContra,
        aproveitamento,
        jogosPorCategoria,
        proximoJogo
      };
    }

    window.salvar = async function(){
      const nome = document.getElementById("nome").value.trim();
      const cpf = document.getElementById("cpf").value.trim();
      const telefone = document.getElementById("telefone").value.trim();
      const email = document.getElementById("email").value.trim();
      const time = document.getElementById("time").value;
      const dataNascimento = document.getElementById("dataNascimento").value;
      const cidadeNascimento = document.getElementById("cidadeNascimento").value.trim();
      const foto = document.getElementById("foto").files[0];
      const categorias = getCategorias();

      if(!nome || !cpf || !time){
        alert("Preencha os campos obrigatórios.");
        return;
      }

      let url = fotoAtual;

      if(foto){
        const refStorage = ref(storage, "tecnicos/" + Date.now() + "-" + foto.name);
        await uploadBytes(refStorage, foto);
        url = await getDownloadURL(refStorage);
      }

      const dados = {
        nome,
        cpf,
        telefone,
        email,
        time,
        foto:url,
        categorias,
        dataNascimento,
        cidadeNascimento
      };

      if(editandoId){
        await updateDoc(doc(db,"tecnicos",editandoId), dados);
        alert("Técnico atualizado com sucesso!");
      }else{
        await addDoc(collection(db,"tecnicos"), dados);
        alert("Técnico salvo com sucesso!");
      }

      limparFormulario();
      carregarTecnicos();
    };

    window.editar = async function(id){
      const snap = await getDocs(collection(db,"tecnicos"));

      snap.forEach(d=>{
        if(d.id===id){
          const t = d.data();
          document.getElementById("nome").value = t.nome || "";
          document.getElementById("cpf").value = t.cpf || "";
          document.getElementById("telefone").value = t.telefone || "";
          document.getElementById("email").value = t.email || "";
          document.getElementById("time").value = t.time || "";
          document.getElementById("dataNascimento").value = t.dataNascimento || "";
          document.getElementById("cidadeNascimento").value = t.cidadeNascimento || "";
          fotoAtual = t.foto || "";
          editandoId = id;
          marcarCategorias(t.categorias || []);
        }
      });

      document.getElementById("formulario").style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.excluir = async function(id){
      if(confirm("Excluir técnico?")){
        await deleteDoc(doc(db,"tecnicos",id));
        carregarTecnicos();
      }
    };

    window.ver = async function(id){
      const snap = await getDocs(collection(db,"tecnicos"));

      for (const d of snap.docs){
        if(d.id===id){
          const t = d.data();
          const cats = (t.categorias||[]).map(c=>`<span class="tag">${c}</span>`).join("");
          const idade = calcularIdade(t.dataNascimento);
          const stats = await calcularEstatisticasTecnico(t.time || "");

          const categoriasStatsHtml = Object.keys(stats.jogosPorCategoria).length
            ? Object.entries(stats.jogosPorCategoria)
                .sort((x, y) => x[0].localeCompare(y[0], "pt-BR"))
                .map(([categoria, quantidade]) => `
                  <div class="categoria-item">
                    <span>${categoria}</span>
                    <strong>${quantidade} jogo(s)</strong>
                  </div>
                `).join("")
            : `<div class="categoria-item"><span>Sem jogos registrados</span><strong>0</strong></div>`;

          const proximoJogoHtml = stats.proximoJogo
            ? `
              <div class="categorias-stats">
                <h4>Próximo jogo</h4>
                <div class="info-line"><strong>Confronto:</strong> ${stats.proximoJogo.confronto}</div>
                <div class="info-line"><strong>Data:</strong> ${stats.proximoJogo.data}</div>
                <div class="info-line"><strong>Local:</strong> ${stats.proximoJogo.local}</div>
                <div class="info-line"><strong>Categoria:</strong> ${stats.proximoJogo.categoria}</div>
              </div>
            `
            : `
              <div class="categorias-stats">
                <h4>Próximo jogo</h4>
                <div class="info-line">Nenhum jogo futuro encontrado.</div>
              </div>
            `;

          document.getElementById("modalContent").innerHTML = `
            <img src="${t.foto || 'logo-liga.jfif'}" class="photo" alt="${t.nome || 'Técnico'}">
            <h2>${t.nome || ""}</h2>

            <div class="modal-grid">
              <div class="info-box">
                <h3>Dados do Técnico</h3>
                <div class="info-line"><strong>Time:</strong> ${t.time || "-"}</div>
                <div class="info-line"><strong>Email:</strong> ${t.email || "-"}</div>
                <div class="info-line"><strong>Telefone:</strong> ${t.telefone || "-"}</div>
                <div class="info-line"><strong>CPF:</strong> ${t.cpf || "-"}</div>
                <div class="info-line"><strong>Idade:</strong> ${idade}</div>
                <div class="info-line"><strong>Onde nasceu:</strong> ${t.cidadeNascimento || "-"}</div>
                <div class="categorias-tags" style="margin-top:10px;">${cats || '<span class="tag">Sem categorias</span>'}</div>
              </div>

              <div class="stats-box">
                <h3>Estatísticas do Time</h3>
                <div class="stats-grid">
                  <div class="stat-card">
                    <strong>${stats.jogos}</strong>
                    <span>Jogos</span>
                  </div>

                  <div class="stat-card">
                    <strong>${stats.vitorias}</strong>
                    <span>Vitórias</span>
                  </div>

                  <div class="stat-card">
                    <strong>${stats.empates}</strong>
                    <span>Empates</span>
                  </div>

                  <div class="stat-card">
                    <strong>${stats.derrotas}</strong>
                    <span>Derrotas</span>
                  </div>

                  <div class="stat-card">
                    <strong>${stats.golsPro}</strong>
                    <span>Gols pró</span>
                  </div>

                  <div class="stat-card">
                    <strong>${stats.golsContra}</strong>
                    <span>Gols contra</span>
                  </div>

                  <div class="stat-card">
                    <strong>${stats.aproveitamento}%</strong>
                    <span>Aproveitamento</span>
                  </div>

                  <div class="stat-card">
                    <strong>${Object.keys(stats.jogosPorCategoria).length}</strong>
                    <span>Categorias com jogos</span>
                  </div>
                </div>

                <div class="categorias-stats">
                  <h4>Jogos por categoria</h4>
                  ${categoriasStatsHtml}
                </div>

                ${proximoJogoHtml}
              </div>
            </div>

            <div class="modal-actions">
              <button onclick="fechar()">
                <i class="fa-solid fa-xmark"></i> Fechar
              </button>
            </div>
          `;

          document.getElementById("modal").style.display = "flex";
          break;
        }
      }
    };

    window.fechar = function(){
      document.getElementById("modal").style.display = "none";
    };

    async function carregarTecnicos(){
      const lista = document.getElementById("lista");
      lista.innerHTML = "<div class='vazio'>Carregando técnicos...</div>";

      const snap = await getDocs(collection(db,"tecnicos"));
      let tecnicos = [];

      snap.forEach(d => tecnicos.push({ id:d.id, ...d.data() }));

      const busca = (document.getElementById("busca").value || "").toLowerCase().trim();

      if(busca){
        tecnicos = tecnicos.filter(t =>
          (t.nome || "").toLowerCase().includes(busca) ||
          (t.time || "").toLowerCase().includes(busca) ||
          (t.email || "").toLowerCase().includes(busca)
        );
      }

      tecnicos.sort((a,b)=>(a.nome || "").localeCompare(b.nome || "", "pt-BR"));

      if(!tecnicos.length){
        lista.innerHTML = "<div class='vazio'>Nenhum técnico encontrado.</div>";
        return;
      }

      lista.innerHTML = "";

      tecnicos.forEach(t=>{
        const cats = (t.categorias || []).map(c=>`<span class="tag">${c}</span>`).join("");

        lista.innerHTML += `
          <div class="card">
            <div class="user">
              <img src="${t.foto || 'logo-liga.jfif'}" class="photo" alt="${t.nome || 'Técnico'}">
              <div class="user-info">
                <div class="nome">${t.nome || ""}</div>
                <small>${t.time || "-"}</small>
                <div class="categorias-tags">${cats || '<span class="tag">Sem categorias</span>'}</div>
              </div>
            </div>
            <div class="actions">
              <button onclick="editar('${t.id}')">
                <i class="fa-solid fa-pen"></i> Editar
              </button>
              <button onclick="ver('${t.id}')">
                <i class="fa-solid fa-eye"></i> Ver
              </button>
              <button class="delete" onclick="excluir('${t.id}')">
                <i class="fa-solid fa-trash"></i> Excluir
              </button>
            </div>
          </div>
        `;
      });
    }

    await carregarCategorias();
    await carregarTimes();
    carregarTecnicos();
  </script>

</body>
</html>
