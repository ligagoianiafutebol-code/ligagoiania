<style>

@media (max-width:800px){

grid-template-columns:1fr;
}

}

}
}
</style>
</head>
<body>

<header>LIGA GOIANA DE FUTEBOL DE BASE</header>

<div class="menu">
  <a href="index.html">Campeonatos</a>
  <a href="tabela.html">Tabela</a>
  <a href="jogos.html">Jogos</a>
  <a href="artilharia.html">Artilharia</a>
  <a href="cartoes.html">Cartões</a>
  <a href="suspensos.html" class="ativo">Suspensos</a>
  <a href="login.html">Login</a>
</div>

<div class="container">
  <div class="filtros">
    <select id="filtroCampeonato" onchange="carregarSuspensos()">
      <option value="">Selecione o campeonato</option>
    </select>

    <select id="filtroCategoria" onchange="carregarSuspensos()">
      <option value="">Selecione a categoria</option>
      <option value="Sub-11">Sub-11</option>
      <option value="Sub-12">Sub-12</option>
      <option value="Sub-13">Sub-13</option>
      <option value="Sub-14">Sub-14</option>
      <option value="Sub-15">Sub-15</option>
      <option value="Sub-16">Sub-16</option>
      <option value="Sub-17">Sub-17</option>
      <option value="Sub-18">Sub-18</option>
      <option value="Sub-19">Sub-19</option>
      <option value="Sub-20">Sub-20</option>
      <option value="Sub-21">Sub-21</option>
    </select>
  </div>

  <div class="titulo" id="tituloPagina">Suspensos</div>

  <div id="listaSuspensos"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let campeonatos = [];
let jogos = [];
let sumulas = [];
let jogadores = [];
let times = [];

function normalizarTexto(texto){
  return String(texto || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function parseDataFlex(valor){
  if(!valor) return new Date(0);

  const dataIso = new Date(valor);
  if(!isNaN(dataIso.getTime())) return dataIso;

  const texto = String(valor).trim();
  const matchBR = texto.match(/^(\d{2})\/(\d{2})\/(\d{4})(?:\s*-\s*(\d{2}):(\d{2}))?$/);

  if(matchBR){
    const [, dia, mes, ano, hora = "00", minuto = "00"] = matchBR;
    return new Date(`${ano}-${mes}-${dia}T${hora}:${minuto}:00`);
  }

  return new Date(0);
}

function ehSegundoAmarelo(obs){
  const texto = normalizarTexto(obs);
  return texto.includes("segundo amarelo")
    || texto.includes("2 amarelos")
    || texto.includes("duplo amarelo");
}

function pegarFotoJogador(nomeJogador, nomeTime = ""){
  const jogador = jogadores.find(j =>
    normalizarTexto(j.nome) === normalizarTexto(nomeJogador) &&
    (!nomeTime || normalizarTexto(j.time) === normalizarTexto(nomeTime))
  );
  return jogador?.foto || "";
}

function preencherFiltroCampeonato(){
  const select = document.getElementById("filtroCampeonato");
  const listaCampeonatos = [...new Set(jogos.map(j => j.campeonato).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"pt-BR"));

  select.innerHTML = '<option value="">Selecione o campeonato</option>';
  listaCampeonatos.forEach(c => {
    select.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

function getFiltros(){
  return {
    campeonato: document.getElementById("filtroCampeonato").value,
    categoria: document.getElementById("filtroCategoria").value
  };
}

function obterRegrasCampeonato(nomeCampeonato){
  const camp = campeonatos.find(c => normalizarTexto(c.nome) === normalizarTexto(nomeCampeonato));

  return {
    amarelosParaSuspensao: Number(camp?.regrasCartoes?.amarelosParaSuspensao || 3),
    jogosSuspensaoAmarelos: Number(camp?.regrasCartoes?.jogosSuspensaoAmarelos || 1),
    jogosSuspensaoVermelhoDireto: Number(camp?.regrasCartoes?.jogosSuspensaoVermelhoDireto || 2),
    jogosSuspensaoSegundoAmarelo: Number(camp?.regrasCartoes?.jogosSuspensaoSegundoAmarelo || 1)
  };
}

function obterListaDoTimeNaSumula(sumula, nomeTime){
  if(normalizarTexto(sumula.timeA) === normalizarTexto(nomeTime)){
    return {
      amarelos: sumula.amarelosDetalhadosA || [],
      vermelhos: sumula.vermelhosDetalhadosA || []
    };
  }

  if(normalizarTexto(sumula.timeB) === normalizarTexto(nomeTime)){
    return {
      amarelos: sumula.amarelosDetalhadosB || [],
      vermelhos: sumula.vermelhosDetalhadosB || []
    };
  }

  return null;
}

function contarNomeNumero(lista, jogadorNome, jogadorNumero){
  return (lista || []).filter(item => {
    const nomeOk = normalizarTexto(item.nome) === normalizarTexto(jogadorNome);
    const numeroOk = String(item.numero || "").trim() && String(jogadorNumero || "").trim()
      ? String(item.numero || "").trim() === String(jogadorNumero || "").trim()
      : true;
    return nomeOk && numeroOk;
  });
}

function calcularSituacaoSuspensao(jogadorNome, jogadorNumero, nomeTime, campeonatoNome, categoriaNome, dataAtual){
  const regras = obterRegrasCampeonato(campeonatoNome);

  const historicoDoTime = sumulas
    .filter(s =>
      normalizarTexto(s.campeonato) === normalizarTexto(campeonatoNome) &&
      normalizarTexto(s.categoria) === normalizarTexto(categoriaNome) &&
      (
        normalizarTexto(s.timeA) === normalizarTexto(nomeTime) ||
        normalizarTexto(s.timeB) === normalizarTexto(nomeTime)
      ) &&
      parseDataFlex(s.data || s.enviadaEm || "").getTime() < dataAtual.getTime()
    )
    .sort((a,b) => parseDataFlex(a.data || a.enviadaEm || "") - parseDataFlex(b.data || b.enviadaEm || ""));

  let amarelosAcumulados = 0;
  let jogosPendentes = 0;

  historicoDoTime.forEach(sumula => {
    if(jogosPendentes > 0){
      jogosPendentes -= 1;
      return;
    }

    const lado = obterListaDoTimeNaSumula(sumula, nomeTime);
    if(!lado) return;

    const amarelosJogador = contarNomeNumero(lado.amarelos, jogadorNome, jogadorNumero);
    const vermelhosJogador = contarNomeNumero(lado.vermelhos, jogadorNome, jogadorNumero);

    amarelosAcumulados += amarelosJogador.length;

    if(regras.amarelosParaSuspensao > 0){
      while(amarelosAcumulados >= regras.amarelosParaSuspensao){
        amarelosAcumulados -= regras.amarelosParaSuspensao;
        jogosPendentes += regras.jogosSuspensaoAmarelos;
      }
    }

    vermelhosJogador.forEach(v => {
      if(ehSegundoAmarelo(v.obs || "")){
        jogosPendentes += regras.jogosSuspensaoSegundoAmarelo;
      }else{
        jogosPendentes += regras.jogosSuspensaoVermelhoDireto;
      }
    });
  });

  return {
    suspenso: jogosPendentes > 0,
    jogosPendentes,
    amarelosAcumulados
  };
}

function montarSuspensos(){
  const { campeonato, categoria } = getFiltros();
  const jogosFiltrados = jogos
    .filter(j =>
      (!campeonato || j.campeonato === campeonato) &&
      (!categoria || j.categoria === categoria)
    )
    .sort((a,b) => parseDataFlex(a.data || "").getTime() - parseDataFlex(b.data || "").getTime());

  const proximoJogoPorTime = {};

  jogosFiltrados.forEach(jogo => {
    const dataJogo = parseDataFlex(jogo.data || "");
    if(jogo.timeA && !proximoJogoPorTime[jogo.timeA]) proximoJogoPorTime[jogo.timeA] = { data: dataJogo, jogo };
    if(jogo.timeB && !proximoJogoPorTime[jogo.timeB]) proximoJogoPorTime[jogo.timeB] = { data: dataJogo, jogo };
  });

  const listaFinal = [];

  jogadores.forEach(jogador => {
    if(categoria && !(jogador.categorias || []).includes(categoria)) return;
    if(!jogador.time) return;

    const proximo = proximoJogoPorTime[jogador.time];
    if(!proximo) return;

    const situacao = calcularSituacaoSuspensao(
      jogador.nome,
      jogador.numero,
      jogador.time,
      proximo.jogo.campeonato,
      proximo.jogo.categoria,
      proximo.data
    );

    if(situacao.suspenso){
      listaFinal.push({
        nome: jogador.nome || "-",
        numero: jogador.numero || "-",
        time: jogador.time || "-",
        foto: jogador.foto || "",
        campeonato: proximo.jogo.campeonato || "-",
        categoria: proximo.jogo.categoria || "-",
        jogosPendentes: situacao.jogosPendentes,
        motivo: `Cumprindo ${situacao.jogosPendentes} jogo(s) de suspensão`
      });
    }
  });

  listaFinal.sort((a,b) => {
    if(a.time !== b.time) return a.time.localeCompare(b.time, "pt-BR");
    return a.nome.localeCompare(b.nome, "pt-BR");
  });

  return listaFinal;
}

window.carregarSuspensos = function(){
  const lista = document.getElementById("listaSuspensos");
  const { campeonato, categoria } = getFiltros();

  document.getElementById("tituloPagina").textContent =
    `Suspensos${categoria ? " - " + categoria : ""}${campeonato ? " | " + campeonato : ""}`;

  const suspensos = montarSuspensos();

  if(!suspensos.length){
    lista.innerHTML = `<div class="vazio">Nenhum jogador suspenso encontrado.</div>`;
    return;
  }

  lista.innerHTML = `
    <div class="lista">
      ${suspensos.map(j => `
        <div class="card">
          <div class="player">
            <img src="${j.foto || pegarFotoJogador(j.nome, j.time)}" class="photo" onerror="this.src=''">
            <div class="info">
              <div class="nome">${j.numero || "-"} - ${j.nome}</div>
              <div class="subinfo">${j.time}</div>
              <div class="tags">
                <div class="tag">${j.campeonato}</div>
                <div class="tag">${j.categoria}</div>
              </div>
              <div class="subinfo">${j.motivo}</div>
            </div>
          </div>
          <div class="lado-direito">
            <div class="numero-destaque">${j.jogosPendentes}</div>
            <div class="subinfo">jogo(s) restante(s)</div>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

async function iniciarPagina(){
  const lista = document.getElementById("listaSuspensos");
  lista.innerHTML = `<div class="vazio">Carregando suspensos...</div>`;

  try{
    const snapCampeonatos = await getDocs(collection(db, "campeonatos"));
    campeonatos = [];
    snapCampeonatos.forEach(docSnap => campeonatos.push({ id: docSnap.id, ...docSnap.data() }));

    const snapJogos = await getDocs(collection(db, "jogos"));
    jogos = [];
    snapJogos.forEach(docSnap => jogos.push({ id: docSnap.id, ...docSnap.data() }));

    const snapSumulas = await getDocs(collection(db, "sumulas"));
    sumulas = [];
    snapSumulas.forEach(docSnap => sumulas.push({ id: docSnap.id, ...docSnap.data() }));

    const snapJogadores = await getDocs(collection(db, "jogadores"));
    jogadores = [];
    snapJogadores.forEach(docSnap => jogadores.push({ id: docSnap.id, ...docSnap.data() }));

    const snapTimes = await getDocs(collection(db, "times"));
    times = [];
    snapTimes.forEach(docSnap => times.push({ id: docSnap.id, ...docSnap.data() }));

    preencherFiltroCampeonato();
    carregarSuspensos();
  }catch(erro){
    console.error(erro);
    lista.innerHTML = `<div class="vazio">Erro ao carregar suspensos.</div>`;
  }
}

iniciarPagina();
</script>

</body>
