<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let campeonatos = [];
let jogos = [];
let sumulas = [];
let jogadores = [];

window.voltarPagina = function(){
  if(history.length > 1){
    history.back();
  }else{
    window.location.href = "index.html";
  }
};

function getParametro(nome){
  const params = new URLSearchParams(window.location.search);
  return params.get(nome);
}

function normalizarTexto(texto){
  return String(texto || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function valorCampo(obj, chaves, fallback = ""){
  for(const chave of chaves){
    if(obj && obj[chave] !== undefined && obj[chave] !== null && obj[chave] !== ""){
      return obj[chave];
    }
  }
  return fallback;
}

function obterIdCampeonato(doc){
  return valorCampo(doc, ["id", "campeonatoId"], "");
}

function obterNomeCampeonato(doc){
  return valorCampo(doc, ["nome", "campeonato", "titulo"], "");
}

async function carregarDados(){
  const [snapCampeonatos, snapJogos, snapSumulas, snapJogadores] = await Promise.all([
    getDocs(collection(db, "campeonatos")),
    getDocs(collection(db, "jogos")),
    getDocs(collection(db, "sumulas")),
    getDocs(collection(db, "jogadores"))
  ]);

  campeonatos = [];
  jogos = [];
  sumulas = [];
  jogadores = [];

  snapCampeonatos.forEach(docSnap => {
    campeonatos.push({ id: docSnap.id, ...docSnap.data() });
  });

  snapJogos.forEach(docSnap => {
    jogos.push({ id: docSnap.id, ...docSnap.data() });
  });

  snapSumulas.forEach(docSnap => {
    sumulas.push({ id: docSnap.id, ...docSnap.data() });
  });

  snapJogadores.forEach(docSnap => {
    jogadores.push({ id: docSnap.id, ...docSnap.data() });
  });
}
function parseDataFlex(valor){
  if(!valor) return new Date(0);

  const dataIso = new Date(valor);
  if(!isNaN(dataIso.getTime())) return dataIso;

  const texto = String(valor).trim();
  const matchBR = texto.match(/^(\d{2})\/(\d{2})\/(\d{4})(?:\s*-\s*(\d{2}):(\d{2}))?$/);

  if(matchBR){
    const [, dia, mes, ano, hora = "00", minuto = "00"] = matchBR;
    return new Date(`${ano}-${mes}-${dia}T${hora}:${minuto}:00`);
  }

  return new Date(0);
}

function ehSegundoAmarelo(obs){
  const texto = normalizarTexto(obs);
  return texto.includes("segundo amarelo")
    || texto.includes("2 amarelos")
    || texto.includes("duplo amarelo")
    || texto.includes("2o amarelo")
    || texto.includes("2º amarelo");
}

function pegarFotoJogador(nomeJogador, nomeTime = ""){
  const jogador = jogadores.find(j =>
    normalizarTexto(valorCampo(j, ["nome"], "")) === normalizarTexto(nomeJogador) &&
    (!nomeTime || normalizarTexto(valorCampo(j, ["time"], "")) === normalizarTexto(nomeTime))
  );

  return valorCampo(jogador, ["foto", "imagem"], "");
}

function preencherFiltroCampeonato(){
  const select = document.getElementById("filtroCampeonato");
  select.innerHTML = '<option value="">Selecione o campeonato</option>';

  campeonatos
    .sort((a,b)=>obterNomeCampeonato(a).localeCompare(obterNomeCampeonato(b), "pt-BR"))
    .forEach(c => {
      const option = document.createElement("option");
      option.value = obterIdCampeonato(c);
      option.textContent = obterNomeCampeonato(c);
      select.appendChild(option);
    });
}

function preencherCategorias(){
  const select = document.getElementById("filtroCategoria");
  const campeonatoId = document.getElementById("filtroCampeonato").value;

  select.innerHTML = '<option value="">Selecione a categoria</option>';

  if(!campeonatoId) return;

  const camp = campeonatos.find(c => obterIdCampeonato(c) === campeonatoId);
  if(!camp) return;

  const categoriasDoCadastro = valorCampo(camp, ["categorias"], []);
  const categorias = new Set(Array.isArray(categoriasDoCadastro) ? categoriasDoCadastro : []);

  jogos.forEach(j => {
    const jogoCampId = valorCampo(j, ["campeonatoId"], "");
    const categoria = valorCampo(j, ["categoria"], "");
    if(jogoCampId === campeonatoId && categoria){
      categorias.add(categoria);
    }
  });

  sumulas.forEach(s => {
    const sumulaCampId = valorCampo(s, ["campeonatoId"], "");
    const categoria = valorCampo(s, ["categoria"], "");
    if(sumulaCampId === campeonatoId && categoria){
      categorias.add(categoria);
    }
  });

  Array.from(categorias)
    .sort((a,b)=>String(a).localeCompare(String(b), "pt-BR"))
    .forEach(cat => {
      const option = document.createElement("option");
      option.value = cat;
      option.textContent = cat;
      select.appendChild(option);
    });
}

function aplicarFiltrosDaURL(){
  const campeonatoURL = getParametro("campeonato");
  const categoriaURL = getParametro("categoria");

  if(campeonatoURL){
    const camp = campeonatos.find(c =>
      normalizarTexto(obterNomeCampeonato(c)) === normalizarTexto(campeonatoURL)
    );

    if(camp){
      document.getElementById("filtroCampeonato").value = obterIdCampeonato(camp);
      preencherCategorias();
    }
  }

  if(categoriaURL){
    const selectCat = document.getElementById("filtroCategoria");
    const opcoes = Array.from(selectCat.options);
    const opcao = opcoes.find(op => normalizarTexto(op.value) === normalizarTexto(categoriaURL));

    if(opcao){
      selectCat.value = opcao.value;
    }
  }
}

function getFiltros(){
  return {
    campeonatoId: document.getElementById("filtroCampeonato").value,
    categoria: document.getElementById("filtroCategoria").value
  };
}

function obterRegrasCampeonatoPorId(campeonatoId){
  const camp = campeonatos.find(c => obterIdCampeonato(c) === campeonatoId);

  return {
    amarelosParaSuspensao: Number(valorCampo(camp, ["regrasCartoes"], {})?.amarelosParaSuspensao || 3),
    jogosSuspensaoAmarelos: Number(valorCampo(camp, ["regrasCartoes"], {})?.jogosSuspensaoAmarelos || 1),
    jogosSuspensaoVermelhoDireto: Number(valorCampo(camp, ["regrasCartoes"], {})?.jogosSuspensaoVermelhoDireto || 2),
    jogosSuspensaoSegundoAmarelo: Number(valorCampo(camp, ["regrasCartoes"], {})?.jogosSuspensaoSegundoAmarelo || 1)
  };
}

function obterListaDoTimeNaSumula(sumula, nomeTime){
  if(normalizarTexto(valorCampo(sumula, ["timeA"], "")) === normalizarTexto(nomeTime)){
    return {
      amarelos: valorCampo(sumula, ["amarelosDetalhadosA"], []),
      vermelhos: valorCampo(sumula, ["vermelhosDetalhadosA"], [])
    };
  }

  if(normalizarTexto(valorCampo(sumula, ["timeB"], "")) === normalizarTexto(nomeTime)){
    return {
      amarelos: valorCampo(sumula, ["amarelosDetalhadosB"], []),
      vermelhos: valorCampo(sumula, ["vermelhosDetalhadosB"], [])
    };
  }

  return null;
}
function contarNomeNumero(lista, jogadorNome, jogadorNumero){
  return (lista || []).filter(item => {
    const nomeOk = normalizarTexto(valorCampo(item, ["nome"], "")) === normalizarTexto(jogadorNome);

    const numeroItem = String(valorCampo(item, ["numero"], "")).trim();
    const numeroJogador = String(jogadorNumero || "").trim();

    const numeroOk = numeroItem && numeroJogador
      ? numeroItem === numeroJogador
      : true;

    return nomeOk && numeroOk;
  });
}

function calcularSituacaoSuspensao(jogadorNome, jogadorNumero, nomeTime, campeonatoId, categoriaNome, dataAtual){
  const regras = obterRegrasCampeonatoPorId(campeonatoId);

  const historicoDoTime = sumulas
    .filter(s =>
      valorCampo(s, ["campeonatoId"], "") === campeonatoId &&
      valorCampo(s, ["categoria"], "") === categoriaNome &&
      (
        normalizarTexto(valorCampo(s, ["timeA"], "")) === normalizarTexto(nomeTime) ||
        normalizarTexto(valorCampo(s, ["timeB"], "")) === normalizarTexto(nomeTime)
      ) &&
      parseDataFlex(valorCampo(s, ["data", "enviadaEm"], "")).getTime() < dataAtual.getTime()
    )
    .sort((a,b) =>
      parseDataFlex(valorCampo(a, ["data", "enviadaEm"], "")).getTime() -
      parseDataFlex(valorCampo(b, ["data", "enviadaEm"], "")).getTime()
    );

  let amarelosAcumulados = 0;
  let jogosPendentes = 0;

  historicoDoTime.forEach(sumula => {
    if(jogosPendentes > 0){
      jogosPendentes -= 1;
      return;
    }

    const lado = obterListaDoTimeNaSumula(sumula, nomeTime);
    if(!lado) return;

    const amarelosJogador = contarNomeNumero(lado.amarelos, jogadorNome, jogadorNumero);
    const vermelhosJogador = contarNomeNumero(lado.vermelhos, jogadorNome, jogadorNumero);

    amarelosAcumulados += amarelosJogador.length;

    if(regras.amarelosParaSuspensao > 0){
      while(amarelosAcumulados >= regras.amarelosParaSuspensao){
        amarelosAcumulados -= regras.amarelosParaSuspensao;
        jogosPendentes += regras.jogosSuspensaoAmarelos;
      }
    }

    vermelhosJogador.forEach(v => {
      if(ehSegundoAmarelo(valorCampo(v, ["obs", "motivo"], ""))){
        jogosPendentes += regras.jogosSuspensaoSegundoAmarelo;
      }else{
        jogosPendentes += regras.jogosSuspensaoVermelhoDireto;
      }
    });
  });

  return {
    suspenso: jogosPendentes > 0,
    jogosPendentes,
    amarelosAcumulados
  };
}

function montarSuspensos(){
  const { campeonatoId, categoria } = getFiltros();

  const jogosFiltrados = jogos
    .filter(j =>
      (!campeonatoId || valorCampo(j, ["campeonatoId"], "") === campeonatoId) &&
      (!categoria || valorCampo(j, ["categoria"], "") === categoria)
    )
    .sort((a,b) =>
      parseDataFlex(valorCampo(a, ["data"], "")).getTime() -
      parseDataFlex(valorCampo(b, ["data"], "")).getTime()
    );

  const proximoJogoPorTime = {};

  jogosFiltrados.forEach(jogo => {
    const timeA = valorCampo(jogo, ["timeA"], "");
    const timeB = valorCampo(jogo, ["timeB"], "");
    const dataJogo = parseDataFlex(valorCampo(jogo, ["data"], ""));

    if(timeA && !proximoJogoPorTime[timeA]) proximoJogoPorTime[timeA] = { data: dataJogo, jogo };
    if(timeB && !proximoJogoPorTime[timeB]) proximoJogoPorTime[timeB] = { data: dataJogo, jogo };
  });

  const listaFinal = [];

  jogadores.forEach(jogador => {
    const categoriasJogador = valorCampo(jogador, ["categorias"], []);
    const timeJogador = valorCampo(jogador, ["time"], "");
    const nomeJogador = valorCampo(jogador, ["nome"], "");
    const numeroJogador = valorCampo(jogador, ["numero"], "");

    if(categoria && Array.isArray(categoriasJogador) && categoriasJogador.length && !categoriasJogador.includes(categoria)) return;
    if(!timeJogador || !nomeJogador) return;

    const proximo = proximoJogoPorTime[timeJogador];
    if(!proximo) return;

    const situacao = calcularSituacaoSuspensao(
      nomeJogador,
      numeroJogador,
      timeJogador,
      valorCampo(proximo.jogo, ["campeonatoId"], ""),
      valorCampo(proximo.jogo, ["categoria"], ""),
      proximo.data
    );

    if(situacao.suspenso){
      listaFinal.push({
        nome: nomeJogador || "-",
        numero: numeroJogador || "-",
        time: timeJogador || "-",
        foto: valorCampo(jogador, ["foto", "imagem"], ""),
        campeonatoId: valorCampo(proximo.jogo, ["campeonatoId"], ""),
        categoria: valorCampo(proximo.jogo, ["categoria"], "-"),
        jogosPendentes: situacao.jogosPendentes,
        motivo: `Cumprindo ${situacao.jogosPendentes} jogo(s) de suspensão`
      });
    }
  });

  listaFinal.sort((a,b) => {
    if(a.time !== b.time) return a.time.localeCompare(b.time, "pt-BR");
    return a.nome.localeCompare(b.nome, "pt-BR");
  });

  return listaFinal;
}

window.carregarSuspensos = function(){
  const lista = document.getElementById("listaSuspensos");
  const { campeonatoId, categoria } = getFiltros();
  const campeonato = campeonatos.find(c => obterIdCampeonato(c) === campeonatoId) || null;
  const nomeCampeonato = campeonato ? obterNomeCampeonato(campeonato) : "";

  document.getElementById("tituloPagina").textContent =
    `Suspensos${categoria ? " - " + categoria : ""}${nomeCampeonato ? " | " + nomeCampeonato : ""}`;

  if(!campeonatoId){
    lista.innerHTML = `<div class="vazio">Selecione um campeonato para ver os suspensos.</div>`;
    return;
  }

  const suspensos = montarSuspensos();

  if(!suspensos.length){
    lista.innerHTML = `<div class="vazio">Nenhum jogador suspenso encontrado.</div>`;
    return;
  }

  lista.innerHTML = `
    <div class="lista">
      ${suspensos.map(j => `
        <div class="card">
          <div class="player">
            <img src="${j.foto || pegarFotoJogador(j.nome, j.time)}" class="photo" alt="${j.nome}" onerror="this.src='logo-liga.jfif'">
            <div class="info">
              <div class="nome">${j.numero || "-"} - ${j.nome}</div>
              <div class="subinfo">${j.time}</div>
              <div class="tags">
                <div class="tag">${nomeCampeonato || "-"}</div>
                <div class="tag">${j.categoria}</div>
              </div>
              <div class="subinfo">${j.motivo}</div>
            </div>
          </div>
          <div class="lado-direito">
            <div class="numero-destaque">${j.jogosPendentes}</div>
            <div class="subinfo">jogo(s) restante(s)</div>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}
async function iniciarPagina(){
  const lista = document.getElementById("listaSuspensos");
  lista.innerHTML = `<div class="vazio">Carregando suspensos...</div>`;

  try{
    await carregarDados();
    preencherFiltroCampeonato();
    aplicarFiltrosDaURL();
    carregarSuspensos();
  }catch(erro){
    console.error(erro);
    lista.innerHTML = `<div class="vazio">Erro ao carregar suspensos.</div>`;
  }
}

document.getElementById("filtroCampeonato").addEventListener("change", () => {
  preencherCategorias();
  document.getElementById("filtroCategoria").value = "";
  carregarSuspensos();
});

document.getElementById("filtroCategoria").addEventListener("change", carregarSuspensos);

iniciarPagina();
</script>

</body>
</html>
