<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súmula Pública - LIGA GOIANA DE FUTEBOL DE BASE</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b1f3a;
  color:white;
}
header{
  background:#08172c;
  padding:18px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  border-bottom:3px solid #f7c600;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
.top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 14px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  background:#f7c600;
  color:black;
}
.topo{
  background:#102a52;
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
  border:1px solid rgba(255,230,0,.18);
}
.topo-flex{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}
.logo{
  height:80px;
  width:80px;
  object-fit:contain;
  border-radius:50%;
  background:#1a3f73;
}
.meio-topo{
  flex:1;
  text-align:center;
}
.meio-topo h2{
  margin:0;
  color:#f7c600;
}
.sub{
  margin-top:6px;
  opacity:.92;
}
.resumo-placar{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:10px;
  justify-content:center;
}
.badge{
  background:#15325f;
  padding:8px 12px;
  border-radius:999px;
  font-weight:bold;
}
.times{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
.time-box{
  background:#102a52;
  border-radius:14px;
  padding:16px;
  border:1px solid rgba(255,230,0,.12);
}
.time-top{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:15px;
}
.escudo{
  width:72px;
  height:72px;
  object-fit:contain;
  border-radius:50%;
  background:#1a3f73;
}
.nome-time{
  font-size:24px;
  font-weight:bold;
  color:#f7c600;
}
.bloco{
  background:#0d2346;
  border-radius:12px;
  padding:12px;
  margin-top:14px;
}
.bloco h3{
  margin:0 0 10px;
  color:#f7c600;
  font-size:18px;
}
.linha{
  background:#15325f;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
  font-size:14px;
}
.linha strong{
  color:#ffe08a;
}
.vazio{
  background:#15325f;
  padding:10px;
  border-radius:8px;
  opacity:.9;
  font-size:14px;
}
.grid-info{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:14px;
  margin-top:20px;
}
.card-info{
  background:#102a52;
  border-radius:14px;
  padding:16px;
  border:1px solid rgba(255,230,0,.12);
}
.card-info h3{
  margin:0 0 10px;
  color:#f7c600;
}
.card-info p{
  margin:0;
  line-height:1.7;
  font-size:14px;
}
.coluna-unica{
  grid-column:1 / -1;
}
.loading{
  background:#102a52;
  padding:30px;
  border-radius:12px;
  text-align:center;
}
@media print{
  .top-actions{
    display:none;
  }
  body{
    background:white;
    color:black;
  }
  header{
    color:black;
    background:white;
    border-bottom:3px solid #f7c600;
  }
}
@media (max-width:900px){
  .times,
  .grid-info{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<header>LIGA GOIANA DE FUTEBOL DE BASE</header>

<div class="container">
  <div class="top-actions">
    <a href="jogos.html" class="btn">← Voltar para Jogos</a>
    <button class="btn" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
  </div>

  <div id="conteudoSumula" class="loading">Carregando súmula...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  getDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let times = [];

function getParametro(nome){
  const params = new URLSearchParams(window.location.search);
  return params.get(nome);
}

function escapar(texto){
  return String(texto || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function pegarEscudo(nomeTime){
  const time = times.find(t => t.nome === nomeTime);
  return time?.escudo || "logo-liga.jfif";
}

function renderListaSimples(lista, formatador){
  if(!Array.isArray(lista) || !lista.length){
    return `<div class="vazio">Nenhum registro informado.</div>`;
  }

  return lista.map(item => `
    <div class="linha">${formatador(item)}</div>
  `).join("");
}

function renderJogadores(lista){
  if(!Array.isArray(lista) || !lista.length){
    return `<div class="vazio">Nenhum jogador informado.</div>`;
  }

  return lista.map(j => `
    <div class="linha">
      <strong>${escapar(j.numero || "-")}</strong> - ${escapar(j.nome || "Sem nome")}
      ${j.posicao ? ` | ${escapar(j.posicao)}` : ""}
      ${j.observacao ? `<br><span>${escapar(j.observacao)}</span>` : ""}
    </div>
  `).join("");
}

function renderComissao(tecnico, a1, a2){
  const itens = [];
  if(tecnico) itens.push(`<div class="linha"><strong>Técnico:</strong> ${escapar(tecnico)}</div>`);
  if(a1) itens.push(`<div class="linha"><strong>Assistente 1:</strong> ${escapar(a1)}</div>`);
  if(a2) itens.push(`<div class="linha"><strong>Assistente 2:</strong> ${escapar(a2)}</div>`);

  return itens.length ? itens.join("") : `<div class="vazio">Nenhum membro informado.</div>`;
}

async function carregarTimes(){
  const snapTimes = await getDocs(collection(db, "times"));
  times = [];
  snapTimes.forEach(docSnap => {
    times.push({ id: docSnap.id, ...docSnap.data() });
  });
}

async function carregarSumula(){
  const jogoId = getParametro("id");
  const box = document.getElementById("conteudoSumula");

  if(!jogoId){
    box.innerHTML = `<div class="loading">ID do jogo não informado.</div>`;
    return;
  }

  try{
    const refSumula = doc(db, "sumulas", jogoId);
    const snapSumula = await getDoc(refSumula);

    if(!snapSumula.exists()){
      box.innerHTML = `<div class="loading">Súmula não encontrada.</div>`;
      return;
    }

    const s = snapSumula.data();

    const golsTimeA = renderListaSimples(s.golsDetalhadosA, item =>
      `<strong>${escapar(item.numero || "-")}</strong> - ${escapar(item.nome || "Sem nome")} (${escapar(item.tipo || "gol")})`
    );

    const golsTimeB = renderListaSimples(s.golsDetalhadosB, item =>
      `<strong>${escapar(item.numero || "-")}</strong> - ${escapar(item.nome || "Sem nome")} (${escapar(item.tipo || "gol")})`
    );

    const assistenciasTimeA = renderListaSimples(s.assistenciasDetalhadasA, item =>
      `<strong>${escapar(item.numero || "-")}</strong> - ${escapar(item.nome || "Sem nome")}${item.obs ? ` | ${escapar(item.obs)}` : ""}`
    );

    const assistenciasTimeB = renderListaSimples(s.assistenciasDetalhadasB, item =>
      `<strong>${escapar(item.numero || "-")}</strong> - ${escapar(item.nome || "Sem nome")}${item.obs ? ` | ${escapar(item.obs)}` : ""}`
    );

    const amarelosTimeA = renderListaSimples(s.amarelosDetalhadosA, item =>
      `<strong>${escapar(item.numero || "-")}</strong> - ${escapar(item.nome || "Sem nome")}${item.obs ? ` | ${escapar(item.obs)}` : ""}`
    );

    const amarelosTimeB = renderListaSimples(s.amarelosDetalhadosB, item =>
      `<strong>${escapar(item.numero || "-")}</strong> - ${escapar(item.nome || "Sem nome")}${item.obs ? ` | ${escapar(item.obs)}` : ""}`
    );

    const vermelhosTimeA = renderListaSimples(s.vermelhosDetalhadosA, item =>
      `<strong>${escapar(item.numero || "-")}</strong> - ${escapar(item.nome || "Sem nome")}${item.obs ? ` | ${escapar(item.obs)}` : ""}`
    );

    const vermelhosTimeB = renderListaSimples(s.vermelhosDetalhadosB, item =>
      `<strong>${escapar(item.numero || "-")}</strong> - ${escapar(item.nome || "Sem nome")}${item.obs ? ` | ${escapar(item.obs)}` : ""}`
    );

    box.innerHTML = `
      <div class="topo">
        <div class="topo-flex">
          <img src="logo-liga.jfif" class="logo" alt="Liga">
          <div class="meio-topo">
            <h2>SÚMULA OFICIAL</h2>
            <div class="sub">${escapar(s.campeonato || "-")}</div>
            <div class="sub">${escapar(s.categoria || "-")} | ${escapar(s.data || "-")} | ${escapar(s.local || "-")}</div>
            <div class="resumo-placar">
              <div class="badge">Placar: ${Number(s.golsA || 0)} x ${Number(s.golsB || 0)}</div>
              <div class="badge">Status: ${escapar(s.status || "finalizada")}</div>
            </div>
          </div>
          <img src="${escapar(s.logoCampeonato || 'logo-liga.jfif')}" class="logo" alt="Campeonato">
        </div>
      </div>

      <div class="times">
        <div class="time-box">
          <div class="time-top">
            <img src="${escapar(pegarEscudo(s.timeA))}" class="escudo" alt="${escapar(s.timeA)}">
            <div class="nome-time">${escapar(s.timeA || "Time A")}</div>
          </div>

          <div class="bloco">
            <h3>Comissão Técnica</h3>
            ${renderComissao(s.tecnicoA, s.assistenteA1, s.assistenteA2)}
          </div>

          <div class="bloco">
            <h3>Escalação</h3>
            ${renderJogadores(s.jogadoresA)}
          </div>

          <div class="bloco">
            <h3>Gols</h3>
            ${golsTimeA}
          </div>

          <div class="bloco">
            <h3>Assistências</h3>
            ${assistenciasTimeA}
          </div>

          <div class="bloco">
            <h3>Cartões Amarelos</h3>
            ${amarelosTimeA}
          </div>

          <div class="bloco">
            <h3>Cartões Vermelhos</h3>
            ${vermelhosTimeA}
          </div>
        </div>

        <div class="time-box">
          <div class="time-top">
            <img src="${escapar(pegarEscudo(s.timeB))}" class="escudo" alt="${escapar(s.timeB)}">
            <div class="nome-time">${escapar(s.timeB || "Time B")}</div>
          </div>

          <div class="bloco">
            <h3>Comissão Técnica</h3>
            ${renderComissao(s.tecnicoB, s.assistenteB1, s.assistenteB2)}
          </div>

          <div class="bloco">
            <h3>Escalação</h3>
            ${renderJogadores(s.jogadoresB)}
          </div>

          <div class="bloco">
            <h3>Gols</h3>
            ${golsTimeB}
          </div>

          <div class="bloco">
            <h3>Assistências</h3>
            ${assistenciasTimeB}
          </div>

          <div class="bloco">
            <h3>Cartões Amarelos</h3>
            ${amarelosTimeB}
          </div>

          <div class="bloco">
            <h3>Cartões Vermelhos</h3>
            ${vermelhosTimeB}
          </div>
        </div>
      </div>

      <div class="grid-info">
        <div class="card-info">
          <h3>Arbitragem</h3>
          <p><strong>Árbitro:</strong> ${escapar(s.arbitro || "-")}</p>
          <p><strong>Assistente 1:</strong> ${escapar(s.arbitroAssistente1 || "-")}</p>
          <p><strong>Assistente 2:</strong> ${escapar(s.arbitroAssistente2 || "-")}</p>
          <p><strong>Árbitro Auxiliar:</strong> ${escapar(s.arbitroAuxiliar || "-")}</p>
        </div>

        <div class="card-info">
          <h3>Resumo</h3>
          <p><strong>Artilharia:</strong> ${escapar(s.artilharia || "-")}</p>
          <p><strong>Assistências:</strong> ${escapar(s.assistencias || "-")}</p>
          <p><strong>Amarelos:</strong> ${escapar(s.amarelos || "-")}</p>
          <p><strong>Vermelhos:</strong> ${escapar(s.vermelhos || "-")}</p>
        </div>

        <div class="card-info coluna-unica">
          <h3>Observações do árbitro</h3>
          <p>${escapar(s.observacoes || "Nenhuma observação informada.")}</p>
        </div>
      </div>
    `;
  }catch(erro){
    console.error(erro);
    box.innerHTML = `<div class="loading">Erro ao carregar a súmula.</div>`;
  }
}

await carregarTimes();
await carregarSumula();
</script>

</body>
</html>
