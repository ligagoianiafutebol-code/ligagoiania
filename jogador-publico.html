<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogador - LIGA GOIANA DE FUTEBOL DE BASE</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.top-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:16px;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
background:#f7c600;
color:black;
border:none;
cursor:pointer;
}

.hero{
background:linear-gradient(135deg,#102a52,#0d2346);
border:1px solid rgba(255,230,0,.12);
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

.hero-top{
display:flex;
align-items:center;
gap:18px;
flex-wrap:wrap;
}

.hero-photo{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
background:#1a3f73;
border:2px solid rgba(255,255,255,.14);
}

.hero-info{
flex:1;
}

.hero-titulo{
font-size:28px;
font-weight:bold;
color:#f7c600;
margin-bottom:6px;
}

.hero-sub{
font-size:14px;
opacity:.92;
line-height:1.6;
}

.hero-tags{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}

.hero-tag{
background:#0b1f3a;
padding:8px 12px;
border-radius:999px;
font-size:12px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.card{
background:#102a52;
border-radius:14px;
padding:16px;
border:1px solid rgba(255,230,0,.12);
}

.card h3{
margin:0 0 12px;
color:#f7c600;
font-size:20px;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.stat-card{
background:#0b1f3a;
border-radius:10px;
padding:12px;
border:1px solid rgba(255,255,255,.08);
}

.stat-card strong{
display:block;
color:#f7c600;
font-size:13px;
margin-bottom:4px;
}

.stat-card span{
font-size:16px;
font-weight:bold;
}

.info-list{
display:flex;
flex-direction:column;
gap:10px;
}

.info-item{
background:#0b1f3a;
border-radius:10px;
padding:12px;
border:1px solid rgba(255,255,255,.08);
font-size:14px;
}

.info-item strong{
color:#f7c600;
}

.loading{
background:#102a52;
border-radius:12px;
padding:30px;
text-align:center;
}

@media (max-width:900px){
.grid{
grid-template-columns:1fr;
}

.stats-grid{
grid-template-columns:1fr 1fr;
}
}

@media (max-width:600px){
.stats-grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<header>LIGA GOIANA DE FUTEBOL DE BASE</header>

<div class="container">
  <div class="top-actions">
    <a href="jogadores.html" class="btn">← Voltar para Jogadores</a>
  </div>

  <div id="conteudoJogador" class="loading">Carregando jogador...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, getDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function getParametro(nome){
  const params = new URLSearchParams(window.location.search);
  return params.get(nome);
}

function escapar(texto){
  return String(texto || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

async function carregarJogador(){
  const jogadorId = getParametro("id");
  const box = document.getElementById("conteudoJogador");

  if(!jogadorId){
    box.innerHTML = `<div class="loading">ID do jogador não informado.</div>`;
    return;
  }

  try{
    const refJogador = doc(db, "jogadores", jogadorId);
    const snapJogador = await getDoc(refJogador);

    if(!snapJogador.exists()){
      box.innerHTML = `<div class="loading">Jogador não encontrado.</div>`;
      return;
    }

    const jogador = { id: snapJogador.id, ...snapJogador.data() };

    document.title = `${jogador.nome || "Jogador"} - LIGA GOIANA DE FUTEBOL DE BASE`;

    box.innerHTML = `
      <div class="hero">
        <div class="hero-top">
          <img src="${escapar(jogador.foto || '')}" class="hero-photo" alt="${escapar(jogador.nome || "Jogador")}" onerror="this.src=''">
          <div class="hero-info">
            <div class="hero-titulo">${escapar(jogador.nome || "Jogador")}</div>
            <div class="hero-sub">
              Time: ${escapar(jogador.time || "-")}<br>
              Posição: ${escapar(jogador.posicao || "-")} | Número: ${escapar(jogador.numero || "-")}
            </div>

            <div class="hero-tags">
              ${(jogador.categorias || []).map(c => `<div class="hero-tag">${escapar(c)}</div>`).join("") || `<div class="hero-tag">Sem categoria</div>`}
            </div>
          </div>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h3>Estatísticas</h3>
          <div class="stats-grid">
            <div class="stat-card">
              <strong>Jogos</strong>
              <span>${Number(jogador.jogos || 0)}</span>
            </div>
            <div class="stat-card">
              <strong>Gols</strong>
              <span>${Number(jogador.gols || 0)}</span>
            </div>
            <div class="stat-card">
              <strong>Assistências</strong>
              <span>${Number(jogador.assistencias || 0)}</span>
            </div>
            <div class="stat-card">
              <strong>Amarelos</strong>
              <span>${Number(jogador.amarelos || 0)}</span>
            </div>
            <div class="stat-card">
              <strong>Vermelhos</strong>
              <span>${Number(jogador.vermelhos || 0)}</span>
            </div>
          </div>
        </div>

        <div class="card">
          <h3>Informações</h3>
          <div class="info-list">
            <div class="info-item"><strong>Nome:</strong> ${escapar(jogador.nome || "-")}</div>
            <div class="info-item"><strong>Time:</strong> ${escapar(jogador.time || "-")}</div>
            <div class="info-item"><strong>Posição:</strong> ${escapar(jogador.posicao || "-")}</div>
            <div class="info-item"><strong>Número:</strong> ${escapar(jogador.numero || "-")}</div>
            <div class="info-item"><strong>Categorias:</strong> ${(jogador.categorias || []).length ? jogador.categorias.map(c => escapar(c)).join(", ") : "-"}</div>
          </div>
        </div>
      </div>
    `;
  }catch(erro){
    console.error(erro);
    box.innerHTML = `<div class="loading">Erro ao carregar o jogador.</div>`;
  }
}

await carregarJogador();
</script>

</body>
</html>
