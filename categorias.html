<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categorias - Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
}

button{
background:#f7c600;
color:black;
padding:10px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

.btn{
display:inline-block;
background:#f7c600;
color:black;
padding:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

.lista{
display:flex;
flex-direction:column;
gap:10px;
}

.card{
background:#102a52;
padding:12px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.actions button{
background:#1a3f73;
margin-left:5px;
font-size:12px;
}

.delete{
background:#b30000 !important;
}

.back{
display:block;
margin-top:15px;
color:#f7c600;
font-weight:bold;
text-decoration:none;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-content{
background:#102a52;
padding:20px;
border-radius:12px;
text-align:center;
}
</style>
</head>

<body>

<header>Categorias</header>

<div class="container">

<a class="btn" onclick="toggleFormulario()">+ Nova Categoria</a>

<input id="buscaCategoria" placeholder="Pesquisar..." oninput="carregarCategorias()">

<div id="formulario" style="display:none;">
  <input id="nomeCategoria" placeholder="Nome da categoria (ex: Sub-15)">
  <button onclick="salvarCategoria()">Salvar</button>
</div>

<div class="lista" id="listaCategorias"></div>

<a href="admin.html" class="back">← Voltar</a>

</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editandoId = null;

window.toggleFormulario = function(){
  const f = document.getElementById("formulario");
  f.style.display = f.style.display === "none" ? "block" : "none";
}

window.salvarCategoria = async function(){
  const nome = document.getElementById("nomeCategoria").value.trim();

  if(!nome){
    alert("Digite o nome da categoria");
    return;
  }

  if(editandoId){
    await updateDoc(doc(db, "categorias", editandoId), { nome });
    alert("Atualizado!");
  }else{
    await addDoc(collection(db, "categorias"), { nome });
    alert("Salvo!");
  }

  document.getElementById("nomeCategoria").value = "";
  editandoId = null;
  carregarCategorias();
}

window.editarCategoria = async function(id){
  const snap = await getDocs(collection(db, "categorias"));

  snap.forEach(docSnap => {
    if(docSnap.id === id){
      document.getElementById("nomeCategoria").value = docSnap.data().nome;
      editandoId = id;
      document.getElementById("formulario").style.display = "block";
    }
  });
}

window.verCategoria = function(nome){
  document.getElementById("modalContent").innerHTML = `
    <h2>${nome}</h2>
    <button onclick="fecharModal()">Fechar</button>
  `;
  document.getElementById("modal").style.display = "flex";
}

window.fecharModal = function(){
  document.getElementById("modal").style.display = "none";
}

window.excluirCategoria = async function(id){
  const confirmar = confirm("Excluir categoria?");
  if(!confirmar) return;

  await deleteDoc(doc(db, "categorias", id));
  carregarCategorias();
}

async function carregarCategorias(){
  const lista = document.getElementById("listaCategorias");
  lista.innerHTML = "";

  const snap = await getDocs(collection(db, "categorias"));
  let categorias = [];

  snap.forEach(docSnap => {
    categorias.push({ id: docSnap.id, ...docSnap.data() });
  });

  const busca = document.getElementById("buscaCategoria").value.toLowerCase();

  if(busca){
    categorias = categorias.filter(c => c.nome.toLowerCase().includes(busca));
  }

  categorias.sort((a,b)=>a.nome.localeCompare(b.nome));

  categorias.forEach(c => {
    lista.innerHTML += `
      <div class="card">
        <div>${c.nome}</div>
        <div class="actions">
          <button onclick="editarCategoria('${c.id}')">Editar</button>
          <button onclick="verCategoria('${c.nome}')">Ver</button>
          <button class="delete" onclick="excluirCategoria('${c.id}')">Excluir</button>
        </div>
      </div>
    `;
  });
}

carregarCategorias();
</script>

</body>
</html>
