<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categorias</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#f7c600;
color:black;
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

.btn{
display:inline-block;
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
text-decoration:none;
}

.btn-voltar{
display:inline-block;
margin-bottom:15px;
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.lista{
display:flex;
flex-direction:column;
gap:10px;
}

.card{
background:#102a52;
padding:12px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.card-info{
display:flex;
flex-direction:column;
gap:4px;
}

.card-info small{
opacity:.85;
font-size:12px;
}

.actions button{
background:#1a3f73;
margin-left:5px;
font-size:12px;
color:white;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:15px;
z-index:999;
}

.modal-content{
background:#102a52;
padding:20px;
border-radius:12px;
text-align:center;
width:100%;
max-width:650px;
max-height:85vh;
overflow:auto;
}

.jogadores-box{
margin-top:15px;
text-align:left;
background:#0b1f3a;
border-radius:10px;
padding:12px;
}

.jogadores-box h3{
margin:0 0 10px;
font-size:15px;
color:#f7c600;
}

.jogadores-lista{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.jogador-tag{
background:#1a3f73;
padding:6px 10px;
border-radius:999px;
font-size:12px;
}

.sem-item{
opacity:.85;
font-size:13px;
}

@media (max-width:700px){
.card{
flex-direction:column;
align-items:flex-start;
}

.actions{
width:100%;
}
}
</style>
</head>

<body>

<header>Categorias</header>

<div class="container">

<a href="index.html" class="btn-voltar">← Voltar</a>

<input id="buscaCategoria" placeholder="Pesquisar..." oninput="carregarCategorias()">

<div class="lista" id="listaCategorias"></div>

</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categoriasCache = [];
let jogadoresCache = [];

function obterNomeJogador(jogador) {
  return (
    jogador.nome ||
    jogador.nomeJogador ||
    jogador.jogador ||
    jogador.atleta ||
    "Jogador sem nome"
  );
}

function jogadorPertenceCategoria(jogador, categoria) {
  const categoriaId = categoria.id;
  const categoriaNome = String(categoria.nome || "").trim().toLowerCase();

  const campoCategoria = String(jogador.categoria || "").trim().toLowerCase();
  const campoCategoriaNome = String(jogador.categoriaNome || "").trim().toLowerCase();
  const campoCategoriaId = String(jogador.categoriaId || "").trim();

  const categoriasLista = Array.isArray(jogador.categorias)
    ? jogador.categorias.map(v => String(v).trim().toLowerCase())
    : [];

  const categoriaIdsLista = Array.isArray(jogador.categoriaIds)
    ? jogador.categoriaIds.map(v => String(v).trim())
    : [];

  if (campoCategoria && campoCategoria === categoriaNome) return true;
  if (campoCategoriaNome && campoCategoriaNome === categoriaNome) return true;
  if (campoCategoriaId && campoCategoriaId === categoriaId) return true;
  if (categoriasLista.includes(categoriaNome)) return true;
  if (categoriaIdsLista.includes(categoriaId)) return true;

  return false;
}

function obterJogadoresDaCategoria(categoria) {
  return jogadoresCache.filter(jogador => jogadorPertenceCategoria(jogador, categoria));
}

window.verCategoria = function(id){
  const categoria = categoriasCache.find(c => c.id === id);
  if (!categoria) return;

  const jogadores = obterJogadoresDaCategoria(categoria);

  const htmlJogadores = jogadores.length
    ? jogadores.map(j => `<div class="jogador-tag">${obterNomeJogador(j)}</div>`).join("")
    : `<div class="sem-item">Nenhum jogador encontrado nesta categoria.</div>`;

  document.getElementById("modalContent").innerHTML = `
    <h2>${categoria.nome}</h2>

    <div class="jogadores-box">
      <h3>Jogadores cadastrados</h3>
      <div class="jogadores-lista">${htmlJogadores}</div>
    </div>

    <button onclick="fecharModal()" style="margin-top:15px;">Fechar</button>
  `;
  document.getElementById("modal").style.display = "flex";
}

window.fecharModal = function(){
  document.getElementById("modal").style.display = "none";
}

async function carregarJogadores(){
  jogadoresCache = [];
  const snap = await getDocs(collection(db, "jogadores"));

  snap.forEach(docSnap => {
    jogadoresCache.push({ id: docSnap.id, ...docSnap.data() });
  });
}

async function carregarCategorias(){
  const lista = document.getElementById("listaCategorias");
  lista.innerHTML = "<div class='sem-item'>Carregando categorias...</div>";

  const snap = await getDocs(collection(db, "categorias"));
  categoriasCache = [];

  snap.forEach(docSnap => {
    categoriasCache.push({ id: docSnap.id, ...docSnap.data() });
  });

  let categorias = [...categoriasCache];

  const busca = (document.getElementById("buscaCategoria").value || "").toLowerCase().trim();

  if(busca){
    categorias = categorias.filter(c => (c.nome || "").toLowerCase().includes(busca));
  }

  categorias.sort((a,b)=>(a.nome || "").localeCompare((b.nome || ""), "pt-BR"));

  if (!categorias.length) {
    lista.innerHTML = "<div class='sem-item'>Nenhuma categoria encontrada.</div>";
    return;
  }

  lista.innerHTML = "";

  categorias.forEach(c => {
    const jogadores = obterJogadoresDaCategoria(c);

    lista.innerHTML += `
      <div class="card">
        <div class="card-info">
          <div>${c.nome}</div>
          <small>${jogadores.length} jogador(es) cadastrado(s)</small>
        </div>
        <div class="actions">
          <button onclick="verCategoria('${c.id}')">Ver</button>
        </div>
      </div>
    `;
  });
}

async function iniciarPagina() {
  try {
    await carregarJogadores();
    await carregarCategorias();
  } catch (erro) {
    document.getElementById("listaCategorias").innerHTML = "<div class='sem-item'>Erro ao carregar as categorias.</div>";
    console.error(erro);
  }
}

iniciarPagina();
</script>

</body>
</html>
