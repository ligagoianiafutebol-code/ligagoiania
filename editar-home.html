<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f3a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#102a52;
  padding:30px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  background:#ffe600;
  border:none;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
</div>

<script>
const USER = "admin";
const PASS = "123456";

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === USER && p === PASS){
    localStorage.setItem("home_editor_logado","true");
    window.location.href = "index.html";
  } else {
    alert("Login errado");
  }
}
</script>

</body>
</html>
