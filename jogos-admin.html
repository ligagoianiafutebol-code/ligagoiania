<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogos - Admin</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f3a;
  color:white;
}
header{
  background:#08172c;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  border-bottom:3px solid #f7c600;
}
.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}
input, select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
}
button{
  background:#f7c600;
  color:black;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.card{
  background:#102a52;
  padding:15px;
  margin-top:12px;
  border-radius:10px;
}
.top-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}
.link-btn{
  display:inline-block;
  background:#f7c600;
  color:black;
  padding:10px 14px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}
.bloco-titulo{
  margin:18px 0 8px;
  color:#f7c600;
  font-size:18px;
  font-weight:bold;
}
.btn-voltar{
  display:inline-block;
  margin-bottom:15px;
  background:#f7c600;
  color:black;
  padding:10px 14px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}
@media (max-width: 800px){
  .grid{ grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header>Cadastro de Jogos</header>

<div class="container">
  <a href="admin.html" class="btn-voltar">← Voltar</a>

  <div class="bloco-titulo">Informações do Jogo</div>
  <div class="grid">
    <div>
      <label>Data e hora</label>
      <input id="dataJogo" type="datetime-local">
    </div>

    <div>
      <label>Local</label>
      <input id="localJogo" placeholder="Ex: Campo 1">
    </div>

    <div>
      <label>Campeonato</label>
      <input id="campeonato" placeholder="Ex: Copa União de Base">
    </div>

    <div>
      <label>Logo do campeonato (URL)</label>
      <input id="logoCampeonato" placeholder="Ex: logo-campeonato.png">
    </div>

    <div>
      <label>Categoria</label>
      <select id="categoria">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Time mandante</label>
      <select id="timeA">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Time visitante</label>
      <select id="timeB">
        <option value="">Selecione</option>
      </select>
    </div>
  </div>

  <div class="bloco-titulo">Comissão Técnica - Mandante</div>
  <div class="grid">
    <div>
      <label>Técnico</label>
      <input id="tecnicoA" placeholder="Nome do técnico mandante">
    </div>

    <div>
      <label>Assistente 1</label>
      <input id="assistenteA1" placeholder="Nome do assistente 1 mandante">
    </div>

    <div>
      <label>Assistente 2</label>
      <input id="assistenteA2" placeholder="Nome do assistente 2 mandante">
    </div>
  </div>

  <div class="bloco-titulo">Comissão Técnica - Visitante</div>
  <div class="grid">
    <div>
      <label>Técnico</label>
      <input id="tecnicoB" placeholder="Nome do técnico visitante">
    </div>

    <div>
      <label>Assistente 1</label>
      <input id="assistenteB1" placeholder="Nome do assistente 1 visitante">
    </div>

    <div>
      <label>Assistente 2</label>
      <input id="assistenteB2" placeholder="Nome do assistente 2 visitante">
    </div>
  </div>

  <div class="bloco-titulo">Arbitragem</div>
  <div class="grid">
    <div>
      <label>Árbitro</label>
      <select id="arbitro">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Árbitro Assistente 1</label>
      <select id="assistente1">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Árbitro Assistente 2</label>
      <select id="assistente2">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Árbitro Auxiliar</label>
      <select id="arbitroAuxiliar">
        <option value="">Selecione</option>
      </select>
    </div>
  </div>

  <div class="top-actions">
    <button onclick="salvarJogo()">Salvar Jogo</button>
  </div>

  <div id="listaJogos"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function carregarTimes(){
  const selectA = document.getElementById("timeA");
  const selectB = document.getElementById("timeB");
  selectA.innerHTML = '<option value="">Selecione</option>';
  selectB.innerHTML = '<option value="">Selecione</option>';

  const snap = await getDocs(collection(db, "times"));
  let times = [];
  snap.forEach(d => times.push(d.data()));
  times.sort((a,b)=>(a.nome||"").localeCompare(b.nome||"", "pt-BR"));

  times.forEach(t => {
    selectA.innerHTML += `<option value="${t.nome}">${t.nome}</option>`;
    selectB.innerHTML += `<option value="${t.nome}">${t.nome}</option>`;
  });
}

async function carregarCategorias(){
  const select = document.getElementById("categoria");
  select.innerHTML = '<option value="">Selecione</option>';

  const snap = await getDocs(collection(db, "categorias"));
  let categorias = [];
  snap.forEach(d => categorias.push(d.data()));
  categorias.sort((a,b)=>(a.nome||"").localeCompare(b.nome||"", "pt-BR"));

  categorias.forEach(c => {
    select.innerHTML += `<option value="${c.nome}">${c.nome}</option>`;
  });
}

async function carregarUsuarios(){
  const arbitro = document.getElementById("arbitro");
  const assistente1 = document.getElementById("assistente1");
  const assistente2 = document.getElementById("assistente2");
  const arbitroAuxiliar = document.getElementById("arbitroAuxiliar");

  arbitro.innerHTML = '<option value="">Selecione</option>';
  assistente1.innerHTML = '<option value="">Selecione</option>';
  assistente2.innerHTML = '<option value="">Selecione</option>';
  arbitroAuxiliar.innerHTML = '<option value="">Selecione</option>';

  const snap = await getDocs(collection(db, "usuarios"));
  let arbitros = [];
  let assistentes = [];

  snap.forEach(d => {
    const u = d.data();

    if(u.tipoUsuario === "arbitro"){
      arbitros.push(u.nome);
    }

    if(u.tipoUsuario === "assistente"){
      assistentes.push(u.nome);
    }
  });

  arbitros.sort((a,b)=>a.localeCompare(b,"pt-BR"));
  assistentes.sort((a,b)=>a.localeCompare(b,"pt-BR"));

  arbitros.forEach(nome => {
    arbitro.innerHTML += `<option value="${nome}">${nome}</option>`;
    arbitroAuxiliar.innerHTML += `<option value="${nome}">${nome}</option>`;
  });

  assistentes.forEach(nome => {
    assistente1.innerHTML += `<option value="${nome}">${nome}</option>`;
    assistente2.innerHTML += `<option value="${nome}">${nome}</option>`;
  });
}

window.salvarJogo = async function(){
  const jogo = {
    data: document.getElementById("dataJogo").value,
    local: document.getElementById("localJogo").value.trim(),
    campeonato: document.getElementById("campeonato").value.trim(),
    logoCampeonato: document.getElementById("logoCampeonato").value.trim(),
    categoria: document.getElementById("categoria").value,
    timeA: document.getElementById("timeA").value,
    timeB: document.getElementById("timeB").value,

    tecnicoA: document.getElementById("tecnicoA").value.trim(),
    assistenteA1: document.getElementById("assistenteA1").value.trim(),
    assistenteA2: document.getElementById("assistenteA2").value.trim(),

    tecnicoB: document.getElementById("tecnicoB").value.trim(),
    assistenteB1: document.getElementById("assistenteB1").value.trim(),
    assistenteB2: document.getElementById("assistenteB2").value.trim(),

    arbitro: document.getElementById("arbitro").value,
    assistente: document.getElementById("assistente1").value,
    assistente2: document.getElementById("assistente2").value,
    arbitroAuxiliar: document.getElementById("arbitroAuxiliar").value,

    status: "pendente",
    criadoEm: new Date().toISOString()
  };

  if(!jogo.data) return alert("Escolha a data e hora.");
  if(!jogo.local) return alert("Digite o local.");
  if(!jogo.timeA || !jogo.timeB) return alert("Selecione os times.");
  if(jogo.timeA === jogo.timeB) return alert("Os times não podem ser iguais.");
  if(!jogo.categoria) return alert("Selecione a categoria.");

  await addDoc(collection(db, "jogos"), jogo);
  alert("Jogo criado com sucesso!");
  location.reload();
};

window.excluirJogo = async function(id){
  if(!confirm("Deseja excluir este jogo?")) return;
  await deleteDoc(doc(db, "jogos", id));
  carregarJogos();
};

async function carregarJogos(){
  const lista = document.getElementById("listaJogos");
  lista.innerHTML = "";

  const snap = await getDocs(collection(db, "jogos"));
  let jogos = [];
  snap.forEach(d => jogos.push({id:d.id, ...d.data()}));

  jogos.sort((a,b)=>(a.data||"").localeCompare(b.data||""));

  jogos.forEach(j => {
    lista.innerHTML += `
      <div class="card">
        <strong>${j.timeA} x ${j.timeB}</strong><br>
        Categoria: ${j.categoria || "-"}<br>
        Campeonato: ${j.campeonato || "-"}<br>
        Data: ${j.data || "-"}<br>
        Local: ${j.local || "-"}<br>
        Técnico Mandante: ${j.tecnicoA || "-"}<br>
        Assistente 1 Mandante: ${j.assistenteA1 || "-"}<br>
        Assistente 2 Mandante: ${j.assistenteA2 || "-"}<br>
        Técnico Visitante: ${j.tecnicoB || "-"}<br>
        Assistente 1 Visitante: ${j.assistenteB1 || "-"}<br>
        Assistente 2 Visitante: ${j.assistenteB2 || "-"}<br>
        Árbitro: ${j.arbitro || "-"}<br>
        Árbitro Assistente 1: ${j.assistente || "-"}<br>
        Árbitro Assistente 2: ${j.assistente2 || "-"}<br>
        Árbitro Auxiliar: ${j.arbitroAuxiliar || "-"}<br>
        Status: ${j.status || "pendente"}<br><br>

        <div class="top-actions">
          <a class="link-btn" href="sumula.html?id=${j.id}">Abrir Súmula</a>
          <button onclick="excluirJogo('${j.id}')">Excluir</button>
        </div>
      </div>
    `;
  });
}

await carregarTimes();
await carregarCategorias();
await carregarUsuarios();
await carregarJogos();
</script>

</body>
</html>
