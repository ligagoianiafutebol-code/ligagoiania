<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogos - Admin</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f3a;
  color:white;
}
header{
  background:#08172c;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  border-bottom:3px solid #f7c600;
}
.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}
input, select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
}
button{
  background:#f7c600;
  color:black;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.card{
  background:#102a52;
  padding:15px;
  margin-top:12px;
  border-radius:10px;
}
.top-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}
.link-btn{
  display:inline-block;
  background:#f7c600;
  color:black;
  padding:10px 14px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}
@media (max-width: 800px){
  .grid{ grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header>Cadastro de Jogos</header>

<div class="container">

  <div class="grid">
    <div>
      <label>Data e hora</label>
      <input id="dataJogo" type="datetime-local">
    </div>

    <div>
      <label>Local</label>
      <input id="localJogo" placeholder="Ex: Campo 1">
    </div>

    <div>
      <label>Time mandante</label>
      <select id="timeA">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Time visitante</label>
      <select id="timeB">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Categoria</label>
      <select id="categoria">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Campeonato</label>
      <input id="campeonato" placeholder="Ex: Copa União de Base">
    </div>

    <div>
      <label>Árbitro</label>
      <select id="arbitro">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Assistente</label>
      <select id="assistente">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Logo do campeonato (URL)</label>
      <input id="logoCampeonato" placeholder="Ex: logo-campeonato.png">
    </div>
  </div>

  <div class="top-actions">
    <button onclick="salvarJogo()">Salvar Jogo</button>
    <a class="link-btn" href="painel-admin.html">Voltar</a>
  </div>

  <div id="listaJogos"></div>
</div>
