<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos - Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
}

.btn{
background:#f7c600;
color:black;
padding:10px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-bottom:15px;
font-weight:bold;
}

.card{
background:#102a52;
padding:12px;
border-radius:10px;
margin-bottom:8px;
}

.match{
display:flex;
justify-content:space-between;
font-size:14px;
}

.info{
font-size:12px;
opacity:0.8;
margin-top:4px;
}

.actions a{
background:#1a3f73;
padding:6px 10px;
border-radius:6px;
color:white;
text-decoration:none;
margin-right:5px;
font-size:12px;
}

.back{
display:block;
margin-top:10px;
color:#f7c600;
text-decoration:none;
font-weight:bold;
}
</style>

</head>
<body>

<header>Jogos</header>

<div class="container">

<a class="btn">+ Novo Jogo</a>

<div class="card">
<div class="match">
Atlético GO x Vila Nova
</div>
<div class="info">Sub-15 • 10:00 • Campo 1</div>
<div class="actions">
<a>Editar</a>
<a>Escalar</a>
</div>
</div>

<div class="card">
<div class="match">
Campinas x Hidrolândia
</div>
<div class="info">Sub-13 • 11:30 • Campo 2</div>
<div class="actions">
<a>Editar</a>
<a>Escalar</a>
</div>
</div>

<a href="admin.html" class="back">← Voltar</a>

</div>

</body>
</html>
