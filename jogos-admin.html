<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogos - Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

input, select{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
}

button{
background:#f7c600;
color:black;
padding:10px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.card{
background:#102a52;
padding:15px;
margin-top:10px;
border-radius:10px;
}

</style>
</head>

<body>

<header>Cadastro de Jogos</header>

<div class="container">

<input id="dataJogo" type="datetime-local">
<select id="timeA"></select>
<select id="timeB"></select>
<select id="categoria"></select>
<select id="arbitro"></select>
<select id="assistente"></select>

<button onclick="salvarJogo()">Salvar Jogo</button>

<div id="listaJogos"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.firebasestorage.app",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// CARREGAR TIMES
async function carregarTimes(){
  const selectA = document.getElementById("timeA");
  const selectB = document.getElementById("timeB");

  const snap = await getDocs(collection(db, "times"));

  snap.forEach(doc=>{
    const t = doc.data();
    selectA.innerHTML += `<option>${t.nome}</option>`;
    selectB.innerHTML += `<option>${t.nome}</option>`;
  });
}

// CARREGAR CATEGORIAS
async function carregarCategorias(){
  const select = document.getElementById("categoria");

  const snap = await getDocs(collection(db, "categorias"));

  snap.forEach(doc=>{
    const c = doc.data();
    select.innerHTML += `<option>${c.nome}</option>`;
  });
}

// CARREGAR USUÁRIOS (ÁRBITRO E ASSISTENTE)
async function carregarUsuarios(){
  const arb = document.getElementById("arbitro");
  const ass = document.getElementById("assistente");

  const snap = await getDocs(collection(db, "usuarios"));

  snap.forEach(doc=>{
    const u = doc.data();

    if(u.tipoUsuario === "arbitro"){
      arb.innerHTML += `<option>${u.nome}</option>`;
    }

    if(u.tipoUsuario === "assistente"){
      ass.innerHTML += `<option>${u.nome}</option>`;
    }
  });
}

// SALVAR JOGO
window.salvarJogo = async function(){

  const jogo = {
    data: document.getElementById("dataJogo").value,
    timeA: document.getElementById("timeA").value,
    timeB: document.getElementById("timeB").value,
    categoria: document.getElementById("categoria").value,
    arbitro: document.getElementById("arbitro").value,
    assistente: document.getElementById("assistente").value,
    status: "pendente"
  };

  await addDoc(collection(db, "jogos"), jogo);

  alert("Jogo criado!");
  location.reload();
}

carregarTimes();
carregarCategorias();
carregarUsuarios();

</script>

</body>
</html>
