<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Times - LIGA GOIANA DE FUTEBOL DE BASE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.menu{
display:flex;
justify-content:center;
gap:10px;
background:#102a52;
padding:12px;
flex-wrap:wrap;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.menu a{
color:white;
text-decoration:none;
font-weight:bold;
font-size:14px;
background:#0d2346;
padding:10px 14px;
border-radius:8px;
}

.menu a.ativo{
background:#f7c600;
color:black;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.hero{
background:linear-gradient(135deg,#102a52,#0d2346);
border:1px solid rgba(255,230,0,.12);
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

.hero h2{
margin:0 0 8px;
color:#f7c600;
font-size:26px;
}

.hero p{
margin:0;
opacity:.92;
line-height:1.6;
font-size:14px;
}

.filtros{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

input, select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
gap:14px;
}

.card{
background:#102a52;
padding:16px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
border:1px solid rgba(255,230,0,.12);
}

.team{
display:flex;
align-items:center;
gap:12px;
min-width:0;
flex:1;
}

.preview{
width:64px;
height:64px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,.15);
background:#1a3f73;
flex-shrink:0;
}

.team-info{
display:flex;
flex-direction:column;
gap:6px;
min-width:0;
}

.nome-time{
font-weight:bold;
font-size:17px;
color:#ffffff;
}

.time-colors{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.time-color{
width:16px;
height:16px;
border-radius:50%;
border:1px solid #ffffff55;
}

.tags{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.tag{
background:#1a3f73;
padding:4px 8px;
border-radius:999px;
font-size:12px;
}

.actions{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:flex-end;
}

.btn-acao{
display:inline-flex;
align-items:center;
justify-content:center;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:13px;
border:none;
cursor:pointer;
}

.btn-ver{
background:#f7c600;
color:black;
}

.vazio{
background:#102a52;
padding:30px;
border-radius:12px;
text-align:center;
}

@media (max-width:800px){
.filtros{
grid-template-columns:1fr;
}

.card{
flex-direction:column;
align-items:flex-start;
}

.actions{
width:100%;
justify-content:flex-start;
}
}
</style>
</head>
<body>

<header>LIGA GOIANA DE FUTEBOL DE BASE</header>

<div class="menu">
<a href="index.html">Campeonatos</a>
<a href="tabela.html">Tabela</a>
<a href="jogos.html">Jogos</a>
<a href="artilharia.html">Artilharia</a>
<a href="cartoes.html">Cartões</a>
<a href="suspensos.html">Suspensos</a>
<a href="times.html" class="ativo">Times</a>
<a href="login.html">Login</a>
</div>

<div class="container">

<div class="hero">
  <h2>Times Participantes</h2>
  <p>Veja as equipes cadastradas, suas categorias e acesse a página pública de cada time.</p>
</div>

<div class="filtros">
  <input id="buscaTime" placeholder="Pesquisar time..." oninput="carregarTimes()">

  <select id="filtroCategoria" onchange="carregarTimes()">
    <option value="">Selecione a categoria</option>
    <option value="Sub-11">Sub-11</option>
    <option value="Sub-12">Sub-12</option>
    <option value="Sub-13">Sub-13</option>
    <option value="Sub-14">Sub-14</option>
    <option value="Sub-15">Sub-15</option>
    <option value="Sub-16">Sub-16</option>
    <option value="Sub-17">Sub-17</option>
    <option value="Sub-18">Sub-18</option>
    <option value="Sub-19">Sub-19</option>
    <option value="Sub-20">Sub-20</option>
    <option value="Sub-21">Sub-21</option>
  </select>
</div>

<div class="lista-grid" id="listaTimes"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let timesCache = [];

window.carregarTimes = function(){
  const lista = document.getElementById("listaTimes");
  const busca = (document.getElementById("buscaTime").value || "").toLowerCase().trim();
  const categoria = document.getElementById("filtroCategoria").value;

  let times = [...timesCache];

  if (busca) {
    times = times.filter(t =>
      (t.nome || "").toLowerCase().includes(busca)
    );
  }

  if (categoria) {
    times = times.filter(t => Array.isArray(t.categorias) && t.categorias.includes(categoria));
  }

  times.sort((a, b) => (a.nome || "").localeCompare((b.nome || ""), "pt-BR"));

  if (!times.length) {
    lista.innerHTML = `<div class="vazio">Nenhum time encontrado.</div>`;
    return;
  }

  lista.innerHTML = "";

  times.forEach(t => {
    const cores = (t.cores || []).map(c => `<div class="time-color" style="background:${c}"></div>`).join("");
    const categorias = (t.categorias || []).map(c => `<span class="tag">${c}</span>`).join("");

    lista.innerHTML += `
      <div class="card">
        <div class="team">
          <img src="${t.escudo || 'logo-liga.jfif'}" class="preview" alt="${t.nome || 'Time'}" onerror="this.src='logo-liga.jfif'">
          <div class="team-info">
            <div class="nome-time">${t.nome || "-"}</div>
            <div class="time-colors">${cores}</div>
            <div class="tags">${categorias || '<span class="tag">Sem categoria</span>'}</div>
          </div>
        </div>

        <div class="actions">
          <a class="btn-acao btn-ver" href="time-publico.html?id=${t.id}">
            Ver Time
          </a>
        </div>
      </div>
    `;
  });
};

async function iniciarPagina(){
  const lista = document.getElementById("listaTimes");
  lista.innerHTML = `<div class="vazio">Carregando times...</div>`;

  try{
    const snap = await getDocs(collection(db, "times"));
    timesCache = [];
    snap.forEach(docSnap => {
      timesCache.push({ id: docSnap.id, ...docSnap.data() });
    });

    carregarTimes();
  }catch(erro){
    console.error(erro);
    lista.innerHTML = `<div class="vazio">Erro ao carregar os times.</div>`;
  }
}

iniciarPagina();
</script>

</body>
</html>
