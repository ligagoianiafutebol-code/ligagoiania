<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Times - Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
max-width:1100px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#f7c600;
color:black;
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

.btn{
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-bottom:12px;
font-weight:bold;
cursor:pointer;
border:none;
}

.back{
display:block;
margin-top:15px;
color:#f7c600;
text-decoration:none;
font-weight:bold;
}

.preview{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
}

.nome-time{
font-weight:bold;
font-size:16px;
}

.palette-box{
display:none;
background:#102a52;
padding:12px;
border-radius:10px;
margin-bottom:14px;
overflow-x:auto;
}

.palette-box.show{
display:block;
}

.color-grid{
display:grid;
grid-auto-flow:column;
grid-template-rows:repeat(8, 26px);
grid-auto-columns:26px;
gap:6px;
}

.color-option{
width:26px;
height:26px;
border-radius:3px;
border:2px solid transparent;
cursor:pointer;
box-sizing:border-box;
}

.color-option.selected{
border-color:#ffffff;
box-shadow:0 0 0 1px #f7c600;
}

#coresSelecionadas{
display:flex;
flex-wrap:wrap;
gap:8px;
margin:10px 0 14px 0;
min-height:36px;
}

.selected-color{
width:30px;
height:30px;
border-radius:6px;
border:2px solid #ffffff33;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
gap:12px;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.team{
display:flex;
align-items:center;
gap:12px;
min-width:0;
}

.team-info{
display:flex;
flex-direction:column;
gap:6px;
min-width:0;
}

.time-colors{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.time-color{
width:14px;
height:14px;
border-radius:4px;
border:1px solid #ffffff55;
}

.actions{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.actions button{
background:#1a3f73;
padding:6px 10px;
border-radius:6px;
color:white;
border:none;
font-size:12px;
margin:0;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:15px;
z-index:999;
}

.modal-content{
background:#102a52;
padding:20px;
border-radius:12px;
max-width:420px;
width:100%;
text-align:center;
}

.modal-content img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
margin-bottom:10px;
}

.modal-colors{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
margin-top:10px;
}

.modal-color{
width:20px;
height:20px;
border-radius:4px;
border:1px solid #ffffff55;
}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.firebasestorage.app",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let coresEscolhidas = [];
let editandoId = null;
let escudoAtual = "";

window.toggleFormulario = function(){
  const f = document.getElementById("formulario");
  f.style.display = f.style.display === "none" ? "block" : "none";
}

window.togglePaleta = function(){
  document.getElementById("paletaBox").classList.toggle("show");
}

function atualizarCores() {
  const box = document.getElementById("coresSelecionadas");
  box.innerHTML = "";

  coresEscolhidas.forEach(cor => {
    box.innerHTML += `<div class="selected-color" style="background:${cor};cursor:pointer;" onclick="removerCor('${cor}')"></div>`;
  });
}

window.removerCor = function(cor){
  coresEscolhidas = coresEscolhidas.filter(c => c !== cor);

  document.querySelectorAll(".color-option").forEach(op => {
    if(op.dataset.color === cor){
      op.classList.remove("selected");
    }
  });

  atualizarCores();
}

document.querySelectorAll(".color-option").forEach(op => {
  op.onclick = () => {
    const cor = op.dataset.color;

    if (coresEscolhidas.includes(cor)) {
      coresEscolhidas = coresEscolhidas.filter(c => c !== cor);
      op.classList.remove("selected");
    } else {
      coresEscolhidas.push(cor);
      op.classList.add("selected");
    }

    atualizarCores();
  };
});

window.salvarTime = async function(){
  const nome = document.getElementById("nomeTime").value.trim();
  const file = document.getElementById("escudo").files[0];

  if(!nome || coresEscolhidas.length === 0){
    alert("Preencha nome e escolha pelo menos 1 cor");
    return;
  }

  let urlEscudo = escudoAtual;

  if (file) {
    const refStorage = ref(storage, "escudos/" + Date.now() + "-" + file.name);
    await uploadBytes(refStorage, file);
    urlEscudo = await getDownloadURL(refStorage);
  }

  if (!urlEscudo) {
    alert("Escolha o escudo do time");
    return;
  }

  if (editandoId) {
    await updateDoc(doc(db, "times", editandoId), {
      nome: nome,
      escudo: urlEscudo,
      cores: coresEscolhidas
    });
    alert("Time atualizado com sucesso!");
  } else {
    await addDoc(collection(db, "times"), {
      nome: nome,
      escudo: urlEscudo,
      cores: coresEscolhidas
    });
    alert("Time salvo com sucesso!");
  }

  limparFormulario();
  carregarTimes();
}

function limparFormulario() {
  document.getElementById("nomeTime").value = "";
  document.getElementById("escudo").value = "";
  document.getElementById("botaoSalvar").textContent = "Salvar Time";
  coresEscolhidas = [];
  escudoAtual = "";
  editandoId = null;
  document.querySelectorAll(".color-option").forEach(op => op.classList.remove("selected"));
  atualizarCores();
}

window.editarTime = async function(id) {
  const snap = await getDocs(collection(db, "times"));
  snap.forEach((item) => {
    if (item.id === id) {
      const t = item.data();
      document.getElementById("nomeTime").value = t.nome || "";
      escudoAtual = t.escudo || "";
      coresEscolhidas = Array.isArray(t.cores) ? [...t.cores] : [];
      editandoId = id;

      document.querySelectorAll(".color-option").forEach(op => {
        op.classList.remove("selected");
        if (coresEscolhidas.includes(op.dataset.color)) {
          op.classList.add("selected");
        }
      });

      atualizarCores();
      document.getElementById("formulario").style.display = "block";
      document.getElementById("botaoSalvar").textContent = "Atualizar Time";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  });
}

window.verTime = function(nome, escudo, cores) {
  const listaCores = (cores || []).map(c => `<div class="modal-color" style="background:${c}"></div>`).join("");

  document.getElementById("modalConteudo").innerHTML = `
    <img src="${escudo}">
    <h2 style="margin:10px 0;">${nome}</h2>
    <div style="opacity:.85;">Cores do time</div>
    <div class="modal-colors">${listaCores}</div>
    <button onclick="fecharModal()" style="margin-top:15px;">Fechar</button>
  `;

  document.getElementById("modalVer").style.display = "flex";
}

window.fecharModal = function() {
  document.getElementById("modalVer").style.display = "none";
}

window.excluirTime = async function(id){
  const confirmar = confirm("Tem certeza que deseja excluir este time?");
  if(!confirmar) return;

  await deleteDoc(doc(db, "times", id));
  alert("Time excluído!");
  carregarTimes();
}

async function carregarTimes(){
  const lista = document.getElementById("listaTimes");
  lista.innerHTML = "";

  let times = [];
  const snap = await getDocs(collection(db, "times"));
  snap.forEach(docSnap => times.push({ id: docSnap.id, ...docSnap.data() }));

  times.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));

  times.forEach(t => {
    const cores = (t.cores || []).map(c => `<div class="time-color" style="background:${c}"></div>`).join("");
    const coresJson = JSON.stringify(t.cores || []).replace(/"/g, '&quot;');
    const nomeSeguro = t.nome.replace(/'/g, "\\'");

    lista.innerHTML += `
      <div class="card">
        <div class="team">
          <img src="${t.escudo}" class="preview">
          <div class="team-info">
            <div class="nome-time">${t.nome}</div>
            <div class="time-colors">${cores}</div>
          </div>
        </div>
        <div class="actions">
          <button onclick="editarTime('${t.id}')">Editar</button>
          <button onclick="verTime('${nomeSeguro}', '${t.escudo}', ${coresJson})">Ver</button>
          <button onclick="excluirTime('${t.id}')" style="background:#b30000;">Excluir</button>
        </div>
      </div>`;
  });
}

carregarTimes();
</script>
