<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Times - Liga Goiana</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
max-width:1100px;
margin:auto;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
gap:12px;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
display:flex;
align-items:center;
gap:12px;
}

.preview{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
}

.nome-time{
font-weight:bold;
font-size:16px;
}

.time-colors{
display:flex;
gap:6px;
margin-top:5px;
}

.time-color{
width:14px;
height:14px;
border-radius:4px;
border:1px solid #ffffff55;
}
</style>

</head>
<body>

<header>LIGA GOIANA DE FUTEBOL DE BASE</header>

<div class="container">
<div class="lista-grid" id="listaTimes"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.firebasestorage.app",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function carregarTimes() {
  const lista = document.getElementById("listaTimes");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "times"));

  let times = [];

  querySnapshot.forEach((doc) => {
    times.push(doc.data());
  });

  // ORDEM ALFABÉTICA
  times.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));

  times.forEach((time) => {
    const cores = Array.isArray(time.cores) ? time.cores : [];

    const coresHTML = cores.map(cor => `
      <div class="time-color" style="background:${cor}"></div>
    `).join("");

    lista.innerHTML += `
      <div class="card">
        <img src="${time.escudo}" class="preview">
        <div>
          <div class="nome-time">${time.nome}</div>
          <div class="time-colors">${coresHTML}</div>
        </div>
      </div>
    `;
  });
}

carregarTimes();
</script>

</body>
</html>
