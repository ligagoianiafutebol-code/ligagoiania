<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Times</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
max-width:1100px;
margin:auto;
}

input, select{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#f7c600;
color:black;
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

.btn{
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-bottom:12px;
font-weight:bold;
cursor:pointer;
border:none;
}

.btn-voltar{
display:inline-block;
margin-bottom:15px;
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.preview{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
background:#1a3f73;
}

.nome-time{
font-weight:bold;
font-size:16px;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
gap:12px;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.team{
display:flex;
align-items:center;
gap:12px;
min-width:0;
}

.team-info{
display:flex;
flex-direction:column;
gap:6px;
min-width:0;
}

.time-colors{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.time-color{
width:14px;
height:14px;
border-radius:4px;
border:1px solid #ffffff55;
}

.actions{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.actions button{
background:#1a3f73;
padding:6px 10px;
border-radius:6px;
color:white;
border:none;
font-size:12px;
margin:0;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:15px;
z-index:999;
}

.modal-content{
background:#102a52;
padding:20px;
border-radius:12px;
max-width:500px;
width:100%;
text-align:center;
max-height:85vh;
overflow:auto;
}

.modal-content img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
margin-bottom:10px;
background:#1a3f73;
}

.modal-colors{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
margin-top:10px;
}

.modal-color{
width:20px;
height:20px;
border-radius:4px;
border:1px solid #ffffff55;
}

.tags{
display:flex;
gap:6px;
flex-wrap:wrap;
justify-content:center;
margin-top:10px;
}

.tag{
background:#1a3f73;
padding:4px 8px;
border-radius:999px;
font-size:12px;
}

.subtitle{
opacity:.85;
font-size:13px;
margin-bottom:10px;
}

.player-row{
display:flex;
align-items:center;
gap:10px;
background:#0b1f3a;
padding:10px;
border-radius:8px;
margin-top:8px;
text-align:left;
}

.player-photo{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
background:#1a3f73;
}

.player-info small{
display:block;
opacity:.85;
margin-top:2px;
}

.sem-item{
opacity:.85;
font-size:13px;
}

@media (max-width:700px){
.card{
flex-direction:column;
align-items:flex-start;
}

.actions{
width:100%;
justify-content:flex-start;
}
}
</style>
</head>

<body>

<header>Times</header>

<div class="container">

<a href="index.html" class="btn-voltar">← Voltar</a>

<input id="buscaTime" placeholder="Pesquisar time..." oninput="carregarTimes()">

<div class="lista-grid" id="listaTimes"></div>

</div>

<div class="modal" id="modalVer">
  <div class="modal-content" id="modalConteudo"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let timesCache = [];
let jogadoresCache = [];

function obterNomeJogador(jogador) {
  return (
    jogador.nome ||
    jogador.nomeJogador ||
    jogador.jogador ||
    jogador.atleta ||
    "Jogador sem nome"
  );
}

function jogadorPertenceAoTime(jogador, time) {
  const timeId = time.id;
  const timeNome = String(time.nome || "").trim().toLowerCase();

  const campoTime = String(jogador.time || "").trim().toLowerCase();
  const campoTimeNome = String(jogador.timeNome || "").trim().toLowerCase();
  const campoTimeId = String(jogador.timeId || "").trim();

  const timesLista = Array.isArray(jogador.times)
    ? jogador.times.map(v => String(v).trim().toLowerCase())
    : [];

  const timeIdsLista = Array.isArray(jogador.timeIds)
    ? jogador.timeIds.map(v => String(v).trim())
    : [];

  if (campoTime && campoTime === timeNome) return true;
  if (campoTimeNome && campoTimeNome === timeNome) return true;
  if (campoTimeId && campoTimeId === timeId) return true;
  if (timesLista.includes(timeNome)) return true;
  if (timeIdsLista.includes(timeId)) return true;

  return false;
}

function obterJogadoresDoTime(time) {
  return jogadoresCache.filter(jogador => jogadorPertenceAoTime(jogador, time));
}

window.verTime = function(id) {
  const time = timesCache.find(t => t.id === id);
  if (!time) return;

  const jogadores = obterJogadoresDoTime(time);
  jogadores.sort((a, b) => obterNomeJogador(a).localeCompare(obterNomeJogador(b), 'pt-BR'));

  const listaCores = (time.cores || []).map(c => `<div class="modal-color" style="background:${c}"></div>`).join("");
  const categorias = (time.categorias || []).map(c => `<div class="tag">${c}</div>`).join("");
  const elenco = jogadores.length
    ? jogadores.map(j => `
        <div class="player-row">
          <img src="${j.foto || ''}" class="player-photo" onerror="this.src=''">
          <div class="player-info">
            <strong>${obterNomeJogador(j)}</strong>
            <small>${j.posicao || "-"}</small>
            <small>Nº ${j.numero || "-"}</small>
          </div>
        </div>
      `).join("")
    : `<div class="subtitle">Esse time ainda não tem jogadores cadastrados.</div>`;

  document.getElementById("modalConteudo").innerHTML = `
    <img src="${time.escudo || ''}" onerror="this.src=''">
    <h2 style="margin:10px 0;">${time.nome || "-"}</h2>
    <div style="opacity:.85;">Cores do time</div>
    <div class="modal-colors">${listaCores || '<div class="subtitle">Sem cores cadastradas.</div>'}</div>
    <div class="tags">${categorias || ""}</div>
    <h3 style="margin-top:20px;">Elenco</h3>
    ${elenco}
    <button onclick="fecharModal()" style="margin-top:15px;">Fechar</button>
  `;

  document.getElementById("modalVer").style.display = "flex";
}

window.fecharModal = function() {
  document.getElementById("modalVer").style.display = "none";
}

async function carregarJogadores() {
  jogadoresCache = [];
  const snap = await getDocs(collection(db, "jogadores"));

  snap.forEach(docSnap => {
    jogadoresCache.push({ id: docSnap.id, ...docSnap.data() });
  });
}

async function carregarTimes() {
  const lista = document.getElementById("listaTimes");
  lista.innerHTML = "<div class='sem-item'>Carregando times...</div>";

  timesCache = [];
  const snap = await getDocs(collection(db, "times"));
  snap.forEach(docSnap => timesCache.push({ id: docSnap.id, ...docSnap.data() }));

  let times = [...timesCache];

  const busca = (document.getElementById("buscaTime").value || "").toLowerCase().trim();

  if (busca) {
    times = times.filter(t => (t.nome || "").toLowerCase().includes(busca));
  }

  times.sort((a, b) => (a.nome || "").localeCompare((b.nome || ""), 'pt-BR'));

  if (!times.length) {
    lista.innerHTML = "<div class='sem-item'>Nenhum time encontrado.</div>";
    return;
  }

  lista.innerHTML = "";

  times.forEach(t => {
    const cores = (t.cores || []).map(c => `<div class="time-color" style="background:${c}"></div>`).join("");
    const categorias = (t.categorias || []).map(c => `<span class="tag">${c}</span>`).join("");
    const totalJogadores = obterJogadoresDoTime(t).length;

    lista.innerHTML += `
      <div class="card">
        <div class="team">
          <img src="${t.escudo || ''}" class="preview" onerror="this.src=''">
          <div class="team-info">
            <div class="nome-time">${t.nome || "-"}</div>
            <div class="time-colors">${cores}</div>
            <div class="tags">${categorias}</div>
            <div class="subtitle">${totalJogadores} jogador(es)</div>
          </div>
        </div>
        <div class="actions">
          <button onclick="verTime('${t.id}')">Ver</button>
        </div>
      </div>`;
  });
}

async function iniciarPagina() {
  try {
    await carregarJogadores();
    await carregarTimes();
  } catch (erro) {
    document.getElementById("listaTimes").innerHTML = "<div class='sem-item'>Erro ao carregar os times.</div>";
    console.error(erro);
  }
}

iniciarPagina();
</script>

</body>
</html>
