<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Times - Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#f7c600;
color:black;
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.team{
display:flex;
align-items:center;
gap:12px;
flex-wrap:wrap;
}

.actions a{
background:#1a3f73;
padding:8px;
border-radius:6px;
color:white;
text-decoration:none;
margin-left:5px;
font-size:13px;
}

.back{
display:block;
margin-top:10px;
color:#f7c600;
text-decoration:none;
font-weight:bold;
}

.preview{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
}

.nome-time{
font-weight:bold;
font-size:16px;
}

.section-title{
font-size:14px;
margin:12px 0 8px;
font-weight:bold;
}

.palette-box{
background:#102a52;
padding:12px;
border-radius:10px;
margin-bottom:14px;
}

.palette-label{
font-size:13px;
margin-bottom:8px;
opacity:.9;
}

.color-grid{
display:grid;
grid-template-columns:repeat(10, 26px);
gap:6px;
justify-content:start;
}

.color-option{
width:26px;
height:26px;
border-radius:3px;
border:2px solid transparent;
cursor:pointer;
box-sizing:border-box;
}

.color-option.selected{
border-color:#ffffff;
box-shadow:0 0 0 1px #f7c600;
}

#coresSelecionadas{
display:flex;
flex-wrap:wrap;
gap:8px;
margin:10px 0 14px 0;
min-height:36px;
}

.selected-color{
width:30px;
height:30px;
border-radius:6px;
border:2px solid #ffffff33;
}

.time-colors{
display:flex;
gap:6px;
flex-wrap:wrap;
align-items:center;
}

.time-color{
width:16px;
height:16px;
border-radius:4px;
border:1px solid #ffffff55;
}
</style>

</head>
<body>

<header>Times</header>

<div class="container">

<input id="nomeTime" placeholder="Nome do time">
<input id="escudo" type="file" accept="image/*">

<div class="section-title">Escolha quantas cores quiser</div>

<div class="palette-box">
  <div class="palette-label">Paleta de cores</div>

    <div class="color-option" data-color="#3b2a1f" style="background:#3b2a1f"></div>

    <!-- Linha 3: vermelhos/laranjas/amarelos -->

    <div class="color-option" data-color="#ff9999" style="background:#ff9999"></div>
    <div class="color-option" data-color="#ff6666" style="background:#ff6666"></div>
    <div class="color-option" data-color="#ff0000" style="background:#ff0000"></div>
    <div class="color-option" data-color="#cc0000" style="background:#cc0000"></div>
    <div class="color-option" data-color="#ffb366" style="background:#ffb366"></div>
    <div class="color-option" data-color="#ff7a00" style="background:#ff7a00"></div>

<div class="section-title">Cores escolhidas (clique para remover)</div>
<div id="coresSelecionadas"></div>

<button onclick="salvarTime()">Salvar Time</button>

<div id="listaTimes"></div>

<a href="admin.html" class="back">← Voltar</a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.firebasestorage.app",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let coresEscolhidas = [];

function atualizarCoresSelecionadas() {
  const box = document.getElementById("coresSelecionadas");
  box.innerHTML = "";

  coresEscolhidas.forEach((cor) => {
    box.innerHTML += `
      <div class="selected-color"
           style="background:${cor}; cursor:pointer;"
           onclick="removerCor('${cor}')">
      </div>
    `;
  });
}

window.removerCor = function(cor) {
  coresEscolhidas = coresEscolhidas.filter(c => c !== cor);

  document.querySelectorAll(".color-option").forEach(op => {
    if (op.dataset.color === cor) {
      op.classList.remove("selected");
    }
  });

  atualizarCoresSelecionadas();
}

function configurarPaleta() {
  const opcoes = document.querySelectorAll(".color-option");

  opcoes.forEach((opcao) => {
    opcao.addEventListener("click", () => {
      const cor = opcao.dataset.color;

      if (coresEscolhidas.includes(cor)) {
        coresEscolhidas = coresEscolhidas.filter(c => c !== cor);
        opcao.classList.remove("selected");
      } else {
        coresEscolhidas.push(cor);
        opcao.classList.add("selected");
      }

      atualizarCoresSelecionadas();
    });
  });
}

async function carregarTimes() {
  const lista = document.getElementById("listaTimes");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "times"));

  querySnapshot.forEach((doc) => {
    const time = doc.data();
    const cores = Array.isArray(time.cores) ? time.cores : [];

    const bolinhas = cores.map(cor => `
      <div class="time-color" style="background:${cor}"></div>
    `).join("");

    lista.innerHTML += `
      <div class="card">
        <div class="team">
          <img src="${time.escudo || ''}" class="preview" alt="Escudo do time">
          <div>
            <div class="nome-time">${time.nome}</div>
            <div class="time-colors">${bolinhas}</div>
          </div>
        </div>
        <div class="actions">
          <a>Editar</a>
          <a>Ver</a>
        </div>
      </div>
    `;
  });
}

window.salvarTime = async function() {
  const nome = document.getElementById("nomeTime").value.trim();
  const arquivo = document.getElementById("escudo").files[0];

  if (!nome) {
    alert("Digite o nome do time");
    return;
  }

  if (!arquivo) {
    alert("Escolha o escudo do time");
    return;
  }

  if (coresEscolhidas.length === 0) {
    alert("Escolha pelo menos 1 cor");
    return;
  }

  const nomeArquivo = Date.now() + "-" + arquivo.name;
  const storageRef = ref(storage, "escudos/" + nomeArquivo);

  await uploadBytes(storageRef, arquivo);
  const urlEscudo = await getDownloadURL(storageRef);

  await addDoc(collection(db, "times"), {
    nome: nome,
    escudo: urlEscudo,
    cores: coresEscolhidas
  });

  alert("Time salvo com sucesso!");

  document.getElementById("nomeTime").value = "";
  document.getElementById("escudo").value = "";

  coresEscolhidas = [];
  document.querySelectorAll(".color-option").forEach(op => op.classList.remove("selected"));
  atualizarCoresSelecionadas();

  carregarTimes();
}

configurarPaleta();
carregarTimes();
</script>

</body>
</html>
