<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Times - Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
}

.btn{
background:#f7c600;
color:black;
padding:10px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-bottom:15px;
font-weight:bold;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.team{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:30px;
height:30px;
background:#f7c600;
border-radius:50%;
}

.actions a{
background:#1a3f73;
padding:8px;
border-radius:6px;
color:white;
text-decoration:none;
margin-left:5px;
font-size:13px;
}

.back{
display:block;
margin-top:10px;
color:#f7c600;
text-decoration:none;
font-weight:bold;
}
</style>

</head>
<body>

<header>Times</header>

<div class="container">

<input id="nomeTime" placeholder="Nome do time">
<button onclick="salvarTime()">Salvar Time</button>

<div class="card">
<div class="team">
<div class="logo"></div>
Atlético GO
</div>
<div class="actions">
<a>Editar</a>
<a>Ver</a>
</div>
</div>

<div class="card">
<div class="team">
<div class="logo"></div>
Vila Nova
</div>
<div class="actions">
<a>Editar</a>
<a>Ver</a>
</div>
</div>

<div class="card">
<div class="team">
<div class="logo"></div>
Campinas
</div>
<div class="actions">
<a>Editar</a>
<a>Ver</a>
</div>
</div>

<a href="admin.html" class="back">← Voltar</a>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.firebasestorage.app",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.salvarTime = async function() {
  const nome = document.getElementById("nomeTime").value;

  if(!nome){
    alert("Digite o nome do time");
    return;
  }

  await addDoc(collection(db, "times"), {
    nome: nome
  });

  alert("Time salvo com sucesso!");
  document.getElementById("nomeTime").value = "";
}

</script>
  
</body>
</html>
