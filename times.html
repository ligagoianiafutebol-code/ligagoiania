<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Times - Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#f7c600;
color:black;
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.team{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:30px;
height:30px;
background:#f7c600;
border-radius:50%;
}

.actions a{
background:#1a3f73;
padding:8px;
border-radius:6px;
color:white;
text-decoration:none;
margin-left:5px;
font-size:13px;
}

.back{
display:block;
margin-top:10px;
color:#f7c600;
text-decoration:none;
font-weight:bold;
}

.preview{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
}

.color-row{
display:flex;
gap:10px;
margin-bottom:12px;
}

.color-box{
flex:1;
}

.color-box label{
display:block;
font-size:13px;
margin-bottom:6px;
}

input[type="color"]{
height:45px;
padding:4px;
}

input[type="file"]{
background:#fff;
color:#000;
}

.nome-time{
font-weight:bold;
}
</style>

</head>
<body>

<header>Times</header>

<div class="container">

<input id="nomeTime" placeholder="Nome do time">
<input id="escudo" type="file" accept="image/*">

<div class="color-row">
  <div class="color-box">
    <label for="cor1">Cor principal</label>
    <input id="cor1" type="color" value="#f7c600">
  </div>

  <div class="color-box">
    <label for="cor2">Cor secundária</label>
    <input id="cor2" type="color" value="#102a52">
  </div>
</div>

<button onclick="salvarTime()">Salvar Time</button>

<div id="listaTimes"></div>

<a href="admin.html" class="back">← Voltar</a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.firebasestorage.app",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

async function carregarTimes() {
  const lista = document.getElementById("listaTimes");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "times"));

  querySnapshot.forEach((doc) => {
    const time = doc.data();

    lista.innerHTML += `
      <div class="card">
        <div class="team">
          <img src="${time.escudo || ''}" class="preview" alt="Escudo do time">
          <div class="nome-time" style="color:${time.cor1 || '#ffffff'}">${time.nome}</div>
          <div style="width:14px;height:14px;border-radius:50%;background:${time.cor1 || '#f7c600'}"></div>
          <div style="width:14px;height:14px;border-radius:50%;background:${time.cor2 || '#102a52'}"></div>
        </div>
        <div class="actions">
          <a>Editar</a>
          <a>Ver</a>
        </div>
      </div>
    `;
  });
}

window.salvarTime = async function() {
  const nome = document.getElementById("nomeTime").value.trim();
  const arquivo = document.getElementById("escudo").files[0];
  const cor1 = document.getElementById("cor1").value;
  const cor2 = document.getElementById("cor2").value;

  if (!nome) {
    alert("Digite o nome do time");
    return;
  }

  if (!arquivo) {
    alert("Escolha o escudo do time");
    return;
  }

  const nomeArquivo = Date.now() + "-" + arquivo.name;
  const storageRef = ref(storage, "escudos/" + nomeArquivo);

  await uploadBytes(storageRef, arquivo);
  const urlEscudo = await getDownloadURL(storageRef);

  await addDoc(collection(db, "times"), {
    nome: nome,
    escudo: urlEscudo,
    cor1: cor1,
    cor2: cor2
  });

  alert("Time salvo com sucesso!");

  document.getElementById("nomeTime").value = "";
  document.getElementById("escudo").value = "";
  document.getElementById("cor1").value = "#f7c600";
  document.getElementById("cor2").value = "#102a52";

  carregarTimes();
}

carregarTimes();
</script>

</body>
</html>
