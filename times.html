<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Times - Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#f7c600;
color:black;
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.team{
display:flex;
align-items:center;
gap:12px;
flex-wrap:wrap;
}

.actions a{
background:#1a3f73;
padding:8px;
border-radius:6px;
color:white;
text-decoration:none;
margin-left:5px;
font-size:13px;
}

.back{
display:block;
margin-top:10px;
color:#f7c600;
text-decoration:none;
font-weight:bold;
}

.preview{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
}

.nome-time{
font-weight:bold;
font-size:16px;
}

.section-title{
font-size:14px;
margin:8px 0;
font-weight:bold;
}

.palette{
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:14px;
}

.color-grid{
display:grid;
grid-template-columns:repeat(5, 44px);
gap:10px;
}

.color-option{
width:44px;
height:44px;
border-radius:8px;
border:3px solid transparent;
cursor:pointer;
box-sizing:border-box;
}

.color-option.selected{
border-color:#ffffff;
box-shadow:0 0 0 2px #f7c600;
}

#coresSelecionadas{
display:flex;
flex-wrap:wrap;
gap:8px;
margin:10px 0 14px 0;
min-height:36px;
}

.selected-color{
width:30px;
height:30px;
border-radius:8px;
border:2px solid #ffffff33;
}

.time-colors{
display:flex;
gap:6px;
flex-wrap:wrap;
align-items:center;
}

.time-color{
width:16px;
height:16px;
border-radius:4px;
border:1px solid #ffffff55;
}
</style>

</head>
<body>

<header>Times</header>

<div class="container">

<input id="nomeTime" placeholder="Nome do time">
<input id="escudo" type="file" accept="image/*">

<div class="section-title">Escolha quantas cores quiser</div>

<div class="palette">
  <div class="color-grid" id="gradeCores">
    <div class="color-option" data-color="#ffffff" style="background:#ffffff"></div>
    <div class="color-option" data-color="#000000" style="background:#000000"></div>
    <div class="color-option" data-color="#f7c600" style="background:#f7c600"></div>
    <div class="color-option" data-color="#ff0000" style="background:#ff0000"></div>
    <div class="color-option" data-color="#002bff" style="background:#002bff"></div>

    <div class="color-option" data-color="#00a651" style="background:#00a651"></div>
    <div class="color-option" data-color="#ff7a00" style="background:#ff7a00"></div>
    <div class="color-option" data-color="#8000ff" style="background:#8000ff"></div>
    <div class="color-option" data-color="#ff4da6" style="background:#ff4da6"></div>
    <div class="color-option" data-color="#8b4513" style="background:#8b4513"></div>

    <div class="color-option" data-color="#c0c0c0" style="background:#c0c0c0"></div>
    <div class="color-option" data-color="#808080" style="background:#808080"></div>
    <div class="color-option" data-color="#001f3f" style="background:#001f3f"></div>
    <div class="color-option" data-color="#39cccc" style="background:#39cccc"></div>
    <div class="color-option" data-color="#2ecc40" style="background:#2ecc40"></div>

    <div class="color-option" data-color="#ffdc00" style="background:#ffdc00"></div>
    <div class="color-option" data-color="#ff851b" style="background:#ff851b"></div>
    <div class="color-option" data-color="#85144b" style="background:#85144b"></div>
    <div class="color-option" data-color="#7fdbff" style="background:#7fdbff"></div>
    <div class="color-option" data-color="#b10dc9" style="background:#b10dc9"></div>
  </div>
</div>

<div class="section-title">Cores escolhidas</div>
<div id="coresSelecionadas"></div>

<button onclick="salvarTime()">Salvar Time</button>

<div id="listaTimes"></div>

<a href="admin.html" class="back">← Voltar</a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.firebasestorage.app",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let coresEscolhidas = [];

function atualizarCoresSelecionadas() {
  const box = document.getElementById("coresSelecionadas");
  box.innerHTML = "";

  coresEscolhidas.forEach((cor) => {
    box.innerHTML += `<div class="selected-color" style="background:${cor}"></div>`;
  });
}

function configurarPaleta() {
  const opcoes = document.querySelectorAll(".color-option");

  opcoes.forEach((opcao) => {
    opcao.addEventListener("click", () => {
      const cor = opcao.dataset.color;

      if (coresEscolhidas.includes(cor)) {
        coresEscolhidas = coresEscolhidas.filter(c => c !== cor);
        opcao.classList.remove("selected");
      } else {
        coresEscolhidas.push(cor);
        opcao.classList.add("selected");
      }

      atualizarCoresSelecionadas();
    });
  });
}

async function carregarTimes() {
  const lista = document.getElementById("listaTimes");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "times"));

  querySnapshot.forEach((doc) => {
    const time = doc.data();
    const cores = Array.isArray(time.cores) ? time.cores : [];

    const bolinhas = cores.map(cor => `
      <div class="time-color" style="background:${cor}"></div>
    `).join("");

    lista.innerHTML += `
      <div class="card">
        <div class="team">
          <img src="${time.escudo || ''}" class="preview" alt="Escudo do time">
          <div>
            <div class="nome-time">${time.nome}</div>
            <div class="time-colors">${bolinhas}</div>
          </div>
        </div>
        <div class="actions">
          <a>Editar</a>
          <a>Ver</a>
        </div>
      </div>
    `;
  });
}

window.salvarTime = async function() {
  const nome = document.getElementById("nomeTime").value.trim();
  const arquivo = document.getElementById("escudo").files[0];

  if (!nome) {
    alert("Digite o nome do time");
    return;
  }

  if (!arquivo) {
    alert("Escolha o escudo do time");
    return;
  }

  if (coresEscolhidas.length === 0) {
    alert("Escolha pelo menos 1 cor");
    return;
  }

  const nomeArquivo = Date.now() + "-" + arquivo.name;
  const storageRef = ref(storage, "escudos/" + nomeArquivo);

  await uploadBytes(storageRef, arquivo);
  const urlEscudo = await getDownloadURL(storageRef);

  await addDoc(collection(db, "times"), {
    nome: nome,
    escudo: urlEscudo,
    cores: coresEscolhidas
  });

  alert("Time salvo com sucesso!");

  document.getElementById("nomeTime").value = "";
  document.getElementById("escudo").value = "";

  coresEscolhidas = [];
  document.querySelectorAll(".color-option").forEach(op => op.classList.remove("selected"));
  atualizarCoresSelecionadas();

  carregarTimes();
}

configurarPaleta();
carregarTimes();
</script>

</body>
</html>
