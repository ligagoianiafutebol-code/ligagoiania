<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Árbitros - Admin</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-soft:rgba(247,198,0,.12);
      --gold-line:rgba(247,198,0,.24);
      --white:#ffffff;
      --muted:#d8e1ef;
      --danger:#b30000;
      --shadow:0 8px 22px rgba(0,0,0,.28);
      --transition:.25s ease;
      --max:1140px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:
        linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
    }

    a{
      text-decoration:none;
      color:inherit;
      transition:var(--transition);
    }

    button{
      font-family:inherit;
      cursor:pointer;
      transition:var(--transition);
      border:none;
    }

    input{
      font-family:inherit;
    }

    .wrap{
      width:min(100% - 28px, var(--max));
      margin:0 auto;
    }

    header{
      background:rgba(8,23,44,.96);
      border-bottom:3px solid var(--gold);
      box-shadow:var(--shadow);
    }

    .header-top{
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:24px;
      font-weight:700;
      color:var(--white);
    }

    .top-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
    }

    .btn-light{
      background:#fff4cf;
      color:#111;
    }

    .btn-light:hover{
      background:var(--gold);
      transform:translateY(-2px);
    }

    .btn-gold{
      background:var(--gold);
      color:#111;
    }

    .btn-gold:hover{
      filter:brightness(1.04);
      transform:translateY(-2px);
    }

    .container{
      padding:24px 0 34px;
    }

    .hero{
      background:linear-gradient(135deg,#102a52,#0d2346);
      border:1px solid var(--gold-line);
      border-radius:18px;
      padding:22px;
      margin-bottom:20px;
      box-shadow:var(--shadow);
    }

    .hero h2{
      margin:0 0 8px;
      color:var(--gold);
      font-size:28px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:15px;
    }

    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .toolbar .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:var(--gold);
      color:black;
      padding:11px 16px;
      border-radius:10px;
      font-weight:700;
      text-decoration:none;
    }

    .toolbar .btn:hover{
      filter:brightness(1.04);
      transform:translateY(-1px);
    }

    .search-box{
      margin-bottom:16px;
    }

    input{
      width:100%;
      padding:13px;
      border:none;
      border-radius:10px;
      font-size:14px;
      box-sizing:border-box;
      background:#f5f7fb;
      color:#111;
    }

    input:focus{
      outline:2px solid rgba(247,198,0,.5);
    }

    .form-panel{
      display:none;
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--shadow);
      margin-bottom:18px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .full{
      grid-column:1 / -1;
    }

    .checkbox-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(130px, 1fr));
      gap:8px;
      margin-top:10px;
    }

    .check-item{
      background:#102a52;
      padding:10px;
      border-radius:10px;
      display:flex;
      align-items:center;
      gap:8px;
      font-size:14px;
    }

    .check-item input{
      width:auto;
      margin:0;
    }

    .form-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .form-actions button{
      background:var(--gold);
      color:black;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
    }

    .form-actions button:hover{
      filter:brightness(1.04);
      transform:translateY(-1px);
    }

    .lista-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
      gap:12px;
    }

    .card{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:16px;
      border-radius:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      border:1px solid rgba(255,230,0,.10);
      box-shadow:var(--shadow);
      transition:var(--transition);
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:var(--gold-line);
    }

    .user{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:0;
      flex:1;
    }

    .photo{
      width:64px;
      height:64px;
      border-radius:50%;
      object-fit:cover;
      background:#1a3f73;
      border:2px solid rgba(255,255,255,.12);
      flex-shrink:0;
    }

    .user-info{
      display:flex;
      flex-direction:column;
      gap:5px;
      min-width:0;
    }

    .user-info .nome{
      font-weight:700;
      font-size:18px;
      color:#fff;
    }

    .user-info small{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .categorias-tags{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .tag{
      background:#1a3f73;
      padding:5px 9px;
      border-radius:999px;
      font-size:12px;
      display:inline-block;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .actions button{
      background:#1a3f73;
      padding:9px 12px;
      border-radius:8px;
      color:white;
      font-size:12px;
      margin:0;
      font-weight:700;
    }

    .actions button:hover{
      background:var(--gold);
      color:#111;
    }

    .actions .delete{
      background:var(--danger) !important;
      color:#fff !important;
    }

    .actions .delete:hover{
      filter:brightness(1.08);
    }

    .vazio{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:30px;
      border-radius:14px;
      text-align:center;
      color:var(--muted);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      padding:15px;
      z-index:999;
    }

    .modal-content{
      background:linear-gradient(180deg, rgba(16,42,82,.98), rgba(12,33,64,.98));
      padding:22px;
      border-radius:16px;
      text-align:center;
      max-width:520px;
      width:100%;
      max-height:85vh;
      overflow:auto;
      border:1px solid var(--gold-line);
      box-shadow:var(--shadow);
    }

    .modal-content h2{
      color:var(--gold);
      margin:14px 0 10px;
    }

    .modal-content p{
      color:var(--muted);
      line-height:1.6;
      margin-bottom:8px;
    }

    .modal-actions{
      margin-top:16px;
    }

    .modal-actions button{
      background:var(--gold);
      color:black;
      padding:11px 14px;
      border-radius:10px;
      font-weight:700;
    }

    @media (max-width:900px){
      .header-title{
        order:3;
        width:100%;
        text-align:center;
      }

      .header-left,
      .header-right{
        width:100%;
        justify-content:center;
      }

      .form-grid{
        grid-template-columns:1fr;
      }

      .card{
        flex-direction:column;
        align-items:flex-start;
      }

      .actions{
        width:100%;
        justify-content:flex-start;
      }
    }

    @media (max-width:600px){
      .top-btn,
      .toolbar .btn{
        width:100%;
        justify-content:center;
      }

      .header-left,
      .header-right{
        flex-direction:column;
        align-items:stretch;
      }

      .form-actions button{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap header-top">
      <div class="header-left">
        <button class="top-btn btn-light" type="button" onclick="voltarPagina()">
          <i class="fa-solid fa-arrow-left"></i> Voltar
        </button>

        <a href="index.html" class="top-btn btn-light">
          <i class="fa-solid fa-house"></i> Página Inicial
        </a>

        <a href="admin.html" class="top-btn btn-light">
          <i class="fa-solid fa-gears"></i> Painel ADM
        </a>
      </div>

      <div class="header-title">Árbitros</div>

      <div class="header-right"></div>
    </div>
  </header>

  <div class="wrap container">

    <div class="hero">
      <h2>Cadastro de Árbitros</h2>
      <p>Cadastre, edite, visualize e organize os árbitros da competição com categorias vinculadas.</p>
    </div>

    <div class="toolbar">
      <a class="btn" onclick="toggleFormulario()">
        <i class="fa-solid fa-plus"></i> Novo Árbitro
      </a>
    </div>

    <div class="search-box">
      <input id="busca" placeholder="Pesquisar árbitro..." oninput="carregarArbitros()">
    </div>

    <div class="form-panel" id="formulario">
      <div class="form-grid">
        <div>
          <input id="nome" placeholder="Nome">
        </div>

        <div>
          <input id="foto" type="file" accept="image/*">
        </div>

        <div>
          <input id="cpf" placeholder="CPF">
        </div>

        <div>
          <input id="telefone" placeholder="Telefone">
        </div>

        <div class="full">
          <input id="email" placeholder="Email">
        </div>

        <div class="full">
          <div class="checkbox-grid" id="categoriasGrid"></div>
        </div>
      </div>

      <div class="form-actions">
        <button onclick="salvar()">
          <i class="fa-solid fa-floppy-disk"></i> Salvar
        </button>
        <button onclick="cancelarEdicao()">
          <i class="fa-solid fa-xmark"></i> Cancelar
        </button>
      </div>
    </div>

    <div class="lista-grid" id="lista"></div>

  </div>

  <div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const storage = getStorage();

    let editandoId = null;
    let fotoAtual = "";

    window.voltarPagina = function(){
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "admin.html";
      }
    };

    window.toggleFormulario = function(){
      const f = document.getElementById("formulario");
      f.style.display = f.style.display === "none" || f.style.display === "" ? "block" : "none";
    };

    window.cancelarEdicao = function(){
      limparFormulario();
      document.getElementById("formulario").style.display = "none";
    };

    async function carregarCategorias(){
      const grid = document.getElementById("categoriasGrid");
      grid.innerHTML = "";

      const snap = await getDocs(collection(db,"categorias"));
      let lista = [];

      snap.forEach(d => {
        const data = d.data();
        if(data.nome) lista.push(data.nome);
      });

      lista.sort((a,b)=>a.localeCompare(b, "pt-BR"));

      lista.forEach(nome=>{
        grid.innerHTML += `
          <label class="check-item">
            <input type="checkbox" value="${nome}">${nome}
          </label>
        `;
      });
    }

    function getCategorias(){
      return Array.from(document.querySelectorAll('#categoriasGrid input:checked')).map(i=>i.value);
    }

    function marcarCategorias(categorias){
      document.querySelectorAll('#categoriasGrid input').forEach(i => {
        i.checked = (categorias || []).includes(i.value);
      });
    }

    function limparFormulario(){
      document.getElementById("nome").value = "";
      document.getElementById("foto").value = "";
      document.getElementById("cpf").value = "";
      document.getElementById("telefone").value = "";
      document.getElementById("email").value = "";
      document.querySelectorAll('#categoriasGrid input').forEach(i => i.checked = false);
      editandoId = null;
      fotoAtual = "";
    }

    window.salvar = async function(){
      const nome = document.getElementById("nome").value.trim();
      const cpf = document.getElementById("cpf").value.trim();
      const telefone = document.getElementById("telefone").value.trim();
      const email = document.getElementById("email").value.trim();
      const foto = document.getElementById("foto").files[0];
      const categorias = getCategorias();

      if(!nome || !cpf){
        alert("Preencha os campos obrigatórios.");
        return;
      }

      let url = fotoAtual;

      if(foto){
        const refStorage = ref(storage,"arbitros/" + Date.now() + "-" + foto.name);
        await uploadBytes(refStorage, foto);
        url = await getDownloadURL(refStorage);
      }

      const dados = { nome, cpf, telefone, email, foto:url, categorias };

      if(editandoId){
        await updateDoc(doc(db,"arbitros",editandoId), dados);
        alert("Árbitro atualizado com sucesso!");
      }else{
        await addDoc(collection(db,"arbitros"), dados);
        alert("Árbitro salvo com sucesso!");
      }

      limparFormulario();
      carregarArbitros();
    };

    window.editar = async function(id){
      const snap = await getDocs(collection(db,"arbitros"));

      snap.forEach(d=>{
        if(d.id===id){
          const a = d.data();
          document.getElementById("nome").value = a.nome || "";
          document.getElementById("cpf").value = a.cpf || "";
          document.getElementById("telefone").value = a.telefone || "";
          document.getElementById("email").value = a.email || "";
          fotoAtual = a.foto || "";
          editandoId = id;
          marcarCategorias(a.categorias || []);
        }
      });

      document.getElementById("formulario").style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.excluir = async function(id){
      if(confirm("Excluir árbitro?")){
        await deleteDoc(doc(db,"arbitros",id));
        carregarArbitros();
      }
    };

    window.ver = async function(id){
      const snap = await getDocs(collection(db,"arbitros"));

      snap.forEach(d=>{
        if(d.id===id){
          const a = d.data();
          const cats = (a.categorias||[]).map(c=>`<span class="tag">${c}</span>`).join("");

          document.getElementById("modalContent").innerHTML = `
            <img src="${a.foto || 'logo-liga.jfif'}" class="photo" alt="${a.nome || 'Árbitro'}">
            <h2>${a.nome || ""}</h2>
            <p>${a.email || "-"}</p>
            <p>${a.telefone || "-"}</p>
            <div style="margin-top:10px;">${cats || '<span class="tag">Sem categorias</span>'}</div>
            <div class="modal-actions">
              <button onclick="fechar()">
                <i class="fa-solid fa-xmark"></i> Fechar
              </button>
            </div>
          `;

          document.getElementById("modal").style.display = "flex";
        }
      });
    };

    window.fechar = function(){
      document.getElementById("modal").style.display = "none";
    };

    async function carregarArbitros(){
      const lista = document.getElementById("lista");
      lista.innerHTML = "<div class='vazio'>Carregando árbitros...</div>";

      const snap = await getDocs(collection(db,"arbitros"));
      let dados = [];

      snap.forEach(d => dados.push({id:d.id, ...d.data()}));

      const busca = (document.getElementById("busca").value || "").toLowerCase().trim();

      if(busca){
        dados = dados.filter(a =>
          (a.nome || "").toLowerCase().includes(busca) ||
          (a.email || "").toLowerCase().includes(busca) ||
          (a.cpf || "").toLowerCase().includes(busca)
        );
      }

      dados.sort((a,b)=>(a.nome || "").localeCompare(b.nome || "", "pt-BR"));

      if(!dados.length){
        lista.innerHTML = "<div class='vazio'>Nenhum árbitro encontrado.</div>";
        return;
      }

      lista.innerHTML = "";

      dados.forEach(a=>{
        const categorias = (a.categorias || []).map(c => `<span class="tag">${c}</span>`).join("");

        lista.innerHTML += `
          <div class="card">
            <div class="user">
              <img src="${a.foto || 'logo-liga.jfif'}" class="photo" alt="${a.nome || 'Árbitro'}">
              <div class="user-info">
                <div class="nome">${a.nome || ""}</div>
                <small>${a.email || "-"}</small>
                <small>${a.telefone || "-"}</small>
                <div class="categorias-tags">${categorias || '<span class="tag">Sem categorias</span>'}</div>
              </div>
            </div>
            <div class="actions">
              <button onclick="editar('${a.id}')">
                <i class="fa-solid fa-pen"></i> Editar
              </button>
              <button onclick="ver('${a.id}')">
                <i class="fa-solid fa-eye"></i> Ver
              </button>
              <button class="delete" onclick="excluir('${a.id}')">
                <i class="fa-solid fa-trash"></i> Excluir
              </button>
            </div>
          </div>
        `;
      });
    }

    await carregarCategorias();
    carregarArbitros();
  </script>

</body>
</html>
