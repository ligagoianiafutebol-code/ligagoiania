<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Árbitros - Admin</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-soft:rgba(247,198,0,.12);
      --gold-line:rgba(247,198,0,.24);
      --white:#ffffff;
      --muted:#d8e1ef;
      --danger:#b30000;
      --shadow:0 8px 22px rgba(0,0,0,.28);
      --transition:.25s ease;
      --max:1140px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:
        linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
    }

    a{
      text-decoration:none;
      color:inherit;
      transition:var(--transition);
    }

    button{
      font-family:inherit;
      cursor:pointer;
      transition:var(--transition);
      border:none;
    }

    input{
      font-family:inherit;
    }

    .wrap{
      width:min(100% - 28px, var(--max));
      margin:0 auto;
    }

    header{
      background:rgba(8,23,44,.96);
      border-bottom:3px solid var(--gold);
      box-shadow:var(--shadow);
    }

    .header-top{
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:24px;
      font-weight:700;
      color:var(--white);
    }

    .top-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
    }

    .btn-light{
      background:#fff4cf;
      color:#111;
    }

    .btn-light:hover{
      background:var(--gold);
      transform:translateY(-2px);
    }

    .container{
      padding:24px 0 34px;
    }

    .hero{
      background:linear-gradient(135deg,#102a52,#0d2346);
      border:1px solid var(--gold-line);
      border-radius:18px;
      padding:22px;
      margin-bottom:20px;
      box-shadow:var(--shadow);
    }

    .hero h2{
      margin:0 0 8px;
      color:var(--gold);
      font-size:28px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:15px;
    }

    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .toolbar .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:var(--gold);
      color:black;
      padding:11px 16px;
      border-radius:10px;
      font-weight:700;
      text-decoration:none;
    }

    .toolbar .btn:hover{
      filter:brightness(1.04);
      transform:translateY(-1px);
    }

    .search-box{
      margin-bottom:16px;
    }

    input{
      width:100%;
      padding:13px;
      border:none;
      border-radius:10px;
      font-size:14px;
      box-sizing:border-box;
      background:#f5f7fb;
      color:#111;
    }

    input:focus{
      outline:2px solid rgba(247,198,0,.5);
    }

    .form-panel{
      display:none;
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--shadow);
      margin-bottom:18px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .full{
      grid-column:1 / -1;
    }

    .info-categorias{
      margin-top:10px;
      background:#102a52;
      border:1px solid rgba(255,255,255,.06);
      border-radius:12px;
      padding:14px;
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }

    .info-categorias strong{
      color:var(--gold);
    }

    .categorias-preview{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .tag{
      background:#1a3f73;
      padding:5px 9px;
      border-radius:999px;
      font-size:12px;
      display:inline-block;
    }

    .form-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .form-actions button{
      background:var(--gold);
      color:black;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
    }

    .form-actions button:hover{
      filter:brightness(1.04);
      transform:translateY(-1px);
    }

    .lista-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
      gap:12px;
    }

    .card{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:16px;
      border-radius:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      border:1px solid rgba(255,230,0,.10);
      box-shadow:var(--shadow);
      transition:var(--transition);
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:var(--gold-line);
    }

    .user{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:0;
      flex:1;
    }

    .photo{
      width:64px;
      height:64px;
      border-radius:50%;
      object-fit:cover;
      background:#1a3f73;
      border:2px solid rgba(255,255,255,.12);
      flex-shrink:0;
    }

    .user-info{
      display:flex;
      flex-direction:column;
      gap:5px;
      min-width:0;
    }

    .user-info .nome{
      font-weight:700;
      font-size:18px;
      color:#fff;
    }

    .user-info small{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .categorias-tags{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .actions button{
      background:#1a3f73;
      padding:9px 12px;
      border-radius:8px;
      color:white;
      font-size:12px;
      margin:0;
      font-weight:700;
    }

    .actions button:hover{
      background:var(--gold);
      color:#111;
    }

    .actions .delete{
      background:var(--danger) !important;
      color:#fff !important;
    }

    .actions .delete:hover{
      filter:brightness(1.08);
    }

    .vazio{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:30px;
      border-radius:14px;
      text-align:center;
      color:var(--muted);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      padding:15px;
      z-index:999;
    }

    .modal-content{
      background:linear-gradient(180deg, rgba(16,42,82,.98), rgba(12,33,64,.98));
      padding:22px;
      border-radius:16px;
      text-align:center;
      max-width:780px;
      width:100%;
      max-height:88vh;
      overflow:auto;
      border:1px solid var(--gold-line);
      box-shadow:var(--shadow);
    }

    .modal-content h2{
      color:var(--gold);
      margin:14px 0 10px;
    }

    .modal-content p{
      color:var(--muted);
      line-height:1.6;
      margin-bottom:8px;
    }

    .modal-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
      text-align:left;
    }

    .info-box,
    .stats-box{
      background:#102a52;
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:14px;
    }

    .info-box h3,
    .stats-box h3{
      color:var(--gold);
      margin-bottom:10px;
      font-size:18px;
    }

    .info-line{
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:10px;
    }

    .stat-card{
      background:#0d2346;
      border-radius:12px;
      padding:12px;
      border:1px solid rgba(255,255,255,.06);
    }

    .stat-card strong{
      display:block;
      color:var(--gold);
      font-size:22px;
      margin-bottom:4px;
    }

    .stat-card span{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .categorias-stats{
      margin-top:14px;
      background:#0d2346;
      border-radius:12px;
      padding:12px;
      border:1px solid rgba(255,255,255,.06);
      text-align:left;
    }

    .categorias-stats h4{
      color:var(--gold);
      margin-bottom:10px;
      font-size:16px;
    }

    .categoria-item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:8px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
      color:var(--muted);
      font-size:14px;
    }

    .categoria-item:last-child{
      border-bottom:none;
    }

    .modal-actions{
      margin-top:18px;
    }

    .modal-actions button{
      background:var(--gold);
      color:black;
      padding:11px 14px;
      border-radius:10px;
      font-weight:700;
    }

    @media (max-width:900px){
      .header-title{
        order:3;
        width:100%;
        text-align:center;
      }

      .header-left,
      .header-right{
        width:100%;
        justify-content:center;
      }

      .form-grid,
      .modal-grid,
      .stats-grid{
        grid-template-columns:1fr;
      }

      .card{
        flex-direction:column;
        align-items:flex-start;
      }

      .actions{
        width:100%;
        justify-content:flex-start;
      }
    }

    @media (max-width:600px){
      .top-btn,
      .toolbar .btn{
        width:100%;
        justify-content:center;
      }

      .header-left,
      .header-right{
        flex-direction:column;
        align-items:stretch;
      }

      .form-actions button{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap header-top">
      <div class="header-left">
        <button class="top-btn btn-light" type="button" onclick="voltarPagina()">
          <i class="fa-solid fa-arrow-left"></i> Voltar
        </button>

        <a href="index.html" class="top-btn btn-light">
          <i class="fa-solid fa-house"></i> Página Inicial
        </a>

        <a href="admin.html" class="top-btn btn-light">
          <i class="fa-solid fa-gears"></i> Painel ADM
        </a>
      </div>

      <div class="header-title">Árbitros</div>

      <div class="header-right"></div>
    </div>
  </header>

  <div class="wrap container">

    <div class="hero">
      <h2>Cadastro de Árbitros</h2>
      <p>Cadastre, edite, visualize e acompanhe estatísticas dos árbitros da competição.</p>
    </div>

    <div class="toolbar">
      <a class="btn" onclick="toggleFormulario()">
        <i class="fa-solid fa-plus"></i> Novo Árbitro
      </a>
    </div>

    <div class="search-box">
      <input id="busca" placeholder="Pesquisar árbitro..." oninput="carregarArbitros()">
    </div>

    <div class="form-panel" id="formulario">
      <div class="form-grid">
        <div>
          <input id="nome" placeholder="Nome">
        </div>

        <div>
          <input id="foto" type="file" accept="image/*">
        </div>

        <div>
          <input id="cpf" placeholder="CPF">
        </div>

        <div>
          <input id="telefone" placeholder="Telefone">
        </div>

        <div>
          <input id="email" placeholder="Email">
        </div>

        <div>
          <input id="dataNascimento" type="date" placeholder="Data de nascimento">
        </div>

        <div class="full">
          <input id="cidadeNascimento" placeholder="Cidade onde nasceu">
        </div>

        <div class="full">
          <div class="info-categorias">
            <strong>Autorização automática:</strong> todo árbitro cadastrado neste painel já fica autorizado para apitar <strong>todas as categorias</strong>.
            <div class="categorias-preview" id="categoriasPreview"></div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button onclick="salvar()">
          <i class="fa-solid fa-floppy-disk"></i> Salvar
        </button>
        <button onclick="cancelarEdicao()">
          <i class="fa-solid fa-xmark"></i> Cancelar
        </button>
      </div>
    </div>

    <div class="lista-grid" id="lista"></div>

  </div>

  <div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script type="module">
    import { db } from "./firebase.js";
    import { collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const storage = getStorage();

    let editandoId = null;
    let fotoAtual = "";
    let categoriasDisponiveis = [];

    window.voltarPagina = function(){
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "admin.html";
      }
    };

    function normalizarTexto(texto){
      return String(texto || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function calcularIdade(dataNascimento){
      if(!dataNascimento) return "-";

      const nascimento = new Date(dataNascimento + "T00:00:00");
      if(isNaN(nascimento.getTime())) return "-";

      const hoje = new Date();
      let idade = hoje.getFullYear() - nascimento.getFullYear();
      const mes = hoje.getMonth() - nascimento.getMonth();

      if(mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())){
        idade--;
      }

      return idade >= 0 ? idade : "-";
    }

    function preencherPreviewCategorias(){
      const box = document.getElementById("categoriasPreview");
      if(!categoriasDisponiveis.length){
        box.innerHTML = `<span class="tag">Sem categorias cadastradas</span>`;
        return;
      }

      box.innerHTML = categoriasDisponiveis.map(c => `<span class="tag">${c}</span>`).join("");
    }

    async function carregarCategorias(){
      categoriasDisponiveis = [];
      const snap = await getDocs(collection(db,"categorias"));

      snap.forEach(d => {
        const data = d.data();
        if(data.nome) categoriasDisponiveis.push(data.nome);
      });

      categoriasDisponiveis.sort((a,b)=>a.localeCompare(b, "pt-BR"));
      preencherPreviewCategorias();
    }

    window.toggleFormulario = function(){
      const f = document.getElementById("formulario");
      f.style.display = f.style.display === "none" || f.style.display === "" ? "block" : "none";
    };

    window.cancelarEdicao = function(){
      limparFormulario();
      document.getElementById("formulario").style.display = "none";
    };

    function limparFormulario(){
      document.getElementById("nome").value = "";
      document.getElementById("foto").value = "";
      document.getElementById("cpf").value = "";
      document.getElementById("telefone").value = "";
      document.getElementById("email").value = "";
      document.getElementById("dataNascimento").value = "";
      document.getElementById("cidadeNascimento").value = "";
      editandoId = null;
      fotoAtual = "";
    }

    function getCategoriasAutomaticas(){
      return [...categoriasDisponiveis];
    }

    async function calcularEstatisticasArbitro(nomeArbitro){
      const snapJogos = await getDocs(collection(db, "jogos"));
      const snapSumulas = await getDocs(collection(db, "sumulas"));

      let jogosApitados = 0;
      let amarelos = 0;
      let vermelhos = 0;
      const jogosPorCategoria = {};

      snapJogos.forEach(docSnap => {
        const jogo = docSnap.data();
        if(normalizarTexto(jogo.arbitro) === normalizarTexto(nomeArbitro)){
          jogosApitados += 1;
          const categoria = jogo.categoria || "Sem categoria";
          jogosPorCategoria[categoria] = (jogosPorCategoria[categoria] || 0) + 1;
        }
      });

      snapSumulas.forEach(docSnap => {
        const sumula = docSnap.data();
        if(normalizarTexto(sumula.arbitro) === normalizarTexto(nomeArbitro)){
          amarelos += (sumula.amarelosDetalhadosA || []).length;
          amarelos += (sumula.amarelosDetalhadosB || []).length;
          vermelhos += (sumula.vermelhosDetalhadosA || []).length;
          vermelhos += (sumula.vermelhosDetalhadosB || []).length;
        }
      });

      const totalCartoes = amarelos + vermelhos;
      const mediaCartoes = jogosApitados > 0 ? (totalCartoes / jogosApitados).toFixed(2) : "0.00";

      return {
        jogosApitados,
        amarelos,
        vermelhos,
        mediaCartoes,
        jogosPorCategoria
      };
    }

    window.salvar = async function(){
      const nome = document.getElementById("nome").value.trim();
      const cpf = document.getElementById("cpf").value.trim();
      const telefone = document.getElementById("telefone").value.trim();
      const email = document.getElementById("email").value.trim();
      const dataNascimento = document.getElementById("dataNascimento").value;
      const cidadeNascimento = document.getElementById("cidadeNascimento").value.trim();
      const foto = document.getElementById("foto").files[0];
      const categorias = getCategoriasAutomaticas();

      if(!nome || !cpf){
        alert("Preencha os campos obrigatórios.");
        return;
      }

      let url = fotoAtual;

      if(foto){
        const refStorage = ref(storage,"arbitros/" + Date.now() + "-" + foto.name);
        await uploadBytes(refStorage, foto);
        url = await getDownloadURL(refStorage);
      }

      const dados = {
        nome,
        cpf,
        telefone,
        email,
        dataNascimento,
        cidadeNascimento,
        foto:url,
        categorias,
        autorizadoTodasCategorias: true
      };

      if(editandoId){
        await updateDoc(doc(db,"arbitros",editandoId), dados);
        alert("Árbitro atualizado com sucesso!");
      }else{
        await addDoc(collection(db,"arbitros"), dados);
        alert("Árbitro salvo com sucesso!");
      }

      limparFormulario();
      carregarArbitros();
    };

    window.editar = async function(id){
      const snap = await getDocs(collection(db,"arbitros"));

      snap.forEach(d=>{
        if(d.id===id){
          const a = d.data();
          document.getElementById("nome").value = a.nome || "";
          document.getElementById("cpf").value = a.cpf || "";
          document.getElementById("telefone").value = a.telefone || "";
          document.getElementById("email").value = a.email || "";
          document.getElementById("dataNascimento").value = a.dataNascimento || "";
          document.getElementById("cidadeNascimento").value = a.cidadeNascimento || "";
          fotoAtual = a.foto || "";
          editandoId = id;
        }
      });

      document.getElementById("formulario").style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.excluir = async function(id){
      if(confirm("Excluir árbitro?")){
        await deleteDoc(doc(db,"arbitros",id));
        carregarArbitros();
      }
    };

    window.ver = async function(id){
      const snap = await getDocs(collection(db,"arbitros"));

      for (const d of snap.docs){
        if(d.id === id){
          const a = d.data();
          const cats = (a.categorias || []).map(c=>`<span class="tag">${c}</span>`).join("");
          const idade = calcularIdade(a.dataNascimento);
          const stats = await calcularEsta
