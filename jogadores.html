<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogadores - LIGA GOIANA DE FUTEBOL DE BASE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.menu{
display:flex;
justify-content:center;
gap:10px;
background:#102a52;
padding:12px;
flex-wrap:wrap;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.menu a{
color:white;
text-decoration:none;
font-weight:bold;
font-size:14px;
background:#0d2346;
padding:10px 14px;
border-radius:8px;
}

.menu a.ativo{
background:#f7c600;
color:black;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.hero{
background:linear-gradient(135deg,#102a52,#0d2346);
border:1px solid rgba(255,230,0,.12);
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

.hero h2{
margin:0 0 8px;
color:#f7c600;
font-size:26px;
}

.hero p{
margin:0;
opacity:.92;
line-height:1.6;
font-size:14px;
}

.filtros{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

input, select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
gap:14px;
}

.card{
background:#102a52;
padding:16px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
border:1px solid rgba(255,230,0,.12);
}

.player{
display:flex;
align-items:center;
gap:12px;
min-width:0;
flex:1;
}

.photo{
width:64px;
height:64px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,.15);
background:#1a3f73;
flex-shrink:0;
}

.player-info{
display:flex;
flex-direction:column;
gap:5px;
min-width:0;
}

.nome-jogador{
font-weight:bold;
font-size:17px;
color:#ffffff;
}

.player-info small{
opacity:.9;
font-size:12px;
}

.tags{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-top:4px;
}

.tag{
background:#1a3f73;
padding:4px 8px;
border-radius:999px;
font-size:12px;
}

.actions{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:flex-end;
}

.btn-acao{
display:inline-flex;
align-items:center;
justify-content:center;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:13px;
border:none;
cursor:pointer;
}

.btn-ver{
background:#f7c600;
color:black;
}

.vazio{
background:#102a52;
padding:30px;
border-radius:12px;
text-align:center;
}

@media (max-width:800px){
.filtros{
grid-template-columns:1fr;
}

.card{
flex-direction:column;
align-items:flex-start;
}

.actions{
width:100%;
justify-content:flex-start;
}
}
</style>
</head>
<body>

<header>LIGA GOIANA DE FUTEBOL DE BASE</header>

<div class="menu">
<a href="index.html">Campeonatos</a>
<a href="tabela.html">Tabela</a>
<a href="jogos.html">Jogos</a>
<a href="artilharia.html">Artilharia</a>
<a href="cartoes.html">Cartões</a>
<a href="suspensos.html">Suspensos</a>
<a href="times.html">Times</a>
<a href="jogadores.html" class="ativo">Jogadores</a>
<a href="login.html">Login</a>
</div>

<div class="container">

<div class="hero">
  <h2>Jogadores</h2>
  <p>Veja os atletas cadastrados, filtre por categoria e abra a página pública de cada jogador.</p>
</div>

<div class="filtros">
  <input id="buscaJogador" placeholder="Pesquisar jogador..." oninput="carregarJogadores()">

  <select id="filtroCategoria" onchange="carregarJogadores()">
    <option value="">Selecione a categoria</option>
    <option value="Sub-11">Sub-11</option>
    <option value="Sub-12">Sub-12</option>
    <option value="Sub-13">Sub-13</option>
    <option value="Sub-14">Sub-14</option>
    <option value="Sub-15">Sub-15</option>
    <option value="Sub-16">Sub-16</option>
    <option value="Sub-17">Sub-17</option>
    <option value="Sub-18">Sub-18</option>
    <option value="Sub-19">Sub-19</option>
    <option value="Sub-20">Sub-20</option>
    <option value="Sub-21">Sub-21</option>
  </select>
</div>

<div class="lista-grid" id="listaJogadores"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let jogadoresCache = [];

window.carregarJogadores = function(){
  const lista = document.getElementById("listaJogadores");
  const busca = (document.getElementById("buscaJogador").value || "").toLowerCase().trim();
  const categoria = document.getElementById("filtroCategoria").value;

  let jogadores = [...jogadoresCache];

  if (busca) {
    jogadores = jogadores.filter(j =>
      (j.nome || "").toLowerCase().includes(busca) ||
      (j.time || "").toLowerCase().includes(busca) ||
      (j.posicao || "").toLowerCase().includes(busca)
    );
  }

  if (categoria) {
    jogadores = jogadores.filter(j => Array.isArray(j.categorias) && j.categorias.includes(categoria));
  }

  jogadores.sort((a, b) => {
    const na = Number(a.numero || 999);
    const nb = Number(b.numero || 999);
    if (na !== nb) return na - nb;
    return (a.nome || "").localeCompare((b.nome || ""), "pt-BR");
  });

  if (!jogadores.length) {
    lista.innerHTML = `<div class="vazio">Nenhum jogador encontrado.</div>`;
    return;
  }

  lista.innerHTML = "";

  jogadores.forEach(jogador => {
    const categorias = (jogador.categorias || []).map(c => `<span class="tag">${c}</span>`).join("");

    lista.innerHTML += `
      <div class="card">
        <div class="player">
          <img src="${jogador.foto || ''}" class="photo" alt="${jogador.nome || 'Jogador'}" onerror="this.src=''">
          <div class="player-info">
            <div class="nome-jogador">${jogador.numero || "-"} - ${jogador.nome || "-"}</div>
            <small>Time: ${jogador.time || "-"}</small>
            <small>Posição: ${jogador.posicao || "-"}</small>
            <small>Jogos: ${Number(jogador.jogos || 0)} | Gols: ${Number(jogador.gols || 0)} | Assistências: ${Number(jogador.assistencias || 0)}</small>
            <small>Amarelos: ${Number(jogador.amarelos || 0)} | Vermelhos: ${Number(jogador.vermelhos || 0)}</small>
            <div class="tags">${categorias || '<span class="tag">Sem categoria</span>'}</div>
          </div>
        </div>

        <div class="actions">
          <a class="btn-acao btn-ver" href="jogador-publico.html?id=${jogador.id}">
            Ver Jogador
          </a>
        </div>
      </div>
    `;
  });
};

async function iniciarPagina(){
  const lista = document.getElementById("listaJogadores");
  lista.innerHTML = `<div class="vazio">Carregando jogadores...</div>`;

  try{
    const snap = await getDocs(collection(db, "jogadores"));
    jogadoresCache = [];
    snap.forEach(docSnap => {
      jogadoresCache.push({ id: docSnap.id, ...docSnap.data() });
    });

    carregarJogadores();
  }catch(erro){
    console.error(erro);
    lista.innerHTML = `<div class="vazio">Erro ao carregar os jogadores.</div>`;
  }
}

iniciarPagina();
</script>

</body>
</html>
