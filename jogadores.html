<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogadores</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
max-width:1100px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#f7c600;
color:black;
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

.btn-voltar{
display:inline-block;
margin-bottom:15px;
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.photo{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
background:#1a3f73;
}

.nome-jogador{
font-weight:bold;
font-size:16px;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
gap:12px;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.player{
display:flex;
align-items:center;
gap:12px;
min-width:0;
}

.player-info{
display:flex;
flex-direction:column;
gap:4px;
min-width:0;
}

.player-info small{
opacity:.85;
font-size:12px;
}

.actions{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.actions button{
background:#1a3f73;
padding:6px 10px;
border-radius:6px;
color:white;
border:none;
font-size:12px;
margin:0;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:15px;
z-index:999;
}

.modal-content{
background:#102a52;
padding:20px;
border-radius:12px;
max-width:620px;
width:100%;
text-align:center;
max-height:85vh;
overflow:auto;
}

.modal-content img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
margin-bottom:12px;
background:#1a3f73;
}

.tags{
display:flex;
gap:6px;
flex-wrap:wrap;
justify-content:center;
margin-top:10px;
}

.tag{
background:#1a3f73;
padding:4px 8px;
border-radius:999px;
font-size:12px;
}

.subtitle{
opacity:.85;
font-size:13px;
margin-bottom:10px;
}

.sem-item{
opacity:.85;
font-size:13px;
}

.stats-box{
display:grid;
grid-template-columns:repeat(2, 1fr);
gap:10px;
margin-top:14px;
text-align:left;
}

.stat-card{
background:#0b1f3a;
border-radius:10px;
padding:10px;
border:1px solid rgba(255,255,255,.08);
}

.stat-card strong{
display:block;
color:#f7c600;
margin-bottom:4px;
font-size:13px;
}

.stat-card span{
font-size:15px;
font-weight:bold;
}

@media (max-width:700px){
.card{
flex-direction:column;
align-items:flex-start;
}

.actions{
width:100%;
justify-content:flex-start;
}

.stats-box{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<header>Jogadores</header>

<div class="container">

<a href="index.html" class="btn-voltar">← Voltar</a>

<input id="buscaJogador" placeholder="Pesquisar jogador..." oninput="carregarJogadores()">

<div class="lista-grid" id="listaJogadores"></div>

</div>

<div class="modal" id="modalVer">
  <div class="modal-content" id="modalConteudo"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let jogadoresCache = [];

window.verJogador = function(id) {
  const jogador = jogadoresCache.find(j => j.id === id);
  if (!jogador) return;

  const categorias = (jogador.categorias || []).map(c => `<div class="tag">${c}</div>`).join("");

  document.getElementById("modalConteudo").innerHTML = `
    <img src="${jogador.foto || ''}" onerror="this.src=''">
    <h2 style="margin:10px 0;">${jogador.nome || "-"}</h2>
    <div class="subtitle">Time: ${jogador.time || "-"}</div>
    <div class="subtitle">Posição: ${jogador.posicao || "-"}</div>
    <div class="subtitle">Número: ${jogador.numero || "-"}</div>

    <div class="tags">${categorias || ""}</div>

    <div class="stats-box">
      <div class="stat-card">
        <strong>Jogos</strong>
        <span>${Number(jogador.jogos || 0)}</span>
      </div>
      <div class="stat-card">
        <strong>Gols</strong>
        <span>${Number(jogador.gols || 0)}</span>
      </div>
      <div class="stat-card">
        <strong>Assistências</strong>
        <span>${Number(jogador.assistencias || 0)}</span>
      </div>
      <div class="stat-card">
        <strong>Amarelos</strong>
        <span>${Number(jogador.amarelos || 0)}</span>
      </div>
      <div class="stat-card">
        <strong>Vermelhos</strong>
        <span>${Number(jogador.vermelhos || 0)}</span>
      </div>
    </div>

    <button onclick="fecharModal()" style="margin-top:15px;">Fechar</button>
  `;

  document.getElementById("modalVer").style.display = "flex";
}

window.fecharModal = function() {
  document.getElementById("modalVer").style.display = "none";
}

window.carregarJogadores = function() {
  const lista = document.getElementById("listaJogadores");
  let jogadores = [...jogadoresCache];

  const busca = (document.getElementById("buscaJogador").value || "").toLowerCase().trim();

  if (busca) {
    jogadores = jogadores.filter(j =>
      (j.nome || "").toLowerCase().includes(busca) ||
      (j.time || "").toLowerCase().includes(busca) ||
      (j.posicao || "").toLowerCase().includes(busca)
    );
  }

  jogadores.sort((a, b) => (a.nome || "").localeCompare((b.nome || ""), 'pt-BR'));

  if (!jogadores.length) {
    lista.innerHTML = "<div class='sem-item'>Nenhum jogador encontrado.</div>";
    return;
  }

  lista.innerHTML = "";

  jogadores.forEach((jogador) => {
    const categorias = (jogador.categorias || []).map(c => `<span class="tag">${c}</span>`).join("");

    lista.innerHTML += `
      <div class="card">
        <div class="player">
          <img src="${jogador.foto || ''}" class="photo" alt="Foto do jogador" onerror="this.src=''">
          <div class="player-info">
            <div class="nome-jogador">${jogador.nome || "-"}</div>
            <small>Time: ${jogador.time || "-"}</small>
            <small>Posição: ${jogador.posicao || "-"}</small>
            <small>Número: ${jogador.numero || "-"}</small>
            <small>Jogos: ${Number(jogador.jogos || 0)} | Gols: ${Number(jogador.gols || 0)}</small>
            <small>Assistências: ${Number(jogador.assistencias || 0)}</small>
            <small>Amarelos: ${Number(jogador.amarelos || 0)} | Vermelhos: ${Number(jogador.vermelhos || 0)}</small>
            <div class="tags">${categorias}</div>
          </div>
        </div>
        <div class="actions">
          <button onclick="verJogador('${jogador.id}')">Ver</button>
        </div>
      </div>
    `;
  });
}

async function iniciarPagina() {
  const lista = document.getElementById("listaJogadores");
  lista.innerHTML = "<div class='sem-item'>Carregando jogadores...</div>";

  try {
    const snapJogadores = await getDocs(collection(db, "jogadores"));
    jogadoresCache = [];

    snapJogadores.forEach((docSnap) => {
      jogadoresCache.push({ id: docSnap.id, ...docSnap.data() });
    });

    carregarJogadores();
  } catch (erro) {
    console.error(erro);
    lista.innerHTML = "<div class='sem-item'>Erro ao carregar jogadores.</div>";
  }
}

iniciarPagina();
</script>

</body>
</html>
