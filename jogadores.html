<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogadores - Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
max-width:1100px;
margin:auto;
}

input, select{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#f7c600;
color:black;
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

.btn{
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-bottom:12px;
font-weight:bold;
cursor:pointer;
border:none;
}

.back{
display:block;
margin-top:15px;
color:#f7c600;
text-decoration:none;
font-weight:bold;
}

.photo{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
background:#f7c600;
}

.nome-jogador{
font-weight:bold;
font-size:16px;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
gap:12px;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.player{
display:flex;
align-items:center;
gap:12px;
min-width:0;
}

.player-info{
display:flex;
flex-direction:column;
gap:4px;
min-width:0;
}

.player-info small{
opacity:.85;
font-size:12px;
}

.actions{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.actions a{
background:#1a3f73;
padding:6px 10px;
border-radius:6px;
color:white;
text-decoration:none;
font-size:12px;
}
</style>
</head>

<body>

<header>Jogadores</header>

<div class="container">

<a class="btn" onclick="toggleFormulario()">+ Novo Jogador</a>

<div id="formulario" style="display:none;">
  <input id="nomeJogador" placeholder="Nome do jogador">
  <input id="fotoJogador" type="file" accept="image/*">
  <input id="dataNascimento" type="date">
  <input id="cpfJogador" placeholder="CPF do jogador">
  <input id="posicaoJogador" placeholder="Posição (ex: Goleiro, Zagueiro, Atacante)">
  <input id="numeroJogador" placeholder="Número da camisa">

  <select id="timeJogador">
    <option value="">Selecione o time</option>
  </select>

  <button onclick="salvarJogador()">Salvar Jogador</button>
</div>

<div class="lista-grid" id="listaJogadores"></div>

<a href="admin.html" class="back">← Voltar</a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.firebasestorage.app",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

window.toggleFormulario = function(){
  const f = document.getElementById("formulario");
  f.style.display = f.style.display === "none" ? "block" : "none";
}

async function carregarTimesNoSelect() {
  const select = document.getElementById("timeJogador");
  select.innerHTML = '<option value="">Selecione o time</option>';

  const querySnapshot = await getDocs(collection(db, "times"));

  let times = [];
  querySnapshot.forEach((doc) => {
    times.push(doc.data());
  });

  times.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));

  times.forEach((time) => {
    select.innerHTML += `<option value="${time.nome}">${time.nome}</option>`;
  });
}

async function carregarJogadores() {
  const lista = document.getElementById("listaJogadores");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "jogadores"));

  let jogadores = [];
  querySnapshot.forEach((doc) => {
    jogadores.push(doc.data());
  });

  jogadores.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));

  jogadores.forEach((jogador) => {
    lista.innerHTML += `
      <div class="card">
        <div class="player">
          <img src="${jogador.foto || ''}" class="photo" alt="Foto do jogador">
          <div class="player-info">
            <div class="nome-jogador">${jogador.nome}</div>
            <small>Time: ${jogador.time || "-"}</small>
            <small>Posição: ${jogador.posicao || "-"}</small>
            <small>Número: ${jogador.numero || "-"}</small>
            <small>CPF: ${jogador.cpf || "-"}</small>
          </div>
        </div>
        <div class="actions">
          <a>Editar</a>
          <a>Transferir</a>
        </div>
      </div>
    `;
  });
}

window.salvarJogador = async function() {
  const nome = document.getElementById("nomeJogador").value.trim();
  const foto = document.getElementById("fotoJogador").files[0];
  const dataNascimento = document.getElementById("dataNascimento").value;
  const cpf = document.getElementById("cpfJogador").value.trim();
  const posicao = document.getElementById("posicaoJogador").value.trim();
  const numero = document.getElementById("numeroJogador").value.trim();
  const time = document.getElementById("timeJogador").value;

  if (!nome) {
    alert("Digite o nome do jogador");
    return;
  }

  if (!foto) {
    alert("Escolha a foto do jogador");
    return;
  }

  if (!dataNascimento) {
    alert("Escolha a data de nascimento");
    return;
  }

  if (!cpf) {
    alert("Digite o CPF do jogador");
    return;
  }

  if (!time) {
    alert("Selecione o time");
    return;
  }

  const nomeArquivo = Date.now() + "-" + foto.name;
  const storageRef = ref(storage, "jogadores/" + nomeArquivo);

  await uploadBytes(storageRef, foto);
  const urlFoto = await getDownloadURL(storageRef);

  await addDoc(collection(db, "jogadores"), {
    nome: nome,
    foto: urlFoto,
    dataNascimento: dataNascimento,
    cpf: cpf,
    posicao: posicao,
    numero: numero,
    time: time
  });

  alert("Jogador salvo com sucesso!");

  document.getElementById("nomeJogador").value = "";
  document.getElementById("fotoJogador").value = "";
  document.getElementById("dataNascimento").value = "";
  document.getElementById("cpfJogador").value = "";
  document.getElementById("posicaoJogador").value = "";
  document.getElementById("numeroJogador").value = "";
  document.getElementById("timeJogador").value = "";

  carregarJogadores();
}

carregarTimesNoSelect();
carregarJogadores();
</script>

</body>
</html>
