<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogadores - Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
max-width:1100px;
margin:auto;
}

input, select{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#f7c600;
color:black;
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

.btn{
background:#f7c600;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-bottom:12px;
font-weight:bold;
cursor:pointer;
border:none;
}

.back{
display:block;
margin-top:15px;
color:#f7c600;
text-decoration:none;
font-weight:bold;
}

.photo{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
background:#1a3f73;
}

.nome-jogador{
font-weight:bold;
font-size:16px;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
gap:12px;
}

.card{
background:#102a52;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.player{
display:flex;
align-items:center;
gap:12px;
min-width:0;
}

.player-info{
display:flex;
flex-direction:column;
gap:4px;
min-width:0;
}

.player-info small{
opacity:.85;
font-size:12px;
}

.actions{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.actions button{
background:#1a3f73;
padding:6px 10px;
border-radius:6px;
color:white;
border:none;
font-size:12px;
margin:0;
}

.actions .delete{
background:#b30000;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:15px;
z-index:999;
}

.modal-content{
background:#102a52;
padding:20px;
border-radius:12px;
max-width:500px;
width:100%;
text-align:center;
max-height:85vh;
overflow:auto;
}

.modal-content img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:2px solid #ffffff22;
margin-bottom:12px;
background:#1a3f73;
}

.tags{
display:flex;
gap:6px;
flex-wrap:wrap;
justify-content:center;
margin-top:10px;
}

.tag{
background:#1a3f73;
padding:4px 8px;
border-radius:999px;
font-size:12px;
}

.subtitle{
opacity:.85;
font-size:13px;
margin-bottom:10px;
}

.checkbox-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(110px, 1fr));
gap:8px;
margin-bottom:12px;
}

.check-item{
background:#102a52;
padding:8px;
border-radius:8px;
display:flex;
align-items:center;
gap:8px;
}

.check-item input{
width:auto;
margin:0;
}
</style>
</head>

<body>

<header>Jogadores</header>

<div class="container">

<a class="btn" onclick="toggleFormulario()">+ Novo Jogador</a>

<input id="buscaJogador" placeholder="Pesquisar jogador..." oninput="carregarJogadores()">

<div id="formulario" style="display:none;">
  <input id="nomeJogador" placeholder="Nome do jogador">
  <input id="fotoJogador" type="file" accept="image/*">
  <input id="dataNascimento" type="date">
  <input id="cpfJogador" placeholder="CPF do jogador">
  <input id="posicaoJogador" placeholder="Posição (ex: Goleiro, Zagueiro, Atacante)">
  <input id="numeroJogador" placeholder="Número da camisa">

  <select id="timeJogador">
    <option value="">Selecione o time</option>
  </select>

  <div class="subtitle">Categorias liberadas para o jogador</div>
  <div class="checkbox-grid" id="categoriasGrid"></div>

  <button id="botaoSalvar" onclick="salvarJogador()">Salvar Jogador</button>
</div>

<div class="lista-grid" id="listaJogadores"></div>

<a href="admin.html" class="back">← Voltar</a>

</div>

<div class="modal" id="modalVer">
  <div class="modal-content" id="modalConteudo"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.firebasestorage.app",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let editandoId = null;
let fotoAtual = "";

window.toggleFormulario = function(){
  const f = document.getElementById("formulario");
  f.style.display = f.style.display === "none" ? "block" : "none";
}

async function carregarCategoriasCheckbox() {
  const grid = document.getElementById("categoriasGrid");
  grid.innerHTML = "";

  const snap = await getDocs(collection(db, "categorias"));
  let categorias = [];

  snap.forEach(docSnap => {
    const data = docSnap.data();
    if (data.nome) categorias.push(data.nome);
  });

  categorias.sort((a,b)=>a.localeCompare(b,'pt-BR'));

  categorias.forEach(nome => {
    grid.innerHTML += `
      <label class="check-item">
        <input type="checkbox" value="${nome}">${nome}
      </label>
    `;
  });
}

function getCategoriasSelecionadas() {
  return Array.from(document.querySelectorAll('#categoriasGrid input[type="checkbox"]:checked')).map(i => i.value);
}

function marcarCategorias(categorias) {
  document.querySelectorAll('#categoriasGrid input[type="checkbox"]').forEach(i => {
    i.checked = (categorias || []).includes(i.value);
  });
}

function limparFormulario() {
  document.getElementById("nomeJogador").value = "";
  document.getElementById("fotoJogador").value = "";
  document.getElementById("dataNascimento").value = "";
  document.getElementById("cpfJogador").value = "";
  document.getElementById("posicaoJogador").value = "";
  document.getElementById("numeroJogador").value = "";
  document.getElementById("timeJogador").value = "";
  document.getElementById("botaoSalvar").textContent = "Salvar Jogador";
  document.querySelectorAll('#categoriasGrid input[type="checkbox"]').forEach(i => i.checked = false);
  editandoId = null;
  fotoAtual = "";
}

async function carregarTimesNoSelect() {
  const select = document.getElementById("timeJogador");
  select.innerHTML = '<option value="">Selecione o time</option>';

  const querySnapshot = await getDocs(collection(db, "times"));
  let times = [];

  querySnapshot.forEach((docSnap) => {
    times.push(docSnap.data());
  });

  times.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));

  times.forEach((time) => {
    select.innerHTML += `<option value="${time.nome}">${time.nome}</option>`;
  });
}

window.salvarJogador = async function() {
  const nome = document.getElementById("nomeJogador").value.trim();
  const foto = document.getElementById("fotoJogador").files[0];
  const dataNascimento = document.getElementById("dataNascimento").value;
  const cpf = document.getElementById("cpfJogador").value.trim();
  const posicao = document.getElementById("posicaoJogador").value.trim();
  const numero = document.getElementById("numeroJogador").value.trim();
  const time = document.getElementById("timeJogador").value;
  const categorias = getCategoriasSelecionadas();

  if (!nome) {
    alert("Digite o nome do jogador");
    return;
  }

  if (!dataNascimento) {
    alert("Escolha a data de nascimento");
    return;
  }

  if (!cpf) {
    alert("Digite o CPF do jogador");
    return;
  }

  if (!time) {
    alert("Selecione o time");
    return;
  }

  const snap = await getDocs(collection(db, "jogadores"));
  let cpfDuplicado = false;

  snap.forEach((item) => {
    const j = item.data();
    if (j.cpf === cpf && item.id !== editandoId) {
      cpfDuplicado = true;
    }
  });

  if (cpfDuplicado) {
    alert("Já existe um jogador cadastrado com esse CPF.");
    return;
  }

  let urlFoto = fotoAtual;

  if (foto) {
    const nomeArquivo = Date.now() + "-" + foto.name;
    const storageRef = ref(storage, "jogadores/" + nomeArquivo);
    await uploadBytes(storageRef, foto);
    urlFoto = await getDownloadURL(storageRef);
  }

  if (!urlFoto) {
    alert("Escolha a foto do jogador");
    return;
  }

  const dados = {
    nome: nome,
    foto: urlFoto,
    dataNascimento: dataNascimento,
    cpf: cpf,
    posicao: posicao,
    numero: numero,
    time: time,
    categorias: categorias
  };

  if (editandoId) {
    await updateDoc(doc(db, "jogadores", editandoId), dados);
    alert("Jogador atualizado com sucesso!");
  } else {
    await addDoc(collection(db, "jogadores"), dados);
    alert("Jogador salvo com sucesso!");
  }

  limparFormulario();
  carregarJogadores();
}

window.editarJogador = async function(id) {
  const snap = await getDocs(collection(db, "jogadores"));

  snap.forEach((item) => {
    if (item.id === id) {
      const j = item.data();

      document.getElementById("nomeJogador").value = j.nome || "";
      document.getElementById("dataNascimento").value = j.dataNascimento || "";
      document.getElementById("cpfJogador").value = j.cpf || "";
      document.getElementById("posicaoJogador").value = j.posicao || "";
      document.getElementById("numeroJogador").value = j.numero || "";
      document.getElementById("timeJogador").value = j.time || "";
      document.getElementById("botaoSalvar").textContent = "Atualizar Jogador";

      marcarCategorias(j.categorias || []);
      fotoAtual = j.foto || "";
      editandoId = id;

      document.getElementById("formulario").style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  });
}

window.verJogador = async function(id) {
  const snap = await getDocs(collection(db, "jogadores"));
  let jogador = null;

  snap.forEach((item) => {
    if (item.id === id) {
      jogador = item.data();
    }
  });

  if (!jogador) return;

  const categorias = (jogador.categorias || []).map(c => `<div class="tag">${c}</div>`).join("");

  document.getElementById("modalConteudo").innerHTML = `
    <img src="${jogador.foto || ''}">
    <h2 style="margin:10px 0;">${jogador.nome}</h2>
    <div class="subtitle">Time: ${jogador.time || "-"}</div>
    <div class="subtitle">Posição: ${jogador.posicao || "-"}</div>
    <div class="subtitle">Número: ${jogador.numero || "-"}</div>
    <div class="subtitle">CPF: ${jogador.cpf || "-"}</div>
    <div class="subtitle">Nascimento: ${jogador.dataNascimento || "-"}</div>
    <div class="tags">${categorias}</div>
    <button onclick="fecharModal()" style="margin-top:15px;">Fechar</button>
  `;

  document.getElementById("modalVer").style.display = "flex";
}

window.fecharModal = function() {
  document.getElementById("modalVer").style.display = "none";
}

window.excluirJogador = async function(id){
  const confirmar = confirm("Tem certeza que deseja excluir este jogador?");
  if(!confirmar) return;

  await deleteDoc(doc(db, "jogadores", id));
  alert("Jogador excluído!");
  carregarJogadores();
}

async function carregarJogadores() {
  const lista = document.getElementById("listaJogadores");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "jogadores"));
  let jogadores = [];

  querySnapshot.forEach((docSnap) => {
    jogadores.push({ id: docSnap.id, ...docSnap.data() });
  });

  const busca = (document.getElementById("buscaJogador").value || "").toLowerCase().trim();

  if (busca) {
    jogadores = jogadores.filter(j =>
      (j.nome || "").toLowerCase().includes(busca) ||
      (j.time || "").toLowerCase().includes(busca) ||
      (j.posicao || "").toLowerCase().includes(busca)
    );
  }

  jogadores.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));

  jogadores.forEach((jogador) => {
    const categorias = (jogador.categorias || []).map(c => `<span class="tag">${c}</span>`).join("");

    lista.innerHTML += `
      <div class="card">
        <div class="player">
          <img src="${jogador.foto || ''}" class="photo" alt="Foto do jogador">
          <div class="player-info">
            <div class="nome-jogador">${jogador.nome}</div>
            <small>Time: ${jogador.time || "-"}</small>
            <small>Posição: ${jogador.posicao || "-"}</small>
            <small>Número: ${jogador.numero || "-"}</small>
            <div class="tags">${categorias}</div>
          </div>
        </div>
        <div class="actions">
          <button onclick="editarJogador('${jogador.id}')">Editar</button>
          <button onclick="verJogador('${jogador.id}')">Ver</button>
          <button class="delete" onclick="excluirJogador('${jogador.id}')">Excluir</button>
        </div>
      </div>
    `;
  });
}

await carregarCategoriasCheckbox();
await carregarTimesNoSelect();
carregarJogadores();
</script>

</body>
</html>
