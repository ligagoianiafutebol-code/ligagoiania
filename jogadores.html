<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogadores - Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:15px;
}

.btn{
background:#f7c600;
color:black;
padding:10px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-bottom:15px;
font-weight:bold;
}

.card{
background:#102a52;
padding:12px;
border-radius:10px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.player{
display:flex;
align-items:center;
gap:10px;
}

.photo{
width:30px;
height:30px;
background:#f7c600;
border-radius:50%;
}

.actions a{
background:#1a3f73;
padding:6px 10px;
border-radius:6px;
color:white;
text-decoration:none;
margin-left:5px;
font-size:12px;
}

.back{
display:block;
margin-top:10px;
color:#f7c600;
text-decoration:none;
font-weight:bold;
}
</style>

</head>
<body>

<header>Jogadores</header>

<div class="container">

<a class="btn">+ Novo Jogador</a>

<div class="card">
<div class="player">
<div class="photo"></div>
João Silva
</div>
<div class="actions">
<a>Editar</a>
<a>Transferir</a>
</div>
</div>

<div class="card">
<div class="player">
<div class="photo"></div>
Pedro Santos
</div>
<div class="actions">
<a>Editar</a>
<a>Transferir</a>
</div>
</div>

<div class="card">
<div class="player">
<div class="photo"></div>
Lucas Lima
</div>
<div class="actions">
<a>Editar</a>
<a>Transferir</a>
</div>
</div>

<a href="admin.html" class="back">← Voltar</a>

</div>

</body>
</html>
