<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistentes - Admin</title>

<style>
body{margin:0;font-family:Arial;background:#0b1f3a;color:white;}
header{background:#08172c;padding:15px;text-align:center;font-size:22px;font-weight:bold;border-bottom:3px solid #f7c600;}
.container{padding:15px;max-width:1100px;margin:auto;}

input{
width:100%;padding:12px;margin-bottom:12px;border:none;border-radius:8px;
}

button{
background:#f7c600;color:black;padding:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;
}

.btn{
background:#f7c600;color:black;padding:10px;border-radius:8px;font-weight:bold;cursor:pointer;margin-bottom:10px;
display:inline-block;
}

.lista-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
gap:12px;
}

.card{
background:#102a52;padding:15px;border-radius:10px;
display:flex;justify-content:space-between;align-items:center;
}

.user{
display:flex;gap:10px;align-items:center;
}

.photo{
width:60px;height:60px;border-radius:50%;object-fit:cover;background:#1a3f73;
}

.actions button{
background:#1a3f73;margin-left:5px;font-size:12px;
}

.delete{background:#b30000 !important;}

.checkbox-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(110px, 1fr));
gap:8px;margin-bottom:12px;
}

.check-item{
background:#102a52;padding:8px;border-radius:8px;
display:flex;align-items:center;gap:8px;
}

.tag{
background:#1a3f73;padding:4px 8px;border-radius:999px;font-size:12px;margin-right:5px;
}

.modal{
display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);
justify-content:center;align-items:center;
}

.modal-content{
background:#102a52;padding:20px;border-radius:12px;text-align:center;
}

.back{
display:block;margin-top:15px;color:#f7c600;font-weight:bold;text-decoration:none;
}
</style>
</head>

<body>

<header>Assistentes</header>

<div class="container">

<a class="btn" onclick="toggleFormulario()">+ Novo Assistente</a>

<input id="busca" placeholder="Pesquisar..." oninput="carregarAssistentes()">

<div id="formulario" style="display:none;">
  <input id="nome" placeholder="Nome">
  <input id="foto" type="file">
  <input id="cpf" placeholder="CPF">
  <input id="telefone" placeholder="Telefone">
  <input id="email" placeholder="Email">

  <div class="checkbox-grid" id="categoriasGrid"></div>

  <button onclick="salvar()">Salvar</button>
</div>

<div class="lista-grid" id="lista"></div>

<a href="admin.html" class="back">← Voltar</a>

</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let editandoId = null;
let fotoAtual = "";

window.toggleFormulario = ()=>{
  const f = document.getElementById("formulario");
  f.style.display = f.style.display === "none" ? "block" : "none";
}

async function carregarCategorias(){
  const grid = document.getElementById("categoriasGrid");
  grid.innerHTML="";

  const snap = await getDocs(collection(db,"categorias"));
  let lista=[];

  snap.forEach(d=>lista.push(d.data().nome));
  lista.sort((a,b)=>a.localeCompare(b,'pt-BR'));

  lista.forEach(nome=>{
    grid.innerHTML+=`
      <label class="check-item">
        <input type="checkbox" value="${nome}">${nome}
      </label>
    `;
  });
}

function getCategorias(){
  return Array.from(document.querySelectorAll('#categoriasGrid input:checked')).map(i=>i.value);
}

window.salvar = async ()=>{
  const nome = document.getElementById("nome").value;
  const cpf = document.getElementById("cpf").value;
  const telefone = document.getElementById("telefone").value;
  const email = document.getElementById("email").value;
  const foto = document.getElementById("foto").files[0];
  const categorias = getCategorias();

  if(!nome || !cpf){
    alert("Preencha os campos obrigatórios");
    return;
  }

  let url = fotoAtual;

  if(foto){
    const refStorage = ref(storage,"assistentes/"+Date.now());
    await uploadBytes(refStorage,foto);
    url = await getDownloadURL(refStorage);
  }

  const dados = {nome,cpf,telefone,email,foto:url,categorias};

  if(editandoId){
    await updateDoc(doc(db,"assistentes",editandoId),dados);
  }else{
    await addDoc(collection(db,"assistentes"),dados);
  }

  alert("Salvo!");
  location.reload();
}

window.editar = async (id)=>{
  const snap = await getDocs(collection(db,"assistentes"));

  snap.forEach(d=>{
    if(d.id===id){
      const a=d.data();
      document.getElementById("nome").value=a.nome;
      document.getElementById("cpf").value=a.cpf;
      document.getElementById("telefone").value=a.telefone;
      document.getElementById("email").value=a.email;
      fotoAtual=a.foto;
      editandoId=id;
    }
  });

  document.getElementById("formulario").style.display="block";
}

window.excluir = async(id)=>{
  if(confirm("Excluir?")){
    await deleteDoc(doc(db,"assistentes",id));
    carregarAssistentes();
  }
}

window.ver = async(id)=>{
  const snap = await getDocs(collection(db,"assistentes"));

  snap.forEach(d=>{
    if(d.id===id){
      const a=d.data();
      const cats = (a.categorias||[]).map(c=>`<span class="tag">${c}</span>`).join("");

      document.getElementById("modalContent").innerHTML=`
        <img src="${a.foto}" class="photo">
        <h2>${a.nome}</h2>
        <p>${a.email||""}</p>
        ${cats}
        <button onclick="fechar()">Fechar</button>
      `;

      document.getElementById("modal").style.display="flex";
    }
  });
}

window.fechar = ()=>document.getElementById("modal").style.display="none";

async function carregarAssistentes(){
  const lista=document.getElementById("lista");
  lista.innerHTML="";

  const snap = await getDocs(collection(db,"assistentes"));
  let dados=[];

  snap.forEach(d=>dados.push({id:d.id,...d.data()}));

  const busca = (document.getElementById("busca").value || "").toLowerCase().trim();
  if(busca){
    dados = dados.filter(a =>
      (a.nome||"").toLowerCase().includes(busca) ||
      (a.email||"").toLowerCase().includes(busca) ||
      (a.cpf||"").toLowerCase().includes(busca)
    );
  }

  dados.sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));

  dados.forEach(a=>{
    lista.innerHTML+=`
      <div class="card">
        <div class="user">
          <img src="${a.foto||''}" class="photo">
          <div>${a.nome}</div>
        </div>
        <div class="actions">
          <button onclick="editar('${a.id}')">Editar</button>
          <button onclick="ver('${a.id}')">Ver</button>
          <button class="delete" onclick="excluir('${a.id}')">Excluir</button>
        </div>
      </div>
    `;
  });
}

await carregarCategorias();
carregarAssistentes();
</script>

</body>
</html>
