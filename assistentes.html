<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistente - LIGA GOIANA DE FUTEBOL DE BASE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-soft:rgba(247,198,0,.12);
      --gold-line:rgba(247,198,0,.24);
      --white:#ffffff;
      --muted:#d8e1ef;
      --shadow:0 8px 22px rgba(0,0,0,.28);
      --transition:.25s ease;
      --max:1240px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:
        linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
      min-height:100vh;
    }

    a{
      text-decoration:none;
      color:inherit;
      transition:var(--transition);
    }

    button{
      font-family:inherit;
      cursor:pointer;
      transition:var(--transition);
      border:none;
      background:none;
    }

    input{
      font-family:inherit;
    }

    .wrap{
      width:min(100% - 28px, var(--max));
      margin:0 auto;
    }

    header{
      background:rgba(8,23,44,.96);
      border-bottom:3px solid var(--gold);
      box-shadow:var(--shadow);
    }

    .header-top{
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:24px;
      font-weight:700;
      color:var(--white);
    }

    .top-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
      white-space:nowrap;
    }

    .btn-light{
      background:#fff4cf;
      color:#111;
    }

    .btn-light:hover{
      background:var(--gold);
      transform:translateY(-2px);
    }

    .nav-bar{
      background:rgba(16,42,82,.95);
      border-top:1px solid rgba(255,255,255,.06);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .menu{
      display:flex;
      justify-content:center;
      gap:10px;
      padding:12px 0;
      flex-wrap:wrap;
    }

    .menu a{
      color:white;
      font-weight:700;
      font-size:14px;
      background:#0d2346;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid transparent;
      white-space:nowrap;
    }

    .menu a:hover{
      color:var(--gold);
      background:var(--gold-soft);
      border-color:var(--gold-line);
    }

    .menu a.ativo{
      background:var(--gold);
      color:black;
    }

    .container{
      padding:24px 0 34px;
    }

    .hero{
      background:linear-gradient(135deg,#102a52,#0d2346);
      border:1px solid var(--gold-line);
      border-radius:18px;
      padding:22px;
      margin-bottom:20px;
      box-shadow:var(--shadow);
    }

    .hero h2{
      margin:0 0 8px;
      color:var(--gold);
      font-size:28px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:15px;
      max-width:850px;
    }

    .search-box{
      margin-bottom:16px;
    }

    input{
      width:100%;
      padding:13px;
      border:none;
      border-radius:10px;
      font-size:14px;
      box-sizing:border-box;
      background:#f5f7fb;
      color:#111;
    }

    input:focus{
      outline:2px solid rgba(247,198,0,.5);
    }
.lista-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
      gap:12px;
    }

    .card{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:16px;
      border-radius:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      border:1px solid rgba(255,230,0,.10);
      box-shadow:var(--shadow);
      transition:var(--transition);
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:var(--gold-line);
    }

    .user{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:0;
      flex:1;
    }

    .photo{
      width:64px;
      height:64px;
      border-radius:50%;
      object-fit:cover;
      background:#1a3f73;
      border:2px solid rgba(255,255,255,.12);
      flex-shrink:0;
    }

    .user-info{
      display:flex;
      flex-direction:column;
      gap:5px;
      min-width:0;
    }

    .user-info .nome{
      font-weight:700;
      font-size:18px;
      color:#fff;
      line-height:1.35;
    }

    .user-info small{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .categorias-tags{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .tag{
      background:#1a3f73;
      padding:5px 9px;
      border-radius:999px;
      font-size:12px;
      display:inline-block;
      border:1px solid rgba(255,255,255,.08);
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .actions .btn-ver{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      background:var(--gold);
      color:#111;
      padding:11px 14px;
      border-radius:10px;
      font-weight:700;
      font-size:13px;
      white-space:nowrap;
    }

    .actions .btn-ver:hover{
      filter:brightness(1.04);
      transform:translateY(-1px);
    }

    .vazio{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:30px;
      border-radius:14px;
      text-align:center;
      color:var(--muted);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      padding:15px;
      z-index:999;
    }

    .modal-content{
      background:linear-gradient(180deg, rgba(16,42,82,.98), rgba(12,33,64,.98));
      padding:22px;
      border-radius:16px;
      text-align:center;
      max-width:780px;
      width:100%;
      max-height:88vh;
      overflow:auto;
      border:1px solid var(--gold-line);
      box-shadow:var(--shadow);
    }

    .modal-content h2{
      color:var(--gold);
      margin:14px 0 10px;
    }

    .modal-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
      text-align:left;
    }

    .info-box,
    .stats-box{
      background:#102a52;
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:14px;
    }

    .info-box h3,
    .stats-box h3{
      color:var(--gold);
      margin-bottom:10px;
      font-size:18px;
    }
.info-line{
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:10px;
    }

    .stat-card{
      background:#0d2346;
      border-radius:12px;
      padding:12px;
      border:1px solid rgba(255,255,255,.06);
    }

    .stat-card strong{
      display:block;
      color:var(--gold);
      font-size:22px;
      margin-bottom:4px;
    }

    .stat-card span{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .categorias-stats{
      margin-top:14px;
      background:#0d2346;
      border-radius:12px;
      padding:12px;
      border:1px solid rgba(255,255,255,.06);
      text-align:left;
    }

    .categorias-stats h4{
      color:var(--gold);
      margin-bottom:10px;
      font-size:16px;
    }

    .categoria-item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:8px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
      color:var(--muted);
      font-size:14px;
    }

    .categoria-item:last-child{
      border-bottom:none;
    }

    .modal-actions{
      margin-top:18px;
    }

    .modal-actions button{
      background:var(--gold);
      color:black;
      padding:11px 14px;
      border-radius:10px;
      font-weight:700;
    }

    @media (max-width:900px){
      .header-title{
        order:3;
        width:100%;
        text-align:center;
      }

      .header-left,
      .header-right{
        width:100%;
        justify-content:center;
      }

      .modal-grid,
      .stats-grid{
        grid-template-columns:1fr;
      }

      .card{
        flex-direction:column;
        align-items:flex-start;
      }

      .actions{
        width:100%;
        justify-content:flex-start;
      }
    }

    @media (max-width:600px){
      .top-btn{
        width:100%;
        justify-content:center;
      }

      .header-left,
      .header-right{
        flex-direction:column;
        align-items:stretch;
      }

      .hero h2{
        font-size:24px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap header-top">
      <div class="header-left">
        <button class="top-btn btn-light" type="button" onclick="voltarPagina()">
          <i class="fa-solid fa-arrow-left"></i> Voltar
        </button>

        <a href="index.html" class="top-btn btn-light">
          <i class="fa-solid fa-house"></i> Página Inicial
        </a>
      </div>

      <div class="header-title">LIGA GOIANA DE FUTEBOL DE BASE</div>

      <div class="header-right"></div>
    </div>

    <div class="nav-bar">
      <div class="wrap">
        <div class="menu">
          <a href="index.html">Início</a>
          <a href="campeonatos.html">Campeonatos</a>
          <a href="tabela.html">Tabela</a>
          <a href="jogos.html">Jogos</a>
          <a href="times.html">Times</a>
          <a href="tecnicos.html">Técnicos</a>
          <a href="jogadores.html">Jogadores</a>
          <a href="arbitros.html">Arbitros</a>
          <a href="assistente.html" class="ativo">Assistente</a>
          <a href="sumula.html">Súmula</a>
          <a href="noticias.html">Notícias</a>
          <a href="login.html">Login</a>
        </div>
      </div>
    </div>
  </header>

  <div class="wrap container">

    <div class="hero">
      <h2>Assistentes</h2>
      <p>Veja os assistentes cadastrados e acompanhe informações públicas e estatísticas de atuação.</p>
    </div>

    <div class="search-box">
      <input id="busca" placeholder="Pesquisar assistente..." oninput="carregarAssistentes()">
    </div>

    <div class="lista-grid" id="lista"></div>

  </div>

  <div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script type="module">
    import { db } from "./firebase.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    window.voltarPagina = function(){
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "index.html";
      }
    };

    function normalizarTexto(texto){
      return String(texto || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }
function calcularIdade(dataNascimento){
      if(!dataNascimento) return "-";

      const nascimento = new Date(dataNascimento + "T00:00:00");
      if(isNaN(nascimento.getTime())) return "-";

      const hoje = new Date();
      let idade = hoje.getFullYear() - nascimento.getFullYear();
      const mes = hoje.getMonth() - nascimento.getMonth();

      if(mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())){
        idade--;
      }

      return idade >= 0 ? idade : "-";
    }

    async function calcularEstatisticasAssistente(nomeAssistente){
      const snapJogos = await getDocs(collection(db, "jogos"));

      let jogosTrabalhados = 0;
      const jogosPorCategoria = {};

      snapJogos.forEach(docSnap => {
        const jogo = docSnap.data();

        const ehAssistente =
          normalizarTexto(jogo.assistente) === normalizarTexto(nomeAssistente) ||
          normalizarTexto(jogo.assistente1) === normalizarTexto(nomeAssistente) ||
          normalizarTexto(jogo.assistente2) === normalizarTexto(nomeAssistente) ||
          normalizarTexto(jogo.arbitroAuxiliar) === normalizarTexto(nomeAssistente);

        if(ehAssistente){
          jogosTrabalhados += 1;
          const categoria = jogo.categoria || "Sem categoria";
          jogosPorCategoria[categoria] = (jogosPorCategoria[categoria] || 0) + 1;
        }
      });

      return {
        jogosTrabalhados,
        jogosPorCategoria
      };
    }

    window.ver = async function(id){
      const snap = await getDocs(collection(db,"assistentes"));

      for (const d of snap.docs){
        if(d.id === id){
          const a = d.data();
          const cats = (a.categorias || []).map(c=>`<span class="tag">${c}</span>`).join("");
          const idade = calcularIdade(a.dataNascimento);
          const stats = await calcularEstatisticasAssistente(a.nome || "");

          const categoriasStatsHtml = Object.keys(stats.jogosPorCategoria).length
            ? Object.entries(stats.jogosPorCategoria)
                .sort((x, y) => x[0].localeCompare(y[0], "pt-BR"))
                .map(([categoria, quantidade]) => `
                  <div class="categoria-item">
                    <span>${categoria}</span>
                    <strong>${quantidade} jogo(s)</strong>
                  </div>
                `).join("")
            : `<div class="categoria-item"><span>Sem jogos registrados</span><strong>0</strong></div>`;

          document.getElementById("modalContent").innerHTML = `
            <img src="${a.foto || 'logo-liga.jfif'}" class="photo" alt="${a.nome || 'Assistente'}">
            <h2>${a.nome || ""}</h2>

            <div class="modal-grid">
              <div class="info-box">
                <h3>Dados do Assistente</h3>
                <div class="info-line"><strong>Idade:</strong> ${idade}</div>
                <div class="info-line"><strong>Onde nasceu:</strong> ${a.cidadeNascimento || "-"}</div>
                <div class="info-line"><strong>Autorização:</strong> Todas as categorias</div>
                <div class="categorias-tags" style="margin-top:10px;">${cats || '<span class="tag">Sem categorias</span>'}</div>
              </div>

              <div class="stats-box">
                <h3>Estatísticas</h3>
                <div class="stats-grid">
                  <div class="stat-card">
                    <strong>${stats.jogosTrabalhados}</strong>
                    <span>Jogos trabalhados</span>
                  </div>

                  <div class="stat-card">
                    <strong>${Object.keys(stats.jogosPorCategoria).length}</strong>
                    <span>Categorias trabalhadas</span>
                  </div>
                </div>

                <div class="categorias-stats">
                  <h4>Jogos por categoria</h4>
                  ${categoriasStatsHtml}
                </div>
              </div>
            </div>

            <div class="modal-actions">
              <button onclick="fechar()">
                <i class="fa-solid fa-xmark"></i> Fechar
              </button>
            </div>
          `;

          document.getElementById("modal").style.display = "flex";
          break;
        }
      }
    };

    window.fechar = function(){
      document.getElementById("modal").style.display = "none";
    };
async function carregarAssistentes(){
      const lista = document.getElementById("lista");
      lista.innerHTML = "<div class='vazio'>Carregando assistentes...</div>";

      const snap = await getDocs(collection(db,"assistentes"));
      let dados = [];

      snap.forEach(d => dados.push({ id:d.id, ...d.data() }));

      const busca = (document.getElementById("busca").value || "").toLowerCase().trim();

      if(busca){
        dados = dados.filter(a =>
          (a.nome || "").toLowerCase().includes(busca)
        );
      }

      dados.sort((a,b)=>(a.nome || "").localeCompare(b.nome || "", "pt-BR"));

      if(!dados.length){
        lista.innerHTML = "<div class='vazio'>Nenhum assistente encontrado.</div>";
        return;
      }

      lista.innerHTML = "";

      dados.forEach(a=>{
        lista.innerHTML += `
          <div class="card">
            <div class="user">
              <img src="${a.foto || 'logo-liga.jfif'}" class="photo" alt="${a.nome || 'Assistente'}">
              <div class="user-info">
                <div class="nome">${a.nome || ""}</div>
                <small>Assistente autorizado</small>
                <div class="categorias-tags">
                  <span class="tag">Todas as categorias</span>
                </div>
              </div>
            </div>

            <div class="actions">
              <button class="btn-ver" onclick="ver('${a.id}')">
                <i class="fa-solid fa-eye"></i> Ver
              </button>
            </div>
          </div>
        `;
      });
    }

    carregarAssistentes();
  </script>

</body>
</html>
