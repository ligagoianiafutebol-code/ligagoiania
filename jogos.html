<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogos - LIGA GOIANA DE FUTEBOL DE BASE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-soft:rgba(247,198,0,.12);
      --gold-line:rgba(247,198,0,.24);
      --white:#ffffff;
      --muted:#d8e1ef;
      --green:#1b5e20;
      --yellow-dark:#7a5a00;
      --shadow:0 8px 22px rgba(0,0,0,.28);
      --transition:.25s ease;
      --max:1180px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:
        linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
    }

    a{
      text-decoration:none;
      color:inherit;
      transition:var(--transition);
    }

    button{
      font-family:inherit;
      cursor:pointer;
      transition:var(--transition);
      border:none;
    }

    .wrap{
      width:min(100% - 28px, var(--max));
      margin:0 auto;
    }

    header{
      background:rgba(8,23,44,.96);
      border-bottom:3px solid var(--gold);
      box-shadow:var(--shadow);
    }

    .header-top{
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:24px;
      font-weight:700;
      color:var(--white);
    }

    .top-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
      white-space:nowrap;
      justify-content:center;
    }

    .btn-light{
      background:#fff4cf;
      color:#111;
    }

    .btn-light:hover{
      background:var(--gold);
      transform:translateY(-2px);
    }

    .nav-bar{
      background:rgba(16,42,82,.95);
      border-top:1px solid rgba(255,255,255,.06);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .menu{
      display:flex;
      justify-content:center;
      gap:10px;
      padding:12px 0;
      flex-wrap:wrap;
    }

    .menu a{
      color:white;
      text-decoration:none;
      font-weight:700;
      font-size:14px;
      background:#0d2346;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid transparent;
      white-space:nowrap;
    }

    .menu a:hover{
      color:var(--gold);
      background:var(--gold-soft);
      border-color:var(--gold-line);
    }

    .menu a.ativo{
      background:var(--gold);
      color:black;
    }

    .container{
      max-width:1100px;
      margin:auto;
      padding:24px 0 34px;
    }

    .hero{
      background:linear-gradient(135deg,#102a52,#0d2346);
      border:1px solid var(--gold-line);
      border-radius:18px;
      padding:22px;
      margin-bottom:20px;
      box-shadow:var(--shadow);
    }

    .hero h2{
      margin:0 0 8px;
      color:var(--gold);
      font-size:28px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:15px;
      max-width:850px;
    }

    .filtros{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:20px;
    }

    select{
      width:100%;
      padding:13px;
      border:none;
      border-radius:10px;
      box-sizing:border-box;
      font-size:14px;
      background:#f5f7fb;
      color:#111;
      font-family:inherit;
    }

    select:focus{
      outline:2px solid rgba(247,198,0,.5);
    }

    .titulo{
      font-size:24px;
      font-weight:700;
      color:var(--gold);
      margin-bottom:16px;
    }

    .rodada{
      font-weight:700;
      margin:20px 0 12px;
      font-size:19px;
      color:var(--gold);
    }

    .jogo{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:16px;
      border-radius:16px;
      margin-bottom:12px;
      border:1px solid rgba(255,230,0,.10);
      box-shadow:var(--shadow);
      transition:var(--transition);
    }

    .jogo:hover{
      transform:translateY(-2px);
      border-color:var(--gold-line);
    }

    .topo-jogo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .times{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      font-size:16px;
      font-weight:700;
      width:100%;
    }

    .time{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .escudo{
      width:32px;
      height:32px;
      object-fit:contain;
      border-radius:50%;
      background:#1a3f73;
      border:1px solid rgba(255,255,255,.12);
      flex-shrink:0;
    }

    .placar{
      font-weight:700;
      font-size:20px;
      color:var(--gold);
      min-width:90px;
      text-align:center;
      background:rgba(247,198,0,.08);
      border:1px solid var(--gold-line);
      border-radius:10px;
      padding:8px 12px;
    }

    .info{
      font-size:13px;
      color:var(--muted);
      margin-top:10px;
      line-height:1.6;
    }

    .status{
      display:inline-block;
      margin-top:10px;
      padding:7px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:#0d2346;
    }

    .finalizado{
      background:var(--green);
    }

    .agendado{
      background:var(--yellow-dark);
    }

    .vazio{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:30px;
      border-radius:14px;
      text-align:center;
      color:var(--muted);
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.06);
    }

    .acoes-jogo{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .btn-acao{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 14px;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
      font-size:13px;
      border:none;
      cursor:pointer;
    }

    .btn-sumula{
      background:var(--gold);
      color:black;
    }

    .btn-secundario{
      background:#1a3f73;
      color:white;
    }

    .btn-sumula:hover,
    .btn-secundario:hover{
      opacity:.92;
      transform:translateY(-1px);
    }

    @media (max-width: 900px){
      .header-title{
        order:3;
        width:100%;
        text-align:center;
      }

      .header-left,
      .header-right{
        width:100%;
        justify-content:center;
      }

      .filtros{
        grid-template-columns:1fr;
      }

      .times{
        flex-direction:column;
        align-items:flex-start;
      }

      .placar{
        text-align:left;
        min-width:auto;
      }
    }

    @media (max-width: 600px){
      .header-top{
        flex-direction:column;
        align-items:center;
      }

      .header-title{
        order:2;
        width:100%;
        text-align:center;
      }

      .header-left{
        order:1;
        width:100%;
        display:flex;
        flex-direction:row;
        align-items:center;
        justify-content:center;
        gap:10px;
        flex-wrap:nowrap;
      }

      .header-right{
        display:none;
      }

      .top-btn{
        width:auto;
        min-width:0;
        flex:1;
        justify-content:center;
        padding:10px 12px;
        font-size:14px;
      }

      .menu{
        justify-content:flex-start;
        flex-wrap:nowrap;
        overflow-x:auto;
        padding:12px 4px;
        scrollbar-width:none;
      }

      .menu::-webkit-scrollbar{
        display:none;
      }

      .menu a{
        width:auto;
        min-width:max-content;
        flex:0 0 auto;
        text-align:center;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap header-top">
      <div class="header-left">
        <button class="top-btn btn-light" type="button" onclick="voltarPagina()">
          <i class="fa-solid fa-arrow-left"></i> Voltar
        </button>

        <a href="index.html" class="top-btn btn-light">
          <i class="fa-solid fa-house"></i> Página Inicial
        </a>
      </div>

      <div class="header-title">LIGA GOIANA DE FUTEBOL DE BASE</div>

      <div class="header-right"></div>
    </div>

    <div class="nav-bar">
      <div class="wrap">
        <div class="menu">
          <a href="index.html">Início</a>
          <a href="campeonatos.html">Campeonatos</a>
          <a href="tabela.html">Tabela</a>
          <a href="jogos.html" class="ativo">Jogos</a>
          <a href="times.html">Times</a>
          <a href="artilharia.html">Artilharia</a>
          <a href="cartoes.html">Cartões</a>
          <a href="suspensos.html">Suspensos</a>
          <a href="login.html">Login</a>
        </div>
      </div>
    </div>
  </header>

  <div class="wrap container">

    <div class="hero">
      <h2>Jogos</h2>
      <p>Acompanhe todos os jogos publicados da competição, com filtros por campeonato e categoria.</p>
    </div>

    <div class="filtros">
      <select id="filtroCampeonato">
        <option value="">Selecione o campeonato</option>
      </select>

      <select id="filtroCategoria">
        <option value="">Selecione a categoria</option>
      </select>
    </div>

    <div class="titulo" id="tituloPagina">Jogos</div>

    <div id="listaJogos"></div>

  </div>

  <script type="module">
    import { db } from "./firebase.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    let jogos = [];
    let times = [];
    let campeonatos = [];

    window.voltarPagina = function(){
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "index.html";
      }
    };

    function getParametro(nome){
      const params = new URLSearchParams(window.location.search);
      return params.get(nome);
    }

    function normalizarTexto(texto){
      return String(texto || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function valorCampo(obj, chaves, fallback = ""){
      for (const chave of chaves){
        if (obj && obj[chave] !== undefined && obj[chave] !== null && obj[chave] !== "") {
          return obj[chave];
        }
      }
      return fallback;
    }

    function obterIdCampeonato(doc){
      return valorCampo(doc, ["id", "campeonatoId"], "");
    }

    function obterNomeCampeonato(doc){
      return valorCampo(doc, ["nome", "campeonato", "titulo"], "");
    }

    function montarLinkPagina(pagina, campeonatoNome, categoria){
      const params = new URLSearchParams();

      if(campeonatoNome){
        params.set("campeonato", campeonatoNome);
      }

      if(categoria){
        params.set("categoria", categoria);
      }

      const query = params.toString();
      return query ? `${pagina}?${query}` : pagina;
    }

    function montarLinkCampeonatoPublico(campeonatoNome){
      const camp = campeonatos.find(c => normalizarTexto(obterNomeCampeonato(c)) === normalizarTexto(campeonatoNome));
      if(!camp) return "campeonatos.html";
      return `campeonato-publico.html?id=${obterIdCampeonato(camp)}`;
    }

    async function carregarDados(){
      const [snapJogos, snapTimes, snapCampeonatos] = await Promise.all([
        getDocs(collection(db, "jogos")),
        getDocs(collection(db, "times")),
        getDocs(collection(db, "campeonatos"))
      ]);

      jogos = [];
      times = [];
      campeonatos = [];

      snapJogos.forEach(docSnap => {
        jogos.push({ id: docSnap.id, ...docSnap.data() });
      });

      snapTimes.forEach(docSnap => {
        times.push({ id: docSnap.id, ...docSnap.data() });
      });

      snapCampeonatos.forEach(docSnap => {
        campeonatos.push({ id: docSnap.id, ...docSnap.data() });
      });
    }

    function pegarEscudo(nomeTime){
      const time = times.find(t => normalizarTexto(valorCampo(t, ["nome"], "")) === normalizarTexto(nomeTime));
      return valorCampo(time, ["escudo", "logo"], "logo-liga.jfif");
    }

    function obterCategoriasDoCampeonato(camp){
      const lista = valorCampo(camp, ["categorias"], []);
      if (Array.isArray(lista) && lista.length) return lista;

      const campId = obterIdCampeonato(camp);
      const nomeCamp = obterNomeCampeonato(camp);
      const setCategorias = new Set();

      jogos.forEach(j => {
        const jogoCampId = valorCampo(j, ["campeonatoId"], "");
        const jogoCampNome = valorCampo(j, ["campeonato", "nomeCampeonato"], "");
        const categoria = valorCampo(j, ["categoria"], "");

        const mesmoCamp = (campId && jogoCampId === campId) ||
          (!campId && normalizarTexto(jogoCampNome) === normalizarTexto(nomeCamp));

        if(mesmoCamp && categoria){
          setCategorias.add(categoria);
        }
      });

      return Array.from(setCategorias).sort((a,b) => String(a).localeCompare(String(b), "pt-BR"));
    }

    function preencherFiltros(){
      const selectCamp = document.getElementById("filtroCampeonato");
      selectCamp.innerHTML = '<option value="">Selecione o campeonato</option>';

      campeonatos
        .sort((a,b) => obterNomeCampeonato(a).localeCompare(obterNomeCampeonato(b), "pt-BR"))
        .forEach(c => {
          const option = document.createElement("option");
          option.value = obterIdCampeonato(c);
          option.textContent = obterNomeCampeonato(c);
          selectCamp.appendChild(option);
        });
    }

    function preencherCategorias(){
      const selectCat = document.getElementById("filtroCategoria");
      const campeonatoId = document.getElementById("filtroCampeonato").value;

      selectCat.innerHTML = '<option value="">Selecione a categoria</option>';

      if(!campeonatoId) return;

      const camp = campeonatos.find(c => obterIdCampeonato(c) === campeonatoId);
      if(!camp) return;

      const categorias = obterCategoriasDoCampeonato(camp);
      categorias.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        selectCat.appendChild(option);
      });
    }

    function aplicarFiltrosDaURL(){
      const campeonatoURL = getParametro("campeonato");
      const categoriaURL = getParametro("categoria");

      if(campeonatoURL){
        const camp = campeonatos.find(c => normalizarTexto(obterNomeCampeonato(c)) === normalizarTexto(campeonatoURL));
        if(camp){
          document.getElementById("filtroCampeonato").value = obterIdCampeonato(camp);
          preencherCategorias();
        }
      }

      if(categoriaURL){
        const selectCat = document.getElementById("filtroCategoria");
        const opcoes = Array.from(selectCat.options);
        const opcao = opcoes.find(op => normalizarTexto(op.value) === normalizarTexto(categoriaURL));
        if(opcao){
          selectCat.value = opcao.value;
        }
      }
    }

    function formatarDataHora(dataString){
      if(!dataString) return "-";

      const data = new Date(dataString);
      if(isNaN(data.getTime())) return String(dataString);

      const dia = String(data.getDate()).padStart(2, "0");
      const mes = String(data.getMonth() + 1).padStart(2, "0");
      const ano = data.getFullYear();
      const hora = String(data.getHours()).padStart(2, "0");
      const minuto = String(data.getMinutes()).padStart(2, "0");

      return `${dia}/${mes}/${ano} - ${hora}:${minuto}`;
    }

    function numeroRodada(valor){
      if(valor === undefined || valor === null || valor === "") return 999999;

      const texto = String(valor);
      const numero = parseInt(texto.replace(/\D/g, ""), 10);

      return isNaN(numero) ? 999999 : numero;
    }

    function jogosFiltrados(){
      const campeonatoId = document.getElementById("filtroCampeonato").value;
      const categoria = document.getElementById("filtroCategoria").value;

      if(!campeonatoId) return [];

      const campeonatoSelecionado = campeonatos.find(c => obterIdCampeonato(c) === campeonatoId);
      if(!campeonatoSelecionado) return [];

      const nomeCamp = obterNomeCampeonato(campeonatoSelecionado);

      return jogos.filter(j => {
        const jogoCampId = valorCampo(j, ["campeonatoId"], "");
        const jogoCampNome = valorCampo(j, ["campeonato", "nomeCampeonato"], "");
        const jogoCategoria = valorCampo(j, ["categoria"], "");

        const mesmoCamp = jogoCampId === campeonatoId ||
          normalizarTexto(jogoCampNome) === normalizarTexto(nomeCamp);

        return mesmoCamp && (!categoria || jogoCategoria === categoria);
      });
    }

    window.carregarJogos = function(){
      const lista = document.getElementById("listaJogos");
      const campeonatoId = document.getElementById("filtroCampeonato").value;
      const categoria = document.getElementById("filtroCategoria").value;
      const campeonatoSelecionado = campeonatos.find(c => obterIdCampeonato(c) === campeonatoId) || null;
      const campeonatoNome = campeonatoSelecionado ? obterNomeCampeonato(campeonatoSelecionado) : "";

      let filtrados = jogosFiltrados();

      document.getElementById("tituloPagina").textContent =
        `Jogos${categoria ? " - " + categoria : ""}${campeonatoNome ? " | " + campeonatoNome : ""}`;

      if(!campeonatoId){
        lista.innerHTML = `<div class="vazio">Selecione um campeonato para ver os jogos.</div>`;
        return;
      }

      if(filtrados.length === 0){
        lista.innerHTML = `<div class="vazio">Nenhum jogo encontrado.</div>`;
        return;
      }

      filtrados.sort((a, b) => {
        const rodadaA = numeroRodada(valorCampo(a, ["rodada"], ""));
        const rodadaB = numeroRodada(valorCampo(b, ["rodada"], ""));
        if(rodadaA !== rodadaB) return rodadaA - rodadaB;

        return String(valorCampo(a, ["data"], "")).localeCompare(String(valorCampo(b, ["data"], "")));
      });

      const grupos = {};

      filtrados.forEach(j => {
        const chave = valorCampo(j, ["rodada"], "")
          ? `Rodada ${valorCampo(j, ["rodada"], "")}`
          : "Sem rodada";

        if(!grupos[chave]) grupos[chave] = [];
        grupos[chave].push(j);
      });

      lista.innerHTML = "";

      Object.keys(grupos).forEach(rodada => {
        lista.innerHTML += `<div class="rodada">${rodada}</div>`;

        grupos[rodada].forEach(j => {
          const status = normalizarTexto(valorCampo(j, ["status"], ""));
          const finalizado = status === "sumula_enviada" || status === "finalizado";
          const placar = finalizado
            ? `${Number(valorCampo(j, ["golsA"], 0))} x ${Number(valorCampo(j, ["golsB"], 0))}`
            : "x";

          const nomeCampJogo = valorCampo(j, ["campeonato", "nomeCampeonato"], campeonatoNome);
          const categoriaJogo = valorCampo(j, ["categoria"], "");
          const linkCampeonato = montarLinkCampeonatoPublico(nomeCampJogo || "");
          const linkTabela = montarLinkPagina("tabela.html", nomeCampJogo || "", categoriaJogo || "");
          const linkJogos = montarLinkPagina("jogos.html", nomeCampJogo || "", categoriaJogo || "");
          const linkSuspensos = montarLinkPagina("suspensos.html", nomeCampJogo || "", categoriaJogo || "");

          lista.innerHTML += `
            <div class="jogo">
              <div class="topo-jogo">
                <div class="times">
                  <div class="time">
                    <img src="${pegarEscudo(valorCampo(j, ["timeA"], ""))}" class="escudo" alt="${valorCampo(j, ["timeA"], "-")}">
                    <span>${valorCampo(j, ["timeA"], "-")}</span>
                  </div>

                  <div class="placar">${placar}</div>

                  <div class="time">
                    <img src="${pegarEscudo(valorCampo(j, ["timeB"], ""))}" class="escudo" alt="${valorCampo(j, ["timeB"], "-")}">
                    <span>${valorCampo(j, ["timeB"], "-")}</span>
                  </div>
                </div>
              </div>

              <div class="info">
                ${formatarDataHora(valorCampo(j, ["data"], ""))}<br>
                ${valorCampo(j, ["local"], "-")}<br>
                Campeonato: ${nomeCampJogo || "-"} | Categoria: ${categoriaJogo || "-"}
              </div>

              <div class="status ${finalizado ? "finalizado" : "agendado"}">
                ${finalizado ? "Finalizado" : "Agendado"}
              </div>

              <div class="acoes-jogo">
                ${finalizado ? `
                  <a class="btn-acao btn-sumula" href="sumula-publica.html?id=${j.id}">
                    <i class="fa-solid fa-file-lines"></i> Ver Súmula
                  </a>
                ` : ""}
                <a class="btn-acao btn-secundario" href="${linkCampeonato}">
                  <i class="fa-solid fa-trophy"></i> Campeonato
                </a>
                <a class="btn-acao btn-secundario" href="${linkTabela}">
                  <i class="fa-solid fa-table"></i> Tabela
                </a>
                <a class="btn-acao btn-secundario" href="${linkJogos}">
                  <i class="fa-solid fa-calendar-days"></i> Jogos
                </a>
                <a class="btn-acao btn-secundario" href="${linkSuspensos}">
                  <i class="fa-solid fa-ban"></i> Suspensos
                </a>
              </div>
            </div>
          `;
        });
      });
    };

    document.getElementById("filtroCampeonato").addEventListener("change", () => {
      preencherCategorias();
      document.getElementById("filtroCategoria").value = "";
      carregarJogos();
    });

    document.getElementById("filtroCategoria").addEventListener("change", carregarJogos);

    await carregarDados();
    preencherFiltros();
    aplicarFiltrosDaURL();
    carregarJogos();
  </script>
