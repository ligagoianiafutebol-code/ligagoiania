<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogos - LIGA GOIANA DE FUTEBOL DE BASE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-soft:rgba(247,198,0,.12);
      --gold-line:rgba(247,198,0,.24);
      --white:#ffffff;
      --muted:#d8e1ef;
      --green:#1b5e20;
      --yellow-dark:#7a5a00;
      --shadow:0 8px 22px rgba(0,0,0,.28);
      --transition:.25s ease;
      --max:1180px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:
        linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
    }

    a{
      text-decoration:none;
      color:inherit;
      transition:var(--transition);
    }

    button{
      font-family:inherit;
      cursor:pointer;
      transition:var(--transition);
      border:none;
    }

    .wrap{
      width:min(100% - 28px, var(--max));
      margin:0 auto;
    }

    header{
      background:rgba(8,23,44,.96);
      border-bottom:3px solid var(--gold);
      box-shadow:var(--shadow);
    }

    .header-top{
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:24px;
      font-weight:700;
      color:var(--white);
    }

    .top-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
    }

    .btn-light{
      background:#fff4cf;
      color:#111;
    }

    .btn-light:hover{
      background:var(--gold);
      transform:translateY(-2px);
    }

    .nav-bar{
      background:rgba(16,42,82,.95);
      border-top:1px solid rgba(255,255,255,.06);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .menu{
      display:flex;
      justify-content:center;
      gap:10px;
      padding:12px 0;
      flex-wrap:wrap;
    }

    .menu a{
      color:white;
      text-decoration:none;
      font-weight:700;
      font-size:14px;
      background:#0d2346;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid transparent;
    }

    .menu a:hover{
      color:var(--gold);
      background:var(--gold-soft);
      border-color:var(--gold-line);
    }

    .menu a.ativo{
      background:var(--gold);
      color:black;
    }

    .container{
      max-width:1100px;
      margin:auto;
      padding:24px 0 34px;
    }

    .hero{
      background:linear-gradient(135deg,#102a52,#0d2346);
      border:1px solid var(--gold-line);
      border-radius:18px;
      padding:22px;
      margin-bottom:20px;
      box-shadow:var(--shadow);
    }

    .hero h2{
      margin:0 0 8px;
      color:var(--gold);
      font-size:28px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:15px;
      max-width:850px;
    }

    .filtros{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:20px;
    }

    select{
      width:100%;
      padding:13px;
      border:none;
      border-radius:10px;
      box-sizing:border-box;
      font-size:14px;
      background:#f5f7fb;
      color:#111;
    }

    select:focus{
      outline:2px solid rgba(247,198,0,.5);
    }

    .titulo{
      font-size:24px;
      font-weight:700;
      color:var(--gold);
      margin-bottom:16px;
    }

    .rodada{
      font-weight:700;
      margin:20px 0 12px;
      font-size:19px;
      color:var(--gold);
    }

    .jogo{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:16px;
      border-radius:16px;
      margin-bottom:12px;
      border:1px solid rgba(255,230,0,.10);
      box-shadow:var(--shadow);
      transition:var(--transition);
    }

    .jogo:hover{
      transform:translateY(-2px);
      border-color:var(--gold-line);
    }

    .topo-jogo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .times{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      font-size:16px;
      font-weight:700;
      width:100%;
    }

    .time{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .escudo{
      width:32px;
      height:32px;
      object-fit:contain;
      border-radius:50%;
      background:#1a3f73;
      border:1px solid rgba(255,255,255,.12);
      flex-shrink:0;
    }

    .placar{
      font-weight:700;
      font-size:20px;
      color:var(--gold);
      min-width:90px;
      text-align:center;
      background:rgba(247,198,0,.08);
      border:1px solid var(--gold-line);
      border-radius:10px;
      padding:8px 12px;
    }

    .info{
      font-size:13px;
      color:var(--muted);
      margin-top:10px;
      line-height:1.6;
    }

    .status{
      display:inline-block;
      margin-top:10px;
      padding:7px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:#0d2346;
    }

    .finalizado{
      background:var(--green);
    }

    .agendado{
      background:var(--yellow-dark);
    }

    .vazio{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:30px;
      border-radius:14px;
      text-align:center;
      color:var(--muted);
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.06);
    }

    .acoes-jogo{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .btn-acao{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 14px;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
      font-size:13px;
      border:none;
      cursor:pointer;
    }

    .btn-sumula{
      background:var(--gold);
      color:black;
    }

    .btn-secundario{
      background:#1a3f73;
      color:white;
    }

    .btn-sumula:hover,
    .btn-secundario:hover{
      opacity:.92;
      transform:translateY(-1px);
    }

    @media (max-width: 900px){
      .header-title{
        order:3;
        width:100%;
        text-align:center;
      }

      .header-left,
      .header-right{
        width:100%;
        justify-content:center;
      }

      .filtros{
        grid-template-columns:1fr;
      }

      .times{
        flex-direction:column;
        align-items:flex-start;
      }

      .placar{
        text-align:left;
        min-width:auto;
      }
    }

    @media (max-width: 600px){
      .top-btn{
        width:100%;
        justify-content:center;
      }

      .header-left,
      .header-right{
        flex-direction:column;
        align-items:stretch;
      }

      .menu a{
        width:100%;
        text-align:center;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap header-top">
      <div class="header-left">
        <button class="top-btn btn-light" type="button" onclick="voltarPagina()">
          <i class="fa-solid fa-arrow-left"></i> Voltar
        </button>

        <a href="index.html" class="top-btn btn-light">
          <i class="fa-solid fa-house"></i> Página Inicial
        </a>
      </div>

      <div class="header-title">LIGA GOIANA DE FUTEBOL DE BASE</div>

      <div class="header-right"></div>
    </div>

    <div class="nav-bar">
      <div class="wrap">
        <div class="menu">
          <a href="index.html">Início</a>
          <a href="campeonatos.html">Campeonatos</a>
          <a href="tabela.html">Tabela</a>
          <a href="jogos.html" class="ativo">Jogos</a>
          <a href="artilharia.html">Artilharia</a>
          <a href="cartoes.html">Cartões</a>
          <a href="suspensos.html">Suspensos</a>
          <a href="login.html">Login</a>
        </div>
      </div>
    </div>
  </header>

  <div class="wrap container">

    <div class="hero">
      <h2>Jogos</h2>
      <p>Acompanhe todos os jogos publicados da competição, com filtros por campeonato e categoria.</p>
    </div>

    <div class="filtros">
      <select id="filtroCampeonato" onchange="carregarJogos()">
        <option value="">Selecione o campeonato</option>
      </select>

      <select id="filtroCategoria" onchange="carregarJogos()">
        <option value="">Selecione a categoria</option>
        <option value="Sub-11">Sub-11</option>
        <option value="Sub-12">Sub-12</option>
        <option value="Sub-13">Sub-13</option>
        <option value="Sub-14">Sub-14</option>
        <option value="Sub-15">Sub-15</option>
        <option value="Sub-16">Sub-16</option>
        <option value="Sub-17">Sub-17</option>
        <option value="Sub-18">Sub-18</option>
        <option value="Sub-19">Sub-19</option>
        <option value="Sub-20">Sub-20</option>
        <option value="Sub-21">Sub-21</option>
      </select>
    </div>

    <div class="titulo" id="tituloPagina">Jogos</div>

    <div id="listaJogos"></div>

  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    let jogos = [];
    let times = [];
    let campeonatos = [];

    window.voltarPagina = function(){
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "index.html";
      }
    };

    function getParametro(nome){
      const params = new URLSearchParams(window.location.search);
      return params.get(nome);
    }

    function normalizarTexto(texto){
      return String(texto || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function montarLinkPagina(pagina, campeonato, categoria){
      const params = new URLSearchParams();

      if(campeonato){
        params.set("campeonato", campeonato);
      }

      if(categoria){
        params.set("categoria", categoria);
      }

      const query = params.toString();
      return query ? `${pagina}?${query}` : pagina;
    }

    function montarLinkCampeonatoPublico(campeonato){
      const camp = campeonatos.find(c => normalizarTexto(c.nome) === normalizarTexto(campeonato));
      if(!camp) return "campeonatos.html";
      return `campeonato-publico.html?id=${camp.id}`;
    }

    async function carregarDados(){
      const snapJogos = await getDocs(collection(db, "jogos"));
      jogos = [];
      snapJogos.forEach(docSnap => {
        jogos.push({ id: docSnap.id, ...docSnap.data() });
      });

      const snapTimes = await getDocs(collection(db, "times"));
      times = [];
      snapTimes.forEach(docSnap => {
        times.push({ id: docSnap.id, ...docSnap.data() });
      });

      const snapCampeonatos = await getDocs(collection(db, "campeonatos"));
      campeonatos = [];
      snapCampeonatos.forEach(docSnap => {
        campeonatos.push({ id: docSnap.id, ...docSnap.data() });
      });
    }

    function pegarEscudo(nomeTime){
      const time = times.find(t => t.nome === nomeTime);
      return time?.escudo || "logo-liga.jfif";
    }

    function preencherFiltros(){
      const selectCamp = document.getElementById("filtroCampeonato");

      const campeonatosLista = [...new Set(jogos.map(j => j.campeonato).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"pt-BR"));

      selectCamp.innerHTML = '<option value="">Selecione o campeonato</option>';

      campeonatosLista.forEach(c => {
        selectCamp.innerHTML += `<option value="${c}">${c}</option>`;
      });
    }

    function aplicarFiltrosDaURL(){
      const campeonatoURL = getParametro("campeonato");
      const categoriaURL = getParametro("categoria");

      if(campeonatoURL){
        const selectCamp = document.getElementById("filtroCampeonato");
        const opcoesCamp = Array.from(selectCamp.options);
        const opcaoCamp = opcoesCamp.find(op => normalizarTexto(op.value) === normalizarTexto(campeonatoURL));

        if(opcaoCamp){
          selectCamp.value = opcaoCamp.value;
        }
      }

      if(categoriaURL){
        const selectCat = document.getElementById("filtroCategoria");
        const opcoesCat = Array.from(selectCat.options);
        const opcaoCat = opcoesCat.find(op => normalizarTexto(op.value) === normalizarTexto(categoriaURL));

        if(opcaoCat){
          selectCat.value = opcaoCat.value;
        }
      }
    }

    function formatarDataHora(dataString){
      if(!dataString) return "-";

      const data = new Date(dataString);
      if(isNaN(data.getTime())) return dataString;

      const dia = String(data.getDate()).padStart(2, "0");
      const mes = String(data.getMonth() + 1).padStart(2, "0");
      const ano = data.getFullYear();
      const hora = String(data.getHours()).padStart(2, "0");
      const minuto = String(data.getMinutes()).padStart(2, "0");

      return `${dia}/${mes}/${ano} - ${hora}:${minuto}`;
    }

    function numeroRodada(valor){
      if(valor === undefined || valor === null || valor === "") return 999999;

      const texto = String(valor);
      const numero = parseInt(texto.replace(/\D/g, ""), 10);

      return isNaN(numero) ? 999999 : numero;
    }

    window.carregarJogos = function(){
      const lista = document.getElementById("listaJogos");
      const campeonato = document.getElementById("filtroCampeonato").value;
      const categoria = document.getElementById("filtroCategoria").value;

      let filtrados = jogos.filter(j =>
        (!campeonato || j.campeonato === campeonato) &&
        (!categoria || j.categoria === categoria)
      );

      document.getElementById("tituloPagina").textContent =
        `Jogos${categoria ? " - " + categoria : ""}${campeonato ? " | " + campeonato : ""}`;

      if(filtrados.length === 0){
        lista.innerHTML = `<div class="vazio">Nenhum jogo encontrado.</div>`;
        return;
      }

      filtrados.sort((a, b) => {
        const rodadaA = numeroRodada(a.rodada);
        const rodadaB = numeroRodada(b.rodada);

        if(rodadaA !== rodadaB) return rodadaA - rodadaB;
        return (a.data || "").localeCompare(b.data || "");
      });

      const grupos = {};

      filtrados.forEach(j => {
        const chave = j.rodada ? `Rodada ${j.rodada}` : "Sem rodada";
        if(!grupos[chave]) grupos[chave] = [];
        grupos[chave].push(j);
      });

      lista.innerHTML = "";

      Object.keys(grupos).forEach(rodada => {
        lista.innerHTML += `<div class="rodada">${rodada}</div>`;

        grupos[rodada].forEach(j => {
          const finalizado = j.status === "sumula_enviada";
          const placar = finalizado
            ? `${Number(j.golsA || 0)} x ${Number(j.golsB || 0)}`
            : "x";

          const linkCampeonato = montarLinkCampeonatoPublico(j.campeonato || "");
          const linkTabela = montarLinkPagina("tabela.html", j.campeonato || "", j.categoria || "");
          const linkJogos = montarLinkPagina("jogos.html", j.campeonato || "", j.categoria || "");
          const linkSuspensos = montarLinkPagina("suspensos.html", j.campeonato || "", j.categoria || "");

          lista.innerHTML += `
            <div class="jogo">
              <div class="topo-jogo">
                <div class="times">
                  <div class="time">
                    <img src="${pegarEscudo(j.timeA)}" class="escudo" alt="${j.timeA}">
                    <span>${j.timeA || "-"}</span>
                  </div>

                  <div class="placar">${placar}</div>

                  <div class="time">
                    <img src="${pegarEscudo(j.timeB)}" class="escudo" alt="${j.timeB}">
                    <span>${j.timeB || "-"}</span>
                  </div>
                </div>
              </div>

              <div class="info">
                ${formatarDataHora(j.data)}<br>
                ${j.local || "-"}<br>
                Campeonato: ${j.campeonato || "-"} | Categoria: ${j.categoria || "-"}
              </div>

              <div class="status ${finalizado ? "finalizado" : "agendado"}">
                ${finalizado ? "Finalizado" : "Agendado"}
              </div>

              <div class="acoes-jogo">
                ${finalizado ? `
                  <a class="btn-acao btn-sumula" href="sumula-publica.html?id=${j.id}">
                    <i class="fa-solid fa-file-lines"></i> Ver Súmula
                  </a>
                ` : ""}
                <a class="btn-acao btn-secundario" href="${linkCampeonato}">
                  <i class="fa-solid fa-trophy"></i> Campeonato
                </a>
                <a class="btn-acao btn-secundario" href="${linkTabela}">
                  <i class="fa-solid fa-table"></i> Tabela
                </a>
                <a class="btn-acao btn-secundario" href="${linkJogos}">
                  <i class="fa-solid fa-calendar-days"></i> Jogos
                </a>
                <a class="btn-acao btn-secundario" href="${linkSuspensos}">
                  <i class="fa-solid fa-ban"></i> Suspensos
                </a>
              </div>
            </div>
          `;
        });
      });
    };

    await carregarDados();
    preencherFiltros();
    aplicarFiltrosDaURL();
    carregarJogos();
  </script>

</body>
</html>
