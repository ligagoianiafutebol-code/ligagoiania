<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos - Liga Goiânia</title>

<style>
body{
font-family: Arial;
margin:0;
background:#0b1f3a;
color:white;
}

header{
background:#0b1f3a;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
padding:12px;
}

.rodada{
font-weight:bold;
margin:15px 0 8px;
}

.jogo{
background:#102a52;
padding:12px;
border-radius:10px;
margin-bottom:8px;
}

.times{
display:flex;
justify-content:space-between;
font-size:15px;
}

.info{
font-size:13px;
opacity:0.8;
margin-top:5px;
}

.placar{
font-weight:bold;
font-size:16px;
}
</style>

</head>
<body>

<header>
Jogos - Sub-15
</header>

<div class="container">

<div class="rodada">Rodada 1</div>

<div class="jogo">
<div class="times">
Atlético GO 
<span class="placar">2 x 1</span>
Vila Nova
</div>
<div class="info">Campo 1 - 10:00</div>
</div>

<div class="jogo">
<div class="times">
Campinas 
<span class="placar">1 x 1</span>
Hidrolândia
</div>
<div class="info">Campo 2 - 11:30</div>
</div>

<div class="rodada">Rodada 2</div>

<div class="jogo">
<div class="times">
Vila Nova 
<span class="placar">- x -</span>
Campinas
</div>
<div class="info">Sábado - 09:00</div>
</div>

</div>

</body>
</html>
