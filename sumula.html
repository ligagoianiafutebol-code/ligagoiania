<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Súmula Oficial</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f3a;
  color:white;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
.topo{
  background:#102a52;
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}
.topo-flex{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}
.logo{
  height:80px;
  object-fit:contain;
}
.meio-topo{
  text-align:center;
  flex:1;
}
.times{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}
.time-box{
  background:#102a52;
  border-radius:12px;
  padding:16px;
}
.time-top{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:15px;
}
.escudo{
  width:70px;
  height:70px;
  object-fit:contain;
  border-radius:50%;
  background:#1a3f73;
}
.nome-time{
  font-size:22px;
  font-weight:bold;
  color:#f7c600;
}
.jogador{
  display:grid;
  grid-template-columns:70px 1fr auto auto;
  gap:8px;
  align-items:center;
  background:#0d2346;
  padding:8px;
  border-radius:8px;
  margin-bottom:8px;
}
.jogador input{
  padding:8px;
  border:none;
  border-radius:6px;
  box-sizing:border-box;
}
.jogador button{
  background:#b30000;
  color:white;
  border:none;
  border-radius:6px;
  padding:8px 10px;
  cursor:pointer;
}
.botao-add{
  background:#f7c600;
  color:black;
  border:none;
  border-radius:8px;
  padding:10px 14px;
  font-weight:bold;
  cursor:pointer;
  margin-top:8px;
}
.infos{
  background:#102a52;
  border-radius:12px;
  padding:16px;
  margin-top:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
.grid input, .grid textarea{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
}
.grid textarea{
  min-height:120px;
  grid-column:1 / -1;
}
.finalizar{
  margin-top:16px;
  background:#f7c600;
  color:black;
  border:none;
  border-radius:8px;
  padding:12px 16px;
  font-weight:bold;
  cursor:pointer;
}
@media (max-width: 900px){
  .times, .grid{
    grid-template-columns:1fr;
  }
  .jogador{
    grid-template-columns:60px 1fr;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="topo">
    <div class="topo-flex">
      <img src="logo-liga.jfif" class="logo" alt="Liga">
      <div class="meio-topo">
        <h2 style="margin:0;color:#f7c600;">SÚMULA OFICIAL</h2>
        <div id="campeonatoInfo"></div>
        <div id="dadosJogoInfo" style="margin-top:6px;"></div>
      </div>
      <img id="logoCampeonato" src="logo-campeonato.png" class="logo" alt="Campeonato">
    </div>
  </div>

  <div class="times">
    <div class="time-box">
      <div class="time-top">
        <img id="escudoA" class="escudo" src="logo-liga.jfif" alt="Escudo A">
        <div class="nome-time" id="nomeTimeA">Time A</div>
      </div>
      <div id="listaA"></div>
      <button class="botao-add" onclick="adicionarJogadorManual('A')">+ Adicionar jogador</button>
    </div>

    <div class="time-box">
      <div class="time-top">
        <img id="escudoB" class="escudo" src="logo-liga.jfif" alt="Escudo B">
        <div class="nome-time" id="nomeTimeB">Time B</div>
      </div>
      <div id="listaB"></div>
      <button class="botao-add" onclick="adicionarJogadorManual('B')">+ Adicionar jogador</button>
    </div>
  </div>

  <div class="infos">
    <div class="grid">
      <div>
        <label>Gols mandante</label>
        <input id="golsA" type="number" min="0" value="0">
      </div>
      <div>
        <label>Gols visitante</label>
        <input id="golsB" type="number" min="0" value="0">
      </div>
      <div>
        <label>Árbitro</label>
        <input id="nomeArbitro" readonly>
      </div>
      <div>
        <label>Assistente</label>
        <input id="nomeAssistente" readonly>
      </div>
      <div>
        <label>Cartões amarelos</label>
        <input id="amarelos" placeholder="Ex: João 2, Pedro 1">
      </div>
      <div>
        <label>Cartões vermelhos</label>
        <input id="vermelhos" placeholder="Ex: Lucas Souza">
      </div>
      <div>
        <label>Artilheiros / gols</label>
        <input id="artilharia" placeholder="Ex: João 2, Pedro 1">
      </div>
      <div>
        <label>Status</label>
        <input id="statusSumula" value="finalizada" readonly>
      </div>
      <div style="grid-column:1 / -1;">
        <label>Observações do árbitro</label>
        <textarea id="observacoes" placeholder="Digite aqui observações, ocorrências, ajustes do dia, etc."></textarea>
      </div>
    </div>

    <button class="finalizar" onclick="salvarSumula()">Finalizar Súmula</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  getDoc,
  doc,
  setDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let jogoId = "";
let jogoAtual = null;
let jogadoresA = [];
let jogadoresB = [];

function getParametro(nome){
  const params = new URLSearchParams(window.location.search);
  return params.get(nome);
}

function renderJogadores(lado){
  const lista = document.getElementById(lado === "A" ? "listaA" : "listaB");
  const jogadores = lado === "A" ? jogadoresA : jogadoresB;

  lista.innerHTML = "";

  jogadores.forEach((j, index) => {
    lista.innerHTML += `
      <div class="jogador">
        <input value="${j.numero || ""}" placeholder="#" onchange="atualizarCampo('${lado}', ${index}, 'numero', this.value)">
        <input value="${j.nome || ""}" placeholder="Nome do jogador" onchange="atualizarCampo('${lado}', ${index}, 'nome', this.value)">
        <input value="${j.posicao || ""}" placeholder="Posição" onchange="atualizarCampo('${lado}', ${index}, 'posicao', this.value)">
        <button onclick="removerJogador('${lado}', ${index})">X</button>
      </div>
    `;
  });
}

window.atualizarCampo = function(lado, index, campo, valor){
  if(lado === "A"){
    jogadoresA[index][campo] = valor;
  }else{
    jogadoresB[index][campo] = valor;
  }
};

window.removerJogador = function(lado, index){
  if(lado === "A"){
    jogadoresA.splice(index, 1);
    renderJogadores("A");
  }else{
    jogadoresB.splice(index, 1);
    renderJogadores("B");
  }
};

window.adicionarJogadorManual = function(lado){
  const novo = { nome:"", numero:"", posicao:"" };
  if(lado === "A"){
    jogadoresA.push(novo);
    renderJogadores("A");
  }else{
    jogadoresB.push(novo);
    renderJogadores("B");
  }
};

async function buscarEscudoDoTime(nomeTime, imgId){
  const snap = await getDocs(collection(db, "times"));
  snap.forEach(d => {
    const t = d.data();
    if(t.nome === nomeTime && t.escudo){
      document.getElementById(imgId).src = t.escudo;
    }
  });
}

async function carregarJogo(){
  jogoId = getParametro("id");
  if(!jogoId){
    alert("Jogo não informado.");
    return;
  }

  const jogoRef = doc(db, "jogos", jogoId);
  const jogoSnap = await getDoc(jogoRef);

  if(!jogoSnap.exists()){
    alert("Jogo não encontrado.");
    return;
  }

  jogoAtual = jogoSnap.data();

  document.getElementById("nomeTimeA").innerText = jogoAtual.timeA;
  document.getElementById("nomeTimeB").innerText = jogoAtual.timeB;
  document.getElementById("campeonatoInfo").innerText = jogoAtual.campeonato || "";
  document.getElementById("dadosJogoInfo").innerText = `${jogoAtual.categoria || ""} | ${jogoAtual.data || ""} | ${jogoAtual.local || ""}`;
  document.getElementById("nomeArbitro").value = jogoAtual.arbitro || "";
  document.getElementById("nomeAssistente").value = jogoAtual.assistente || "";

  if(jogoAtual.logoCampeonato){
    document.getElementById("logoCampeonato").src = jogoAtual.logoCampeonato;
  }

  buscarEscudoDoTime(jogoAtual.timeA, "escudoA");
  buscarEscudoDoTime(jogoAtual.timeB, "escudoB");

  const jogadoresSnap = await getDocs(collection(db, "jogadores"));

  jogadoresA = [];
  jogadoresB = [];

  jogadoresSnap.forEach(d => {
    const j = d.data();

    const categoriasJogador = j.categorias || [];
    const categoriaOk = categoriasJogador.includes(jogoAtual.categoria);

    if(j.time === jogoAtual.timeA && categoriaOk){
      jogadoresA.push({
        nome: j.nome || "",
        numero: j.numero || "",
        posicao: j.posicao || ""
      });
    }

    if(j.time === jogoAtual.timeB && categoriaOk){
      jogadoresB.push({
        nome: j.nome || "",
        numero: j.numero || "",
        posicao: j.posicao || ""
      });
    }
  });

  jogadoresA.sort((a,b)=>(Number(a.numero)||999)-(Number(b.numero)||999));
  jogadoresB.sort((a,b)=>(Number(a.numero)||999)-(Number(b.numero)||999));

  renderJogadores("A");
  renderJogadores("B");
}

window.salvarSumula = async function(){
  if(!jogoId || !jogoAtual) return alert("Jogo não carregado.");

  const dados = {
    jogoId: jogoId,
    campeonato: jogoAtual.campeonato || "",
    categoria: jogoAtual.categoria || "",
    data: jogoAtual.data || "",
    local: jogoAtual.local || "",
    timeA: jogoAtual.timeA || "",
    timeB: jogoAtual.timeB || "",
    arbitro: jogoAtual.arbitro || "",
    assistente: jogoAtual.assistente || "",
    logoCampeonato: jogoAtual.logoCampeonato || "",
    golsA: Number(document.getElementById("golsA").value || 0),
    golsB: Number(document.getElementById("golsB").value || 0),
    amarelos: document.getElementById("amarelos").value.trim(),
    vermelhos: document.getElementById("vermelhos").value.trim(),
    artilharia: document.getElementById("artilharia").value.trim(),
    observacoes: document.getElementById("observacoes").value.trim(),
    jogadoresA: jogadoresA,
    jogadoresB: jogadoresB,
    status: "finalizada",
    enviadaEm: new Date().toISOString()
  };

  await setDoc(doc(db, "sumulas", jogoId), dados);
  await updateDoc(doc(db, "jogos", jogoId), { status: "sumula_enviada" });

  alert("Súmula finalizada e salva com sucesso!");
};

await carregarJogo();
</script>

</body>
</html>
