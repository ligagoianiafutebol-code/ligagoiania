<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Liga Goiânia</title>

<style>
body{
font-family: Arial;
margin:0;
background:#0b1f3a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.box{
background:#102a52;
padding:25px;
border-radius:12px;
width:90%;
max-width:360px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

h1{
text-align:center;
font-size:24px;
margin-bottom:20px;
color:white;
}

input, select{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#f7c600;
color:black;
font-weight:bold;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
}

small{
display:block;
text-align:center;
margin-top:12px;
opacity:0.8;
}
</style>
</head>
<body>

<div class="box">
<h1>Login Liga Goiânia</h1>

<select>
<option>Administrador</option>
<option>Técnico</option>
<option>Árbitro</option>
<option>Assistente</option>
</select>

<input type="email" placeholder="Seu email">
<input type="password" placeholder="Sua senha">

<button>Entrar</button>

<small>ligagoiania.com.br</small>
</div>

</body>
</html>
