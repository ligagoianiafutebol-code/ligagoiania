<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Goiana de Futebol de Base - Login</title>

<style>
body{
font-family:Arial;
margin:0;
background:#0b1f3a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.box{
background:#102a52;
padding:25px;
border-radius:12px;
width:90%;
max-width:360px;
}
h1{text-align:center;font-size:22px;margin-bottom:20px;}
input, select{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}
button{
width:100%;
padding:12px;
background:#f7c600;
color:black;
font-weight:bold;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h1>Login Liga Goiana</h1>

<select>
<option>Administrador</option>
<option>Técnico</option>
<option>Árbitro</option>
<option>Assistente</option>
</select>

<input id="email" type="email" placeholder="Seu email">
<input id="senha" type="password" placeholder="Sua senha">

<button onclick="login()">Entrar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.firebasestorage.app",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  signInWithEmailAndPassword(auth, email, senha)
    .then(() => {
      alert("Login realizado com sucesso");
      window.location.href = "admin.html";
    })
    .catch((error) => {
      alert("Erro: " + error.message);
    });
}

</script>

</body>
</html>
