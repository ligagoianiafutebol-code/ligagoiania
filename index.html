<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liga Goiana de Futebol de Base</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --yellow:#ffe600;
      --yellow-2:#ffd000;
      --yellow-soft:rgba(255,230,0,.14);
      --yellow-soft-2:rgba(255,230,0,.08);
      --white:#ffffff;
      --muted:#d7dfeb;
      --line:rgba(255,230,0,.18);
      --line-soft:rgba(255,255,255,.08);
      --shadow:0 14px 32px rgba(0,0,0,.30);
      --shadow-2:0 20px 40px rgba(0,0,0,.45);
      --sidebar-width:320px;
      --blue-bg:#031022;
      --blue-1:#051935;
      --blue-2:#0b2a57;
      --blue-3:#102d5c;
      --blue-4:#0c2347;
      --card:rgba(8,28,58,.94);
      --card-2:rgba(9,32,66,.94);
      --radius:18px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(3,16,34,.92), rgba(3,16,34,.96)),
        url("fundo.png") center/cover no-repeat fixed;
      color:var(--white);
      min-height:100vh;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      max-width:100%;
      display:block;
    }

    button{
      font-family:inherit;
    }

    .wrap{
      width:min(1240px, calc(100% - 32px));
      margin:0 auto;
    }

    .logo-link{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .logo-link img{
      width:56px;
      height:56px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid var(--yellow);
      background:#fff;
      flex-shrink:0;
    }

    .logo-text{
      display:flex;
      flex-direction:column;
      min-width:0;
      gap:2px;
    }

    .logo-text strong{
      color:var(--white);
      font-size:15px;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .logo-text span{
      color:var(--muted);
      font-size:12px;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sidebar-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.48);
      backdrop-filter:blur(2px);
      z-index:1390;
      opacity:0;
      visibility:hidden;
      pointer-events:none;
      transition:.28s ease;
    }

    .sidebar-overlay.show{
      opacity:1;
      visibility:visible;
      pointer-events:auto;
    }

    .sidebar{
      position:fixed;
      top:0;
      left:0;
      width:var(--sidebar-width);
      height:100vh;
      overflow-y:auto;
      background:linear-gradient(180deg, rgba(3,16,34,.985), rgba(5,25,53,.985));
      border-right:1px solid var(--line);
      z-index:1400;
      padding:22px 18px 28px;
      box-shadow:var(--shadow-2);
      transform:translateX(-100%);
      transition:transform .30s ease;
    }

    .sidebar.open{
      transform:translateX(0);
    }

    .sidebar-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding-bottom:18px;
      border-bottom:1px solid var(--line);
      margin-bottom:18px;
    }

    .sidebar-close{
      width:40px;
      height:40px;
      border:none;
      border-radius:12px;
      background:rgba(255,255,255,.08);
      color:#fff;
      cursor:pointer;
      font-size:20px;
      flex-shrink:0;
      transition:.2s ease;
    }

    .sidebar-close:hover{
      background:var(--yellow);
      color:#031022;
    }

    .sidebar-block{
      margin-bottom:18px;
      padding-bottom:14px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .sidebar-block:last-child{
      border-bottom:none;
      margin-bottom:0;
      padding-bottom:0;
    }

    .sidebar-title{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.10em;
      color:var(--yellow);
      margin-bottom:10px;
      font-weight:700;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .side-menu{
      display:flex;
      flex-direction:column;
      gap:7px;
    }

    .side-menu a{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border-radius:12px;
      color:#fff;
      background:rgba(255,255,255,.04);
      border:1px solid transparent;
      transition:.22s ease;
      font-size:14px;
    }

    .side-menu a:hover,
    .side-menu a.active{
      background:var(--yellow-soft);
      color:var(--yellow);
      border-color:var(--line);
      transform:translateX(4px);
    }

    .side-icon{
      width:20px;
      text-align:center;
      flex-shrink:0;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:1200;
      background:rgba(3,16,34,.88);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--line);
    }

    .topbar-content{
      min-height:92px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:16px;
      padding:14px 0;
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .menu-toggle{
      width:48px;
      height:48px;
      border:none;
      border-radius:14px;
      background:var(--yellow);
      color:#031022;
      font-size:24px;
      font-weight:700;
      cursor:pointer;
      box-shadow:var(--shadow);
      flex-shrink:0;
      transition:.22s ease;
    }

    .menu-toggle:hover{
      background:var(--yellow-2);
      transform:translateY(-2px);
    }

    .top-nav{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
    }

    .nav-link,
    .nav-dropdown-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:11px 14px;
      border-radius:12px;
      color:#fff;
      font-weight:700;
      font-size:14px;
      transition:.22s ease;
      border:1px solid transparent;
      background:transparent;
      cursor:pointer;
    }

    .nav-link:hover,
    .nav-link.active,
    .nav-dropdown-btn:hover,
    .nav-dropdown.open .nav-dropdown-btn{
      color:var(--yellow);
      background:rgba(255,255,255,.05);
      border-color:rgba(255,255,255,.06);
    }
.nav-dropdown{
      position:relative;
    }

    .nav-dropdown-menu{
      position:absolute;
      top:calc(100% + 10px);
      left:0;
      min-width:220px;
      background:rgba(4,23,52,.98);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--shadow-2);
      padding:10px;
      display:none;
      flex-direction:column;
      gap:6px;
      z-index:1250;
    }

    .nav-dropdown.open .nav-dropdown-menu{
      display:flex;
    }

    .nav-dropdown-menu a{
      padding:12px 14px;
      border-radius:12px;
      color:#fff;
      font-size:14px;
      transition:.2s ease;
    }

    .nav-dropdown-menu a:hover{
      background:var(--yellow-soft);
      color:var(--yellow);
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:flex-end;
      flex-wrap:wrap;
    }

    .btn-login,
    .btn-highlight{
      border:none;
      cursor:pointer;
      font-weight:700;
      transition:.22s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      white-space:nowrap;
    }

    .btn-login{
      padding:12px 16px;
      border-radius:12px;
      background:var(--yellow);
      color:#031022;
      font-size:14px;
      box-shadow:var(--shadow);
    }

    .btn-login:hover{
      background:var(--yellow-2);
      transform:translateY(-2px);
    }

    .btn-highlight{
      padding:12px 16px;
      border-radius:12px;
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      font-size:14px;
    }

    .btn-highlight:hover{
      background:rgba(255,255,255,.14);
      transform:translateY(-2px);
    }

    .ticker{
      background:linear-gradient(90deg, rgba(255,230,0,.14), rgba(255,255,255,.03));
      border-bottom:1px solid var(--line);
    }

    .ticker-content{
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-align:center;
      color:#fff;
      font-weight:700;
      font-size:14px;
    }

    .ticker-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 12px;
      border-radius:999px;
      background:var(--yellow);
      color:#031022;
      font-size:12px;
      font-weight:800;
      letter-spacing:.04em;
    }

    .hero{
      padding:24px 0 20px;
    }

    .hero-panel{
      display:grid;
      grid-template-columns:1.08fr .92fr;
      gap:22px;
      align-items:center;
      background:linear-gradient(145deg, rgba(8,28,58,.96), rgba(16,45,92,.92));
      border:1px solid var(--line);
      border-radius:26px;
      overflow:hidden;
      box-shadow:var(--shadow);
      min-height:520px;
    }

    .hero-copy{
      padding:42px;
    }

    .hero-tag{
      display:inline-flex;
      align-items:center;
      padding:8px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      color:#031022;
      background:var(--yellow);
      margin-bottom:18px;
    }

    .hero-copy h1{
      font-size:52px;
      line-height:1.05;
      color:var(--yellow);
      margin-bottom:14px;
    }

    .hero-subtitle{
      font-size:24px;
      font-weight:700;
      color:#fff;
      margin-bottom:14px;
    }

    .hero-desc{
      font-size:18px;
      line-height:1.7;
      color:var(--muted);
      max-width:620px;
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      margin-top:28px;
    }

    .btn-primary,
    .btn-secondary{
      border:none;
      cursor:pointer;
      font-weight:700;
      transition:.22s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
    }

    .btn-primary{
      padding:14px 20px;
      border-radius:14px;
      background:var(--yellow);
      color:#031022;
      font-size:15px;
      box-shadow:var(--shadow);
    }

    .btn-primary:hover{
      transform:translateY(-2px);
      background:var(--yellow-2);
    }

    .btn-secondary{
      padding:14px 20px;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      font-size:15px;
    }

    .btn-secondary:hover{
      background:rgba(255,255,255,.14);
      transform:translateY(-2px);
    }

    .hero-art{
      height:100%;
      min-height:460px;
      background:rgba(255,255,255,.03);
      position:relative;
    }

    .hero-art img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .hero-glow{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.00), rgba(0,0,0,.18));
      pointer-events:none;
    }

    .conteudo{
      padding:6px 0 28px;
    }

    .cards-pilares{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:22px;
      margin-top:24px;
    }

    .pillar{
      background:linear-gradient(145deg, #0b2a57, #081f45);
      border:1px solid rgba(255,230,0,.25);
      border-radius:22px;
      padding:26px 20px;
      box-shadow:0 12px 30px rgba(0,0,0,.5);
      transition:.25s ease;
      text-decoration:none;
      color:inherit;
      min-height:265px;
    }

    .pillar:hover{
      transform:translateY(-6px);
      border-color:#ffd700;
    }

    .pillar-icon{
      width:70px;
      height:70px;
      margin:0 auto 16px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .pillar-icon i{
      font-size:42px;
      color:#ffd86b;
      text-shadow:0 2px 6px rgba(0,0,0,.35);
    }

    .pillar h3{
      color:#ffd700;
      font-size:18px;
      margin-bottom:10px;
      line-height:1.3;
      font-weight:800;
      text-align:center;
      text-transform:uppercase;
    }

    .pillar p{
      color:#f2f5fb;
      line-height:1.6;
      font-size:15px;
      text-align:center;
    }

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

    const firebaseConfig = {

      authDomain: "liga-goiana-base.firebaseapp.com",
      projectId: "liga-goiana-base",
      storageBucket: "liga-goiana-base.appspot.com",
      messagingSenderId: "952863591183",
      appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
    };

    const app = initializeApp(firebaseConfig);

    const noticiasPadrao = [
      {

      }
    ];

    const jogosPadrao = [
      {
        data: "2026-04-20",
        hora: "09:00",
        mandante: "Atlético GO",
        visitante: "Vila Nova",
        categoria: "Sub-15",
        campeonato: "Copa União",
        local: "Campo 01",
        status: "agendado",
        escudoMandante: "atletico-go.png",
        escudoVisitante: "vila-nova.png"
      },
      {
        data: "2026-04-20",
        hora: "10:30",
        mandante: "Campinas",
        visitante: "Hidrolândia",
        categoria: "Sub-13",
        campeonato: "Copa União",
        local: "Campo 02",
        status: "agendado",
        escudoMandante: "campinas.png",
        escudoVisitante: "hidrolandia.png"
      },
      {
        data: "2026-04-20",

        mandante: "União",
        visitante: "Independência",
        categoria: "Sub-17",
        campeonato: "Liga Goiânia Elite",

        status: "agendado",

        escudoVisitante: "independencia.png"
      }
    ];

    let noticiaAtual = 0;
    let timerNoticias = null;
    let jogosCache = [];
    let noticiasCache = [];

    const sidebar = document.getElementById("sidebar");
    const sidebarOverlay = document.getElementById("sidebarOverlay");
    const menuToggle = document.getElementById("menuToggle");
    const sidebarClose = document.getElementById("sidebarClose");
    const estatisticasDropdown = document.getElementById("estatisticasDropdown");
    const menuAdmin = document.getElementById("menuAdmin");

    function abrirSidebar() {
      if (!sidebar || !sidebarOverlay) return;
      sidebar.classList.add("open");
      sidebarOverlay.classList.add("show");
    }

    function fecharSidebar() {
      if (!sidebar || !sidebarOverlay) return;
      sidebar.classList.remove("open");
      sidebarOverlay.classList.remove("show");
    }

    function toggleSidebar(event) {
      if (event) event.stopPropagation();
      if (!sidebar || !sidebarOverlay) return;

      if (sidebar.classList.contains("open")) {
        fecharSidebar();
      } else {
        abrirSidebar();
      }
    }

    window.toggleSidebar = toggleSidebar;

    if (menuToggle) {
      menuToggle.addEventListener("click", toggleSidebar);
    }

    if (sidebarClose) {
      sidebarClose.addEventListener("click", function (e) {
        e.stopPropagation();
        fecharSidebar();
      });
    }

    if (sidebarOverlay) {
      sidebarOverlay.addEventListener("click", fecharSidebar);
    }

    document.addEventListener("click", function(e) {
      if (sidebar && sidebar.classList.contains("open")) {
        const clicouNoMenu = sidebar.contains(e.target);
        const clicouNoBotao = menuToggle && menuToggle.contains(e.target);

        if (!clicouNoMenu && !clicouNoBotao) {
          fecharSidebar();
        }
      }

      if (estatisticasDropdown && !estatisticasDropdown.contains(e.target)) {
        estatisticasDropdown.classList.remove("open");
      }
    });

    estatisticasDropdown?.querySelector(".nav-dropdown-btn")?.addEventListener("click", function(e) {
      e.stopPropagation();
      estatisticasDropdown.classList.toggle("open");
    });

    function formatarDataBR(dataIso, hora) {
      try {
        const [ano, mes, dia] = String(dataIso).split("-");
        if (ano && mes && dia) {
          return `${dia}/${mes} - ${hora || "00:00"}`;
        }
        return `${dataIso} - ${hora || "00:00"}`;
      } catch {
        return `${dataIso} - ${hora || "00:00"}`;
      }
    }

    function formatarDataNoticia(valor) {
      if (!valor) return "";
      if (typeof valor === "string") return valor;

      try {
        if (valor.seconds) {
          const data = new Date(valor.seconds * 1000);
          return data.toLocaleDateString("pt-BR");
        }
      } catch {}

      return String(valor);
    }

    function normalizarStatus(status) {
      return String(status || "").toLowerCase().trim();
    }

    function montarLinkJogo(jogo) {
      return `jogos.html?campeonato=${encodeURIComponent(jogo.campeonato || "")}&categoria=${encodeURIComponent(jogo.categoria || "")}`;
    }

    function carregarNoticiasLocalStorage() {
      try {
        const noticiasSalvas = JSON.parse(localStorage.getItem("liga_noticias"));
        if (Array.isArray(noticiasSalvas) && noticiasSalvas.length) {
          return noticiasSalvas;
        }
      } catch {}
      return [];
    }

    function carregarJogosLocalStorage() {
      try {
        const jogosSalvos = JSON.parse(localStorage.getItem("liga_jogos"));
        if (Array.isArray(jogosSalvos) && jogosSalvos.length) {
          return jogosSalvos;
        }
      } catch {}
      return [];
    }

    async function buscarNoticiasFirebase() {
      try {
        const snap = await getDocs(collection(db, "noticias"));
        const lista = [];

        snap.forEach((docSnap) => {
          const data = docSnap.data() || {};
          const publicada =
            data.publicada === true ||
            data.publicado === true ||
            String(data.status || "").toLowerCase() === "publicada" ||
            String(data.status || "").toLowerCase() === "publicado";

          if (publicada || (!("publicada" in data) && !("publicado" in data) && !data.status)) {
            lista.push({
              id: docSnap.id,
              titulo: data.titulo || "Sem título",
              resumo: data.resumo || data.descricao || "Sem resumo.",
              data: formatarDataNoticia(data.data || data.criadaEm || data.publicadaEm),
              imagem: data.imagem || data.capa || "fundo.png"
            });
          }
        });

        lista.sort((a, b) => String(b.data || "").localeCompare(String(a.data || "")));
        return lista;
      } catch (erro) {
        console.error("Erro ao buscar notícias no Firebase:", erro);
        return [];
      }
    }

    async function buscarJogosFirebase() {
      try {
        const snap = await getDocs(collection(db, "jogos"));
        const lista = [];

        snap.forEach((docSnap) => {
          const data = docSnap.data() || {};

          let dataJogo = "";
          let horaJogo = "";

          if (typeof data.data === "string") {
            if (data.data.includes("T")) {
              const [parteData, parteHora] = data.data.split("T");
              dataJogo = parteData;
              horaJogo = (parteHora || "").slice(0, 5);
            } else {
              dataJogo = data.data;
            }
          }

          if (!horaJogo && data.hora) {
            horaJogo = data.hora;
          }

          lista.push({
            id: docSnap.id,
            data: dataJogo || data.data || "",
            hora: horaJogo || "00:00",
            mandante: data.timeA || data.mandante || "Time A",
            visitante: data.timeB || data.visitante || "Time B",
            categoria: data.categoria || "",
            campeonato: data.campeonato || "",
            local: data.local || "",
            status: data.status || "agendado",
            escudoMandante: data.escudoMandante || "",
            escudoVisitante: data.escudoVisitante || ""
          });
        });

        return lista;
      } catch (erro) {
        console.error("Erro ao buscar jogos no Firebase:", erro);
        return [];
      }
    }

    function obterNoticias() {
      const noticiasLocal = carregarNoticiasLocalStorage();
      if (noticiasCache.length) return noticiasCache;
      if (noticiasLocal.length) return noticiasLocal;
      return noticiasPadrao;
    }

    function obterJogos() {
      const jogosLocal = carregarJogosLocalStorage();
      if (jogosCache.length) return jogosCache;
      if (jogosLocal.length) return jogosLocal;
      return jogosPadrao;
    }

    function renderNoticias() {
      const noticias = obterNoticias();
      const slider = document.getElementById("newsSliderTrack");
      const vertical = document.getElementById("newsVerticalTrack");

      if (!slider || !vertical) return;

      const noticiasDuplicadas = [...noticias, ...noticias];

      slider.innerHTML = noticias.map((noticia, index) => `
        <article class="news-slide ${index === 0 ? "active" : ""}" onclick="window.location.href='noticias.html'">
          <img src="${noticia.imagem || 'fundo.png'}" alt="${noticia.titulo}" onerror="this.src='fundo.png'">
          <strong>${noticia.titulo || "Sem título"}</strong>
          <p>${noticia.resumo || "Sem resumo."}</p>
          <span>${noticia.data || ""}</span>
        </article>
      `).join("");

      vertical.innerHTML = noticiasDuplicadas.map(noticia => `
        <div class="news-item" onclick="window.location.href='noticias.html'">
          <img src="${noticia.imagem || 'fundo.png'}" alt="${noticia.titulo}" onerror="this.src='fundo.png'">
          <div>
            <strong>${noticia.titulo || "Sem título"}</strong>
            <p>${noticia.resumo || "Sem resumo."}</p>
            <span>${noticia.data || ""}</span>
          </div>
        </div>
      `).join("");

      iniciarSliderNoticias();
    }

    function iniciarSliderNoticias() {
      const slides = document.querySelectorAll("#newsSliderTrack .news-slide");
      if (!slides.length) return;

      if (timerNoticias) {
        clearInterval(timerNoticias);
      }

      noticiaAtual = 0;

      timerNoticias = setInterval(() => {
        slides[noticiaAtual].classList.remove("active");
        noticiaAtual = (noticiaAtual + 1) % slides.length;
        slides[noticiaAtual].classList.add("active");
      }, 3500);
    }

    function renderJogos() {
      const jogos = obterJogos();
      const tabela = document.getElementById("gamesTableBody");
      const tickerFaixa = document.getElementById("tickerFaixa");
      const tickerBadge = document.getElementById("tickerBadge");
      const tickerTexto = document.getElementById("tickerTexto");

      if (!tabela) return;

      const agora = new Date();

      const futuros = jogos.filter(jogo => {
        if (normalizarStatus(jogo.status) === "encerrado") return false;
        if (!jogo.data) return false;

        const dataHora = new Date(`${jogo.data}T${jogo.hora || "00:00"}:00`);
        if (isNaN(dataHora.getTime())) return true;

        return dataHora >= agora;
      }).sort((a, b) => new Date(`${a.data}T${a.hora || "00:00"}:00`) - new Date(`${b.data}T${b.hora || "00:00"}:00`));

      const encerrados = jogos.filter(jogo => {
        if (normalizarStatus(jogo.status) === "encerrado" || normalizarStatus(jogo.status) === "sumula_enviada") return true;
        if (!jogo.data) return false;

        const dataHora = new Date(`${jogo.data}T${jogo.hora || "00:00"}:00`);
        if (isNaN(dataHora.getTime())) return false;

        return dataHora < agora;
      }).sort((a, b) => new Date(`${b.data}T${b.hora || "00:00"}:00`) - new Date(`${a.data}T${a.hora || "00:00"}:00`));

      if (tickerFaixa && tickerBadge && tickerTexto) {
        if (futuros.length) {
          tickerFaixa.style.display = "block";
          tickerBadge.textContent = "AO VIVO";
          tickerTexto.textContent = "Acompanhe jogos, categorias e rodadas da Liga Goiana de Futebol de Base.";
        } else if (encerrados.length) {
          tickerFaixa.style.display = "block";
          tickerBadge.textContent = "RESULTADOS";
          tickerTexto.textContent = "Últimos jogos atualizados e prontos para consulta.";
        }
      }

      const listaFinal = futuros.length ? futuros.slice(0, 6) : encerrados.slice(0, 6);

      if (!listaFinal.length) {
        tabela.innerHTML = `
          <tr>
            <td colspan="4" style="text-align:center; padding:22px;">
              Nenhum jogo encontrado no momento.
            </td>
          </tr>
        `;
        return;
      }

      tabela.innerHTML = listaFinal.map(jogo => {
        const linkJogo = montarLinkJogo(jogo);

        return `
          <tr onclick="window.location.href='${linkJogo}'">
            <td>${formatarDataBR(jogo.data, jogo.hora)}</td>
            <td>
              <div class="confronto">
                <div class="time-mini">
                  <img src="${jogo.escudoMandante || 'logo-liga.jfif'}" onerror="this.src='logo-liga.jfif'" class="escudo" alt="${jogo.mandante}">
                  <span>${jogo.mandante}</span>
                </div>
                <span class="vs">X</span>
                <div class="time-mini">
                  <img src="${jogo.escudoVisitante || 'logo-liga.jfif'}" onerror="this.src='logo-liga.jfif'" class="escudo" alt="${jogo.visitante}">
                  <span>${jogo.visitante}</span>
                </div>
              </div>
            </td>
            <td><span class="badge">${jogo.categoria || "-"}</span></td>
            <td>${jogo.local || "-"}</td>
          </tr>
        `;
      }).join("");
    }

    function configurarPainelAdmin() {
      const adminAtivo = localStorage.getItem("liga_admin_logado") === "true";
      if (menuAdmin) {
        menuAdmin.style.display = adminAtivo ? "flex" : "none";
      }
    }

    async function iniciarDadosPagina() {
      noticiasCache = await buscarNoticiasFirebase();
      jogosCache = await buscarJogosFirebase();
      renderNoticias();
      renderJogos();
      configurarPainelAdmin();
    }

    window.addEventListener("DOMContentLoaded", async () => {
      await iniciarDadosPagina();
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth > 700 && estatisticasDropdown) {
        estatisticasDropdown.classList.remove("open");
      }
    });
