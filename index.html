<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Goiana de Futebol de Base</title>

<style>
:root {
    --azul-escuro: #000b1a;
    --azul-claro: #003366;
    --dourado: #FFD700;
    --branco: #ffffff;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: var(--azul-escuro);
    color: var(--branco);

    /* fundo com imagem + efeito escuro */
    background-image: linear-gradient(rgba(0, 15, 41, 0.85), rgba(0, 11, 26, 0.95)), 
    url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=2070');

    background-size: cover;
    background-position: center;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.container {
    max-width: 600px;
}

/* título */
h1 {
    font-size: 2.5rem;
    color: var(--dourado);
    text-transform: uppercase;
    margin-bottom: 10px;
}

/* subtítulo */
p {
    font-size: 1.1rem;
    color: #ddd;
    margin-bottom: 30px;
}

/* botão */
button {
    background: linear-gradient(to bottom, var(--dourado), #b8860b);
    color: black;
    padding: 16px 35px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4);
}
</style>
</head>

<body>

<div class="container">

<h1>BEM-VINDO À LIGA GOIANA DE BASE</h1>

<p>Onde o talento encontra o futuro</p>

<button onclick="entrar()">ENTRAR</button>

</div>

<script>
function entrar(){
    window.location.href = "login.html"; // ou admin.html
}
</script>

</body>
</html>
