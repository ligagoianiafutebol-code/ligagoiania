<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Goiana de Futebol de Base</title>

<style>
:root{
  --yellow:#ffe600;
  --yellow-2:#ffd000;
  --sidebar-width:270px;
}

body{
  margin:0;
  font-family:Arial;
  background:#031022;
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:var(--sidebar-width);
  height:100vh;
  background:#020c22;
  padding:20px;
  transition:.3s;
  z-index:1000;
}

.sidebar.closed{
  transform:translateX(-100%);
}

.sidebar a{
  display:block;
  padding:10px;
  color:white;
}

/* MAIN */
.main{
  margin-left:var(--sidebar-width);
  transition:.3s;
}

.main.expanded{
  margin-left:0;
}

/* HEADER (NÃO FIXO) */
header{
  background:
    linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.9)),
    url("fundo.png");
  background-size:cover;
  padding:15px;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BOTÃO MENU */
.menu-toggle{
  background:var(--yellow);
  border:none;
  padding:10px;
  cursor:pointer;
}

/* LINKS */
.top-links a{
  margin:0 8px;
  color:white;
}

/* BOTÃO */
.btn-top{
  background:var(--yellow);
  color:#111;
  padding:10px;
  cursor:pointer;
}

/* HERO */
.hero{
  background:
    linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.85)),
    url("fundo.png");
  padding:40px;
}

/* CONTEUDO */
.conteudo{
  padding:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  background:#081a3a;
  padding:20px;
  text-align:center;
}

/* FOOTER */
footer{
  background:#000;
  padding:20px;
  text-align:center;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a href="#">Campeonatos</a>
  <a href="#">Categorias</a>
  <a href="#">Times</a>
  <a href="#">Jogadores</a>
  <a href="#">Técnicos</a>
  <a href="#">Árbitros</a>
  <a href="#">Assistentes</a>
  <a href="#">Jogos</a>
  <a href="#">Súmulas</a>
  <a href="#">Tabelas</a>
  <a href="#">Notícias</a>
</div>

<div class="main" id="main">

<!-- HEADER -->
<header>
  <div class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <div class="top-links">
      <a href="#">Início</a>
      <a href="#">Campeonatos</a>
      <a href="#">Equipes</a>
      <a href="#">Resultados</a>
    </div>

    <button class="btn-top" onclick="window.location.href='login.html'">
      🔐 Login / Cadastro
    </button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1 style="color:#ffe600;">Bem-vindo à Liga Goiana de Base</h1>
  <p>Onde o talento encontra o futuro</p>
</section>

<!-- CONTEUDO -->
<section class="conteudo">
  <div class="cards">
    <div class="card">🏆 Competição</div>
    <div class="card">🛡️ Formação</div>
    <div class="card">📈 Desenvolvimento</div>
    <div class="card">🤝 Respeito</div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  Liga Goiana © 2026
</footer>

</div>

<script>
function toggleSidebar(){
  const sidebar = document.getElementById("sidebar");
  const main = document.getElementById("main");

  sidebar.classList.toggle("closed");
  main.classList.toggle("expanded");
}

/* FECHAR MENU AO CLICAR FORA */
document.addEventListener("click", function(e){
  const sidebar = document.getElementById("sidebar");
  const btn = document.querySelector(".menu-toggle");

  if(!sidebar.contains(e.target) && !btn.contains(e.target)){
    sidebar.classList.add("closed");
    main.classList.add("expanded");
  }
});
</script>

</body>
</html>
