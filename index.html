<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liga Goiana de Futebol de Base</title>

  <style>
    :root{
      --yellow:#ffe600;
      --yellow-2:#ffd000;
      --yellow-soft:rgba(255,230,0,.14);
      --white:#ffffff;
      --muted:#d7dfeb;
      --line:rgba(255,230,0,.18);
      --shadow:0 14px 32px rgba(0,0,0,.30);
      --sidebar-width:280px;
      --blue-bg:#031022;
      --blue-1:#051935;
      --blue-2:#0b2a57;
      --blue-3:#102d5c;
      --card:rgba(8,28,58,.94);
      --green:#10a542;
      --green-2:#0b7c31;
      --radius:18px;
    }

    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:Arial;
      background:
        linear-gradient(rgba(3,16,34,.92), rgba(3,16,34,.96)),
        url("fundo.png") center/cover no-repeat fixed;
      color:white;
    }

    /* SIDEBAR */
    .sidebar{
      position:fixed;
      width:280px;
      height:100vh;
      background:#031022;
      padding:20px;
    }

    .side-menu a{
      display:block;
      padding:10px;
      margin-bottom:6px;
      border-radius:8px;
    }

    .side-menu a:hover{
      background:#ffe60022;
      color:#ffe600;
    }

    /* TOPO */
    .topbar{
      margin-left:280px;
      background:#031022;
      padding:15px;
      border-bottom:2px solid #ffe600;
    }

    .menu-toggle{
      background:#ffe600;
      border:none;
      padding:10px;
      border-radius:8px;
      cursor:pointer;
    }

    /* HERO */
    .hero{
      margin-left:280px;
      padding:20px;
    }

    .hero h1{
      color:#ffe600;
      font-size:42px;
    }

    .btn{
      background:#ffe600;
      padding:10px 14px;
      border-radius:8px;
      display:inline-block;
      margin-top:10px;
      color:black;
      font-weight:bold;
    }

    /* CONTEUDO */
    .conteudo{
      margin-left:280px;
      padding:20px;
    }

    .panel{
      background:#102a52;
      padding:15px;
      border-radius:10px;
      margin-bottom:20px;
    }

    .panel h2{
      color:#ffe600;
    }

    table{
      width:100%;
      margin-top:10px;
    }

    td{
      padding:8px;
    }

    /* NOTICIAS */
    .news-item{
      background:#0b1f3a;
      padding:10px;
      border-radius:8px;
      margin-bottom:10px;
      cursor:pointer;
    }

    .news-item:hover{
      border:1px solid #ffe600;
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="side-menu">
    <a href="tabela.html">Tabelas</a>
    <a href="artilharia.html">Artilharia</a>
    <a href="classificacao.html">Classificação</a>
    <a href="jogos.html">Jogos</a>
    <a href="campeonatos.html">Campeonato</a>
    <a href="categorias.html">Categoria</a>
    <a href="times.html">Times</a>
    <a href="jogadores.html">Jogadores</a>
    <a href="tecnicos.html">Técnicos</a>
    <a href="sumulas.html">Súmulas</a>
    <a href="noticias.html">Notícias</a>
    <a href="index.html">Página Inicial</a>
  </div>
</div>

<!-- TOPO -->
<div class="topbar">
  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Bem-vindo à Liga Goiana de Base</h1>
  <p>Onde o talento encontra o futuro</p>

  <a href="campeonatos.html" class="btn">Ver Campeonatos</a>
</div>

<!-- CONTEUDO -->
<div class="conteudo">

  <!-- JOGOS -->
  <div class="panel">
    <h2>Próximos Jogos</h2>
    <table id="jogosTabela"></table>
  </div>

  <!-- NOTICIAS -->
  <div class="panel">
    <h2>Notícias</h2>
    <div id="listaNoticias"></div>
  </div>

</div>
<script>
function toggleSidebar(){
  const sidebar = document.querySelector(".sidebar");
  if(sidebar.style.display === "none"){
    sidebar.style.display = "block";
  }else{
    sidebar.style.display = "none";
  }
}

/* =========================
   DADOS PADRÃO
========================= */

const jogos = [
  {
    data:"20/04",
    hora:"09:00",
    timeA:"Atlético GO",
    timeB:"Vila Nova",
    categoria:"Sub-15",
    local:"Campo 1"
  },
  {
    data:"20/04",
    hora:"10:30",
    timeA:"Campinas",
    timeB:"Hidrolândia",
    categoria:"Sub-13",
    local:"Campo 2"
  }
];

const noticias = [
  {
    titulo:"Abertura da Liga",
    texto:"Começou mais uma edição da Liga Goiana de Base."
  },
  {
    titulo:"Grandes Jogos",
    texto:"Rodada com muitos gols e emoção."
  }
];

/* =========================
   RENDER JOGOS
========================= */

function renderJogos(){
  const tabela = document.getElementById("jogosTabela");

  tabela.innerHTML = jogos.map(j => `
    <tr>
      <td>${j.data} ${j.hora}</td>
      <td>${j.timeA} x ${j.timeB}</td>
      <td>${j.categoria}</td>
      <td>${j.local}</td>
    </tr>
  `).join("");
}

/* =========================
   RENDER NOTICIAS
========================= */

function renderNoticias(){
  const lista = document.getElementById("listaNoticias");

  lista.innerHTML = noticias.map(n => `
    <div class="news-item">
      <strong>${n.titulo}</strong>
      <p>${n.texto}</p>
    </div>
  `).join("");
}

/* =========================
   INIT
========================= */

renderJogos();
renderNoticias();

</script>

</body>
</html>
