<!DOCTYPE html>  <html lang="pt-BR">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>Liga Goiana de Futebol de Base</title>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">    <style>  
    :root{  
      --yellow:#ffd400;  
      --yellow-2:#ffe600;  
      --yellow-soft:rgba(255,212,0,.12);  
      --yellow-line:rgba(255,212,0,.24);  
      --white:#ffffff;  
      --muted:#d8e1ef;  
      --text-soft:#a8b6cf;  
      --bg:#010918;  
      --bg-2:#04132d;  
      --bg-3:#071c44;  
      --card:#03112d;  
      --card-2:#07183b;  
      --shadow:0 12px 30px rgba(0,0,0,.35);  
      --radius:18px;  
      --radius-lg:24px;  
      --transition:.25s ease;  
      --max:1280px;  
    }  
  
    *{  
      margin:0;  
      padding:0;  
      box-sizing:border-box;  
    }  
  
    html{  
      scroll-behavior:smooth;  
    }  
  
    body{  
      font-family: Arial, Helvetica, sans-serif;  
      background:  
        linear-gradient(rgba(1,9,24,.86), rgba(1,9,24,.95)),  
        url("fundo.png") center/cover fixed no-repeat;  
      color:var(--white);  
      overflow-x:hidden;  
    }  
  
    a{  
      text-decoration:none;  
      color:inherit;  
      transition:var(--transition);  
    }  
  
    button{  
      font-family:inherit;  
      transition:var(--transition);  
      cursor:pointer;  
    }  
  
    ul{  
      list-style:none;  
    }  
  
    img{  
      max-width:100%;  
      display:block;  
    }  
  
    .wrap{  
      width:min(100% - 32px, var(--max));  
      margin:0 auto;  
    }  
  
    .sidebar-overlay{  
      position:fixed;  
      inset:0;  
      background:rgba(0,0,0,.55);  
      opacity:0;  
      visibility:hidden;  
      transition:var(--transition);  
      z-index:998;  
    }  
  
    .sidebar-overlay.show{  
      opacity:1;  
      visibility:visible;  
    }  
  
    .sidebar{  
      position:fixed;  
      top:0;  
      left:0;  
      width:320px;  
      max-width:88%;  
      height:100vh;  
      background:linear-gradient(180deg, #04132d 0%, #021022 100%);  
      border-right:1px solid var(--yellow-line);  
      box-shadow:var(--shadow);  
      padding:22px 18px 28px;  
      overflow-y:auto;  
      transform:translateX(-105%);  
      transition:var(--transition);  
      z-index:999;  
    }  
  
    .sidebar.open{  
      transform:translateX(0);  
    }  
  
    .sidebar-header{  
      display:flex;  
      justify-content:space-between;  
      align-items:flex-start;  
      gap:12px;  
      margin-bottom:20px;  
      padding-bottom:16px;  
      border-bottom:1px solid rgba(255,255,255,.08);  
    }  
  
    .sidebar-brand{  
      display:flex;  
      gap:12px;  
      align-items:center;  
    }  
  
    .sidebar-brand img{  
      width:54px;  
      height:54px;  
      object-fit:cover;  
      border-radius:14px;  
      border:2px solid var(--yellow);  
      background:#fff;  
    }  
  
    .sidebar-brand-text strong{  
      display:block;  
      font-size:16px;  
      color:var(--yellow);  
      line-height:1.25;  
    }  
  
    .sidebar-brand-text span{  
      display:block;  
      margin-top:4px;  
      color:var(--muted);  
      font-size:12px;  
      line-height:1.35;  
    }  
.sidebar-close{  
      width:36px;  
      height:36px;  
      border:none;  
      border-radius:50%;  
      background:rgba(255,255,255,.08);  
      color:#fff;  
      font-size:24px;  
    }  
  
    .sidebar-close:hover{  
      background:var(--yellow);  
      color:#08172c;  
    }  
  
    .sidebar-block{  
      margin-bottom:22px;  
      background:rgba(255,255,255,.03);  
      border:1px solid rgba(255,255,255,.06);  
      border-radius:16px;  
      padding:14px;  
    }  
  
    .sidebar-title{  
      font-size:14px;  
      font-weight:700;  
      color:var(--yellow);  
      margin-bottom:12px;  
      letter-spacing:.4px;  
    }  
  
    .side-menu{  
      display:flex;  
      flex-direction:column;  
      gap:8px;  
    }  
  
    .side-menu a{  
      display:flex;  
      align-items:center;  
      gap:10px;  
      padding:11px 12px;  
      border-radius:12px;  
      color:var(--muted);  
      border:1px solid transparent;  
    }  
  
    .side-menu a:hover{  
      background:var(--yellow-soft);  
      color:var(--yellow);  
      border-color:var(--yellow-line);  
      transform:translateX(3px);  
    }  
  
    .side-icon{  
      width:20px;  
      text-align:center;  
      color:var(--yellow);  
      flex-shrink:0;  
    }  
  
    .topbar{  
      position:relative;  
      background:rgba(1,9,24,.88);  
      border-bottom:1px solid rgba(255,255,255,.08);  
      backdrop-filter:blur(12px);  
      z-index:100;  
    }  
  
    .topbar-inner{  
      min-height:84px;  
      display:flex;  
      align-items:center;  
      justify-content:space-between;  
      gap:18px;  
      padding:14px 0;  
    }  
  
    .topbar-left{  
      display:flex;  
      align-items:center;  
      gap:14px;  
      min-width:0;  
    }  
  
    .menu-toggle{  
      width:46px;  
      height:46px;  
      border-radius:14px;  
      border:1px solid var(--yellow-line);  
      background:var(--yellow-soft);  
      color:var(--yellow);  
      font-size:20px;  
      display:flex;  
      align-items:center;  
      justify-content:center;  
      flex-shrink:0;  
    }  
  
    .menu-toggle:hover{  
      background:var(--yellow);  
      color:#08172c;  
      transform:translateY(-2px);  
    }  
  
    .topbar-logo{  
      display:flex;  
      align-items:center;  
      gap:12px;  
      min-width:0;  
    }  
  
    .topbar-logo img{  
      width:58px;  
      height:58px;  
      border-radius:14px;  
      object-fit:cover;  
      border:2px solid var(--yellow);  
      background:#fff;  
      flex-shrink:0;  
    }  
  
    .logo-text{  
      min-width:0;  
    }  
  
    .logo-text strong{  
      display:block;  
      font-size:17px;  
      color:#fff;  
      line-height:1.2;  
    }  
  
    .logo-text span{  
      display:block;  
      margin-top:4px;  
      color:var(--yellow);  
      font-size:13px;  
      white-space:nowrap;  
      overflow:hidden;  
      text-overflow:ellipsis;  
    }  
.top-nav ul{  
      display:flex;  
      align-items:center;  
      gap:6px;  
      flex-wrap:wrap;  
      justify-content:center;  
    }  
  
    .top-nav li{  
      position:relative;  
    }  
  
    .top-nav a,  
    .dropdown-toggle{  
      display:inline-flex;  
      align-items:center;  
      gap:8px;  
      padding:10px 14px;  
      border-radius:12px;  
      color:var(--muted);  
      font-weight:600;  
      border:1px solid transparent;  
      background:transparent;  
    }  
  
    .top-nav a:hover,  
    .dropdown-toggle:hover,  
    .top-nav li:hover > a,  
    .top-nav li:hover > .dropdown-toggle{  
      color:var(--yellow);  
      background:var(--yellow-soft);  
      border-color:var(--yellow-line);  
    }  
  
    .dropdown-menu{  
      position:absolute;  
      top:calc(100% + 8px);  
      left:0;  
      min-width:190px;  
      background:linear-gradient(180deg, #04132d 0%, #021022 100%);  
      border:1px solid var(--yellow-line);  
      border-radius:16px;  
      box-shadow:var(--shadow);  
      padding:8px;  
      display:none;  
      z-index:120;  
    }  
  
    .dropdown:hover .dropdown-menu{  
      display:block;  
    }  
  
    .dropdown-menu a{  
      display:flex;  
      width:100%;  
    }  
  
    .top-actions{  
      display:flex;  
      align-items:center;  
      gap:10px;  
      flex-shrink:0;  
    }  
  
    .btn-top-main,  
    .btn-primary,  
    .btn-secondary,  
    .btn-login-chip{  
      display:inline-flex;  
      align-items:center;  
      justify-content:center;  
      gap:10px;  
      border-radius:14px;  
      font-weight:700;  
      border:1px solid transparent;  
    }  
  
    .btn-top-main,  
    .btn-primary{  
      background:linear-gradient(135deg, var(--yellow), var(--yellow-2));  
      color:#08172c;  
      padding:14px 18px;  
      box-shadow:0 10px 22px rgba(255,212,0,.22);  
    }  
  
    .btn-top-main:hover,  
    .btn-primary:hover{  
      transform:translateY(-2px);  
      filter:brightness(1.04);  
      box-shadow:0 12px 24px rgba(255,212,0,.3);  
    }  
  
    .btn-login-chip{  
      padding:10px 16px;  
      border:1px solid var(--yellow-line);  
      background:rgba(255,212,0,.08);  
      color:var(--yellow);  
    }  
  
    .btn-login-chip:hover{  
      background:var(--yellow);  
      color:#08172c;  
    }  
  
    .login-avatar{  
      width:28px;  
      height:28px;  
      border-radius:50%;  
      background:rgba(255,255,255,.12);  
      display:flex;  
      align-items:center;  
      justify-content:center;  
      color:inherit;  
    }  
  
    .hero{  
      padding:34px 0 20px;  
    }  
  
    .hero-card{  
      background:linear-gradient(135deg, rgba(7,28,68,.9), rgba(3,17,45,.92));  
      border:1px solid var(--yellow-line);  
      border-radius:30px;  
      box-shadow:var(--shadow);  
      overflow:hidden;  
    }  
  
    .hero-grid{  
      display:grid;  
      grid-template-columns:1.15fr .85fr;  
      gap:26px;  
      align-items:center;  
      padding:34px;  
    }  
.eyebrow{  
      display:inline-flex;  
      align-items:center;  
      gap:8px;  
      padding:8px 14px;  
      border-radius:999px;  
      background:rgba(255,212,0,.12);  
      border:1px solid var(--yellow-line);  
      color:var(--yellow);  
      font-size:13px;  
      font-weight:700;  
      margin-bottom:16px;  
    }  
  
    .hero h1{  
      font-size:46px;  
      line-height:1.08;  
      margin-bottom:12px;  
      color:#fff;  
    }  
  
    .hero h1 span{  
      color:var(--yellow);  
    }  
  
    .hero p{  
      color:var(--muted);  
      font-size:18px;  
      line-height:1.7;  
      max-width:700px;  
      margin-bottom:10px;  
    }  
  
    .hero-actions{  
      display:flex;  
      flex-wrap:wrap;  
      gap:14px;  
      margin-top:26px;  
    }  
  
    .btn-secondary{  
      padding:14px 18px;  
      border:1px solid var(--yellow-line);  
      color:#fff;  
      background:rgba(255,255,255,.06);  
    }  
  
    .btn-secondary:hover{  
      transform:translateY(-2px);  
      background:var(--yellow);  
      color:#08172c;  
    }  
  
    .hero-art img{  
      width:100%;  
      height:100%;  
      min-height:360px;  
      object-fit:cover;  
      border-radius:24px;  
      border:1px solid rgba(255,255,255,.08);  
      box-shadow:var(--shadow);  
    }  
  
    .cards-pilares{  
      display:grid;  
      grid-template-columns:repeat(4, 1fr);  
      gap:18px;  
      margin:28px 0 10px;  
    }  
  
    .pillar{  
      background:linear-gradient(180deg, rgba(7,24,59,.94), rgba(3,17,45,.96));  
      border:1px solid rgba(255,255,255,.08);  
      border-radius:20px;  
      padding:22px 18px;  
      display:flex;  
      gap:14px;  
      align-items:flex-start;  
      box-shadow:var(--shadow);  
      transition:var(--transition);  
    }  
  
    .pillar:hover{  
      border-color:var(--yellow-line);  
      transform:translateY(-2px);  
    }  
  
    .pillar-icon{  
      width:52px;  
      height:52px;  
      border-radius:16px;  
      display:flex;  
      align-items:center;  
      justify-content:center;  
      background:var(--yellow-soft);  
      color:var(--yellow);  
      font-size:22px;  
      flex-shrink:0;  
    }  
  
    .pillar-text h3{  
      font-size:18px;  
      margin-bottom:8px;  
      color:#fff;  
    }  
  
    .pillar-text p{  
      font-size:14px;  
      line-height:1.6;  
      color:var(--muted);  
    }  
  
    .content-grid{  
      display:grid;  
      grid-template-columns:1.3fr .9fr;  
      gap:22px;  
      margin:28px 0;  
    }  
  
    .panel{  
      background:linear-gradient(180deg, rgba(7,24,59,.94), rgba(3,17,45,.96));  
      border:1px solid rgba(255,255,255,.08);  
      border-radius:24px;  
      box-shadow:var(--shadow);  
      padding:22px;  
    }  
.panel-head{  
      display:flex;  
      justify-content:space-between;  
      align-items:center;  
      gap:12px;  
      margin-bottom:18px;  
      flex-wrap:wrap;  
    }  
  
    .panel-head-title{  
      display:flex;  
      align-items:center;  
      gap:12px;  
    }  
  
    .panel-head-icon{  
      width:46px;  
      height:46px;  
      border-radius:14px;  
      background:var(--yellow-soft);  
      color:var(--yellow);  
      display:flex;  
      align-items:center;  
      justify-content:center;  
      font-size:20px;  
    }  
  
    .panel-head h2{  
      font-size:28px;  
      color:#fff;  
    }  
  
    .panel-head a{  
      color:var(--yellow);  
      font-weight:700;  
    }  
  
    .panel-head a:hover{  
      color:#fff176;  
    }  
  
    .match-table{  
      width:100%;  
      border-collapse:collapse;  
      overflow:hidden;  
      border-radius:16px;  
    }  
  
    .match-table thead th{  
      background:rgba(255,212,0,.12);  
      color:var(--yellow);  
      text-align:left;  
      padding:14px 12px;  
      font-size:14px;  
    }  
  
    .match-table tbody td{  
      padding:14px 12px;  
      border-top:1px solid rgba(255,255,255,.08);  
      color:var(--muted);  
      font-size:14px;  
    }  
  
    .match-table tbody tr:hover{  
      background:rgba(255,212,0,.08);  
    }  
  
    .news-list{  
      display:flex;  
      flex-direction:column;  
      gap:14px;  
    }  
  
    .news-item{  
      padding:16px;  
      border-radius:18px;  
      background:rgba(255,255,255,.04);  
      border:1px solid rgba(255,255,255,.06);  
      transition:var(--transition);  
    }  
  
    .news-item:hover{  
      transform:translateY(-2px);  
      background:rgba(255,212,0,.08);  
      border-color:var(--yellow-line);  
    }  
  
    .news-item h3{  
      font-size:17px;  
      color:#fff;  
      margin-bottom:8px;  
    }  
  
    .news-item p{  
      color:var(--muted);  
      line-height:1.6;  
      font-size:14px;  
    }  
  
    .cta-banner{  
      margin:10px 0 34px;  
    }  
  
    .cta-banner-inner{  
      display:flex;  
      justify-content:space-between;  
      align-items:center;  
      gap:20px;  
      flex-wrap:wrap;  
      background:linear-gradient(135deg, rgba(255,212,0,.16), rgba(255,255,255,.05));  
      border:1px solid var(--yellow-line);  
      border-radius:24px;  
      padding:26px;  
      box-shadow:var(--shadow);  
    }  
  
    .cta-banner-inner h3{  
      font-size:30px;  
      color:#fff;  
      margin-bottom:8px;  
    }  
  
    .cta-banner-inner p{  
      color:var(--muted);  
      line-height:1.6;  
    }  
.admin-panel{  
      margin:0 0 34px;  
    }  
  
    .admin-panel h2{  
      font-size:32px;  
      color:#fff;  
      margin-bottom:18px;  
    }  
  
    .admin-groups{  
      display:flex;  
      flex-direction:column;  
      gap:18px;  
    }  
  
    .admin-group{  
      display:flex;  
      flex-wrap:wrap;  
      gap:14px;  
    }  
  
    .admin-group button{  
      min-width:180px;  
      padding:15px 18px;  
      border-radius:14px;  
      border:1px solid var(--yellow-line);  
      background:rgba(255,255,255,.05);  
      color:#fff;  
      font-weight:700;  
      font-size:15px;  
    }  
  
    .admin-group button:hover{  
      background:var(--yellow);  
      color:#08172c;  
      transform:translateY(-2px);  
    }  
  
    footer{  
      background:linear-gradient(180deg, rgba(2,10,24,.96), rgba(1,9,24,1));  
      border-top:1px solid rgba(255,255,255,.08);  
      padding:40px 0 18px;  
    }  
  
    .footer-grid{  
      display:grid;  
      grid-template-columns:1.2fr .8fr .8fr .8fr;  
      gap:20px;  
    }  
  
    .footer-card{  
      background:rgba(255,255,255,.03);  
      border:1px solid rgba(255,255,255,.06);  
      border-radius:22px;  
      padding:22px;  
    }  
  
    .footer-card h4{  
      color:var(--yellow);  
      margin-bottom:14px;  
      font-size:18px;  
    }  
  
    .footer-brand{  
      display:flex;  
      gap:14px;  
      align-items:center;  
      margin-bottom:14px;  
    }  
  
    .footer-brand img{  
      width:62px;  
      height:62px;  
      border-radius:16px;  
      border:2px solid var(--yellow);  
      object-fit:cover;  
      background:#fff;  
    }  
  
    .footer-brand-text h3{  
      font-size:20px;  
      margin-bottom:6px;  
      color:#fff;  
    }  
  
    .footer-brand-text p{  
      color:var(--muted);  
      line-height:1.5;  
      font-size:14px;  
    }  
  
    .footer-card a{  
      display:block;  
      color:var(--muted);  
      margin-bottom:10px;  
    }  
  
    .footer-card a:hover{  
      color:var(--yellow);  
    }  
  
    .footer-contact-line{  
      display:flex !important;  
      align-items:center;  
      gap:10px;  
      margin-bottom:12px !important;  
    }  
  
    .footer-social{  
      display:flex;  
      gap:10px;  
      flex-wrap:wrap;  
      margin-top:12px;  
    }  
  
    .footer-social a{  
      width:42px;  
      height:42px;  
      border-radius:12px;  
      background:rgba(255,255,255,.07);  
      display:flex;  
      align-items:center;  
      justify-content:center;  
      color:var(--yellow);  
      margin-bottom:0;  
    }  
.footer-social a:hover{  
      background:var(--yellow);  
      color:#08172c;  
    }  
  
    .copyright{  
      margin-top:18px;  
      padding-top:18px;  
      border-top:1px solid rgba(255,255,255,.08);  
      text-align:center;  
      color:var(--text-soft);  
      font-size:14px;  
    }  
  
    #menuAdmin{  
      display:none;  
    }  
  
    @media (max-width: 1180px){  
      .top-nav{  
        display:none;  
      }  
  
      .hero-grid,  
      .content-grid,  
      .footer-grid,  
      .cards-pilares{  
        grid-template-columns:1fr 1fr;  
      }  
    }  
  
    @media (max-width: 900px){  
      .hero-grid,  
      .content-grid,  
      .footer-grid,  
      .cards-pilares{  
        grid-template-columns:1fr;  
      }  
  
      .hero h1{  
        font-size:36px;  
      }  
  
      .panel-head h2{  
        font-size:24px;  
      }  
  
      .topbar-inner{  
        flex-wrap:wrap;  
      }  
  
      .top-actions{  
        width:100%;  
        justify-content:flex-start;  
      }  
  
      .admin-group button{  
        width:100%;  
      }  
    }  
  
    @media (max-width: 600px){  
      .wrap{  
        width:min(100% - 20px, var(--max));  
      }  
  
      .hero-grid{  
        padding:20px;  
      }  
  
      .hero h1{  
        font-size:30px;  
      }  
  
      .btn-top-main,  
      .btn-primary,  
      .btn-secondary{  
        width:100%;  
      }  
  
      .top-actions{  
        flex-direction:column;  
        align-items:stretch;  
      }  
  
      .btn-login-chip{  
        justify-content:center;  
      }  
  
      .logo-text strong{  
        font-size:15px;  
      }  
  
      .logo-text span{  
        font-size:12px;  
      }  
  
      .match-table{  
        display:block;  
        overflow-x:auto;  
      }  
    }  
  </style>  </head>
