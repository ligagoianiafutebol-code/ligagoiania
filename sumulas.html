<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súmulas Oficiais</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f3a;
  color:white;
}

header{
  background:#08172c;
  padding:18px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  border-bottom:3px solid #f7c600;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.btn-voltar{
  display:inline-block;
  margin-bottom:15px;
  background:#f7c600;
  color:black;
  padding:10px 14px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
}

.card{
  background:#102a52;
  border-radius:12px;
  padding:16px;
  margin-bottom:14px;
  border:1px solid rgba(255,230,0,.15);
}

.topo-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.titulo-jogo{
  font-size:20px;
  font-weight:bold;
  color:#f7c600;
}

.sub{
  opacity:.9;
  font-size:14px;
  margin-top:4px;
}

.link-btn{
  display:inline-block;
  background:#f7c600;
  color:black;
  padding:10px 14px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  overflow:auto;
  padding:20px;
  z-index:9999;
}

.modal-content{
  max-width:1200px;
  margin:auto;
  background:#0f274c;
  border-radius:14px;
  padding:20px;
  border:1px solid rgba(255,230,0,.18);
}

.modal-topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.logo{
  height:80px;
  object-fit:contain;
}

.meio-topo{
  flex:1;
  text-align:center;
}

.meio-topo h2{
  margin:0;
  color:#f7c600;
}

.times{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

.time-box{
  background:#102a52;
  border-radius:12px;
  padding:16px;
}

.time-top{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:15px;
}

.escudo{
  width:70px;
  height:70px;
  object-fit:contain;
  border-radius:50%;
  background:#1a3f73;
}

.nome-time{
  font-size:22px;
  font-weight:bold;
  color:#f7c600;
}

.bloco{
  background:#0d2346;
  border-radius:10px;
  padding:12px;
  margin-top:12px;
}

.bloco h3{
  margin:0 0 10px;
  color:#f7c600;
  font-size:16px;
}

.jogador{
  background:#15325f;
  border-radius:8px;
  padding:8px;
  margin-bottom:8px;
}

.linha-jogador{
  display:grid;
  grid-template-columns:70px 1fr 1fr;
  gap:8px;
}

.obs-jogador{
  margin-top:6px;
  opacity:.9;
  font-size:12px;
}

.acao-item{
  background:#15325f;
  border-radius:8px;
  padding:8px;
  margin-bottom:8px;
  display:grid;
  grid-template-columns:90px 1fr 150px;
  gap:8px;
}

.info-box{
  background:#102a52;
  border-radius:12px;
  padding:16px;
  margin-top:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.item-info{
  background:#0d2346;
  padding:12px;
  border-radius:8px;
}

.obs{
  grid-column:1 / -1;
  background:#0d2346;
  padding:12px;
  border-radius:8px;
  white-space:pre-wrap;
}

.fechar{
  background:#f7c600;
  color:black;
  border:none;
  border-radius:8px;
  padding:10px 14px;
  font-weight:bold;
  cursor:pointer;
}

.vazio{
  text-align:center;
  padding:30px;
  background:#102a52;
  border-radius:12px;
}

.tag{
  display:inline-block;
  background:#1a3f73;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  margin:3px 4px 0 0;
}

@media (max-width: 900px){
  .filtros,
  .times,
  .grid{
    grid-template-columns:1fr;
  }

  .linha-jogador,
  .acao-item{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<header>Súmulas Oficiais</header>

<div class="container">
  <a href="admin.html" class="btn-voltar">← Voltar</a>

  <div class="filtros">
    <input id="busca" placeholder="Buscar por time..." oninput="carregarSumulas()">
    <select id="filtroCategoria" onchange="carregarSumulas()">
      <option value="">Todas as categorias</option>
    </select>
    <select id="filtroCampeonato" onchange="carregarSumulas()">
      <option value="">Todos os campeonatos</option>
    </select>
  </div>

  <div id="listaSumulas"></div>
</div>

<div class="modal" id="modalSumula">
  <div class="modal-content" id="conteudoModal"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let todasSumulas = [];
let todosTimes = [];

async function carregarTimes(){
  const snap = await getDocs(collection(db, "times"));
  todosTimes = [];
  snap.forEach(d => {
    todosTimes.push(d.data());
  });
}

function pegarEscudo(nomeTime){
  const time = todosTimes.find(t => t.nome === nomeTime);
  return (time && time.escudo) ? time.escudo : "logo-liga.jfif";
}

async function carregarFiltros(){
  const catSelect = document.getElementById("filtroCategoria");
  const campSelect = document.getElementById("filtroCampeonato");

  const categorias = [...new Set(todasSumulas.map(s => s.categoria).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"pt-BR"));
  const campeonatos = [...new Set(todasSumulas.map(s => s.campeonato).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"pt-BR"));

  catSelect.innerHTML = '<option value="">Todas as categorias</option>';
  campSelect.innerHTML = '<option value="">Todos os campeonatos</option>';

  categorias.forEach(c => {
    catSelect.innerHTML += `<option value="${c}">${c}</option>`;
  });

  campeonatos.forEach(c => {
    campSelect.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

async function buscarSumulas(){
  const snap = await getDocs(collection(db, "sumulas"));
  todasSumulas = [];

  snap.forEach(d => {
    const s = d.data();
    todasSumulas.push({ id:d.id, ...s });
  });

  todasSumulas.sort((a,b)=>(b.enviadaEm || "").localeCompare(a.enviadaEm || ""));
}

function montarListaJogadores(lista){
  if(!lista || !lista.length){
    return "<div>Nenhum jogador informado.</div>";
  }

  return lista.map(j => `
    <div class="jogador">
      <div class="linha-jogador">
        <div><strong>${j.numero || "-"}</strong></div>
        <div>${j.nome || "-"}</div>
        <div>${j.posicao || "-"}</div>
      </div>
      ${j.observacao ? `<div class="obs-jogador">Obs: ${j.observacao}</div>` : ""}
    </div>
  `).join("");
}

function montarListaAcoes(lista, tipoTexto){
  if(!lista || !lista.length){
    return `<div>Nenhum ${tipoTexto} informado.</div>`;
  }

  return lista.map(a => `
    <div class="acao-item">
      <div><strong>${a.numero || "-"}</strong></div>
      <div>${a.nome || "-"}</div>
      <div>${a.tipo || a.obs || "-"}</div>
    </div>
  `).join("");
}

window.carregarSumulas = function(){
  const lista = document.getElementById("listaSumulas");
  const busca = (document.getElementById("busca").value || "").toLowerCase().trim();
  const categoria = document.getElementById("filtroCategoria").value;
  const campeonato = document.getElementById("filtroCampeonato").value;

  let filtradas = todasSumulas.filter(s => {
    const bateBusca =
      !busca ||
      (s.timeA || "").toLowerCase().includes(busca) ||
      (s.timeB || "").toLowerCase().includes(busca);

    const bateCategoria = !categoria || s.categoria === categoria;
    const bateCampeonato = !campeonato || s.campeonato === campeonato;

    return bateBusca && bateCategoria && bateCampeonato;
  });

  if(filtradas.length === 0){
    lista.innerHTML = `<div class="vazio">Nenhuma súmula encontrada.</div>`;
    return;
  }

  lista.innerHTML = "";

  filtradas.forEach(s => {
    lista.innerHTML += `
      <div class="card">
        <div class="topo-card">
          <div>
            <div class="titulo-jogo">${s.timeA || "-"} ${s.golsA ?? 0} x ${s.golsB ?? 0} ${s.timeB || "-"}</div>
            <div class="sub">${s.campeonato || "-"} | ${s.categoria || "-"} | ${s.data || "-"} | ${s.local || "-"}</div>
          </div>
          <a href="#" class="link-btn" onclick="abrirSumula('${s.id}'); return false;">Ver Súmula</a>
        </div>
      </div>
    `;
  });
};

window.abrirSumula = function(id){
  const s = todasSumulas.find(item => item.id === id);
  if(!s) return;

  const escudoA = pegarEscudo(s.timeA);
  const escudoB = pegarEscudo(s.timeB);

  document.getElementById("conteudoModal").innerHTML = `
    <div class="modal-topo">
      <img src="logo-liga.jfif" class="logo" alt="Liga">
      <div class="meio-topo">
        <h2>SÚMULA OFICIAL</h2>
        <div>${s.campeonato || "-"}</div>
        <div style="margin-top:6px;">${s.categoria || "-"} | ${s.data || "-"} | ${s.local || "-"}</div>
      </div>
      <img src="${s.logoCampeonato || 'logo-liga.jfif'}" class="logo" alt="Campeonato">
    </div>

    <div class="times">
      <div class="time-box">
        <div class="time-top">
          <img src="${escudoA}" class="escudo" alt="Escudo A">
          <div class="nome-time">${s.timeA || "-"}</div>
        </div>

        <div class="bloco">
          <h3>Comissão Técnica</h3>
          <div><span class="tag">Técnico</span> ${s.tecnicoA || "-"}</div>
          <div><span class="tag">Assistente 1</span> ${s.assistenteA1 || "-"}</div>
          <div><span class="tag">Assistente 2</span> ${s.assistenteA2 || "-"}</div>
        </div>

        <div class="bloco">
          <h3>Escalação</h3>
          ${montarListaJogadores(s.jogadoresA)}
        </div>

        <div class="bloco">
          <h3>Gols</h3>
          ${montarListaAcoes(s.golsDetalhadosA, "gol")}
        </div>

        <div class="bloco">
          <h3>Cartões Amarelos</h3>
          ${montarListaAcoes(s.amarelosDetalhadosA, "cartão amarelo")}
        </div>

        <div class="bloco">
          <h3>Cartões Vermelhos</h3>
          ${montarListaAcoes(s.vermelhosDetalhadosA, "cartão vermelho")}
        </div>
      </div>

      <div class="time-box">
        <div class="time-top">
          <img src="${escudoB}" class="escudo" alt="Escudo B">
          <div class="nome-time">${s.timeB || "-"}</div>
        </div>

        <div class="bloco">
          <h3>Comissão Técnica</h3>
          <div><span class="tag">Técnico</span> ${s.tecnicoB || "-"}</div>
          <div><span class="tag">Assistente 1</span> ${s.assistenteB1 || "-"}</div>
          <div><span class="tag">Assistente 2</span> ${s.assistenteB2 || "-"}</div>
        </div>

        <div class="bloco">
          <h3>Escalação</h3>
          ${montarListaJogadores(s.jogadoresB)}
        </div>

        <div class="bloco">
          <h3>Gols</h3>
          ${montarListaAcoes(s.golsDetalhadosB, "gol")}
        </div>

        <div class="bloco">
          <h3>Cartões Amarelos</h3>
          ${montarListaAcoes(s.amarelosDetalhadosB, "cartão amarelo")}
        </div>

        <div class="bloco">
          <h3>Cartões Vermelhos</h3>
          ${montarListaAcoes(s.vermelhosDetalhadosB, "cartão vermelho")}
        </div>
      </div>
    </div>

    <div class="info-box">
      <div class="grid">
        <div class="item-info"><strong>Placar:</strong><br>${s.timeA || "-"} ${s.golsA ?? 0} x ${s.golsB ?? 0} ${s.timeB || "-"}</div>
        <div class="item-info"><strong>Árbitro:</strong><br>${s.arbitro || "-"}</div>
        <div class="item-info"><strong>Árbitro Assistente 1:</strong><br>${s.arbitroAssistente1 || "-"}</div>
        <div class="item-info"><strong>Árbitro Assistente 2:</strong><br>${s.arbitroAssistente2 || "-"}</div>
        <div class="item-info"><strong>Árbitro Auxiliar:</strong><br>${s.arbitroAuxiliar || "-"}</div>
        <div class="item-info"><strong>Artilharia:</strong><br>${s.artilharia || "-"}</div>
        <div class="item-info"><strong>Cartões Amarelos:</strong><br>${s.amarelos || "-"}</div>
        <div class="item-info"><strong>Cartões Vermelhos:</strong><br>${s.vermelhos || "-"}</div>
        <div class="obs"><strong>Observações:</strong><br>${s.observacoes || "-"}</div>
      </div>

      <button class="fechar" onclick="fecharModal()" style="margin-top:16px;">Fechar</button>
    </div>
  `;

  document.getElementById("modalSumula").style.display = "block";
};

window.fecharModal = function(){
  document.getElementById("modalSumula").style.display = "none";
};

window.onclick = function(e){
  if(e.target.id === "modalSumula"){
    fecharModal();
  }
};

await carregarTimes();
await buscarSumulas();
await carregarFiltros();
carregarSumulas();
</script>

</body>
</html>
