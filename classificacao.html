<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classificação - LIGA GOIANA DE FUTEBOL DE BASE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-2:#0d2346;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-soft:rgba(247,198,0,.12);
      --gold-line:rgba(247,198,0,.24);
      --white:#ffffff;
      --muted:#d8e1ef;
      --shadow:0 8px 22px rgba(0,0,0,.28);
      --transition:.25s ease;
      --max:1240px;
      --win:#3dbb5d;
      --draw:#d8a100;
      --loss:#d34b4b;
      --info:#1fa2ff;
      --danger:#d9534f;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:Arial, sans-serif;
      background:
        linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
      min-height:100vh;
    }

    a{
      text-decoration:none;
      color:inherit;
      transition:var(--transition);
    }

    button{
      font-family:inherit;
      cursor:pointer;
      transition:var(--transition);
      border:none;
      background:none;
    }

    select{
      font-family:inherit;
    }

    .wrap{
      width:min(100% - 28px, var(--max));
      margin:0 auto;
    }

    header{
      background:rgba(8,23,44,.96);
      border-bottom:3px solid var(--gold);
      box-shadow:var(--shadow);
    }

    .header-top{
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:24px;
      font-weight:700;
      color:var(--white);
    }

    .top-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
      white-space:nowrap;
    }

    .btn-light{
      background:#fff4cf;
      color:#111;
    }

    .btn-light:hover{
      background:var(--gold);
      transform:translateY(-2px);
    }

    .nav-bar{
      background:rgba(16,42,82,.95);
      border-top:1px solid rgba(255,255,255,.06);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .menu{
      display:flex;
      justify-content:center;
      gap:10px;
      padding:12px 0;
      flex-wrap:wrap;
    }

    .menu a{
      color:#fff;
      font-weight:700;
      font-size:14px;
      background:#0d2346;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid transparent;
      cursor:pointer;
      white-space:nowrap;
    }

    .menu a:hover{
      color:var(--gold);
      background:var(--gold-soft);
      border-color:var(--gold-line);
    }

    .menu a.ativo{
      background:var(--gold);
      color:#111;
    }

    .container{
      padding:24px 0 40px;
    }

    .hero{
      background:linear-gradient(135deg, #102a52, #0d2346);
      border:1px solid var(--gold-line);
      border-radius:18px;
      padding:22px;
      margin-bottom:20px;
      box-shadow:var(--shadow);
    }

    .hero-top{
      display:flex;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .hero-logo{
      width:82px;
      height:82px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid rgba(255,255,255,.15);
      background:#1a3f73;
      flex-shrink:0;
    }

    .hero-info{
      flex:1;
      min-width:260px;
    }

    .hero h1{
      margin:0 0 8px;
      color:var(--gold);
      font-size:28px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:15px;
      max-width:900px;
    }

    .hero-tags{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .hero-tag{
      background:#0b1f3a;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      color:var(--white);
      border:1px solid rgba(255,255,255,.08);
    }

    .filtros{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:22px;
    }

    select{
      width:100%;
      padding:14px 14px;
      border:none;
      border-radius:10px;
      font-size:15px;
      box-sizing:border-box;
      background:#f5f7fb;
      color:#111;
    }

    select:focus{
      outline:2px solid rgba(247,198,0,.5);
    }

    .titulo-secao{
      font-size:22px;
      color:var(--gold);
      font-weight:700;
      margin:0 0 14px;
    }

    .abas{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .aba{
      color:#fff;
      font-weight:700;
      font-size:14px;
      background:#0d2346;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid transparent;
      cursor:pointer;
      white-space:nowrap;
    }

    .aba:hover{
      color:var(--gold);
      background:var(--gold-soft);
      border-color:var(--gold-line);
    }

    .aba.ativa{
      background:var(--gold);
      color:#111;
    }

    .subabas{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .subaba{
      min-width:120px;
      text-align:center;
      color:#cfe0ff;
      font-weight:700;
      font-size:14px;
      background:rgba(13,35,70,.95);
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      cursor:pointer;
      white-space:nowrap;
    }

    .subaba.ativa{
      color:#111;
      background:var(--gold);
      border-color:var(--gold);
    }

    .subaba:hover{
      border-color:var(--gold-line);
      color:var(--gold);
    }

    .subaba.ativa:hover{
      color:#111;
    }

    .bloco{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-bottom:18px;
    }

    .bloco-titulo{
      padding:16px 18px;
      font-size:17px;
      font-weight:700;
      border-bottom:1px solid rgba(255,255,255,.08);
      color:#fff;
    }

    .bloco-conteudo{
      padding:18px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .info-card{
      background:rgba(11,31,58,.72);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:16px;
    }

    .info-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .info-valor{
      font-size:20px;
      font-weight:700;
      color:#fff;
    }

    .linha-info{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .linha-info:last-child{
      border-bottom:none;
    }

    .linha-esquerda{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .mini-escudo{
      width:40px;
      height:40px;
      border-radius:50%;
      object-fit:cover;
      background:#1a3f73;
      border:1px solid rgba(255,255,255,.08);
      flex-shrink:0;
    }

    .linha-texto{
      min-width:0;
    }

    .linha-titulo{
      font-size:15px;
      font-weight:700;
      color:#fff;
      line-height:1.35;
    }

    .linha-sub{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      margin-top:2px;
    }

    .linha-direita{
      text-align:right;
      flex-shrink:0;
    }

    .numero{
      font-size:24px;
      font-weight:700;
      color:var(--gold);
      line-height:1;
    }

    .botao-ver-mais{
      margin-top:14px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:10px;
      background:#0d2346;
      color:#fff;
      font-weight:700;
      border:1px solid rgba(255,255,255,.08);
      cursor:pointer;
    }

    .botao-ver-mais:hover{
      color:var(--gold);
      border-color:var(--gold-line);
      background:var(--gold-soft);
    }

    .tabela-box{
      overflow-x:auto;
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
    }

    .tabela-box::-webkit-scrollbar{
      height:8px;
    }

    .tabela-box::-webkit-scrollbar-thumb{
      background:rgba(247,198,0,.35);
      border-radius:999px;
    }

    table{
      width:100%;
      min-width:1200px;
      border-collapse:collapse;
    }

    thead tr{
      background:#081a33;
    }

    th,
    td{
      padding:14px 10px;
      border-bottom:1px solid rgba(255,255,255,.08);
      text-align:center;
      font-size:14px;
    }

    th{
      color:var(--gold);
      font-weight:700;
      white-space:nowrap;
    }

    td{
      color:#fff;
    }

    .col-pos{
      width:56px;
      font-weight:700;
    }

    .col-time{
      min-width:280px;
      text-align:left;
    }

    .time-wrap{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .escudo{
      width:32px;
      height:32px;
      border-radius:50%;
      object-fit:cover;
      background:#1a3f73;
      flex-shrink:0;
      border:1px solid rgba(255,255,255,.08);
    }

    .time-nome{
      font-weight:700;
      color:#fff;
      line-height:1.35;
    }

    .time-extra{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-top:3px;
    }

    .pontos{
      color:var(--gold);
      font-weight:700;
      font-size:18px;
    }

    .forma-cell{
      min-width:170px;
    }

    .forma{
      display:flex;
      justify-content:center;
      gap:6px;
      flex-wrap:nowrap;
    }

    .bolinha{
      width:28px;
      height:28px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:700;
      color:#fff;
      flex-shrink:0;
    }

    .vitoria{ background:var(--win); }
    .empate{ background:var(--draw); color:#111; }
    .derrota{ background:var(--loss); }

    .lista-jogos{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .grupo-data{
      margin-top:6px;
    }

    .grupo-data-titulo{
      font-size:17px;
      color:var(--gold);
      font-weight:700;
      margin:0 0 10px;
    }

    .jogo-card{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      border:1px solid rgba(255,255,255,.06);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .jogo-topo{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .times-jogo{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      width:100%;
      font-weight:700;
    }

    .jogo-time{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .placar{
      font-size:20px;
      font-weight:700;
      color:var(--gold);
      flex-shrink:0;
      min-width:86px;
      text-align:center;
    }

    .status{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-top:10px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }

    .status.finalizado{ background:#1b5e20; color:#fff; }
    .status.agendado{ background:#7a5a00; color:#fff; }

    .vazio{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:30px;
      border-radius:14px;
      text-align:center;
      color:var(--muted);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
    }

    @media (max-width:900px){
      .header-title{
        order:3;
        width:100%;
        text-align:center;
      }

      .header-left,
      .header-right{
        width:100%;
        justify-content:center;
      }

      .filtros{
        grid-template-columns:1fr;
      }

      .grid-2{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:600px){
      .header-top{
        flex-direction:column;
        align-items:center;
      }

      .header-title{
        order:2;
        width:100%;
        text-align:center;
      }

      .header-left{
        order:1;
        width:100%;
        display:flex;
        flex-direction:row;
        align-items:center;
        justify-content:center;
        gap:10px;
        flex-wrap:nowrap;
      }

      .header-right{
        display:none;
      }

      .top-btn{
        width:auto;
        min-width:0;
        flex:1;
        justify-content:center;
        padding:10px 12px;
        font-size:14px;
      }

      .menu{
        justify-content:flex-start;
        flex-wrap:nowrap;
        overflow-x:auto;
        padding:12px 4px;
        scrollbar-width:none;
      }

      .menu::-webkit-scrollbar{
        display:none;
      }

      .menu a{
        width:auto;
        min-width:max-content;
        flex:0 0 auto;
        text-align:center;
      }

      .abas{
        justify-content:flex-start;
        flex-wrap:nowrap;
        overflow-x:auto;
        padding-bottom:4px;
        scrollbar-width:none;
      }

      .abas::-webkit-scrollbar{
        display:none;
      }

      .aba{
        flex:0 0 auto;
      }

      .subabas{
        justify-content:flex-start;
        flex-wrap:nowrap;
        overflow-x:auto;
        padding-bottom:4px;
        scrollbar-width:none;
      }

      .subabas::-webkit-scrollbar{
        display:none;
      }

      .subaba{
        flex:0 0 auto;
        min-width:max-content;
      }

      table{
        min-width:1100px;
      }

      .hero h1{
        font-size:24px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="wrap header-top">
    <div class="header-left">
      <button class="top-btn btn-light" onclick="voltarPagina()">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </button>

      <a href="index.html" class="top-btn btn-light">
        <i class="fa-solid fa-house"></i> Página Inicial
      </a>
    </div>

    <div class="header-title">LIGA GOIANA DE FUTEBOL DE BASE</div>

    <div class="header-right"></div>
  </div>

  <div class="nav-bar">
    <div class="wrap">
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="campeonatos.html">Campeonatos</a>
        <a href="tabela.html">Tabela</a>
        <a href="jogos.html">Jogos</a>
        <a href="times.html">Times</a>
        <a href="artilharia.html">Artilharia</a>
        <a href="cartoes.html">Cartões</a>
        <a href="suspensos.html">Suspensos</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </div>
</header>

<main class="wrap container">

  <section class="hero">
    <div class="hero-top">
      <img id="heroLogo" class="hero-logo" src="logo-liga.jfif" alt="Logo campeonato">

      <div class="hero-info">
        <h1 id="heroTitulo">Classificação</h1>
        <p id="heroSub">Visualização completa do campeonato selecionado.</p>

        <div class="hero-tags">
          <div class="hero-tag" id="tagCategoria">Categoria: -</div>
          <div class="hero-tag" id="tagJogos">Jogos: 0</div>
          <div class="hero-tag" id="tagTimes">Times: 0</div>
          <div class="hero-tag" id="tagGols">Gols: 0</div>
        </div>
      </div>
    </div>
  </section>

  <section class="filtros">
    <select id="filtroCampeonato">
      <option value="">Selecione o campeonato</option>
    </select>

    <select id="filtroCategoria">
      <option value="">Selecione a categoria</option>
    </select>
  </section>

  <section>
    <h2 class="titulo-secao">Temporada</h2>

    <div class="abas">
      <button class="aba ativa" onclick="trocarAba('detalhes', this)">Detalhes</button>
      <button class="aba" onclick="trocarAba('jogos', this)">Jogos</button>
      <button class="aba" onclick="trocarAba('classificacao', this)">Classificação</button>
      <button class="aba" onclick="trocarAba('jogadores', this)">Jogadores</button>
      <button class="aba" onclick="trocarAba('times', this)">Times</button>
      <button class="aba" onclick="trocarAba('historico', this)">Histórico</button>
    </div>

    <div class="subabas" id="subAbas"></div>
    <div id="conteudo"></div>
  </section>

</main>

<script type="module">
  import { db } from "./firebase.js";
  import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  let abaAtual = "detalhes";
  let subAbaAtual = "geral";

  let campeonatos = [];
  let jogos = [];
  let times = [];

  function voltarPagina(){
    if (history.length > 1) {
      history.back();
    } else {
      window.location.href = "index.html";
    }
  }

  function normalizarTexto(texto){
    return String(texto || "")
      .trim()
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
  }

  function valorCampo(obj, chaves, fallback = ""){
    for (const chave of chaves){
      if (obj && obj[chave] !== undefined && obj[chave] !== null && obj[chave] !== "") {
        return obj[chave];
      }
    }
    return fallback;
  }

  function obterIdCampeonato(doc){
    return valorCampo(doc, ["id", "campeonatoId"], "");
  }

  function obterNomeCampeonato(doc){
    return valorCampo(doc, ["nome", "campeonato", "titulo"], "");
  }

  function obterEscudoTime(nome){
    const time = times.find(t => normalizarTexto(valorCampo(t, ["nome"], "")) === normalizarTexto(nome));
    return valorCampo(time, ["escudo", "logo"], "logo-liga.jfif");
  }

  function obterCategoriasDoCampeonato(camp){
    const lista = valorCampo(camp, ["categorias"], []);
    if (Array.isArray(lista) && lista.length) return lista;

    const campId = obterIdCampeonato(camp);
    const nomeCamp = obterNomeCampeonato(camp);

    const setCategorias = new Set();

    jogos.forEach(j => {
      const jogoCampId = valorCampo(j, ["campeonatoId"], "");
      const jogoCampNome = valorCampo(j, ["campeonato", "nomeCampeonato"], "");
      const categoria = valorCampo(j, ["categoria"], "");

      const mesmoCamp = (campId && jogoCampId === campId) ||
        (!campId && normalizarTexto(jogoCampNome) === normalizarTexto(nomeCamp));

      if (mesmoCamp && categoria) {
        setCategorias.add(categoria);
      }
    });

    return Array.from(setCategorias).sort((a,b) => String(a).localeCompare(String(b), "pt-BR"));
  }

  async function carregarDadosFirebase(){
    const [snapCampeonatos, snapJogos, snapTimes] = await Promise.all([
      getDocs(collection(db, "campeonatos")),
      getDocs(collection(db, "jogos")),
      getDocs(collection(db, "times"))
    ]);

    campeonatos = [];
    jogos = [];
    times = [];

    snapCampeonatos.forEach(docSnap => {
      campeonatos.push({ id: docSnap.id, ...docSnap.data() });
    });

    snapJogos.forEach(docSnap => {
      jogos.push({ id: docSnap.id, ...docSnap.data() });
    });

    snapTimes.forEach(docSnap => {
      times.push({ id: docSnap.id, ...docSnap.data() });
    });
  }

  function preencherCampeonatos(){
    const select = document.getElementById("filtroCampeonato");
    select.innerHTML = `<option value="">Selecione o campeonato</option>`;

    campeonatos
      .sort((a,b) => obterNomeCampeonato(a).localeCompare(obterNomeCampeonato(b), "pt-BR"))
      .forEach(c => {
        const option = document.createElement("option");
        option.value = obterIdCampeonato(c);
        option.textContent = obterNomeCampeonato(c);
        select.appendChild(option);
      });
  }

  function preencherCategorias(){
    const select = document.getElementById("filtroCategoria");
    const campId = document.getElementById("filtroCampeonato").value;

    select.innerHTML = `<option value="">Selecione a categoria</option>`;

    if(!campId) return;

    const camp = campeonatos.find(c => obterIdCampeonato(c) === campId);
    if(!camp) return;

    const categorias = obterCategoriasDoCampeonato(camp);
    categorias.forEach(cat => {
      const option = document.createElement("option");
      option.value = cat;
      option.textContent = cat;
      select.appendChild(option);
    });
  }

  function getFiltros(){
    const campeonatoId = document.getElementById("filtroCampeonato").value;
    const categoria = document.getElementById("filtroCategoria").value;
    const campeonato = campeonatos.find(c => obterIdCampeonato(c) === campeonatoId) || null;
    return { campeonatoId, categoria, campeonato };
  }

  function jogosFiltrados(){
    const { campeonatoId, categoria, campeonato } = getFiltros();
    if(!campeonatoId || !categoria || !campeonato) return [];

    const nomeCamp = obterNomeCampeonato(campeonato);

    return jogos.filter(j => {
      const jogoCampId = valorCampo(j, ["campeonatoId"], "");
      const jogoCampNome = valorCampo(j, ["campeonato", "nomeCampeonato"], "");
      const jogoCategoria = valorCampo(j, ["categoria"], "");

      const mesmoCamp = jogoCampId === campeonatoId ||
        normalizarTexto(jogoCampNome) === normalizarTexto(nomeCamp);

      return mesmoCamp && jogoCategoria === categoria;
    });
  }

  function jogosFinalizadosFiltrados(){
    return jogosFiltrados().filter(j => {
      const status = normalizarTexto(valorCampo(j, ["status"], ""));
      const temPlacar = valorCampo(j, ["golsA"], null) !== null && valorCampo(j, ["golsB"], null) !== null;
      return status === "sumula_enviada" || status === "finalizado" || temPlacar;
    });
  }

  function ordenarPorData(lista){
    return [...lista].sort((a,b) => {
      const dataA = valorCampo(a, ["data", "dataHora"], "");
      const dataB = valorCampo(b, ["data", "dataHora"], "");
      return String(dataA).localeCompare(String(dataB));
    });
  }

  function formatarDataHora(dataString){
    if(!dataString) return "-";
    const data = new Date(dataString);
    if(isNaN(data.getTime())) return String(dataString);

    const dia = String(data.getDate()).padStart(2, "0");
    const mes = String(data.getMonth() + 1).padStart(2, "0");
    const ano = data.getFullYear();
    const hora = String(data.getHours()).padStart(2, "0");
    const minuto = String(data.getMinutes()).padStart(2, "0");
    return `${dia}/${mes}/${ano} - ${hora}:${minuto}`;
  }

  function agruparJogosPorData(lista){
    const grupos = {};
    lista.forEach(j => {
      const chave = valorCampo(j, ["dataAgrupada"], "");
      if(chave){
        if(!grupos[chave]) grupos[chave] = [];
        grupos[chave].push(j);
        return;
      }

      const dataRaw = valorCampo(j, ["data", "dataHora"], "");
      if(!dataRaw){
        if(!grupos["Sem data"]) grupos["Sem data"] = [];
        grupos["Sem data"].push(j);
        return;
      }

      const data = new Date(dataRaw);
      let titulo = "Sem data";
      if(!isNaN(data.getTime())){
        titulo = data.toLocaleDateString("pt-BR", {
          weekday: "long",
          day: "2-digit",
          month: "2-digit"
        });
      }

      if(!grupos[titulo]) grupos[titulo] = [];
      grupos[titulo].push(j);
    });
    return grupos;
  }

  function atualizarHero(){
    const { campeonato, categoria } = getFiltros();
    const listaJogos = jogosFiltrados();
    const listaFinalizados = jogosFinalizadosFiltrados();

    const timesSet = new Set();
    listaJogos.forEach(j => {
      const timeA = valorCampo(j, ["timeA", "mandante"], "");
      const timeB = valorCampo(j, ["timeB", "visitante"], "");
      if(timeA) timesSet.add(timeA);
      if(timeB) timesSet.add(timeB);
    });

    let gols = 0;
    listaFinalizados.forEach(j => {
      gols += Number(valorCampo(j, ["golsA"], 0));
      gols += Number(valorCampo(j, ["golsB"], 0));
    });

    document.getElementById("heroTitulo").innerText = campeonato ? obterNomeCampeonato(campeonato) : "Classificação";
    document.getElementById("heroSub").innerText = campeonato
      ? "Visualização completa do campeonato selecionado."
      : "Selecione um campeonato e uma categoria para visualizar os dados.";
    document.getElementById("heroLogo").src = campeonato ? valorCampo(campeonato, ["logo"], "logo-liga.jfif") : "logo-liga.jfif";
    document.getElementById("tagCategoria").innerText = "Categoria: " + (categoria || "-");
    document.getElementById("tagJogos").innerText = "Jogos: " + listaFinalizados.length;
    document.getElementById("tagTimes").innerText = "Times: " + timesSet.size;
    document.getElementById("tagGols").innerText = "Gols: " + gols;
  }

  function trocarAba(nome, el){
    abaAtual = nome;
    subAbaAtual = "geral";

    document.querySelectorAll(".aba").forEach(b => b.classList.remove("ativa"));
    el.classList.add("ativa");

    montarSubAbas();
    atualizarTela();
  }

  function montarSubAbas(){
    const box = document.getElementById("subAbas");
    box.innerHTML = "";

    let lista = [];

    if(abaAtual === "classificacao"){
      lista = ["Geral", "Casa", "Fora"];
    }

    if(!lista.length) return;

    lista.forEach((nome, i) => {
      const btn = document.createElement("button");
      btn.className = "subaba " + (i === 0 ? "ativa" : "");
      btn.innerText = nome;

      btn.onclick = () => {
        subAbaAtual = nome.toLowerCase();
        document.querySelectorAll(".subaba").forEach(b => b.classList.remove("ativa"));
        btn.classList.add("ativa");
        atualizarTela();
      };

      box.appendChild(btn);
    });
  }

  function renderDetalhes(){
    const box = document.getElementById("conteudo");

        const status = normalizarTexto(valorCampo(j, ["status"], ""));

      })

    box.innerHTML = `
      <div class="grid-2">
        <div class="bloco">
          <div class="bloco-titulo">Detalhes da competição</div>
          <div class="bloco-conteudo">
            <div class="grid-2">
              <div class="info-card">
                <div class="info-label">Campeão atual</div>
                <div class="info-valor">${valorCampo(campeonato, ["campeaoAtual"], "-")}</div>
              </div>

              <div class="info-card">
                <div class="info-label">Mais títulos</div>
                <div class="info-valor">${valorCampo(campeonato, ["maisTitulos", "titulos"], "-")}</div>
              </div>

              <div class="info-card">
                <div class="info-label">País</div>
                <div class="info-valor">${valorCampo(campeonato, ["pais"], "Brasil")}</div>
              </div>

              <div class="info-card">
                <div class="info-label">Times</div>
                <div class="info-valor">${new Set(listaJogos.flatMap(j => [valorCampo(j, ["timeA"], ""), valorCampo(j, ["timeB"], "")]).filter(Boolean)).size}</div>
              </div>

              <div class="info-card">
                <div class="info-label">Rodada</div>
                <div class="info-valor">${valorCampo(campeonato, ["rodadaAtual"], "-")}</div>
              </div>

              <div class="info-card">
                <div class="info-label">Temporada</div>
                <div class="info-valor">${valorCampo(campeonato, ["temporada"], "-")}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="bloco">
          <div class="bloco-titulo">Próximo jogo</div>
          <div class="bloco-conteudo">
            ${
              proximoJogo ? `
                <div class="jogo-card" style="margin:0;">
                  <div class="jogo-topo">
                    <div class="times-jogo">
                      <div class="jogo-time">
                        <img src="${obterEscudoTime(valorCampo(proximoJogo, ["timeA"], ""))}" class="mini-escudo">
                        <span>${valorCampo(proximoJogo, ["timeA"], "-")}</span>
                      </div>

                      <div class="placar">x</div>

                      <div class="jogo-time" style="justify-content:flex-end;">
                        <span>${valorCampo(proximoJogo, ["timeB"], "-")}</span>
                        <img src="${obterEscudoTime(valorCampo(proximoJogo, ["timeB"], ""))}" class="mini-escudo">
                      </div>
                    </div>
                  </div>

                  <div class="linha-sub" style="margin-top:10px;">
                    ${formatarDataHora(valorCampo(proximoJogo, ["data"], ""))}
                  </div>

                  <div class="status agendado">Agendado</div>
                </div>
              ` : `<div class="vazio" style="padding:20px;">Nenhum próximo jogo encontrado.</div>`
            }
          </div>
        </div>
      </div>
    `;
  }
function renderJogos(){
    const box = document.getElementById("conteudo");
    const lista = ordenarPorData(jogosFiltrados());

    if(!lista.length){
      box.innerHTML = `<div class="vazio">Nenhum jogo encontrado para esse campeonato/categoria.</div>`;
      return;
    }

    const grupos = agruparJogosPorData(lista);

    box.innerHTML = `

      </div>
    `;

      bloco.innerHTML = `
        <div class="grupo-data-titulo">${data}</div>
        ${grupos[data].map(j => {
          const status = normalizarTexto(valorCampo(j, ["status"], ""));
          const finalizado = status === "sumula_enviada" || status === "finalizado";
          return `
            <div class="jogo-card">

                    <span>${valorCampo(j, ["timeA"], "-")}</span>
                  </div>

                  <div class="placar">${finalizado ? `${Number(valorCampo(j, ["golsA"], 0))} x ${Number(valorCampo(j, ["golsB"], 0))}` : "x"}</div>

                  <div class="jogo-time" style="justify-content:flex-end;">
                    <span>${valorCampo(j, ["timeB"], "-")}</span>

                  </div>

              </div>

              <div class="linha-sub" style="margin-top:10px;">
                ${formatarDataHora(valorCampo(j, ["data"], ""))}

              <div class="status ${finalizado ? "finalizado" : "agendado"}">
                ${finalizado ? "Finalizado" : "Agendado"}

  function criarLinhaClassificacao(nome){
    return {
      nome,
      pontos: 0,
      jogos: 0,
      v: 0,
      e: 0,
      d: 0,
      gp: 0,
      gc: 0,
      forma: []
    };
  }

  function adicionarForma(time, resultado){
    time.forma.push(resultado);
    if(time.forma.length > 5){
      time.forma.shift();
    }
  }

  function montarClassificacao(modo = "geral"){
    const lista = ordenarPorData(jogosFinalizadosFiltrados());
    const tabela = {};

    lista.forEach(j => {
      const timeA = valorCampo(j, ["timeA"], "");
      const timeB = valorCampo(j, ["timeB"], "");
      const golsA = Number(valorCampo(j, ["golsA"], 0));
      const golsB = Number(valorCampo(j, ["golsB"], 0));

      if(!timeA || !timeB) return;

      if(!tabela[timeA]) tabela[timeA] = criarLinhaClassificacao(timeA);
      if(!tabela[timeB]) tabela[timeB] = criarLinhaClassificacao(timeB);

      const a = tabela[timeA];
      const b = tabela[timeB];

      let contaA = true;
      let contaB = true;

      if(modo === "casa"){
        contaB = false;
      }

      if(modo === "fora"){
        contaA = false;
      }

      if(contaA){
        a.jogos++;
        a.gp += golsA;
        a.gc += golsB;
      }

      if(contaB){
        b.jogos++;
        b.gp += golsB;
        b.gc += golsA;
      }

      if(golsA > golsB){
        if(contaA){
          a.v++;
          a.pontos += 3;
          adicionarForma(a, "V");
        }
        if(contaB){
          b.d++;
          adicionarForma(b, "D");
        }
      } else if(golsB > golsA){
        if(contaB){
          b.v++;
          b.pontos += 3;
          adicionarForma(b, "V");
        }
        if(contaA){
          a.d++;
          adicionarForma(a, "D");
        }
      } else {
        if(contaA){
          a.e++;
          a.pontos += 1;
          adicionarForma(a, "E");
        }
        if(contaB){
          b.e++;
          b.pontos += 1;
          adicionarForma(b, "E");
        }
      }
    });

    return Object.values(tabela).sort((a,b) => {
      const sgA = a.gp - a.gc;
      const sgB = b.gp - b.gc;

      if(b.pontos !== a.pontos) return b.pontos - a.pontos;
      if(b.v !== a.v) return b.v - a.v;
      if(sgB !== sgA) return sgB - sgA;
      if(b.gp !== a.gp) return b.gp - a.gp;
      return a.nome.localeCompare(b.nome, "pt-BR");
    });
  }

  function renderClassificacao(){
    const box = document.getElementById("conteudo");
    const lista = montarClassificacao(subAbaAtual || "geral");

    if(!lista.length){
      box.innerHTML = `<div class="vazio">Nenhum jogo finalizado encontrado para montar a classificação.</div>`;
      return;
    }

    box.innerHTML = `
      <div class="bloco">
        <div class="bloco-titulo">Classificação completa</div>
        <div class="bloco-conteudo">
          <div class="tabela-box">
            <table>
              <thead>
                <tr>
                  <th class="col-pos">#</th>
                  <th class="col-time">Time</th>
                  <th>P</th>
                  <th>J</th>
                  <th>V</th>
                  <th>E</th>
                  <th>D</th>
                  <th>GM</th>
                  <th>GS</th>
                  <th>SG</th>
                  <th class="forma-cell">Últimos 5</th>
                </tr>
              </thead>
              <tbody>
                ${lista.map((t,i) => `
                  <tr>
                    <td class="col-pos">${i + 1}</td>

                    <td class="col-time">
                      <div class="time-wrap">
                        <img src="${obterEscudoTime(t.nome)}" class="escudo">
                        <div>
                          <div class="time-nome">${t.nome}</div>
                          <span class="time-extra">${i < 4 ? "Classificado" : "Em disputa"}</span>
                        </div>
                      </div>
                    </td>

                    <td class="pontos">${t.pontos}</td>
                    <td>${t.jogos}</td>
                    <td>${t.v}</td>
                    <td>${t.e}</td>
                    <td>${t.d}</td>
                    <td>${t.gp}</td>
                    <td>${t.gc}</td>
                    <td>${t.gp - t.gc}</td>

                    <td class="forma-cell">
                      <div class="forma">
                        ${t.forma.map(r => `
                          <div class="bolinha ${r === "V" ? "vitoria" : r === "E" ? "empate" : "derrota"}">${r}</div>
                        `).join("")}
                      </div>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  }

  function renderJogadores(){
    const box = document.getElementById("conteudo");
    box.innerHTML = `
      <div class="vazio">
        Essa parte eu deixei preparada. No próximo passo eu ligo jogadores reais pelo Firebase.
      </div>
    `;
  }

  function renderTimes(){
    const box = document.getElementById("conteudo");
    const lista = jogosFiltrados();

    const nomes = new Set();
    lista.forEach(j => {
      const timeA = valorCampo(j, ["timeA"], "");
      const timeB = valorCampo(j, ["timeB"], "");
      if(timeA) nomes.add(timeA);
      if(timeB) nomes.add(timeB);
    });

    const timesLista = Array.from(nomes).sort((a,b) => a.localeCompare(b, "pt-BR"));

    if(!timesLista.length){
      box.innerHTML = `<div class="vazio">Nenhum time encontrado para esse campeonato/categoria.</div>`;
      return;
    }

    box.innerHTML = `
      <div class="bloco">
        <div class="bloco-titulo">Times do campeonato</div>
        <div class="bloco-conteudo">
          ${timesLista.map(nome => `
            <div class="linha-info">
              <div class="linha-esquerda">
                <img src="${obterEscudoTime(nome)}" class="mini-escudo">
                <div class="linha-texto">
                  <div class="linha-titulo">${nome}</div>
                  <div class="linha-sub">Time inscrito nesta categoria</div>
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }

  function renderHistorico(){
    const box = document.getElementById("conteudo");
    box.innerHTML = `
      <div class="vazio">
        O histórico eu ligo no próximo passo, quando organizarmos campeonatos encerrados por temporada.
      </div>
    `;
  }

  function atualizarTela(){
    atualizarHero();

    if(abaAtual === "detalhes") renderDetalhes();
    if(abaAtual === "jogos") renderJogos();
    if(abaAtual === "classificacao") renderClassificacao();
    if(abaAtual === "jogadores") renderJogadores();
    if(abaAtual === "times") renderTimes();
    if(abaAtual === "historico") renderHistorico();
  }

  async function iniciar(){
    document.getElementById("conteudo").innerHTML = `<div class="vazio">Carregando classificação...</div>`;

    try{
      await carregarDadosFirebase();
      preencherCampeonatos();
      montarSubAbas();
      atualizarTela();
    }catch(error){
      console.error(error);
      document.getElementById("conteudo").innerHTML = `<div class="vazio">Erro ao carregar dados do Firebase.</div>`;
    }
  }

  document.getElementById("filtroCampeonato").addEventListener("change", () => {
    preencherCategorias();
    document.getElementById("filtroCategoria").value = "";
    atualizarTela();
  });

  document.getElementById("filtroCategoria").addEventListener("change", atualizarTela);

  iniciar();
</script>
