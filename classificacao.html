<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classificação - LIGA GOIANA DE FUTEBOL DE BASE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-2:#0d2346;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-soft:rgba(247,198,0,.12);
      --gold-line:rgba(247,198,0,.24);
      --white:#ffffff;
      --muted:#d8e1ef;
      --shadow:0 8px 22px rgba(0,0,0,.28);
      --transition:.25s ease;
      --max:1240px;
      --win:#3dbb5d;
      --draw:#d8a100;
      --loss:#d34b4b;
      --info:#1fa2ff;
      --danger:#d9534f;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:Arial, sans-serif;
      background:
        linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
      min-height:100vh;
    }

    a{
      text-decoration:none;
      color:inherit;
      transition:var(--transition);
    }

    button{
      font-family:inherit;
      cursor:pointer;
      transition:var(--transition);
      border:none;
      background:none;
    }

    select{
      font-family:inherit;
    }

    .wrap{
      width:min(100% - 28px, var(--max));
      margin:0 auto;
    }

    header{
      background:rgba(8,23,44,.96);
      border-bottom:3px solid var(--gold);
      box-shadow:var(--shadow);
    }

    .header-top{
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:24px;
      font-weight:700;
      color:var(--white);
    }

    .top-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
      white-space:nowrap;
    }

    .btn-light{
      background:#fff4cf;
      color:#111;
    }

    .btn-light:hover{
      background:var(--gold);
      transform:translateY(-2px);
    }

    .nav-bar{
      background:rgba(16,42,82,.95);
      border-top:1px solid rgba(255,255,255,.06);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .menu{
      display:flex;
      justify-content:center;
      gap:10px;
      padding:12px 0;
      flex-wrap:wrap;
    }

    .menu a{
      color:#fff;
      font-weight:700;
      font-size:14px;
      background:#0d2346;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid transparent;
      cursor:pointer;
      white-space:nowrap;
    }

    .menu a:hover{
      color:var(--gold);
      background:var(--gold-soft);
      border-color:var(--gold-line);
    }

    .menu a.ativo{
      background:var(--gold);
      color:#111;
    }

    .container{
      padding:24px 0 40px;
    }

    .hero{
      background:linear-gradient(135deg, #102a52, #0d2346);
      border:1px solid var(--gold-line);
      border-radius:18px;
      padding:22px;
      margin-bottom:20px;
      box-shadow:var(--shadow);
    }

    .hero-top{
      display:flex;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .hero-logo{
      width:82px;
      height:82px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid rgba(255,255,255,.15);
      background:#1a3f73;
      flex-shrink:0;
    }

    .hero-info{
      flex:1;
      min-width:260px;
    }

    .hero h1{
      margin:0 0 8px;
      color:var(--gold);
      font-size:28px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:15px;
      max-width:900px;
    }

    .hero-tags{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .hero-tag{
      background:#0b1f3a;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      color:var(--white);
      border:1px solid rgba(255,255,255,.08);
    }

    .filtros{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:22px;
    }

    select{
      width:100%;
      padding:14px 14px;
      border:none;
      border-radius:10px;
      font-size:15px;
      box-sizing:border-box;
      background:#f5f7fb;
      color:#111;
    }

    select:focus{
      outline:2px solid rgba(247,198,0,.5);
    }

    .titulo-secao{
      font-size:22px;
      color:var(--gold);
      font-weight:700;
      margin:0 0 14px;
    }

    .abas{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .aba{
      color:#fff;
      font-weight:700;
      font-size:14px;
      background:#0d2346;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid transparent;
      cursor:pointer;
      white-space:nowrap;
    }

    .aba:hover{
      color:var(--gold);
      background:var(--gold-soft);
      border-color:var(--gold-line);
    }

    .aba.ativa{
      background:var(--gold);
      color:#111;
    }

    .subabas{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .subaba{
      min-width:120px;
      text-align:center;
      color:#cfe0ff;
      font-weight:700;
      font-size:14px;
      background:rgba(13,35,70,.95);
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      cursor:pointer;
      white-space:nowrap;
    }

    .subaba.ativa{
      color:#111;
      background:var(--gold);
      border-color:var(--gold);
    }

    .subaba:hover{
      border-color:var(--gold-line);
      color:var(--gold);
    }

    .subaba.ativa:hover{
      color:#111;
    }

    .bloco{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-bottom:18px;
    }

    .bloco-titulo{
      padding:16px 18px;
      font-size:17px;
      font-weight:700;
      border-bottom:1px solid rgba(255,255,255,.08);
      color:#fff;
    }

    .bloco-conteudo{
      padding:18px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .grid-3{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:16px;
    }

    .info-card{
      background:rgba(11,31,58,.72);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:16px;
    }

    .info-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .info-valor{
      font-size:20px;
      font-weight:700;
      color:#fff;
    }
.linha-info{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .linha-info:last-child{
      border-bottom:none;
    }

    .linha-esquerda{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .mini-escudo{
      width:40px;
      height:40px;
      border-radius:50%;
      object-fit:cover;
      background:#1a3f73;
      border:1px solid rgba(255,255,255,.08);
      flex-shrink:0;
    }

    .linha-texto{
      min-width:0;
    }

    .linha-titulo{
      font-size:15px;
      font-weight:700;
      color:#fff;
      line-height:1.35;
    }

    .linha-sub{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      margin-top:2px;
    }

    .linha-direita{
      text-align:right;
      flex-shrink:0;
    }

    .numero{
      font-size:24px;
      font-weight:700;
      color:var(--gold);
      line-height:1;
    }

    .numero-legenda{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .botao-ver-mais{
      margin-top:14px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:10px;
      background:#0d2346;
      color:#fff;
      font-weight:700;
      border:1px solid rgba(255,255,255,.08);
      cursor:pointer;
    }

    .botao-ver-mais:hover{
      color:var(--gold);
      border-color:var(--gold-line);
      background:var(--gold-soft);
    }

    .tabela-box{
      overflow-x:auto;
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
    }

    .tabela-box::-webkit-scrollbar{
      height:8px;
    }

    .tabela-box::-webkit-scrollbar-thumb{
      background:rgba(247,198,0,.35);
      border-radius:999px;
    }

    table{
      width:100%;
      min-width:1200px;
      border-collapse:collapse;
    }

    thead tr{
      background:#081a33;
    }

    th,
    td{
      padding:14px 10px;
      border-bottom:1px solid rgba(255,255,255,.08);
      text-align:center;
      font-size:14px;
    }

    th{
      color:var(--gold);
      font-weight:700;
      white-space:nowrap;
    }

    td{
      color:#fff;
    }

    .col-pos{
      width:56px;
      font-weight:700;
    }

    .col-time{
      min-width:280px;
      text-align:left;
    }

    .time-wrap{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .escudo{
      width:32px;
      height:32px;
      border-radius:50%;
      object-fit:cover;
      background:#1a3f73;
      flex-shrink:0;
      border:1px solid rgba(255,255,255,.08);
    }

    .time-nome{
      font-weight:700;
      color:#fff;
      line-height:1.35;
    }

    .time-extra{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-top:3px;
    }

    .pontos{
      color:var(--gold);
      font-weight:700;
      font-size:18px;
    }

    .forma-cell{
      min-width:170px;
    }

    .forma{
      display:flex;
      justify-content:center;
      gap:6px;
      flex-wrap:nowrap;
    }

    .bolinha{
      width:28px;
      height:28px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:700;
      color:#fff;
      flex-shrink:0;
    }

    .vitoria{
      background:var(--win);
    }

    .empate{
      background:var(--draw);
      color:#111;
    }

    .derrota{
      background:var(--loss);
    }

    .lista-jogos{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .grupo-data{
      margin-top:6px;
    }

    .grupo-data-titulo{
      font-size:17px;
      color:var(--gold);
      font-weight:700;
      margin:0 0 10px;
    }

    .jogo-card{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      border:1px solid rgba(255,255,255,.06);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .jogo-topo{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .times-jogo{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      width:100%;
      font-weight:700;
    }

    .jogo-time{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .placar{
      font-size:20px;
      font-weight:700;
      color:var(--gold);
      flex-shrink:0;
      min-width:86px;
      text-align:center;
    }

    .status{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-top:10px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }

    .status.finalizado{
      background:#1b5e20;
      color:#fff;
    }

    .status.agendado{
      background:#7a5a00;
      color:#fff;
    }

    .status.info{
      background:#0e4f86;
      color:#fff;
    }

    .vazio{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:30px;
      border-radius:14px;
      text-align:center;
      color:var(--muted);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
    }

    .acao-danger{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:11px 15px;
      border-radius:10px;
      font-weight:700;
      color:#fff;
      background:var(--danger);
      cursor:pointer;
    }

    .acao-danger:hover{
      filter:brightness(1.06);
      transform:translateY(-1px);
    }
@media (max-width:900px){
      .header-title{
        order:3;
        width:100%;
        text-align:center;
      }

      .header-left,
      .header-right{
        width:100%;
        justify-content:center;
      }

      .filtros{
        grid-template-columns:1fr;
      }

      .grid-2{
        grid-template-columns:1fr;
      }

      .grid-3{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:600px){
      .header-top{
        flex-direction:column;
        align-items:center;
      }

      .header-title{
        order:2;
        width:100%;
        text-align:center;
      }

      .header-left{
        order:1;
        width:100%;
        display:flex;
        flex-direction:row;
        align-items:center;
        justify-content:center;
        gap:10px;
        flex-wrap:nowrap;
      }

      .header-right{
        display:none;
      }

      .top-btn{
        width:auto;
        min-width:0;
        flex:1;
        justify-content:center;
        padding:10px 12px;
        font-size:14px;
      }

      .menu{
        justify-content:flex-start;
        flex-wrap:nowrap;
        overflow-x:auto;
        padding:12px 4px;
        scrollbar-width:none;
      }

      .menu::-webkit-scrollbar{
        display:none;
      }

      .menu a{
        width:auto;
        min-width:max-content;
        flex:0 0 auto;
        text-align:center;
      }

      .abas{
        justify-content:flex-start;
        flex-wrap:nowrap;
        overflow-x:auto;
        padding-bottom:4px;
        scrollbar-width:none;
      }

      .abas::-webkit-scrollbar{
        display:none;
      }

      .aba{
        flex:0 0 auto;
      }

      .subabas{
        justify-content:flex-start;
        flex-wrap:nowrap;
        overflow-x:auto;
        padding-bottom:4px;
        scrollbar-width:none;
      }

      .subabas::-webkit-scrollbar{
        display:none;
      }

      .subaba{
        flex:0 0 auto;
        min-width:max-content;
      }

      table{
        min-width:1100px;
      }

      .hero h1{
        font-size:24px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="wrap header-top">

    <div class="header-left">
      <button class="top-btn btn-light" onclick="voltarPagina()">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </button>

      <a href="index.html" class="top-btn btn-light">
        <i class="fa-solid fa-house"></i> Página Inicial
      </a>
    </div>

    <div class="header-title">
      LIGA GOIANA DE FUTEBOL DE BASE
    </div>

    <div class="header-right"></div>

  </div>

  <div class="nav-bar">
    <div class="wrap">
      <nav class="menu">
        <a href="campeonatos.html">Campeonatos</a>
        <a href="tabela.html">Tabela</a>
        <a href="jogos.html">Jogos</a>
        <a href="times.html">Times</a>
        <a href="artilharia.html">Artilharia</a>
        <a href="cartoes.html">Cartões</a>
        <a href="suspensos.html">Suspensos</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </div>

</header>

<main class="wrap container">

  <section class="hero">
    <div class="hero-top">

      <img id="heroLogo" class="hero-logo" src="logo-liga.jfif">

      <div class="hero-info">
        <h1 id="heroTitulo">Classificação</h1>
        <p id="heroSub">
          Visualização completa do campeonato selecionado.
        </p>

        <div class="hero-tags">
          <div class="hero-tag" id="tagCategoria">Categoria: -</div>
          <div class="hero-tag" id="tagJogos">Jogos: 0</div>
          <div class="hero-tag" id="tagTimes">Times: 0</div>
          <div class="hero-tag" id="tagGols">Gols: 0</div>
        </div>

      </div>
    </div>
  </section>

  <section class="filtros">
    <select id="filtroCampeonato"></select>

    <select id="filtroCategoria">
      <option value="">Selecione a categoria</option>
      <option>Sub-11</option>
      <option>Sub-13</option>
      <option>Sub-15</option>
      <option>Sub-17</option>
    </select>
  </section>

  <section>

    <h2 class="titulo-secao">Temporada</h2>

    <div class="abas">
      <button class="aba ativa" onclick="trocarAba('detalhes', this)">Detalhes</button>
      <button class="aba" onclick="trocarAba('jogos', this)">Jogos</button>
      <button class="aba" onclick="trocarAba('classificacao', this)">Classificação</button>
      <button class="aba" onclick="trocarAba('jogadores', this)">Jogadores</button>
      <button class="aba" onclick="trocarAba('times', this)">Times</button>
      <button class="aba" onclick="trocarAba('historico', this)">Histórico</button>
    </div>

    <div class="subabas" id="subAbas"></div>

    <div id="conteudo"></div>

  </section>
</main>

<script>
let abaAtual = "detalhes";
let subAbaAtual = "geral";

function voltarPagina(){
  if(history.length > 1){
    history.back();
  }else{
    window.location.href = "index.html";
  }
}

/* =========================
   CAMPEONATO TESTE (FIXO)
========================= */

const campeonatoTeste = {
  nome: "Premier League 2024/2025",
  categoria: "Profissional",
  logo: "logo-liga.jfif",

  tabela: [
    {nome:"Manchester City", pontos:91, jogos:38, v:28, e:7, d:3, gp:96, gc:34, forma:["V","V","E","V","V"]},
    {nome:"Arsenal", pontos:89, jogos:38, v:28, e:5, d:5, gp:91, gc:29, forma:["V","V","V","D","V"]},
    {nome:"Liverpool", pontos:82, jogos:38, v:24, e:10, d:4, gp:86, gc:41, forma:["V","E","V","V","E"]},
    {nome:"Aston Villa", pontos:68, jogos:38, v:20, e:8, d:10, gp:76, gc:61, forma:["D","V","V","E","V"]},
    {nome:"Tottenham", pontos:66, jogos:38, v:20, e:6, d:12, gp:74, gc:61, forma:["V","D","V","D","V"]}
  ],

  jogos: [
    {data:"Hoje", casa:"Manchester City", fora:"Arsenal", placar:"2 x 1", status:"finalizado"},
    {data:"Amanhã", casa:"Liverpool", fora:"Chelsea", placar:"", status:"agendado"},
    {data:"22/04", casa:"Tottenham", fora:"Aston Villa", placar:"", status:"agendado"}
  ],

  detalhes:{
    campeao:"Manchester City",
    titulos:"Mais títulos",
    pais:"Inglaterra",
    times:20,
    rodada:"38 / 38"
  },

  gols:1091
};

/* =========================
   INICIAR
========================= */

function iniciar(){
  const select = document.getElementById("filtroCampeonato");

  select.innerHTML = `<option>${campeonatoTeste.nome}</option>`;

  atualizarTela();
}

/* =========================
   TROCAR ABA
========================= */

function trocarAba(nome, el){
  abaAtual = nome;

  document.querySelectorAll(".aba").forEach(b=>b.classList.remove("ativa"));
  el.classList.add("ativa");

  montarSubAbas();
  atualizarTela();
}

/* =========================
   SUBABAS
========================= */

function montarSubAbas(){
  const box = document.getElementById("subAbas");
  box.innerHTML = "";

  let lista = [];

  if(abaAtual === "classificacao"){
    lista = ["Geral","Casa","Fora"];
  }

  if(abaAtual === "jogadores"){
    lista = ["Gols","xG","Assistências"];
  }

  if(abaAtual === "times"){
    lista = ["Lista"];
  }

  if(abaAtual === "historico"){
    lista = ["Campeões"];
  }

  if(!lista.length) return;

  lista.forEach((nome,i)=>{
    const btn = document.createElement("button");
    btn.className = "subaba " + (i===0 ? "ativa":"");
    btn.innerText = nome;

    btn.onclick = ()=>{
      subAbaAtual = nome;
      document.querySelectorAll(".subaba").forEach(b=>b.classList.remove("ativa"));
      btn.classList.add("ativa");
      atualizarTela();
    };

    box.appendChild(btn);
  });
}

function renderClassificacao(){
  const box = document.getElementById("conteudo");

  let lista = [...campeonatoTeste.tabela];

  if(subAbaAtual === "Casa"){
    lista = lista.map(t => ({
      ...t,
      pontos: Math.max(0, t.pontos - 6),
      jogos: Math.max(0, t.jogos - 19),
      v: Math.max(0, t.v - 10),
      e: Math.max(0, t.e - 4),
      d: Math.max(0, t.d - 5),
      gp: Math.max(0, t.gp - 40),
      gc: Math.max(0, t.gc - 18)
    }));
  }

  if(subAbaAtual === "Fora"){
    lista = lista.map(t => ({
      ...t,
      pontos: Math.max(0, t.pontos - 10),
      jogos: Math.max(0, t.jogos - 19),
      v: Math.max(0, t.v - 12),
      e: Math.max(0, t.e - 2),
      d: Math.max(0, t.d - 5),
      gp: Math.max(0, t.gp - 46),
      gc: Math.max(0, t.gc - 16)
    }));
  }

  lista.sort((a,b)=>{
    if(b.pontos !== a.pontos) return b.pontos - a.pontos;
    if((b.gp - b.gc) !== (a.gp - a.gc)) return (b.gp - b.gc) - (a.gp - a.gc);
    return b.gp - a.gp;
  });

  box.innerHTML = `
    <div class="bloco">
      <div class="bloco-titulo">Classificação completa</div>
      <div class="bloco-conteudo">
        <div class="tabela-box">
          <table>
            <thead>
              <tr>
                <th class="col-pos">#</th>
                <th class="col-time">Time</th>
                <th>P</th>
                <th>J</th>
                <th>V</th>
                <th>E</th>
                <th>D</th>
                <th>GM</th>
                <th>GS</th>
                <th>SG</th>
                <th class="forma-cell">Últimos 5</th>
              </tr>
            </thead>
            <tbody>
              ${lista.map((t,i)=>`
                <tr>
                  <td class="col-pos">${i+1}</td>

                  <td class="col-time">
                    <div class="time-wrap">
                      <img src="logo-liga.jfif" class="escudo">
                      <div>
                        <div class="time-nome">${t.nome}</div>
                        <span class="time-extra">${i < 4 ? "Classificado" : "Temporada encerrada"}</span>
                      </div>
                    </div>
                  </td>

                  <td class="pontos">${t.pontos}</td>
                  <td>${t.jogos}</td>
                  <td>${t.v}</td>
                  <td>${t.e}</td>
                  <td>${t.d}</td>
                  <td>${t.gp}</td>
                  <td>${t.gc}</td>
                  <td>${t.gp - t.gc}</td>

                  <td class="forma-cell">
                    <div class="forma">
                      ${t.forma.map(r => `
                        <div class="bolinha ${
                          r === "V" ? "vitoria" :
                          r === "E" ? "empate" :
                          "derrota"
                        }">${r}</div>
                      `).join("")}
                    </div>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function excluirCampeonatoTeste(){
  const confirmar = confirm("Tem certeza que deseja excluir o campeonato de teste?");
  if(!confirmar) return;

  document.getElementById("filtroCampeonato").innerHTML =
    `<option value="">Nenhum campeonato disponível</option>`;

  document.getElementById("filtroCategoria").value = "";

  document.getElementById("heroTitulo").innerText = "Classificação";
  document.getElementById("heroSub").innerText = "Nenhum campeonato de teste disponível.";
  document.getElementById("tagCategoria").innerText = "Categoria: -";
  document.getElementById("tagJogos").innerText = "Jogos: 0";
  document.getElementById("tagTimes").innerText = "Times: 0";
  document.getElementById("tagGols").innerText = "Gols: 0";

  document.getElementById("conteudo").innerHTML = `
    <div class="vazio">
      Campeonato de teste excluído com sucesso.
    </div>
  `;
}

/* =========================
   MENU EXTRA NO FINAL
========================= */

function adicionarBotaoTesteNoFinal(){
  const areaAbas = document.querySelector(".abas");

  const jaExiste = Array.from(areaAbas.querySelectorAll("button"))
    .some(btn => btn.innerText.trim() === "Excluir Teste");

  if(jaExiste) return;

  const btn = document.createElement("button");
  btn.className = "aba";
  btn.type = "button";
  btn.innerText = "Excluir Teste";

  btn.onclick = function(){
    abaAtual = "excluir";

    document.querySelectorAll(".aba").forEach(b=>b.classList.remove("ativa"));
    btn.classList.add("ativa");

    document.getElementById("subAbas").innerHTML = "";
    renderExcluirTeste();
  };

  areaAbas.appendChild(btn);
}
