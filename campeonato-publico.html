<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato - LIGA GOIANA DE FUTEBOL DE BASE</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b1f3a;
color:white;
}

header{
background:#08172c;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
border-bottom:3px solid #f7c600;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.top-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:16px;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
background:#f7c600;
color:black;
border:none;
cursor:pointer;
}

.btn-secundario{
display:inline-flex;
align-items:center;
justify-content:center;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
background:#1a3f73;
color:white;
border:none;
cursor:pointer;
}

.hero{
background:linear-gradient(135deg,#102a52,#0d2346);
border:1px solid rgba(255,230,0,.12);
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

.hero-top{
display:flex;
align-items:center;
gap:18px;
flex-wrap:wrap;
}

.hero-logo{
width:96px;
height:96px;
border-radius:50%;
object-fit:cover;
background:#1a3f73;
border:2px solid rgba(255,255,255,.14);
}

.hero-info{
flex:1;
}

.hero-titulo{
font-size:30px;
font-weight:bold;
color:#f7c600;
margin-bottom:6px;
}

.hero-sub{
font-size:14px;
opacity:.92;
line-height:1.6;
}

.hero-tags{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}

.hero-tag{
background:#0b1f3a;
padding:8px 12px;
border-radius:999px;
font-size:12px;
font-weight:bold;
}

.hero-links{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:16px;
}

.bloco-categoria{
margin-top:16px;
display:flex;
flex-direction:column;
gap:8px;
max-width:320px;
}

.bloco-categoria label{
font-size:13px;
font-weight:bold;
color:#f7c600;
}

.bloco-categoria select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
box-sizing:border-box;
font-size:14px;
background:white;
color:black;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.card{
background:#102a52;
border-radius:14px;
padding:16px;
border:1px solid rgba(255,230,0,.12);
}

.card h3{
margin:0 0 12px;
color:#f7c600;
font-size:20px;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.stat-card{
background:#0b1f3a;
border-radius:10px;
padding:12px;
border:1px solid rgba(255,255,255,.08);
}

.stat-card strong{
display:block;
color:#f7c600;
font-size:13px;
margin-bottom:4px;
}

.stat-card span{
font-size:16px;
font-weight:bold;
}

.times-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:12px;
}

.time-card{
background:#0b1f3a;
border-radius:12px;
padding:12px;
border:1px solid rgba(255,255,255,.08);
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
}

.time-left{
display:flex;
align-items:center;
gap:12px;
min-width:0;
flex:1;
}

.time-logo{
width:52px;
height:52px;
border-radius:50%;
object-fit:cover;
background:#1a3f73;
flex-shrink:0;
}

.time-info{
display:flex;
flex-direction:column;
gap:4px;
min-width:0;
}

.time-info strong{
font-size:15px;
}

.time-info small{
opacity:.9;
font-size:12px;
}

.jogo-item{
background:#0b1f3a;
border-radius:12px;
padding:12px;
margin-bottom:10px;
border:1px solid rgba(255,255,255,.08);
}

.jogo-top{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
font-weight:bold;
}

.placar{
color:#f7c600;
font-size:18px;
font-weight:bold;
}

.tags{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-top:8px;
}

.tag{
background:#1a3f73;
padding:4px 8px;
border-radius:999px;
font-size:12px;
}

.vazio{
background:#0b1f3a;
border-radius:12px;
padding:16px;
text-align:center;
opacity:.9;
}

.loading{
background:#102a52;
border-radius:12px;
padding:30px;
text-align:center;
}

.coluna-unica{
grid-column:1 / -1;
}

@media (max-width:900px){
.grid{
grid-template-columns:1fr;
}

.stats-grid{
grid-template-columns:1fr 1fr;
}
}

@media (max-width:600px){
.stats-grid{
grid-template-columns:1fr;
}

.time-card{
flex-direction:column;
align-items:flex-start;
}

.time-left{
width:100%;
}
}
</style>
</head>
<body>

<header>LIGA GOIANA DE FUTEBOL DE BASE</header>

<div class="container">
  <div class="top-actions">
    <a href="campeonatos.html" class="btn">← Voltar para Campeonatos</a>
  </div>

  <div id="conteudoCampeonato" class="loading">Carregando campeonato...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  getDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyArj4yRlEl-yibkc0VEmL_4UJpRHHQSc",
  authDomain: "liga-goiana-base.firebaseapp.com",
  projectId: "liga-goiana-base",
  storageBucket: "liga-goiana-base.appspot.com",
  messagingSenderId: "952863591183",
  appId: "1:952863591183:web:4eea34f494ba2dd754cc7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let times = [];
let jogos = [];
let sumulas = [];
let campeonatoAtual = null;

function getParametro(nome){
  const params = new URLSearchParams(window.location.search);
  return params.get(nome);
}

function escapar(texto){
  return String(texto || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function normalizarTexto(texto){
  return String(texto || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function parseDataFlex(valor){
  if(!valor) return new Date(0);

  const dataIso = new Date(valor);
  if(!isNaN(dataIso.getTime())) return dataIso;

  const texto = String(valor).trim();
  const matchBR = texto.match(/^(\d{2})\/(\d{2})\/(\d{4})(?:\s*-\s*(\d{2}):(\d{2}))?$/);

  if(matchBR){
    const [, dia, mes, ano, hora = "00", minuto = "00"] = matchBR;
    return new Date(`${ano}-${mes}-${dia}T${hora}:${minuto}:00`);
  }

  return new Date(0);
}

function formatarData(valor){
  if(!valor) return "-";
  const data = parseDataFlex(valor);
  if(isNaN(data.getTime())) return valor;

  const dia = String(data.getDate()).padStart(2, "0");
  const mes = String(data.getMonth() + 1).padStart(2, "0");
  const ano = data.getFullYear();
  return `${dia}/${mes}/${ano}`;
}

function montarLink(pagina, nomeCampeonato, categoria){
  const params = new URLSearchParams();

  if(nomeCampeonato){
    params.set("campeonato", nomeCampeonato);
  }

  if(categoria){
    params.set("categoria", categoria);
  }

  const query = params.toString();
  return query ? `${pagina}?${query}` : pagina;
}

function atualizarLinksDeAcesso(){
  if(!campeonatoAtual) return;

  const select = document.getElementById("categoriaSelecionada");
  const categoria = select ? select.value : "";

  const linkTabela = document.getElementById("linkTabela");
  const linkJogos = document.getElementById("linkJogos");
  const linkSuspensos = document.getElementById("linkSuspensos");

  if(linkTabela){
    linkTabela.href = montarLink("tabela.html", campeonatoAtual.nome, categoria);
  }

  if(linkJogos){
    linkJogos.href = montarLink("jogos.html", campeonatoAtual.nome, categoria);
  }

  if(linkSuspensos){
    linkSuspensos.href = montarLink("suspensos.html", campeonatoAtual.nome, categoria);
  }
}

window.atualizarCategoriaPublica = function(){
  atualizarLinksDeAcesso();
};

async function carregarBases(){
  const snapTimes = await getDocs(collection(db, "times"));
  times = [];
  snapTimes.forEach(docSnap => times.push({ id: docSnap.id, ...docSnap.data() }));

  const snapJogos = await getDocs(collection(db, "jogos"));
  jogos = [];
  snapJogos.forEach(docSnap => jogos.push({ id: docSnap.id, ...docSnap.data() }));

  const snapSumulas = await getDocs(collection(db, "sumulas"));
  sumulas = [];
  snapSumulas.forEach(docSnap => sumulas.push({ id: docSnap.id, ...docSnap.data() }));
}

function timePertenceAoCampeonato(time, campeonato){
  const campeonatoId = campeonato.id;
  const campeonatoNome = normalizarTexto(campeonato.nome);

  const campoCampeonatoId = String(time.campeonatoId || "").trim();
  const campoCampeonato = normalizarTexto(time.campeonato || "");
  const campoCampeonatoNome = normalizarTexto(time.campeonatoNome || "");

  const listaCampeonatos = Array.isArray(time.campeonatos) ? time.campeonatos.map(v => normalizarTexto(v)) : [];
  const listaCampeonatoIds = Array.isArray(time.campeonatoIds) ? time.campeonatoIds.map(v => String(v).trim()) : [];

  if (campoCampeonatoId && campoCampeonatoId === campeonatoId) return true;
  if (campoCampeonato && campoCampeonato === campeonatoNome) return true;
  if (campoCampeonatoNome && campoCampeonatoNome === campeonatoNome) return true;
  if (listaCampeonatos.includes(campeonatoNome)) return true;
  if (listaCampeonatoIds.includes(campeonatoId)) return true;

  return false;
}

function getTimesDoCampeonato(campeonato){
  const viaCadastro = times.filter(time => timePertenceAoCampeonato(time, campeonato));

  const nomesNosJogos = new Set();
  jogos.forEach(j => {
    if(normalizarTexto(j.campeonato) === normalizarTexto(campeonato.nome)){
      if(j.timeA) nomesNosJogos.add(normalizarTexto(j.timeA));
      if(j.timeB) nomesNosJogos.add(normalizarTexto(j.timeB));
    }
  });

  const viaJogos = times.filter(t => nomesNosJogos.has(normalizarTexto(t.nome)));

  const mapa = new Map();
  [...viaCadastro, ...viaJogos].forEach(t => mapa.set(t.id, t));

  return Array.from(mapa.values()).sort((a,b) => String(a.nome || "").localeCompare(String(b.nome || ""), "pt-BR"));
}

function getEstatisticasCampeonato(campeonato){
  const jogosDoCampeonato = jogos.filter(j => normalizarTexto(j.campeonato) === normalizarTexto(campeonato.nome));
  const sumulasDoCampeonato = sumulas.filter(s => normalizarTexto(s.campeonato) === normalizarTexto(campeonato.nome));

  const categoriasSet = new Set();
  const timesSet = new Set();
  let gols = 0;

  jogosDoCampeonato.forEach(j => {
    if(j.categoria) categoriasSet.add(j.categoria);
    if(j.timeA) timesSet.add(j.timeA);
    if(j.timeB) timesSet.add(j.timeB);
  });

  sumulasDoCampeonato.forEach(s => {
    gols += Number(s.golsA || 0) + Number(s.golsB || 0);
  });

  return {
    jogosCadastrados: jogosDoCampeonato.length,
    jogosFinalizados: sumulasDoCampeonato.length,
    categorias: Array.from(categoriasSet),
    times: timesSet.size,
    gols
  };
}

function renderSelectCategorias(campeonato, stats){
  const categoriasBase = Array.isArray(campeonato.categorias) ? campeonato.categorias : [];
  const categoriasJogos = Array.isArray(stats.categorias) ? stats.categorias : [];

  const mapa = new Map();
  [...categoriasBase, ...categoriasJogos].forEach(categoria => {
    if(categoria){
      mapa.set(normalizarTexto(categoria), categoria);
    }
  });

  const categorias = Array.from(mapa.values()).sort((a,b) => a.localeCompare(b, "pt-BR"));

  if(!categorias.length){
    return "";
  }

  return `
    <div class="bloco-categoria">
      <label for="categoriaSelecionada">Escolha a categoria</label>
      <select id="categoriaSelecionada" onchange="atualizarCategoriaPublica()">
        <option value="">Todas as categorias</option>
        ${categorias.map(c => `<option value="${c}">${c}</option>`).join("")}
      </select>
    </div>
  `;
}

function renderTimesParticipantes(campeonato){
  const lista = getTimesDoCampeonato(campeonato);

  if(!lista.length){
    return `<div class="vazio">Nenhum time participante encontrado.</div>`;
  }

  return `
    <div class="times-grid">
      ${lista.map(t => `
        <div class="time-card">
          <div class="time-left">
            <img src="${escapar(t.escudo || 'logo-liga.jfif')}" class="time-logo" alt="${escapar(t.nome || "Time")}">
            <div class="time-info">
              <strong>${escapar(t.nome || "Time")}</strong>
              <small>${Array.isArray(t.categorias) && t.categorias.length ? t.categorias.map(c => escapar(c)).join(", ") : "Sem categoria"}</small>
            </div>
          </div>

          <a class="btn-secundario" href="time-publico.html?id=${t.id}">
            Ver Time
          </a>
        </div>
      `).join("")}
    </div>
  `;
}

function renderUltimosJogos(campeonato){
  const lista = jogos
    .filter(j => normalizarTexto(j.campeonato) === normalizarTexto(campeonato.nome))
    .sort((a,b) => parseDataFlex(b.data || "") - parseDataFlex(a.data || ""))
    .slice(0, 8);

  if(!lista.length){
    return `<div class="vazio">Nenhum jogo encontrado para esse campeonato.</div>`;
  }

  return lista.map(j => {
    const finalizado = j.status === "sumula_enviada";
    const placar = finalizado
      ? `${Number(j.golsA || 0)} x ${Number(j.golsB || 0)}`
      : "x";

    return `
      <div class="jogo-item">
        <div class="jogo-top">
          <div>${escapar(j.timeA || "-")} x ${escapar(j.timeB || "-")}</div>
          <div class="placar">${placar}</div>
        </div>
        <div style="margin-top:8px;font-size:13px;opacity:.9;">
          ${formatarData(j.data)} | ${escapar(j.local || "-")}
        </div>
        <div class="tags">
          <div class="tag">${escapar(j.categoria || "-")}</div>
          <div class="tag">${finalizado ? "Finalizado" : "Agendado"}</div>
        </div>
      </div>
    `;
  }).join("");
}

async function carregarCampeonato(){
  const campeonatoId = getParametro("id");
  const box = document.getElementById("conteudoCampeonato");

  if(!campeonatoId){
    box.innerHTML = `<div class="loading">ID do campeonato não informado.</div>`;
    return;
  }

  try{
    const refCampeonato = doc(db, "campeonatos", campeonatoId);
    const snapCampeonato = await getDoc(refCampeonato);

    if(!snapCampeonato.exists()){
      box.innerHTML = `<div class="loading">Campeonato não encontrado.</div>`;
      return;
    }

    campeonatoAtual = { id: snapCampeonato.id, ...snapCampeonato.data() };
    const stats = getEstatisticasCampeonato(campeonatoAtual);

    box.innerHTML = `
      <div class="hero">
        <div class="hero-top">
          <img src="${escapar(campeonatoAtual.logo || 'logo-liga.jfif')}" class="hero-logo" alt="${escapar(campeonatoAtual.nome || "Campeonato")}">
          <div class="hero-info">
            <div class="hero-titulo">${escapar(campeonatoAtual.nome || "Campeonato")}</div>
            <div class="hero-sub">
              Temporada: ${escapar(campeonatoAtual.temporada || "-")}<br>
              Status: ${escapar(campeonatoAtual.status || "-")}
            </div>

            <div class="hero-tags">
              ${(campeonatoAtual.categorias || []).map(c => `<div class="hero-tag">${escapar(c)}</div>`).join("") || `<div class="hero-tag">Sem categoria</div>`}
            </div>

            ${renderSelectCategorias(campeonatoAtual, stats)}

            <div class="hero-links">
              <a class="btn-secundario" id="linkTabela" href="#">Tabela</a>
              <a class="btn-secundario" id="linkJogos" href="#">Jogos</a>
              <a class="btn-secundario" id="linkSuspensos" href="#">Suspensos</a>
            </div>
          </div>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h3>Estatísticas</h3>
          <div class="stats-grid">
            <div class="stat-card"><strong>Temporada</strong><span>${escapar(campeonatoAtual.temporada || "-")}</span></div>
            <div class="stat-card"><strong>Times</strong><span>${stats.times}</span></div>
            <div class="stat-card"><strong>Jogos</strong><span>${stats.jogosCadastrados}</span></div>
            <div class="stat-card"><strong>Finalizados</strong><span>${stats.jogosFinalizados}</span></div>
            <div class="stat-card"><strong>Gols</strong><span>${stats.gols}</span></div>
            <div class="stat-card"><strong>Categorias</strong><span>${stats.categorias.length}</span></div>
          </div>

          <div class="hero-tags" style="margin-top:14px;">
            ${(stats.categorias.length ? stats.categorias : (campeonatoAtual.categorias || [])).map(c => `<div class="hero-tag">${escapar(c)}</div>`).join("")}
          </div>
        </div>

        <div class="card">
          <h3>Últimos Jogos</h3>
          ${renderUltimosJogos(campeonatoAtual)}
        </div>

        <div class="card coluna-unica">
          <h3>Times Participantes</h3>
          ${renderTimesParticipantes(campeonatoAtual)}
        </div>
      </div>
    `;

    atualizarLinksDeAcesso();
  }catch(erro){
    console.error(erro);
    box.innerHTML = `<div class="loading">Erro ao carregar o campeonato.</div>`;
  }
}

await carregarBases();
await carregarCampeonato();
</script>

</body>
</html>
