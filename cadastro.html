<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Liga Goiana</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(rgba(2,10,25,.75), rgba(2,10,25,.9)), url("fundo.png");
      background-size:cover;
      background-position:center;
      min-height:100vh;
      color:white;
    }

    .container{
      width:100%;
      max-width:950px;
      margin:40px auto;
      padding:20px;
      box-sizing:border-box;
    }

    .box{
      background:rgba(3,16,34,.94);
      border:1px solid rgba(255,230,0,.18);
      border-radius:18px;
      padding:28px;
      box-shadow:0 12px 28px rgba(0,0,0,.35);
    }

    h1{
      margin:0 0 8px;
      color:#ffe600;
      text-align:center;
      text-transform:uppercase;
      font-size:30px;
    }

    .sub{
      margin:0 0 22px;
      text-align:center;
      color:#dbe3ee;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .full{
      grid-column:1 / -1;
    }

    label{
      display:block;
      margin:0 0 6px;
      font-weight:bold;
      color:#eef4ff;
    }

    input, select{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      box-sizing:border-box;
      font-size:14px;
    }

    .acoes{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
    }

    button{
      padding:13px 18px;
      border:none;
      border-radius:10px;
      background:linear-gradient(to bottom, #fff04d, #ffd000);
      color:#111;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
    }

    .btn-sec{
      background:#1a335f;
      color:white;
    }

    .links{
      margin-top:18px;
      text-align:center;
    }

    .links a{
      color:#ffe600;
      font-weight:bold;
      text-decoration:none;
    }

    .msg{
      margin-top:16px;
      padding:12px;
      border-radius:10px;
      display:none;
      font-weight:bold;
    }

    .erro{
      background:rgba(180,0,0,.22);
      color:#ffb0b0;
      border:1px solid rgba(255,120,120,.25);
    }

    .sucesso{
      background:rgba(0,120,0,.22);
      color:#b8ffbe;
      border:1px solid rgba(120,255,140,.25);
    }

    @media (max-width: 700px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="box">
      <h1>Cadastro de Usuário</h1>
      <p class="sub">Preencha seus dados para criar sua conta no sistema</p>

      <div class="grid">
        <div>
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Digite seu nome completo">
        </div>

        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Digite seu email">
        </div>

        <div>
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Crie uma senha">
        </div>

        <div>
          <label for="telefone">Telefone</label>
          <input type="text" id="telefone" placeholder="(00) 00000-0000">
        </div>

        <div>
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00">
        </div>

        <div>
          <label for="dataNascimento">Data de nascimento</label>
          <input type="date" id="dataNascimento">
        </div>

        <div>
          <label for="tipoUsuario">Tipo de usuário</label>
          <select id="tipoUsuario">
            <option value="">Selecione</option>
            <option value="pai_atleta">Pai de Atleta</option>
            <option value="jogador">Jogador</option>
            <option value="tecnico">Técnico</option>
            <option value="publico_geral">Público Geral</option>
          </select>
        </div>

        <div>
          <label for="categoria">Categoria</label>
          <select id="categoria">
            <option value="">Selecione</option>
            <option value="Sub-11">Sub-11</option>
            <option value="Sub-12">Sub-12</option>
            <option value="Sub-13">Sub-13</option>
            <option value="Sub-14">Sub-14</option>
            <option value="Sub-15">Sub-15</option>
            <option value="Sub-16">Sub-16</option>
            <option value="Sub-17">Sub-17</option>
            <option value="Sub-18">Sub-18</option>
          </select>
        </div>

        <div class="full">
          <label for="time">Time</label>
          <input type="text" id="time" placeholder="Digite o nome do time">
        </div>
      </div>

      <div class="acoes">
        <button onclick="cadastrarUsuario()">Cadastrar</button>
        <button class="btn-sec" onclick="window.location.href='login.html'">Ir para Login</button>
      </div>

      <div id="msgErro" class="msg erro"></div>
      <div id="msgSucesso" class="msg sucesso"></div>

      <div class="links">
        <a href="index.html">← Voltar para o site</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const msgErro = document.getElementById("msgErro");
    const msgSucesso = document.getElementById("msgSucesso");

    function mostrarErro(texto){
      msgSucesso.style.display = "none";
      msgErro.style.display = "block";
      msgErro.innerText = texto;
    }

    function mostrarSucesso(texto){
      msgErro.style.display = "none";
      msgSucesso.style.display = "block";
      msgSucesso.innerText = texto;
    }

    window.cadastrarUsuario = async function(){
      const nome = document.getElementById("nome").value.trim();
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const telefone = document.getElementById("telefone").value.trim();
      const cpf = document.getElementById("cpf").value.trim();
      const dataNascimento = document.getElementById("dataNascimento").value;
      const tipoUsuario = document.getElementById("tipoUsuario").value;
      const categoria = document.getElementById("categoria").value;
      const time = document.getElementById("time").value.trim();

      if(!nome) return mostrarErro("Preencha o nome completo.");
      if(!email) return mostrarErro("Preencha o email.");
      if(!senha) return mostrarErro("Preencha a senha.");
      if(senha.length < 6) return mostrarErro("A senha precisa ter pelo menos 6 caracteres.");
      if(!telefone) return mostrarErro("Preencha o telefone.");
      if(!cpf) return mostrarErro("Preencha o CPF.");
      if(!dataNascimento) return mostrarErro("Preencha a data de nascimento.");
      if(!tipoUsuario) return mostrarErro("Selecione o tipo de usuário.");

      try{
        const cred = await createUserWithEmailAndPassword(auth, email, senha);

        await setDoc(doc(db, "usuarios", cred.user.uid), {
          uid: cred.user.uid,
          nome: nome,
          email: email,
          telefone: telefone,
          cpf: cpf,
          dataNascimento: dataNascimento,
          tipoUsuario: tipoUsuario,
          categoria: categoria || "",
          time: time || "",
          status: "ativo",
          criadoEm: new Date().toISOString()
        });

        mostrarSucesso("Cadastro realizado com sucesso! Você será levado para o login.");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1800);

      }catch(e){
        if(e.code === "auth/email-already-in-use"){
          mostrarErro("Esse email já está em uso.");
        }else if(e.code === "auth/invalid-email"){
          mostrarErro("Email inválido.");
        }else if(e.code === "auth/weak-password"){
          mostrarErro("Senha fraca. Use pelo menos 6 caracteres.");
        }else{
          mostrarErro("Erro ao cadastrar: " + e.message);
        }
      }
    };
  </script>

</body>
</html>
