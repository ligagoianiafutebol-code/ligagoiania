<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notícias - Admin</title>
<style>
body{margin:0;font-family:Arial;background:#0b1f3a;color:white;}
header{background:#08172c;padding:15px;text-align:center;font-size:22px;font-weight:bold;border-bottom:3px solid #f7c600;}
.container{padding:15px;}
.btn{background:#f7c600;color:black;padding:10px;border-radius:8px;text-decoration:none;display:inline-block;margin-bottom:15px;font-weight:bold;}
.card{background:#102a52;padding:15px;border-radius:10px;margin-bottom:10px;}
.title{font-weight:bold;margin-bottom:6px;}
.info{font-size:13px;opacity:.85;margin-bottom:8px;}
.actions a{background:#1a3f73;padding:6px 10px;border-radius:6px;color:white;text-decoration:none;margin-right:5px;font-size:12px;}
.back{display:block;margin-top:10px;color:#f7c600;text-decoration:none;font-weight:bold;}
</style>
</head>
<body>
<header>Notícias</header>
<div class="container">
<a class="btn">+ Nova Notícia</a>

<div class="card">
  <div class="title">Abertura da Copa União</div>
  <div class="info">Publicada em 10/04/2026</div>
  <div class="actions">
    <a>Editar</a>
    <a>Publicar</a>
  </div>
</div>

<div class="card">
  <div class="title">Mudança de horário da rodada</div>
  <div class="info">Publicada em 12/04/2026</div>
  <div class="actions">
    <a>Editar</a>
    <a>Publicar</a>
  </div>
</div>

<a href="admin.html" class="back">← Voltar</a>
</div>
</body>
</html>
